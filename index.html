    if (state.subTab === "paper") {
      // 面板 + 论文→PAPER_DATA(display-paper-daily)
      if (channel === "display") {
        if (!PAPER_DATA || typeof PAPER_DATA !== "object") return null;
        if (date === "latest") {
          const keys = Object.keys(PAPER_DATA).sort().reverse();
          return keys.length ? PAPER_DATA[keys[0]] : null;
        }
        return PAPER_DATA[date] || null;
      }
      // 半导体 + 论文→SEMICON_DATA(semicon-paper-daily混在semicon池)
      const pool = SEMICON_DATA || {};
      if (date === "latest") {
        const keys = Object.keys(pool).sort().reverse();
        return keys.length ? pool[keys[0]] : null;
      }
      return pool[date] || null;
    }
    let pool;
    if (channel === "ai") pool = AI_DATA;
    else if (channel === "semicon") pool = SEMICON_DATA || {};
    else pool = DISPLAY_DATA;
    if (!pool || typeof pool !== "object") return null;
    if (date === "latest") {
      const keys = Object.keys(pool).sort().reverse();
      return keys.length ? pool[keys[0]] : null;
    }
    return pool[date] || null;
  }

  function getSubTabs(channel) {
    if (channel === "search") return [];
    if (channel === "ai") return [
      { id: "news", label: "新闻速递" },
      { id: "skills", label: "Skill 推荐" },
    ];
    if (channel === "research") return [
      { id: "weekly", label: "周清单" },
      { id: "daily", label: "每日拆解" },
    ];
    if (channel === "display") return [
      { id: "news", label: "新闻速递" },
      { id: "paper", label: "论文研讨" },
    ];
    return [
      { id: "news", label: "新闻速递" },
      { id: "paper", label: "论文研讨" },
      { id: "test", label: "器件测试" },
    ];
  }

  // ========== DATE PICKER ==========
  function fillDateSelect() {
    const sel = $("#dateSelect");
    sel.innerHTML = "";
    // Show dates where current channel has data
    const ch = state.channel;
    const pool = state.subTab === "paper"
      ? (state.channel === "display" ? PAPER_DATA : SEMICON_DATA || {})
      : ch === "ai" ? AI_DATA
      : ch === "semicon" ? (SEMICON_DATA || {})
      : ch === "research" ? (RESEARCH_DATA || {})
      : DISPLAY_DATA;
    const dates = pool && typeof pool === "object" ? Object.keys(pool).sort().reverse() : [];
    if (!dates.length && HISTORY) {
      HISTORY.forEach(d => {
        const opt = document.createElement("option");
        opt.value = d.date;
        opt.textContent = `${d.date} ${d.weekday || ""}`;
        sel.appendChild(opt);
      });
      return;
    }
    dates.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d;
      opt.textContent = d;
      sel.appendChild(opt);
    });
    if (dates.length) sel.value = dates[0];
  }

  function getDateLabel(date) {
    const e = HISTORY ? HISTORY.find(h => h.date === date) : null;
    return e ? `${date} ${e.weekday || ""}` : date;
  }

  // ========== RENDER — NEWS (featured / secondary / flash) ==========
  function renderNews(data) {
    if (!data) return `<div class="error">暂无数据</div>`;
    const news = data.news || [];
    if (!news.length) return `<div class="error">暂无新闻</div>`;

    // Classify by priority (default secondary)
    const featured = news.filter(n => n.priority === "featured").slice(0, 2);
    const secondary = news.filter(n => n.priority === "secondary");
    const flash = news.filter(n => n.priority === "flash");

    // If no priorities set, treat first 2 as featured, next 5 as secondary, rest as flash
    const hasPrioritySet = news.some(n => n.priority);
    let fNews = featured, sNews = secondary, flNews = flash;
    if (!hasPrioritySet) {
      fNews = news.slice(0, 2);
      sNews = news.slice(2, 7);
      flNews = news.slice(7);
    }

    let html = "";

    // ---- Hero / Summary ----
    if (data.summary || data.highlights) {
      html += `<div class="hero-section">`;
      if (data.summary) {
        // Summary as context line
      }
      if (data.highlights && data.highlights.length) {
        html += `<div class="overview-box">`;
        html += `<span class="overview-title">本期概述</span>`;
        html += `<p class="overview-text">${esc(data.summary || "")}</p>`;
        if (data.focus) html += `<span class="overview-focus">${esc(data.focus)}</span>`;
        html += `</div>`;
      }
      html += `</div>`;
    }

    // ---- Featured (hero cards) ----
    if (fNews.length) {
      html += `<div class="hero-section">`;
      html += `<span class="section-label">重点关注</span>`;
      html += `<div class="featured-grid">`;
      fNews.forEach(n => {
        const img = n.image
          ? `<img class="card-img" src="${esc(n.image)}" alt="${esc(n.title)}" loading="lazy" onerror="this.closest('.featured-card').classList.add('fc-tech');this.remove()" />`
          : ``;
        const tags = ` <span class="tag" style="background:rgba(255,255,255,0.2);color:#fff;font-size:10px">${esc(n.tech || n.route || n.category || "")}</span>`;
        const cardClass = !img ? " featured-card fc-panel" : " featured-card";
        html += `
          <div class="${cardClass}">
            ${img || ``}
            <div class="card-overlay">
              <div class="card-tags">${tags}${routeBadge(n.routeStatus)}</div>
              <h2>${esc(n.title)}</h2>
              <p class="card-summary">${esc(n.content || n.event || "")}</p>
            </div>
            ${n.url ? `<a class="featured-link" href="${safeHref(esc(n.url))}" target="_blank" rel="noopener"></a>` : ""}
          </div>`;
      });
      html += `</div></div>`;
    }

    // ---- Secondary (glassmorphism grid) ----
    if (sNews.length) {
      html += `<div class="secondary-section">`;
      html += `<span class="section-label">深度速读</span>`;
      html += `<div class="secondary-grid">`;
      sNews.forEach((n, i) => {
        // 收窄版 Bento：缩小宽窄差异，杜绝空列
        // 条数→排布：4→2+2, 5→2+3, 6→2+2+2（6 列网格，span 取 2/3，最大宽窄比 1.5）
        const span = buildSecondarySpans(sNews.length)[i] || 3;

        const img = n.image
          ? `<img class="sec-img" src="${esc(n.image)}" alt="${esc(n.title)}" loading="lazy" onerror="this.remove()" />`
          : ``;
        const tags = n.tech ? `<span class="sec-tag">${esc(n.tech)}</span>` : "";
        const routeT = routeBadge(n.routeStatus);
        html += `
          <div class="secondary-card sec-span-${span}">
            ${img || ""}
            <div class="sec-body">
              <div class="sec-tags">${tags}${routeT}</div>
              <h3>${esc(n.title)}</h3>
              <p class="sec-summary">${esc(n.content || n.event || n.reason || "")}</p>
              <div class="sec-meta">
                <span>${esc(n.source || "")}</span>
                ${n.url ? `<a class="sec-link" href="${safeHref(esc(n.url))}" target="_blank" rel="noopener">阅读 →</a>` : ""}
              </div>
            </div>
          </div>`;
      });
      html += `</div></div>`;
    }

    // ---- Flash (compact list) ----
    if (flNews.length) {
      html += `<div class="flash-section">`;
      html += `<span class="section-label">快讯速览</span>`;
      html += `<div class="flash-list">`;
      flNews.forEach((n, i) => {
        const tag = n.tech || n.route || n.category || "";
        html += `
          <div class="flash-item">
            <span class="flash-index">${i + 1}</span>
            <div class="flash-content">
              <div class="flash-title">${esc(n.title)}</div>
              <p class="flash-summary">${esc(n.content || n.event || n.reason || "")}</p>
              <div class="flash-meta">
                <span class="flash-source">${esc(n.source || n.date || "")}</span>
                ${tag ? `<span class="flash-tag">${esc(tag)}</span>` : ""}
              </div>
            </div>
            ${n.url ? `<a class="flash-link" href="${safeHref(esc(n.url))}" target="_blank" rel="noopener">→</a>` : ""}
          </div>`;
      });
      html += `</div></div>`;
    }

    return html;
  }

  // ========== RENDER — PAPER (deep read, one per page) ==========
  function renderPaper(data) {
    if (!data) return `<div class="error">暂无论文数据</div>`;
    const papers = data.papers || [];
    if (!papers.length) return `<div class="error">暂无论文</div>`;
    const dkey = data.date || state.date;

    let html = `<div class="paper-section">`;

    // Summary header
    if (data.summary || data.highlights) {
      html += `<div class="overview-box">`;
      html += `<span class="overview-title">本期论文概述</span>`;
      if (data.summary) html += `<p class="overview-text">${esc(data.summary)}</p>`;
      if (data.focus) html += `<span class="overview-focus">${esc(data.focus)}</span>`;
      html += `</div>`;
    }

    papers.forEach((p, idx) => {
      if (idx > 0) html += `<div class="paper-divider"></div>`;

      const img = p.image
        ? `<img class="paper-header-img" src="${esc(p.image)}" alt="${esc(p.title)}" loading="lazy" onerror="this.remove()" />`
        : `<div class="paper-header-fallback"></div>`;

      const tags = [
        p.paperType ? `<span class="paper-meta-tag type">${esc(p.paperType)}</span>` : "",
        p.field ? `<span class="paper-meta-tag field">${esc(p.field)}</span>` : "",
        p.venue ? `<span class="paper-meta-tag venue">${esc(p.venue)}</span>` : "",
      ].filter(Boolean).join("");

      const techTags = (p.techTags || p.keywords || []).filter(Boolean);
      const tagCloud = techTags.length
        ? `<div class="paper-tag-cloud">${techTags.map(t => `<span class="paper-tag">${esc(t)}</span>`).join("")}</div>`
        : "";

      const metrics = p.metrics || [];
      const metricsHtml = metrics.length
        ? `<div class="paper-metrics">${metrics.map(m => `
          <div class="paper-metric">
            <span class="paper-metric-name">${esc(m.name || "")}</span>
            <span class="paper-metric-value">${esc(m.value || "")}${m.unit ? `<span class="paper-metric-unit">${esc(m.unit)}</span>` : ""}</span>
            ${m.note ? `<div class="paper-metric-note">${esc(m.note)}</div>` : ""}
          </div>`).join("")}</div>`
        : "";

      const attachments = [];
      if (p.pdf || p.pdfLocal) {
        const pdfHref = p.pdfLocal || p.pdf;
        const isLocal = !!p.pdfLocal;
        attachments.push(`<a class="attach-pill${isLocal ? " local" : ""}" href="${safeHref(esc(pdfHref))}" target="${isLocal ? "_self" : "_blank"}" rel="noopener" data-track-pdf="pp-${esc(dkey)}-${idx}">⬇ PDF</a>`);
      }
      (p.attachments || []).forEach(a => {
        const isLocal = a.cached || (a.url || "").startsWith("./");
        attachments.push(`<a class="attach-pill${isLocal ? " local" : ""}" href="${safeHref(esc(a.url))}" target="${isLocal ? "_self" : "_blank"}" rel="noopener" data-track-pdf="pp-${esc(dkey)}-${idx}">${esc(a.label || a.name || "PDF")}</a>`);
      });
      const attachmentsHtml = attachments.length ? `<div class="paper-attachments">${attachments.join("")}</div>` : "";

      html += `
        <article class="paper-card-full" data-track-id="pp-${esc(dkey)}-${idx}" data-track-type="paper">
          ${img}
          <div class="paper-body">
            <div class="paper-meta-tags">${tags}</div>
            <h1 class="paper-title">${esc(p.title)}</h1>
            ${p.authors ? `<div class="paper-authors">${esc(p.authors)}</div>` : ""}
            ${p.oneLiner ? `<div class="paper-oneliner">${esc(p.oneLiner)}</div>` : ""}
            ${tagCloud}
            ${metricsHtml}

            <div class="paper-section-block">
              <span class="paper-section-label">摘要</span>
              <p>${esc(p.abstract || p.content || "")}</p>
            </div>

            <div class="paper-section-block">
              <span class="paper-section-label">技术解读</span>
              <p>${esc(p.content || p.techIntro || p.abstract || "")}</p>
            </div>

            ${p.techIntro ? `
            <div class="paper-section-block">
              <span class="paper-section-label">背景知识</span>
              <p>${esc(p.techIntro)}</p>
            </div>` : ""}

            ${attachmentsHtml}

            <div class="paper-footer">
              <span class="paper-source">${esc(p.source || "")}</span>
              <span>${esc(p.date || data.date || "")}</span>
            </div>
            ${p.url ? `<a class="paper-link" href="${safeHref(esc(p.url))}" target="_blank" rel="noopener">查看原文 →</a>` : ""}
          </div>
        </article>`;
    });

    html += `</div>`;
    return html;
  }

  // ========== RENDER — SEMICON TEST (半导体器件测试) ==========
  function renderSemiconTest(data) {
    if (!data) return `<div class="error">暂无数据</div>`;
    const tests = data.tests || [];
    if (!tests.length) return `<div class="error">本日期暂无器件测试内容</div>`;
    const dkey = data.date || state.date;

    let html = `<div class="paper-section">`;
    if (data.summary || (data.testsNote)) {
      // 仅当存在专门概述时显示；器件测试通常无独立 overview
    }
    html += `<div class="overview-box">`;
    html += `<div class="overview-head"><span class="overview-title">半导体器件测试 · 每日 1-2 条</span>`;
    html += `<span class="overview-focus">聚焦极限/非常规测试方法、可靠性表征与测试规范优化</span></div>`;
    html += `</div>`;

    tests.forEach((it, idx) => {
      if (idx > 0) html += `<div class="paper-divider"></div>`;
      const hasCJK = (s) => /[一-鿿]/.test(s || "");
      const title = it.cnTitle || it.title || "";
      const tags = [
        it.venue ? `<span class="paper-meta-tag venue">${esc(it.venue)}</span>` : "",
        it.venueType ? `<span class="paper-meta-tag ${it.venueType === '会议' ? 'conf' : 'venue'}">${esc(it.venueType)}</span>` : "",
        it.year ? `<span class="paper-meta-tag type">${esc(it.year)}</span>` : "",
      ].filter(Boolean).join("");
      const techTags = (it.keywords || []).filter(Boolean);
      const tagCloud = techTags.length ? `<div class="paper-tag-cloud">${techTags.map(t => `<span class="paper-tag">${esc(t)}</span>`).join("")}</div>` : "";

      // —— 六字段（测试方法/创新点/测试原理/适用场景/关键指标）——
      const fields = [
        { label: "测试方法", val: it.method },
        { label: "创新点", val: it.innovation },
        { label: "测试原理", val: it.principle },
        { label: "适用场景", val: it.scenario },
      ].filter(f => f.val && f.val !== "见原文摘要 (See abstract)");
      let fieldsHtml = "";
      if (fields.length) {
        fieldsHtml = `<div class="test-fields">` + fields.map(f =>
          `<div class="test-field"><span class="test-field-label">${esc(f.label)}</span><p class="test-field-val">${esc(f.val)}</p></div>`
        ).join("") + `</div>`;
      } else if (it.abstract) {
        fieldsHtml = `<div class="paper-section-block"><span class="paper-section-label">摘要</span><p>${esc(it.abstract)}</p></div>`;
      }

      // 关键指标
      const metrics = it.metrics || [];
      const metricsHtml = metrics.length
        ? `<div class="test-metrics"><span class="test-field-label">关键指标</span><div class="test-metric-row">` +
          metrics.map(m => `<span class="test-metric"><b>${esc(m.name || "")}</b>${esc(m.value || "")}${m.unit ? `<i>${esc(m.unit)}</i>` : ""}</span>`).join("") +
          `</div></div>`
        : "";

      // 下载 / 原文
      const links = [];
      if (it.pdf || it.pdfLocal) {
        const pdfHref = it.pdfLocal || it.pdf;
        const isLocal = !!it.pdfLocal;
        links.push(`<a class="ref-dl-btn" href="${safeHref(esc(pdfHref))}" target="${isLocal ? '_self' : '_blank'}" rel="noopener"${isLocal ? ' download' : ''} data-track-pdf="test-${esc(dkey)}-${idx}">⬇ PDF</a>`);
      }
      if (it.url) links.push(`<a class="ref-link" href="${safeHref(esc(it.url))}" target="_blank" rel="noopener">原文</a>`);
      if (it.doi) links.push(`<a class="ref-link" href="${safeHref('https://doi.org/' + esc(it.doi))}" target="_blank" rel="noopener">DOI</a>`);
      const linkHtml = links.length ? `<div class="paper-attachments">${links.join("")}</div>` : "";

      html += `
        <article class="paper-card-full test-card" data-track-id="test-${esc(dkey)}-${idx}" data-track-type="semicon-test">
          <div class="paper-body">
            <div class="paper-meta-tags">${tags}</div>
            <h1 class="paper-title">${esc(title)}</h1>
            ${it.title && it.cnTitle && it.title !== it.cnTitle ? `<div class="paper-orig-title">原文：${esc(it.title)}</div>` : ""}
            ${it.authors ? `<div class="paper-authors">${esc(it.authors)}</div>` : ""}
            ${tagCloud}
            ${fieldsHtml}
            ${metricsHtml}
            ${linkHtml}
            <div class="paper-footer">
              <span class="paper-source">${esc([it.source, it.date].filter(Boolean).join(" · "))}</span>
            </div>
          </div>
        </article>`;
    });
    html += `</div>`;
    return html;
  }

  // ========== RENDER — RESEARCH (论文信息调研) ==========
  function renderResearchWeekly(data) {
    if (!data) return `<div class="error">暂无调研数据</div>`;
    const items = data.items || [];
    const dkey = data.weekStart || data.date || state.date;
    const papers = items.filter(i => i.type !== "patent").length;
    const patents = items.length - papers;
    let html = `<div class="ref-list">`;
    html += `<div class="overview-box">`;
    html += `<div class="overview-head"><span class="overview-title">论文信息调研 · 周清单</span>`;
    html += `<a class="dl-btn" href="research-weekly.html" target="_blank" rel="noopener" download>⬇ 下载本周清单（可独立打开）</a></div>`;
    if (data.overview && data.overview.brief) html += `<p class="overview-text">${esc(data.overview.brief)}</p>`;
    else if (data.summary) html += `<p class="overview-text">${esc(data.summary)}</p>`;
    html += `<span class="overview-focus">${esc(data.weekStart || "")} ~ ${esc(data.weekEnd || "")} · 监测 ${esc(String(data.companyCount || 13))} 家面板企业 · 论文 ${papers} 篇 · 专利 ${patents} 件</span>`;
    if (data.overview && data.overview.companies && data.overview.companies.length) {
      html += `<div class="ov-tags">` + data.overview.companies.map(c => `<span class="ov-tag co">${esc(c.name)}<i>${c.count}</i></span>`).join("") + `</div>`;
    }
    if (data.overview && data.overview.topics && data.overview.topics.length) {
      html += `<div class="ov-tags">` + data.overview.topics.map(t => `<span class="ov-tag topic">${esc(t)}</span>`).join("") + `</div>`;
    }
    html += `</div>`;
    if (!items.length) {
      html += `<div class="error">本期未检索到相关论文 / 专利</div>`;
    }
    items.forEach((it, idx) => {
      const isPatent = it.type === "patent";
      const links = [];
      if (it.pdf || it.pdfLocal) {
        const pdfHref = it.pdfLocal || it.pdf;
        const isLocal = !!it.pdfLocal;
        const pdfLabel = isLocal ? "⬇ PDF（本地下载）" : "↗ 出版方 PDF";
        links.push(`<a class="ref-dl-btn" href="${safeHref(esc(pdfHref))}" target="${isLocal ? '_self' : '_blank'}" rel="noopener"${isLocal ? ' download' : ''} data-track-pdf="res-${esc(dkey)}-${idx}">${pdfLabel}</a>`);
      }
      if (it.url) links.push(`<a class="ref-link" href="${safeHref(esc(it.url))}" target="_blank" rel="noopener">原文</a>`);
      if (it.doi) links.push(`<a class="ref-link" href="${safeHref('https://doi.org/' + esc(it.doi))}" target="_blank" rel="noopener">DOI</a>`);
      const tags = (it.keywords || []).filter(Boolean);
      const tagCloud = tags.length ? `<div class="ref-tags">${tags.map(t => `<span class="kw-tag">${esc(t)}</span>`).join("")}</div>` : "";
      html += `<div class="ref-item" data-track-id="res-${esc(dkey)}-${idx}" data-track-type="research">
        <span class="ref-num">[${idx + 1}]</span>
        <div class="ref-main">
          <div class="ref-cite">${esc(it.citation || it.title || "")}</div>
          <div class="ref-meta">
            <span class="ref-type ${isPatent ? 'patent' : 'paper'}">${isPatent ? '专利' : '论文'}</span>
            ${it.company ? `<span class="ref-company">${esc(it.company)}</span>` : ""}
            ${it.venueType ? `<span class="ref-type ${isPatent ? 'patent' : 'venue'}">${esc(it.venueType)}</span>` : ""}
            ${it.date ? `<span class="ref-date">${esc(it.date)}</span>` : ""}
            ${links.join("")}
          </div>
          ${tagCloud}
          ${it.cnSummary ? `<div class="ref-cn">${esc(it.cnSummary)}</div>` : ""}
        </div>
      </div>`;
    });
    if (data.patentNote) html += `<div class="ref-note">${esc(data.patentNote)}</div>`;
    html += `</div>`;
    return html;
  }

  function setResearchDay(d) { state.researchDay = d; render(); }

  function researchDailyCard(it, idx) {
    const dkey = it.date || state.date;
    const isPatent = it.type === "patent";
    const hasCJK = (s) => /[一-鿿]/.test(s || "");

    // 标题元信息区
    const tags = [
      `<span class="paper-meta-tag ${isPatent ? 'type' : 'field'}">${isPatent ? '专利' : (it.company || '论文')}</span>`,
      it.venue ? `<span class="paper-meta-tag venue">${esc(it.venue)}</span>` : "",
      it.venueType ? `<span class="paper-meta-tag ${it.venueType === '会议' ? 'conf' : 'venue'}">${esc(it.venueType)}</span>` : "",
      it.year ? `<span class="paper-meta-tag">${esc(String(it.year))}</span>` : "",
    ].filter(Boolean).join("");
    const techTags = (it.keywords || []).filter(Boolean);
    const tagCloud = techTags.length ? `<div class="paper-tag-cloud">${techTags.map(t => `<span class="paper-tag">${esc(t)}</span>`).join("")}</div>` : "";

    // 六字段数据：占位符「见原文摘要」视为缺失；优先真实字段，缺失则回退 keyPoints/cnSummary/abstract，仍无则省略该块（不显示占位符）
    const SENT = /见原文摘要/;
    const real = v => (v && !SENT.test(v)) ? v : "";
    const cnSent = (s) => (s || "").split(/(?<=[。！？])/).map(x => x.trim()).filter(Boolean);
    const engSent = (s) => (s || "").replace(/^Abstract[:\s]*/i, "").split(/(?<=[.。])/).map(x => x.trim()).filter(x => x.length > 10);
    const synthSig = (it) => {
      const v = (it.venue || "").replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">");
      const y = it.year ? String(it.year) : "";
      let head = "";
      if (it.company && v) head = `由${it.company}发表于${v}（${y}）`;
      else if (it.company) head = `由${it.company}报道`;
      else if (v) head = `发表于${v}（${y}）`;
      const kw = (it.keywords || []).slice(0, 3).join("、");
      const focus = kw || "上述显示技术方向";
      return head ? `本研究${head}，聚焦${focus}，对面板显示相关技术路线具有参考价值。`
                  : `本研究聚焦${focus}，对面板显示相关技术路线具有参考价值。`;
    };

    const background = real(it.background) || (it.cnSummary ? cnSent(it.cnSummary)[0] + "。" : "") || (it.abstract ? engSent(it.abstract)[0] || "" : "") || "";
    const innovation = real(it.innovation) || (it.keyPoints && it.keyPoints[0]) || "";
    const approach = real(it.approach)
      || (it.keyPoints && it.keyPoints.length > 1 ? it.keyPoints.slice(1).join("") : "")
      || (it.keyPoints && it.keyPoints.length === 1 ? it.keyPoints[0] : "")
      || cnSent(it.cnSummary).slice(1).join("")
      || (it.abstract ? engSent(it.abstract).slice(1).join(" ") : "");
    const significance = real(it.significance)
      || (it.keyPoints && it.keyPoints.length > 2 ? it.keyPoints.slice(2).join("") : "")
      || synthSig(it)
      || (it.abstract ? engSent(it.abstract).slice(-1)[0] || "" : "");
    const oneLiner = real(it.oneLiner) || (it.cnTitle ? `本研究围绕${it.cnTitle.slice(0, 20)}…展开，详见原文。` : "");

    // 关键数据指标（过滤掉占位符值）
    const metrics = (it.metrics || []).filter(m => m && !SENT.test(m.value || ""));
    const metricsHtml = metrics.length
      ? `<div class="test-metrics"><span class="test-field-label">关键数据指标</span>
          <div class="test-metric-row">${metrics.map(m => `
            <span class="test-metric"><b>${esc(m.name || "")}</b>${esc(m.value || "")}<i>${esc(m.unit || "")}</i></span>`).join("")}</div>
        </div>`
      : "";

    // 六字段网格（前2个半宽，技术方案/领域意义满宽；值为空则省略该块，不显示占位符）
    const fieldBlock = (label, val) => val
      ? `<div class="test-field${label === "技术方案" || label === "面板显示领域意义" ? " research-field--full" : ""}"><span class="test-field-label">${label}</span><p class="test-field-val">${esc(val)}</p></div>`
      : "";
    const fieldsHtml = `<div class="test-fields">${fieldBlock("研究背景", background)}${fieldBlock("核心创新点", innovation)}${fieldBlock("技术方案", approach)}</div>${fieldBlock("面板显示领域意义", significance)}${metricsHtml}`;

    // 一句话总结
    const oneLinerHtml = oneLiner ? `<div class="paper-oneliner">${esc(oneLiner)}</div>` : "";

    // 附件区：本地缓存 PDF 加 download 属性→真下载；远程出版方 PDF 新标签打开并明确标注
    const attachments = [];
    if (it.pdfLocal) {
      attachments.push(`<a class="attach-pill local" href="${safeHref(esc(it.pdfLocal))}" download rel="noopener" data-track-pdf="resd-${esc(dkey)}-${idx}">⬇ PDF（本地下载）</a>`);
    } else if (it.pdf) {
      attachments.push(`<a class="attach-pill" href="${safeHref(esc(it.pdf))}" target="_blank" rel="noopener" data-track-pdf="resd-${esc(dkey)}-${idx}">↗ 出版方 PDF</a>`);
    }
    if (it.url) attachments.push(`<a class="attach-pill" href="${safeHref(esc(it.url))}" target="_blank" rel="noopener">原文</a>`);
    if (it.doi) attachments.push(`<a class="attach-pill" href="${safeHref('https://doi.org/' + esc(it.doi))}" target="_blank" rel="noopener">DOI</a>`);
    const attHtml = attachments.length ? `<div class="paper-attachments">${attachments.join("")}</div>` : "";

    const srcNote = [it.source, it.doi ? `DOI:${it.doi}` : ""].filter(Boolean).join(" · ");
    const origAbstract = it.abstract ? `<details class="orig-abstract"><summary>查看原文摘要（英文）</summary><p>${esc(it.abstract)}</p></details>` : "";

    return `<article class="paper-card-full research-card" data-track-id="resd-${esc(dkey)}-${idx}" data-track-type="research">
      <div class="paper-body">
        <div class="paper-meta-tags">${tags}</div>
        <h1 class="paper-title">${esc(it.cnTitle || it.title || "")}</h1>
        ${it.title && it.cnTitle && it.title !== it.cnTitle ? `<div class="paper-orig-title">原文：${esc(it.title)}</div>` : ""}
        ${it.authors ? `<div class="paper-authors">${esc(it.authors)}</div>` : ""}
        ${tagCloud}
        ${fieldsHtml}
        ${oneLinerHtml}
        ${attHtml}
        ${origAbstract}
        <div class="paper-footer">
          <span class="paper-source">${esc(srcNote)}</span>
          <span>${esc(it.date || "")}</span>
        </div>
      </div>
    </article>`;
  }

  function renderResearchDaily(data) {
    if (!data) return `<div class="error">暂无调研数据</div>`;
    const items = data.items || [];
    const plan = data.dailyPlan || [[]];
    const today = new Date();
    const wd = (today.getDay() + 6) % 7; // Mon=0..Sun=6
    let day = state.researchDay;
    if (typeof day !== "number" || day < 0 || day > 4) day = Math.min(wd, 4);
    state.researchDay = day;
    const dayNames = ["周一", "周二", "周三", "周四", "周五"];
    let html = `<div class="research-daytabs">`;
    for (let i = 0; i < 5; i++) {
      html += `<button class="research-daytab${i === day ? ' active' : ''}" onclick="setResearchDay(${i})">${dayNames[i]}</button>`;
    }
    html += `</div>`;
    const bucket = (plan[day] || []).map(idx => items[idx]).filter(Boolean);
    html += `<div class="overview-box"><span class="overview-title">${dayNames[day]} · 论文研讨拆解（中文提炼）</span><span class="overview-focus">本日 ${bucket.length} 篇/件（共 ${items.length} 篇/件，均分至 5 个工作日）</span></div>`;
    if (!bucket.length) {
      html += `<div class="error">本日无拆解内容</div>`;
      return html;
    }
    html += `<div class="paper-section">`;
    bucket.forEach((it, i) => {
      if (i > 0) html += `<div class="paper-divider"></div>`;
      html += researchDailyCard(it, i);
    });
    html += `</div>`;
    return html;
  }

  // ========== RENDER — SKILLS (AI channel, 名词解释卡片网格) ==========
  function renderSkills(data) {
    if (!data || !data.skills || !data.skills.length) return `<div class="error">暂无 Skill 推荐</div>`;
    const skills = data.skills;
    const established = skills.filter(s => s.tier === "established").length;
    const rising = skills.filter(s => s.tier === "rising").length;

    let html = `<div class="skills-wrap">`;
    // 概览标题条
    html += `
      <div class="skills-head">
        <span class="section-label">每日 Skill 推荐</span>
        <p class="skills-sub">每天精选 <strong>${established} 个老牌高星</strong> + <strong>${rising} 个上升迅猛</strong> 的 Agent Skill，一句话看懂它是做什么的。</p>
      </div>`;

    // 不等宽卡片网格：6 列，spans 决定每行 2-3 个且不等宽
    const spans = [4, 2, 2, 2, 2, 3, 3];
    html += `<div class="skill-grid">`;
    skills.forEach((s, i) => {
      const span = spans[i % spans.length];
      const isRising = s.tier === "rising";
      const skId = "sk-" + esc(s.repo || s.name || ("idx" + i));
      const badge = isRising
        ? `<span class="sk-badge sk-rising">上升迅猛</span>`
        : `<span class="sk-badge sk-estab">老牌高星</span>`;
      const tags = (s.tags || []).map(t => `<span class="chip">${esc(t)}</span>`).join("");
      const author = s.author ? `<span class="sk-fact"><span class="sk-fact-k">作者</span><span class="sk-fact-v">${esc(s.author)}</span></span>` : "";
      const repo = s.repo ? `<span class="sk-fact"><span class="sk-fact-k">仓库</span><span class="sk-fact-v sk-mono">${esc(s.repo)}</span></span>` : "";
      html += `
        <article class="skill-card sk-span-${span}${isRising ? " sk-card-rising" : ""}" data-track-id="${skId}" data-track-type="skill">
          <div class="sk-head">
            <span class="sk-icon">${skillIconSvg(s)}</span>
            <div class="sk-head-main">
              <h3 class="sk-name">${esc(s.name || "")}</h3>
              ${badge}
            </div>
          </div>
          <div class="sk-spec">
            <span class="sk-fact sk-stars-fact">
              <span class="sk-fact-k">Stars</span>
              <span class="sk-fact-v sk-stars-v">${esc(s.stars || "—")}</span>
            </span>
            ${author}
            ${repo}
          </div>
          <p class="sk-desc">${esc(s.desc || s.description || "")}</p>
          <div class="sk-foot">
            <div class="sk-tags">${tags}</div>
            ${s.url ? `<a class="sk-link" href="${safeHref(esc(s.url))}" target="_blank" rel="noopener">GitHub 查看 →</a>` : ""}
          </div>
        </article>`;
    });
    html += `</div></div>`;
    return html;
  }

  // ========== MAIN RENDER ==========
  function render() {
    const $content = $("#content");
    const $dateTag = $("#dateTag");
    const $subTabs = $("#subTabs");

    // —— 论文搜索频道：独立工具页（无日期 / 无子菜单）——
    if (state.channel === "search") {
      document.getElementById("app").classList.add("is-search");
      $dateTag.textContent = "";
      $subTabs.innerHTML = "";
      $content.innerHTML = "";
      if (window.renderPaperSearchChannel) window.renderPaperSearchChannel($content);
      if (window.initAnalytics) window.initAnalytics();
      window.scrollTo({ top: 0, behavior: "smooth" });
      return;
    }
    document.getElementById("app").classList.remove("is-search");

    const data = getData(state.channel, state.date);

    // Update date tag
    $dateTag.textContent = data ? getDateLabel(data.date || state.date) : "";

    // Update sub-tabs
    const tabs = getSubTabs(state.channel);
    if (state.subTab === "paper" && state.channel === "ai") state.subTab = "skills";
    if (!tabs.find(t => t.id === state.subTab)) state.subTab = tabs[0].id;

    $subTabs.innerHTML = tabs.map(t =>
      `<button class="tab-l2${t.id === state.subTab ? " active" : ""}" data-subtab="${t.id}">${t.label}</button>`
    ).join("");

    // Bind sub-tab clicks
    $subTabs.querySelectorAll(".tab-l2").forEach(btn => {
      btn.onclick = () => {
        state.subTab = btn.dataset.subtab;
        fillDateSelect();
        render();
      };
    });

    // Render content
    let html = "";
    if (!data) {
      const label = state.subTab === "paper" ? "论文" : state.channel === "display" ? "面板显示" : state.channel === "semicon" ? "半导体" : "AI";
      html = `<div class="error">该日期暂无 ${label} 数据</div>`;
    } else if (state.subTab === "paper") {
      html = (window.renderPaperBreakdown ? window.renderPaperBreakdown(data) : renderPaper(data));
    } else if (state.subTab === "skills") {
      html = renderSkills(data);
    } else if (state.subTab === "weekly") {
      html = renderResearchWeekly(data);
    } else if (state.subTab === "daily") {
      html = renderResearchDaily(data);
    } else if (state.subTab === "test") {
      html = renderSemiconTest(data);
    } else {
      html = renderNews(data);
    }
    $content.innerHTML = html;
    if (window.initAnalytics) window.initAnalytics();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // ========== EVENT BINDINGS ==========
  // Level-1 channel tabs
  $("#channelTabs").addEventListener("click", (e) => {
    const btn = e.target.closest("button.tab-l1");
    if (!btn) return;
    $$("#channelTabs .tab-l1").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    state.channel = btn.dataset.channel;
    state.subTab = "news";
    fillDateSelect();
    render();
  });

  // Date select
  $("#dateSelect").addEventListener("change", (e) => {
    state.date = e.target.value;
    render();
  });

  // ========== INIT ==========
  fillDateSelect();
  render();

  // ========== SCROLL REVEAL — Apple-style fade-up ==========
  (function initScrollReveal() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          // Stagger delay based on element index within viewport
          requestAnimationFrame(() => {
            entry.target.classList.add('visible');
          });
          observer.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.01,
      rootMargin: '0px 0px -20px 0px'
    });

    function revealContent() {
      const sections = document.querySelectorAll(
        '.hero-section, .secondary-section, .flash-section, .paper-section, .skills-wrap'
      );
      sections.forEach((el, idx) => {
        if (!el.classList.contains('reveal')) {
          el.classList.add('reveal');
          if (idx % 3 === 1) el.classList.add('reveal-delay-1');
          else if (idx % 3 === 2) el.classList.add('reveal-delay-2');
          observer.observe(el);
        }
      });
    }

    // Initial + re-run on render
    revealContent();

    // Also observe after dynamic renders
    const origRender = render;
    // Re-observe whenever content changes
    const watchContent = new MutationObserver(() => {
      requestAnimationFrame(revealContent);
    });
    const app = document.getElementById('app');
    if (app) watchContent.observe(app, { childList: true, subtree: true });
  })();
  </script>
</body>
