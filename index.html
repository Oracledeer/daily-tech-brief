2620", "unit": "mm", "note": "G8.6 标准"}, {"name": "设计月产能", "value": "3.2", "unit": "万片/月", "note": "B16 产能"}, {"name": "LTPO 良率", "value": "65 → 82", "unit": "%", "note": "12 周爬坡"}, {"name": "蒸镀膜厚偏差", "value": "±3", "unit": "%", "note": "FMM 拼接缝"}, {"name": "峰值亮度", "value": "1100", "unit": "cd/m²", "note": "14.6 寸模组"}, {"name": "色域", "value": "99.5", "unit": "% DCI-P3", "note": "14.6 寸模组"}], "source": "SID Display Week 2026 论文集", "url": "https://www.sid.org/Publications/SID-Digest-of-Technical-Papers.aspx", "image": "https://images.unsplash.com/photo-1581090700227-1e8b0e8b1b3e?w=800&q=80", "imageCaption": "OLED 蒸镀工艺示意 (Unsplash)", "date": "2026-06-23", "attachments": [{"label": "PDF 全文 (BOE B16 G8.6 AMOLED)", "url": "https://onlinelibrary.wiley.com/doi/pdfdirect/10.1002/sdtp.17654", "cached": false}]}, {"id": 2, "title": "Tandem WOLED with Stacked Blue Emitter Achieving 8% Lifetime Drop at 1000 cd/m²", "authors": "LG Display R&D Lab, Kim J., Park S., Seoul National University, Lee M., et al.", "field": "WOLED / Tandem OLED", "paperType": "期刊论文", "venue": "Nature Electronics", "oneLiner": "LGD 与首尔大学提出三层 Tandem WOLED 新结构，1000 cd/m² 下寿命衰减从 15% 降至 8%。", "abstract": "论文提出一种新的三层 Tandem WOLED 堆叠结构，蓝色发光层采用双层 p-i-n 异质结，实现 1000 cd/m² 恒流驱动下 LT95 寿命从 2000 小时延长至 3000 小时以上，寿命衰减幅度从 15% 降至 8%。该结构兼容 LG Display 现有 WOLED 量产线，无需新增真空腔体。", "content": "Tandem OLED 即多层堆叠 OLED，通过电荷产生层 (CGL) 将两个或多个发光单元串联，在相同电流下亮度成倍提升，从而在相同亮度下大幅降低电流密度，寿命显著延长。本文三层堆叠结构在 1000 cd/m² 工况下，器件外量子效率 (EQE) 达到 38%，CIE 色坐标 (0.31, 0.33)，与标准白光高度一致。", "techIntro": "WOLED（White OLED）由 LG Display 主推，通过蒸镀白光 OLED 加彩色滤光片 (CF) 实现 RGB 三色，是当前大尺寸 OLED TV 的主流方案。Tandem（堆叠）路线用于解决 WOLED 蓝光寿命短的瓶颈；中尺寸 IT OLED（iPad/MacBook）同样需要此方案提升可靠性。LT95 指亮度衰减到初始值 95% 所需时间，是 OLED 寿命常用指标。", "techTags": ["Tandem WOLED", "LGD", "首尔大学", "蓝光寿命", "CGL", "EQE", "LT95", "中尺寸 OLED"], "metrics": [{"name": "亮度条件", "value": "1000", "unit": "cd/m²", "note": "恒流驱动"}, {"name": "LT95 寿命", "value": "2000 → 3000+", "unit": "h", "note": "三层结构提升"}, {"name": "寿命衰减", "value": "15 → 8", "unit": "%", "note": "1000 cd/m² 下"}, {"name": "EQE", "value": "38", "unit": "%", "note": "外量子效率"}, {"name": "CIE 色坐标", "value": "(0.31, 0.33)", "unit": "", "note": "标准白光"}], "source": "Nature Electronics Vol. 9, Issue 6", "url": "https://www.nature.com/articles/s41928-026-00987-1", "image": "https://images.unsplash.com/photo-1635776063043-2bf08c1b1c95?w=800&q=80", "imageCaption": "OLED 器件结构示意 (Unsplash)", "date": "2026-06-25", "attachments": [{"label": "PDF 全文 (Nature Electronics)", "url": "https://www.nature.com/articles/s41928-026-00987-1.pdf", "cached": false}, {"label": "补充材料 (SI)", "url": "https://www.nature.com/articles/s41928-026-00987-1#Sec8", "cached": false}]}], "sources": ["SID Display Week 2026", "Nature Electronics", "BOE R&D 官方公告", "LG Display 官方公告"]}, "2026-07-01": {"schema": "display-paper-daily/v1", "date": "2026-07-01", "weekday": "周三", "period": "06.30 – 07.01", "summary": "本周面板显示两篇关键技术文献：Microsystems & Nanoengineering 刊出 ETRI × KAIST 团队的 SITRAB（多重同步转移键合）技术，让 RGB 不同厚度 micro-LED 在玻璃基板上一次性异构集成，像素良率从 83% 拉升至 99.80%；Chemical Engineering Journal 上线北京交通大学团队基于 MR-TADF 蓝光超荧光 OLED，双面异相敏化结构把 EQEmax 推到 22.7%，较参考器件提升 36%。", "focus": "Micro-LED 异构集成 / 蓝光超荧光 OLED / 喷墨印刷 QLED", "highlights": ["ETRI + KAIST 提出 SITRAB 工艺：单次激光诱导焊接把 RGB 三色 micro-LED 异构集成到玻璃背板，32×32 全彩样机色域 119.67% NTSC / 89.36% BT.2020", "像素良率从 83.01% 提升至 99.80%：1024 像素中坏点从 174 颗降到 2 颗，靠冗余 micro-LED 二次转移修复", "北京交通大学团队提出双面异相敏化结构：TADF 敏化剂 DMAC-DPS 与 MR-TADF 终端发射体 ν-DABNA 分别掺入 PPF/mCBP 不同极性主体，EQE 22.7% @ 470 nm 蓝光", "论文 1 已本地缓存 PDF 全文（CC BY 4.0 开放获取），点击即可下载；论文 2 为付费墙期刊，原文 DOI 链接可点击"], "routes": [{"name": "Micro-LED 异构集成", "status": "↑突破", "note": "ETRI SITRAB 工艺在玻璃基板上同时集成 RGB 不同厚度 micro-LED，量产良率接近 100%"}, {"name": "蓝光 OLED / HF 路线", "status": "↑突破", "note": "北京交大双面异相敏化结构把 MR-TADF 蓝光 EQE 推上 22.7%，为蓝色磷光/TADF 路线提供新器件工程思路"}, {"name": "喷墨印刷 QLED", "status": "→稳定推进", "note": "韩国成均馆大学 6 月连发两篇印刷全彩 QLED 论文：双极性 AC 串联子像素 + 115.4% DCI-P3，单步 lift-off 子像素 + 蓝光 EQE 提升 1.6 倍"}, {"name": "印刷 OLED (IJP)", "status": "→稳定推进", "note": "中尺寸 IT OLED 量产前夜，TCL 华星 27 寸 UHD + 14 寸笔电面板 Q3 量产"}], "papers": [{"id": 1, "title": "Heterogeneous integration of micro-LEDs via multiple simultaneous transfer and bonding", "authors": "Jiho Joo, Gwang-Mun Choi, Chanmi Lee, Ki-seok Jang, Jin-hyuk Oh, Yong-Sung Eom, Kwang-Seong Choi, Byung Jo Um, Byeong-Soo Bae, Jungho Shin (corresponding)", "field": "Micro-LED 异构集成 / 巨量转移", "paperType": "期刊论文", "venue": "Microsystems & Nanoengineering, Vol. 12, Article 170 (2026)", "oneLiner": "韩国 ETRI × KAIST 团队提出 SITRAB 多重同步转移键合工艺，让 RGB 不同厚度的 micro-LED 一次性异构集成到玻璃背板，量产良率直逼 100%。", "abstract": "Micro-LED 被视为下一代显示技术，但不同颜色、功能、尺寸 micro-LED 在全彩显示中的组装一直受限于 micro-LED 与背板之间不可逆的键合。本文报告一种多重同步转移与键合（SITRAB）技术，用于 micro-LED 的异构集成。在 SITRAB 过程中，micro-LED 在几秒内通过激光诱导焊接被转移到显示基板上并完成键合。尽管反复接受红外激光照射，SITRAB 粘合剂仍能保持焊接能力。因此，通过重复 SITRAB 步骤，可以将来自不同 interposer 的 micro-LED 顺序集成到同一背板上。例如，AlGaInP 与 InGaN LED 被集成到无源矩阵背板上，显示 165 ppi 图像；15×15 micro-LED 阵列被拼接以将显示尺寸扩大 4 倍；冗余 LED 可被即时转移到有缺陷的显示区域，使像素良率达到 99.80%。最后，不同芯片厚度的 RGB micro-LED 被组装在玻璃背板上，演示 32×32 分辨率的全彩显示。", "content": "SITRAB 工艺采用激光诱导锡焊（laser-induced soldering）+ 自研 SITRAB 粘合剂，可在数秒内把单颗或成组 micro-LED 转移到目标基板。粘合剂厚度 2.25 ± 0.07 µm，剪切强度 34.87 MPa，激光参数 300 W × 6 s × 6 次循环后仍保持焊接能力。实验结果：(1) AlGaInP（红）+ InGaN（绿）micro-LED 集成到 39 × 39 mm 无源背板，实现 165 ppi 单色显示；(2) 4 组 15×15 AlGaInP 阵列拼接，扩展到 30×30 分辨率；(3) 1024 像素测试，原始坏点 174 颗，通过冗余 micro-LED 二次转移修复，坏点降至 2 颗，像素良率从 83.01% 提升至 99.80%；(4) RGB micro-LED（红 9 µm、绿 6 µm、蓝 6 µm 厚）异构集成到玻璃基板，实现 32×32 全彩样机，像素间距 324 µm，色域 NTSC 119.67% / BT.2020 89.36%，平均亮度 339.36 cd/m²，亮度 CV 仅 4.89%；(5) 6 英寸背板拼接 310×310 分辨率，发光面积 100×100 mm²。", "techIntro": "Micro-LED（Micro Light-Emitting Diode）指芯片尺寸 < 50 µm 的 LED 显示单元，自发光、亮度高、寿命长，被视为 AR/VR 与下一代大尺寸显示的核心技术。巨量转移（Mass Transfer）是把数百万颗 micro-LED 芯片从外延片搬运到驱动背板的关键工艺，传统方法是 pick-and-place，效率与良率受限。SITRAB（Simultaneous Transfer and Bonding，多次同步转移键合）使用红外激光 + 自研锡焊粘合剂，可以在数秒内把整片 micro-LED 阵列转移到目标基板，且多次激光照射下粘合剂仍可重复焊接，对应「异构集成」（Heterogeneous Integration）指把不同材料（AlGaInP 红、InGaN 绿蓝）、不同厚度的 LED 集成到同一背板。冗余修复（Redundancy Repair）指预先放置备用 LED，检测到坏点后即时转移替代，把良率从 80% 区间推上 99%+。", "techTags": ["Micro-LED", "SITRAB", "ETRI", "KAIST", "异构集成", "巨量转移", "激光焊接", "冗余修复", "玻璃基板", "全彩显示"], "metrics": [{"name": "粘合剂厚度", "value": "2.25 ± 0.07", "unit": "µm", "note": "SITRAB 锡焊层"}, {"name": "剪切强度", "value": "34.87", "unit": "MPa", "note": "键合可靠性"}, {"name": "像素良率", "value": "83.01 → 99.80", "unit": "%", "note": "1024 像素，冗余修复"}, {"name": "坏点数", "value": "174 → 2", "unit": "颗", "note": "1024 像素测试"}, {"name": "全彩样机", "value": "32 × 32", "unit": "像素", "note": "RGB 异构集成"}, {"name": "色域", "value": "119.67 / 89.36", "unit": "% NTSC / % BT.2020", "note": "32×32 全彩"}, {"name": "平均亮度", "value": "339.36 ± 16.61", "unit": "cd/m²", "note": "亮度 CV 4.89%"}, {"name": "对准精度", "value": "x: 1.51 ± 0.75 / y: -0.36 ± 0.63", "unit": "µm", "note": "高分辨率转移"}, {"name": "EL 峰值波长", "value": "R 637 / G 515 / B 458", "unit": "nm", "note": "AlGaInP + InGaN"}, {"name": "6 英寸拼接", "value": "310 × 310", "unit": "像素", "note": "100 × 100 mm² 发光面积"}], "source": "Nature 旗下 Microsystems & Nanoengineering（Springer Nature，CC BY 4.0）", "url": "https://www.nature.com/articles/s41378-026-01304-2", "image": "https://images.unsplash.com/photo-1518770660439-4636190af475?w=800&q=80", "imageCaption": "Micro-LED 阵列与微显示示意 (Unsplash)", "date": "2026-05-11", "attachments": [{"label": "PDF 全文 (Microsystems & Nanoengineering, CC BY 4.0)", "url": "./data/paper/attachments/2026-07-01/paper-1-PDF_全文_Microsystems_Nanoengine.pdf", "cached": true}]}, {"id": 2, "title": "High-performance blue hyperfluorescence OLEDs with precise spatial control of the sensitizing layer in hetero-phase emissive layer for exciton dynamics optimization", "authors": "Kunpeng Song, Haichang Wang, Chen Zhang, Zirun Zhao, Xiaowei Li, Ying Xu, Bo Qiao, Dandan Song, Ling Fan, Suling Zhao (corresponding)", "field": "蓝光 OLED / 超荧光 (HF) / MR-TADF", "paperType": "期刊论文", "venue": "Chemical Engineering Journal (Elsevier), Available online 26 June 2026", "oneLiner": "北京交通大学团队用「双面异相敏化」结构把 MR-TADF 蓝光超荧光 OLED 的 EQEmax 推上 22.7%，较参考器件提升 36%。", "abstract": "基于蓝光多共振热活化延迟荧光 (MR-TADF) 材料的超荧光 (HF) 系统是实现高色纯度、高效率蓝光 OLED 的重要技术路径。当前蓝光 HF OLED 的核心难题是共蒸镀发光层难以精确控制、敏化剂与终端发射体对主体材料的极性要求存在冲突。本文通过双源共蒸镀构造了一种双面异相敏化结构，将 TADF 敏化剂 DMAC-DPS 与 MR-TADF 终端发射体 ν-DABNA 分别掺入极性不同的 PPF 和 mCBP 主体中；通过红色磷光探针探测 mCBP:ν-DABNA 层内的激子密度分布，发现将 PPF:DMAC-DPS 敏化层精确放置在激子密度峰值区域，可最大化敏化位点的利用率，从而实现高效的双面异相敏化。实验结果：该策略使最大外量子效率 (EQEmax) 提升至 22.7%，较参考器件提高 36%，同时有效抑制敏化剂 DMAC-DPS 的本征发射，保证 470 nm 蓝光色纯度。这是首次通过敏化层空间设计调控激子动力学，为高性能、高色纯度蓝光 OLED 的开发提供新策略。", "content": "超荧光（Hyperfluorescence, HF）OLED 路线由 TADF 敏化剂 + 窄带 MR-TADF 终端发射体组合：TADF 敏化剂把单三线态激子上转换为单线态，再通过 Förster 能量转移把单线态激子转移给窄带 MR-TADF 终端发射体发射蓝光，理论上可同时获得接近 100% 内量子效率与窄带蓝光色纯度。但实际器件中敏化剂与终端发射体对主体材料的极性要求不同，简单的单层共掺会导致激子空间分布不均、敏化效率低。本文团队在 PPF（高极性）主体中掺入 TADF 敏化剂 DMAC-DPS，在 mCBP（低极性）主体中掺入 MR-TADF 终端发射体 ν-DABNA，构建「双面异相」敏化结构；通过红色磷光探针定量分析 mCBP:ν-DABNA 层的激子密度分布，把 PPF:DMAC-DPS 敏化层定位在激子密度峰值区域，最大化敏化位点利用率。结果：EQEmax 22.7%（参考器件 16.7%），相对提升 36%；发射峰 470 nm，色纯度高，敏化剂本征发射被显著抑制。", "techIntro": "OLED 蓝光效率与寿命一直是行业瓶颈。磷光 OLED（PhOLED）靠 Ir/Pt 配合物实现 100% 内量子效率，但深蓝光色纯度与寿命差。热活化延迟荧光（TADF, Thermally Activated Delayed Fluorescence）材料通过反向系间窜越（RISC）把三线态激子转成单线态，理论 IQE 也可达 100%，但典型 TADF 发射光谱宽、色纯度差。多共振 MR-TADF（Multi-Resonance TADF）由 Hatakeyama 团队 2016 年首次提出（DABNA-1），通过硼/氮原子的相反共振效应在刚性稠环骨架内实现窄带发射（半峰全宽 FWHM < 30 nm），但仍然受激子利用率限制。超荧光（Hyperfluorescence, HF）OLED 把 TADF 敏化剂与 MR-TADF 终端发射体组合，前者做敏化、后者做窄带发射，兼顾高效率与高色纯度，是目前最有前景的 OLED 蓝光路线之一。EQEmax 是最大外量子效率，反映器件把电子转换成出射光子的能力。", "techTags": ["蓝光 OLED", "MR-TADF", "Hyperfluorescence", "超荧光", "DMAC-DPS", "ν-DABNA", "双面异相敏化", "激子动力学", "北京交通大学"], "metrics": [{"name": "EQEmax", "value": "22.7", "unit": "%", "note": "参考器件 16.7%，相对提升 36%"}, {"name": "发射波长", "value": "470", "unit": "nm", "note": "高色纯度蓝光"}, {"name": "敏化剂", "value": "DMAC-DPS", "unit": "", "note": "TADF 敏化剂"}, {"name": "终端发射体", "value": "ν-DABNA", "unit": "", "note": "MR-TADF 蓝光"}, {"name": "主体材料", "value": "PPF / mCBP", "unit": "", "note": "高/低极性双主体"}, {"name": "探测方法", "value": "红色磷光探针", "unit": "", "note": "激子密度分布定量"}], "source": "Chemical Engineering Journal (Elsevier)", "url": "https://www.sciencedirect.com/science/article/pii/S1385894726063278", "image": "https://images.unsplash.com/photo-1532187863486-abf9dbad1b69?w=800&q=80", "imageCaption": "OLED 发光器件示意 (Unsplash)", "date": "2026-06-26", "attachments": [{"label": "原文摘要页 (ScienceDirect，付费墙)", "url": "https://www.sciencedirect.com/science/article/pii/S1385894726063278", "cached": false}]}], "sources": ["Nature - Microsystems & Nanoengineering (Springer Nature)", "Chemical Engineering Journal (Elsevier)", "ETRI 韩国电子通信研究院", "KAIST 韩国科学技术院", "北京交通大学"]}, "2026-07-02": {"schema": "display-paper-daily/v1", "date": "2026-07-02", "weekday": "周四", "period": "07.01 – 07.02", "summary": "本期两篇关键技术论文：清华大学深圳国际研究生院团队在 Light: Science & Applications 发表深蓝铱磷光 OLED 新材料——不对称 [3+2+1] 配位 Ir(III) 配合物 CF₃-2 实现 EQEmax 29.0%、CIE (0.147, 0.089) 达 NTSC 蓝光标准，hyper-OLED 以 CF₃-1 敏化 ν-DABNA 获得 LT50 = 2127 h；福州大学平板显示国家地方联合工程实验室在 Displays 发表全喷墨打印 (AIJP) 30 μm 红色 Micro-QLED——EQE 7.35%、亮度 61,377 cd/m²，是迄今 AIJP 工艺最小尺寸 QLED。", "focus": "深蓝磷光 OLED / Ir(III) NHC 配合物 / Micro-QLED / 全喷墨打印", "highlights": ["清华深研院 Wei Guodan 团队设计不对称 [3+2+1] 配位 Ir(III) 配合物 CF₃-2：EQEmax 29.0%，CIE (0.147, 0.089) 满足 NTSC 深蓝标准，kr = 1.28×10⁶ s⁻¹", "CF₃-1 敏化 ν-DABNA 的 hyper-OLED 寿命 LT50 = 2127 h @ 100 cd/m²；CF₃-2 敏化 DOB2-DABNA-A 实现深蓝 CIE (0.146, 0.067)，LT50 = 373 h", "L-CF₃-1 纯磷光器件（无敏化）LT50 = 3875 h @ 100 cd/m²，验证 Ir(III) 材料本征稳定性", "成功集成 OLED-on-TFT 微显示：94 PPI (270×270 μm 像素)，智能手机 App 驱动，显示「清华」图案", "福州大学团队 AIJP 工艺制备 30 μm 红色 Micro-QLED：结构 ITO/PEDOT:PSS/TFB/CdSe:ZnS QD/ZnO/Ag，EQEmax 7.35%，亮度 61,377 cd/m²", "全 5 层可溶液加工层叠打印，无光刻、无咖啡环效应，开启 Micro-QLED 低成本工业化路径"], "routes": [{"name": "深蓝磷光 OLED (Ir-PhOLED)", "status": "↑突破", "note": "[3+2+1] 不对称 Ir(III) NHC 配合物 CF₃-2 EQE 29.0% + NTSC 蓝光，CF₃-1 hyper-OLED LT50 破 2000 h"}, {"name": "蓝光超荧光 (HF) 路线", "status": "↑突破", "note": "Ir(III) 磷光敏化 MR-TADF 超荧光：CF₃-1/ν-DABNA LT50 2127 h，CF₃-2/DOB2-DABNA-A CIEy 0.067"}, {"name": "Micro-QLED / 喷墨打印", "status": "↑突破", "note": "福州大学 AIJP 工艺实现 30 μm 级红色 Micro-QLED，5 层全溶液叠印无需光刻"}, {"name": "印刷 OLED (IJP)", "status": "→稳定推进", "note": "中尺寸 IT OLED 量产前夜，TCL 华星 27 寸 UHD + 14 寸笔电面板 Q3 量产"}], "papers": [{"id": 1, "title": "High-efficiency and stable deep-blue iridium phosphorescent OLEDs with enhanced charge transfer dynamics", "authors": "Siqi Li, Kai-Ning Tong, Meng Zhang (co-first), Wei He, Chengcheng Wu, Junki Ochi, Kefei Shi, Xin Wang, Chihaya Adachi, Takuji Hatakeyama, Guodan Wei (corresponding)", "field": "深蓝磷光 OLED / Ir(III) NHC 配合物 / 微显示", "paperType": "期刊论文", "venue": "Light: Science & Applications, Vol. 15, Article 259 (2026)", "oneLiner": "清华深研院设计不对称 [3+2+1] Ir(III) 配合物 CF₃-2，EQEmax 29.0% 满足 NTSC 深蓝标准；hyper-OLED LT50 破 2000 h，并成功集成 OLED-on-TFT 微显示。", "abstract": "深蓝磷光 OLED (Ph-OLED) 对先进显示技术至关重要，但长期受限于效率与稳定性矛盾。本文报告一类不对称 [3+2+1] 配位 Ir(III) 配合物，引入强吸电子 –CF₃ 和 –F 修饰的 N-杂环卡宾 (NHC) 配体。CF₃ 取代促进电荷转移 (CT) 激发态，显著提高辐射衰减速率 kr = 1.28×10⁶ s⁻¹，实现 443 nm 快速高效磷光发射。CF₃-2 器件 EQEmax 达 29.0%，CIE (0.147, 0.089) 满足 NTSC 蓝光标准；CF₃-1 器件 EQEmax 24.6%，最大亮度 6542 cd/m²。CF₃-1 敏化 MR-TADF 发射体 ν-DABNA 的 hyper-OLED 实现 LT50 = 2127 h @ 100 cd/m²；CF₃-2 敏化 DOB2-DABNA-A 实现 CIE (0.146, 0.067) 深蓝，LT50 = 373 h。纯磷光控制器件 L-CF₃-1 LT50 = 3875 h，验证材料本征稳定性。论文还展示 OLED-on-TFT 微显示集成：94 PPI (270×270 μm)，智能手机 App 驱动显示「清华」图案。", "content": "核心创新是 [3+2+1] 不对称配位设计：刚性三齿 NHC 配体 (pbib) 提供结构稳定性，双齿 C^C 配体经 –CF₃/–F 修饰调控激发态。CF₃ 组促进 CT 濁发态（LLCT 占比 ~94.5%），大幅提升跃迁偶极矩 Δμ(T₁→S₀)，使 CF₃-2 达到 0.74 Debye（F 系列 LE态仅 0.29-0.45 Debye），kr 与 Δμ² 正相关。器件结构：ITO/HAT-CN/TAPC/TCTA/CzSi/CzSi:Ir(III) 12.5%/DPEPO/TSPO1/Liq/Al。CF₃-2 器件 EQEmax 29.0%，CE 17.7 cd/A，PE 14.4 lm/W，亮度 1554 cd/m²。Hyper-OLED 采用 ITO/HAT-CN/BCFN/SiCzCz/SiCzCz:30% SiTrzCz₂:12.5% Ir(III):1% TADF/mSiTrz/Liq/Al 结构。H-CF₃-1 (ν-DABNA) EQEmax 23.4%，FWHM 20 nm，LT50 2127 h；H-CF₃-2 (DOB2-DABNA-A) CIE (0.146, 0.067)，EQEmax 14.3%。OLED-on-TFT 微显示：24 mm 对角面板，94 PPI，热压键合，5 V 驱动。六种 Ir(III) 配合物发射波长覆盖 416-456 nm，PLQY 51.0-83.8%，激发态寿命 0.66-1.11 μs。", "techIntro": "磷光 OLED (PhOLED) 利用 Ir(III) 配合物的强自旋-轨道耦合，同时收集单线态和三线态激子，理论内量子效率 IQE = 100%，远超荧光 OLED 的 25%。传统 [2+2+2] 对称配位深蓝 Ir(III) 配合物 (如 FIrpic) EQE < 15% 且效率滚落严重。N-杂环卡宾 (NHC) 配体具有强电子供体能力和大位阻，增强配体场分裂，抑制非辐射 ³MC 衰减路径并拓宽 HOMO-LUMO 能隙实现深蓝发射。[3+2+1] 不对称配位由清华深研院 Wei Guodan 团队首创（2021 年 Chem. Sci.），刚性三齿 NHC + 双齿 C^C + 单齿 CN 的组合赋予深蓝发射与短激发态寿命。Hyper-OLED（超磷光/超荧光 OLED）将磷光敏化剂与窄带 MR-TADF 终端发射体组合，磷光敏化剂高效收集三线态激子、通过 Förster 能量转移传给 MR-TADF 窄带发射，兼顾 100% IQE 与窄带色纯度。EQEmax 是最大外量子效率；LT50 是亮度衰减到初始值 50% 的时间；kr 是辐射衰减速率。", "techTags": ["深蓝磷光 OLED", "Ir(III) NHC 配合物", "[3+2+1] 不对称配位", "CF₃-2", "电荷转移激发态", "跃迁偶极矩", "Hyper-OLED", "ν-DABNA", "DOB2-DABNA-A", "OLED-on-TFT 微显示", "清华大学深圳国际研究生院"], "metrics": [{"name": "EQEmax (CF₃-2)", "value": "29.0", "unit": "%", "note": "NTSC 蓝光 CIE (0.147, 0.089)"}, {"name": "EQEmax (CF₃-1)", "value": "24.6", "unit": "%", "note": "CIE (0.152, 0.126)"}, {"name": "Hyper-OLED LT50 (H-CF₃-1)", "value": "2127", "unit": "h", "note": "@ 100 cd/m², ν-DABNA 敏化"}, {"name": "纯磷光 LT50 (L-CF₃-1)", "value": "3875", "unit": "h", "note": "@ 100 cd/m², 无敏化"}, {"name": "Hyper-OLED LT50 (H-CF₃-2)", "value": "373", "unit": "h", "note": "@ 100 cd/m², DOB2-DABNA-A"}, {"name": "Hyper-OLED CIE (H-CF₃-2)", "value": "(0.146, 0.067)", "unit": "", "note": "极深蓝"}, {"name": "kr (CF₃-2)", "value": "1.28×10⁶", "unit": "s⁻¹", "note": "CT 态快速磷光衰减"}, {"name": "EL 发射峰", "value": "443", "unit": "nm", "note": "CF₃-2 深蓝"}, {"name": "最大亮度 (CF₃-1)", "value": "6542", "unit": "cd/m²", "note": "D-CF₃-1 器件"}, {"name": "微显示分辨率", "value": "94", "unit": "PPI", "note": "270×270 μm 像素, OLED-on-TFT"}, {"name": "Hyper-OLED EQEmax (H-CF₃-1)", "value": "23.4", "unit": "%", "note": "ν-DABNA, FWHM 20 nm"}], "source": "Nature 旗下 Light: Science & Applications (Springer Nature, CC BY 4.0 开放获取)", "url": "https://www.nature.com/articles/s41377-026-02264-y", "image": "https://images.unsplash.com/photo-1557672172-298e090bd0f1?w=800&q=80", "imageCaption": "蓝光 OLED 发光器件与深蓝磷光示意 (Unsplash)", "date": "2026-06-02", "attachments": [{"label": "PDF 全文 (Light: Science & Applications, CC BY 4.0)", "url": "./data/paper/attachments/2026-07-02/paper-1-PDF_全文_Light_Science_Applicati.pdf", "cached": true}]}, {"id": 2, "title": "All Inkjet-Printed red Micro Quantum-Dots Light-Emitting diodes (QLEDs): Fabrication and performance", "authors": "Qiwei Li, Yijian Zhou, Xinrui Huang, Caihong Yan, Shuaishuai Wang, Zongjie He, Chang Lin, Yang Li, Kaixin Zhang, Jie Sun, Qun Yan, Tailiang Guo (corresponding)", "field": "Micro-QLED / 全喷墨打印 (AIJP) / 量子点电致发光", "paperType": "期刊论文", "venue": "Displays (Elsevier), 2026 年 7 月在线发表", "oneLiner": "福州大学团队用全喷墨打印 (AIJP) 工艺叠印 5 层溶液功能层，制备 30 μm 红色 Micro-QLED，EQE 7.35%，亮度破 6 万 cd/m²——AIJP 工艺最小尺寸 QLED。", "abstract": "Micro-QLED 是 QLED 显示的关键进化方向，继承宽色域、窄带宽、自发光优势的同时追求超小尺寸。但现有制备方法受限于复杂工艺、效率退化和高制造成本。本研究采用全喷墨打印 (AIJP) 方案克服传统喷墨兼容性限制：通过优化墨水配方抑制咖啡环效应、实现层间精确侵蚀控制，5 层可溶液加工层叠打印制备结构 ITO/PEDOT:PSS/TFB/CdSe/ZnS QD/ZnO/Ag 的红色 Micro-QLED，最小尺寸 30 μm——AIJP 工艺迄今最小发光面积 QLED。器件 EQEmax 7.35%，电流效率 11.19 cd/A，最大亮度 61,377.41 cd/m²。开启电压 2 V。AIJP 工艺无需光刻、材料利用率高、简化制备，为全彩 Micro-QLED 显示工业化迈出关键一步。", "content": "Micro-LED 小于 50 μm 时红色器件 EQE 急剧下降，QLED 提供替代路径。传统喷墨打印 (IJP) 仅制备单功能层（通常 QD 发光层），AIJP 要求全部 5 层溶液叠印且无层间混溶——这是核心难点。本研究策略：(1) 5 种定制墨水分别对应 PEDOT:PSS (水基)、TFB (CB+CHB 混合溶剂)、CdSe/ZnS QD (甲苯基)、ZnO (IPA+DMSO 混合)、Ag 纳米导电墨水 (Jet-605C)；(2) 利用 Marangoni 流动效应抑制咖啡环：TFB 添加 CHB 调节表面张力梯度，QD 添加十八烷控制挥发速率；(3) 正交溶剂系统防止层间侵蚀：TFB 层用 CB+CHB（高沸点），QD 层用甲苯（低沸点），TFB 薄膜对甲苯短时暴露耐受；ZnO 层用 IPA+DMSO，对下方 QD 甲苯层化学兼容。(4) 墨水配方精确控制液滴体积与着陆位置。结果：30 μm 器件 EQEmax 7.35%，CE 11.19 cd/A，亮度 61,377 cd/m²，Von 2 V，EL 峰值 621 nm (FWHM 窄)，CdSe/ZnS QD 平均尺寸 11.5 nm。对比文献最小 AIJP QLED 尺寸从 40 μm 缩至 30 μm。", "techIntro": "量子点发光二极管 (QLED / QD-EL) 以胶体半导体纳米晶 (量子点, QD) 为发光材料，溶液可加工、发射波长可调、FWHM 窄 (< 30 nm)、色域广，是继 OLED 之后的新一代自发光显示候选技术。Micro-QLED 是 QLED 的微缩化方向，芯片尺寸 < 50 μm，瞄准 AR/VR 微显示和高 PPI 面板。喷墨印刷 (Inkjet Printing, IJP) 通过液滴精确定位直接图案化沉积，材料利用率 > 80%（旋涂 < 30%），适合大面积、高分辨率、低成本制造。全喷墨打印 (All Inkjet Printing, AIJP) 进一步将全部功能层（空穴注入、空穴传输、发光、电子传输、电极）均用喷墨制备，彻底免除光刻步骤，简化工艺链。咖啡环效应 (Coffee Ring Effect) 是液滴干燥时边缘沉积浓集的现象，严重降低薄膜均匀性，Marangoni 流动通过表面张力梯度驱动内部环流抑制此效应。正交溶剂系统指相邻功能层使用互不溶解的溶剂，防止上层墨水溶解下方已固化薄膜。", "techTags": ["Micro-QLED", "全喷墨打印", "AIJP", "量子点", "CdSe/ZnS", "咖啡环效应", "Marangoni 流动", "正交溶剂", "福州大学", "30 μm 微显示"], "metrics": [{"name": "EQEmax", "value": "7.35", "unit": "%", "note": "30 μm 红色 Micro-QLED"}, {"name": "电流效率", "value": "11.19", "unit": "cd/A", "note": ""}, {"name": "最大亮度", "value": "61,377.41", "unit": "cd/m²", "note": "红色 Micro-QLED"}, {"name": "器件尺寸", "value": "30", "unit": "μm", "note": "AIJP 工艺最小尺寸 QLED"}, {"name": "开启电压", "value": "2", "unit": "V", "note": ""}, {"name": "EL 发射峰", "value": "621", "unit": "nm", "note": "CdSe/ZnS 红光 QD"}, {"name": "QD 平均尺寸", "value": "11.5", "unit": "nm", "note": "CdSe/ZnS"}, {"name": "功能层数", "value": "5", "unit": "层", "note": "全部 AIJP 叠印"}, {"name": "器件结构", "value": "ITO/PEDOT:PSS/TFB/QD/ZnO/Ag", "unit": "", "note": "5 层全溶液加工"}], "source": "Displays (Elsevier)", "url": "https://www.sciencedirect.com/science/article/pii/S014193822600048X", "image": "https://images.unsplash.com/photo-1586953208270-767889db1102?w=800&q=80", "imageCaption": "喷墨打印与量子点微显示工艺示意 (Unsplash)", "date": "2026-07-01", "attachments": [{"label": "原文摘要页 (ScienceDirect，需机构订阅)", "url": "https://www.sciencedirect.com/science/article/pii/S014193822600048X", "cached": false}]}], "sources": ["Light: Science & Applications (Springer Nature, CC BY 4.0)", "Displays (Elsevier)", "清华大学深圳国际研究生院", "京都大学 Hatakeyama 团队", "九州大学 OPERA (Adachi 团队)", "福州大学平板显示国家地方联合工程实验室"]}, "2026-07-03": {"schema": "display-paper-daily/v1", "date": "2026-07-03", "weekday": "周五", "period": "07.02 – 07.03", "summary": "本期精读 1 篇：华南理工大学彭俊彪教授 × 吉林大学王悦教授联合团队在 Organic Electronics Vol.153 发表螺芴辅助 (spirofluorene-assisted) 纯蓝 MR-TADC 发射体 Me-t-DABNA-SF——螺芴基团调控前线分子轨道实现 LRCT+SRCT 混合激发态，kRISC 1.4×10⁵ s⁻¹，EQEmax 27.9%（纯蓝 CIE (0.14, 0.07)，FWHM 26 nm），TADF 敏化后进一步提升至 35.6%，为可升华低分子量蓝光 MR-TADF 设计开辟新路径。", "focus": "MR-TADF / 螺芴辅助分子设计 / 纯蓝 OLED / kRISC 加速 / Me-t-DABNA-SF", "highlights": ["Me-t-DABNA-SF：螺芴基团引入 MR 骨架未配位芳胺，LUMO 86.2% 定域于螺芴，构建 LRCT+SRCT 混合激发态，SOC 增大 → kRISC = 1.4×10⁵ s⁻¹（比母核 Me-t-DABNA 提高 1.4 倍）", "纯蓝窄带发射：EL 峰值 458 nm，FWHM 26 nm，CIE (0.14, 0.07) 满足 NTSC 蓝光标准", "EQEmax 27.9%（非敏化纯蓝器件），TADF 敏化策略进一步提升至 35.6%", "螺芴正交构型抑制分子间聚集与激子湮灭，实现「抗聚集发光」效应", "分子量 < 1000 g/mol，可升华蒸发工艺适用——克服了大分子 MR-TADF 无法蒸镀的量产瓶颈"], "routes": [{"name": "蓝光 MR-TADF OLED", "status": "↑突破", "note": "螺芴辅助策略：Me-t-DABNA-SF EQE 27.9% → 35.6%（敏化），CIE (0.14, 0.07) 纯蓝，可升华"}, {"name": "蓝光超荧光 (HF) 路线", "status": "↑突破", "note": "TADF 敏化策略将 MR-TADF EQE 从 27.9% 提升至 35.6%，验证 HF 路线在纯蓝波段有效性"}, {"name": "深蓝磷光 OLED (Ir-PhOLED)", "status": "→稳定推进", "note": "上周清华深研院 CF₃-2 EQE 29.0% / LT50 2127 h 已确立方向，本周无新进展"}, {"name": "Micro-QLED / 喷墨打印", "status": "→稳定推进", "note": "上周福州大学 AIJP 30 μm Micro-QLED 已突破，本周无新进展"}], "papers": [{"id": 1, "title": "High-performance blue MR-TADF emitter achieved by spirofluorene-assisted frontier molecular orbital regulation and accelerated spin-flipping (螺芴辅助前线分子轨道调控与加速自旋翻转实现高性能纯蓝 MR-TADF 发射体)", "authors": "Lili Hou (华南理工大学 & 吉林大学), Chao Jiang (华南理工大学 & 吉林大学), Yufang Nie (吉林大学), Xiaodong Guo (吉林大学), Yue Wang (吉林大学, 通讯作者), Junbiao Peng (华南理工大学, 通讯作者)", "field": "纯蓝 MR-TADF OLED / 螺芴辅助分子设计", "paperType": "期刊论文", "venue": "Organic Electronics, Vol. 153, June 2026, 107407", "oneLiner": "螺芴基团引入 MR 骨架调控前线轨道 → LRCT+SRCT 混合态加速 kRISC 1.4×10⁵ s⁻¹，EQE 27.9% → 35.6%（敏化），纯蓝 CIE (0.14, 0.07)。", "abstract": "纯有机多重共振热活化延迟荧光 (MR-TADF) 材料兼具 100% 激子利用率与窄带发射，在先进 OLED 显示中前景广阔。然而，缓慢的反向系间窜跃速率 (kRISC) 导致 MR-TADF 器件严重效率滚落，且可升华的蓝光 MR-TADF 分子设计策略仍十分稀缺。本文提出螺芴辅助分子设计策略，将螺芴基团引入 MR 骨架的未配位芳胺位置，精准调控前线分子轨道 (FMO)：LUMO 86.2% 定域于螺芴基团，构建长程电荷转移 (LRCT) 与短程电荷转移 (SRCT) 混合激发态，增大自旋-轨道耦合 (SOC) 常数，使 Me-t-DABNA-SF 的 kRISC 达到 1.4×10⁵ s⁻¹（比母核 Me-t-DABNA 提升 1.4 倍）。同时，螺芴正交构型的位阻效应抑制分子间聚集与激子湮灭，实现抗聚集发光 (anti-ACQ)。优化器件在 458 nm 发射，FWHM 26 nm，CIE (0.14, 0.07) 满足 NTSC 纯蓝标准；EQEmax 27.9%，经 TADF 敏化策略进一步提升至 35.6%。该策略为可升华低分子量高性能蓝光 MR-TADF 发射体设计开辟了新路径。", "content": "核心创新在于螺芴辅助分子设计策略 (spirofluorene-assisted molecular design)：将螺芴 (spirofluorene) 基团引入 Me-t-DABNA 的 MR 骨架未配位芳胺位置，形成目标分子 Me-t-DABNA-SF。设计原理分三层：(1) FMO 调控——LUMO 主要定域于螺芴基团（贡献 86.2% 的 S₁ HOMO→LUMO 跃迁），形成 LRCT+SRCT 混合激发态，SOC 常数增大促进 RISC 过程；(2) RISC 加速——Me-t-DABNA-SF kRISC = 1.4×10⁵ s⁻¹，比对照分子 Me-t-DABNA 的 1.0×10⁵ s⁻¹ 提高 40%，源于螺芴带来的 SOC 增强与 ΔEST 优化；(3) 抗聚集效应——螺芴正交构型增大相邻分子间距，抑制聚集诱导猝灭 (ACQ) 和三线态-三线态湮灭 (TTA)。器件结构：ITO/HAT-CN/TAPC/TCTA/mCBP/mCBP:Me-t-DABNA-SF (3 wt%)/DPEPO/TSPO1/Liq/Al。非敏化纯蓝器件 EQEmax 27.9%，CE 45.4 cd/A，PE 30.9 lm/W，EL 峰值 458 nm，FWHM 26 nm，CIE (0.14, 0.07)。TADF 敏化器件采用 ITO/HAT-CN/TAPC/TCTa/mCBP/mCBP:4CzIPN:Me-t-DABNA-SF (3 wt%)/DPEPO/TSPO1/Liq/Al 结构，EQEmax 提升至 35.6%。螺芴修饰保持了纯蓝发射（溶液 PL 峰 457 nm，FWHM 23 nm），分子量 < 1000 g/mol，升华温度适中，可直接用于蒸镀量产线，克服了传统大分子 MR-TADF（MW > 1000，强平面性）无法蒸镀的瓶颈。合成路线：Me-t-DABNA 经 NBS 溴化得 Me-t-DABNA-Br，再与螺芴硼酸 Suzuki 偶联得 Me-t-DABNA-SF。", "techIntro": "多重共振热活化延迟荧光 (MR-TADF) 是一类利用硼 (B) 和氮 (N) 原子在刚性共轭骨架内交替分布产生多重共振效应的纯有机发光材料，具有窄带发射 (FWHM < 30 nm) 和 100% 激子利用率的优势，被视为下一代 OLED 显示蓝光发射体的候选。但其核心瓶颈在于反向系间窜跃 (RISC) 速率慢——三线态激子无法快速返回单线态，导致严重效率滚落。螺芴 (spirofluorene) 是由两个苯环通过一个共用碳原子正交连接的刚性结构，引入后既调控前线分子轨道分布（将 LUMO 推向螺芴区，形成 LRCT 混合态增强 SOC），又利用正交构型的位阻效应抑制分子聚集。LRCT (长程电荷转移) 和 SRCT (短程电荷转移) 的混合态使 HOMO-LUMO 跃迁偶极矩增大，SOC 常数提升，加速 RISC。EQEmax 是最大外量子效率；kRISC 是反向系间窜跃速率；SOC 是自旋-轨道耦合常数；ACQ 是聚集诱导猝灭；FWHM 是半峰宽；CIE 是国际照明委员会色坐标。", "techTags": ["MR-TADF", "螺芴辅助分子设计", "Me-t-DABNA-SF", "LRCT+SRCT 混合态", "kRISC 加速", "自旋-轨道耦合", "抗聚集发光", "纯蓝 OLED", "TADF 敏化策略", "华南理工大学", "吉林大学"], "metrics": [{"name": "EQEmax（非敏化纯蓝器件）", "value": "27.9", "unit": "%", "note": "Me-t-DABNA-SF, CIE (0.14, 0.07)"}, {"name": "EQEmax（TADF 敏化器件）", "value": "35.6", "unit": "%", "note": "4CzIPN 敏化, HF 策略"}, {"name": "kRISC", "value": "1.4×10⁵", "unit": "s⁻¹", "note": "比 Me-t-DABNA (1.0×10⁵) 提高 40%"}, {"name": "CIE 色坐标", "value": "(0.14, 0.07)", "unit": "", "note": "满足 NTSC 纯蓝标准"}, {"name": "EL 发射峰", "value": "458", "unit": "nm", "note": "纯蓝窄带"}, {"name": "FWHM", "value": "26", "unit": "nm", "note": "窄带发射"}, {"name": "电流效率（非敏化）", "value": "45.4", "unit": "cd/A", "note": ""}, {"name": "功率效率（非敏化）", "value": "30.9", "unit": "lm/W", "note": ""}, {"name": "溶液 PL 峰", "value": "457", "unit": "nm", "note": "FWHM 23 nm"}, {"name": "LUMO 螺芴贡献", "value": "86.2", "unit": "%", "note": "S₁ HOMO→LUMO 跃迁占比"}, {"name": "分子量", "value": "< 1000", "unit": "g/mol", "note": "可升华，适用于蒸镀工艺"}], "source": "Organic Electronics (Elsevier)", "url": "https://www.sciencedirect.com/science/article/pii/S1566119926000364", "image": "https://images.unsplash.com/photo-1557672172-298e090bd0f1?w=800&q=80", "imageCaption": "蓝光 OLED 发光材料与分子结构示意 (Unsplash)", "date": "2026-06-01", "attachments": [{"label": "原文摘要页 (ScienceDirect，需机构订阅获取全文)", "url": "https://www.sciencedirect.com/science/article/pii/S1566119926000364", "cached": false}]}], "sources": ["Organic Electronics (Elsevier, Vol.153, June 2026)", "华南理工大学发光材料与器件国家重点实验室", "吉林大学超分子结构与材料国家重点实验室"]}, "2026-07-07": {"schema": "display-paper-daily/v1", "date": "2026-07-07", "weekday": "周二", "summary": "本周三篇面板显示领域重要论文：京东方提出AI替代几何光学仿真模型（1000%速度提升，>99%精度），Sony推出Isolated Pixel新像素结构实现0.44英寸4980ppi微显示，ETH Zurich开发双向傅里叶像素实现光控制与分析合一。", "focus": "AI深度融入显示设计流程、超高分辨率微显示结构创新、像素功能从单向发光走向双向光控", "highlights": ["AI替代传统光学仿真的工业级验证——1000倍加速意味着设计周期从天级缩至分钟级", "Sony 4980ppi新像素结构采用光刻+干法刻蚀隔离像素，消除子像素间漏光", "ETH Fourier像素将显示与传感合二为一，为下一代交互显示奠基"], "papers": [{"id": "paper-001", "title": "Enabling Next-Generation OLEDs: A Revolutionary AI-Driven Model for Geometric Optical Design", "authors": "Bo Shi, Yinglong Huang, Jianji Fu, Yuanhao Tan, Yang Su, Zhiqing Li, Rong Zhang, Senbao Jiang, Xiuwen Shi, Xiaojun Tang, Kening Zheng, Guoqiang Tang, Haijun Qiu (BOE OLED Division R&D Center)", "field": "面板显示", "paperType": "期刊论文", "venue": "Journal of the Society for Information Display, Vol 34, Issue 5, pp. 309-320, May 2026", "oneLiner": "京东方提出AI替代传统几何光学仿真模型，实现>1000%速度提升同时保持>99%预测精度", "abstract": "OLED面板设计严重依赖几何光学仿真来指导设计选择和预测光学行为。本研究提出一种变革性的AI模型作为传统几何光学仿真的替代（surrogate）。该模型在保持>99%预测精度的同时实现超过1000%的评估速度提升，从而能够近乎实时地进行性能评估。这一突破使得大规模设计空间的快速探索成为可能，大幅加速OLED技术创新。数据可从通信作者索取。", "content": "本文核心贡献是训练了一个深度学习代理模型（surrogate model），用于替代传统的基于光线追踪的几何光学仿真。传统仿真每一次设计迭代可能需要数小时到数天，而AI模型可以在毫秒级输出结果。团队来自京东方OLED研发中心，验证了模型在多种OLED器件结构（包括顶发射、底发射、微腔结构）上的泛化能力。模型预测精度>99%意味着可直接用于设计空间的初筛和趋势判断，大幅缩短开发周期。这是SID JSID期刊2026年5月发表的工作。", "techIntro": "OLED面板的光学设计通常涉及多层薄膜干涉效应的精确模拟，需要综合考虑有机发光层各层厚度、折射率分布、微腔效应、出光耦合等复杂因素。传统方法使用光线追踪或传输矩阵法求解麦克斯韦方程组，虽然精度高但计算量巨大，每次参数调整都需要重新计算。AI代理模型通过学习大量仿真数据的输入-输出映射关系，可以在不牺牲精度的情况下实现近乎即时的预测。这项工作的意义在于首次在工业级OLED设计中验证了AI代理模型的实用性。", "techTags": ["OLED光学设计", "AI代理模型", "几何光学仿真", "深度学习", "BOE", "微腔效应"], "metrics": [{"name": "模型评估速度提升", "value": ">1000", "unit": "%", "note": "相比传统几何光学仿真"}, {"name": "预测精度", "value": ">99", "unit": "%", "note": "AI模型 vs 传统仿真结果"}, {"name": "期刊卷期", "value": "Vol 34, Issue 5", "unit": "", "note": "2026年5月"}, {"name": "页码范围", "value": "309-320", "unit": "页", "note": ""}], "attachments": [{"name": "论文原文", "url": "https://sid.onlinelibrary.wiley.com/doi/10.1002/jsid.70062", "label": "JSID全文", "cached": false}], "source": "Journal of the SID", "url": "https://sid.onlinelibrary.wiley.com/doi/10.1002/jsid.70062", "image": "https://images.unsplash.com/photo-1620712943543-bcc4688e7485-e363dbe005cb?w=1200&q=80&auto=format&fit=crop", "imageCaption": "AI + OLED 光学设计示意", "date": "2026-05-01"}, {"id": "paper-002", "title": "A New Pixel Structure for High-Resolution OLED Microdisplays, Enhancing Efficiency and Color Gamut Using Patterned OLEDs and Aligned Light Guides", "authors": "Masaya Ogura, Naoya Kasahara, Jun Yoshida, Naohiro Kadoguchi, Naoto Oda, Toshiaki Shiraiwa, Kosuke Homma, Takayoshi Kato, Tomoaki Sawabe, Kenichi Aoyagi (Sony Semiconductor Solutions)", "field": "面板显示", "paperType": "期刊论文", "venue": "Journal of the Society for Information Display, Vol 34, Issue 5, pp. 247-253, May 2026", "oneLiner": "Sony提出'Isolated Pixel'新结构，通过光刻+干法刻蚀隔离像素，实现0.44英寸4980ppi微显示", "abstract": "我们提出一种名为'Isolated Pixel'的新型OLED像素结构，用于超精细像素阵列。该结构通过抑制像素间漏电流并引入自对准光导来改善光提取，从而提升色域和发光效率。具体工艺为：通过光刻和干法刻蚀将OLED和钝化层隔离，然后用SiN和低折射率材料的透明材料堆叠填充像素间空间。Isolated Pixel结构制造后未观察到光学和电学特性退化。原型面板（0.44英寸，4980ppi，DCI-P3 95%，最大亮度10,000cd/m²）展示了优越的画质——色彩再现性和发光效率均有提升。", "content": "Sony Semiconductor Solutions团队提出的Isolated Pixel结构解决了超高分辨率微显示中的关键问题：当像素尺寸缩小到微米级时，相邻像素间的电流泄漏和光学串扰严重劣化画质。传统方法依赖彩色滤光片（CF）方案，但存在光吸收导致的效率损失。Sony的解决方案是将每个OLED子像素通过光刻和干法刻蚀物理隔离，然后在间隙填充由SiN（高折射率）和低折射率材料组成的透明波导结构。这种自对准光导将波导出的光导向像素正上方，既提高了光提取效率，又消除了相邻像素间的颜色串扰。原型规格：0.44英寸对角线，4980ppi分辨率，DCI-P3色域覆盖率95%，最大亮度10,000cd/m²。", "techIntro": "OLED微显示是AR/VR/XR眼镜的核心显示元件，其核心挑战是在极小尺寸（<1英寸）内实现超高分辨率（>3000ppi）和高亮度（>5000cd/m²）。随像素尺寸缩小到几微米量级，相邻像素间的电流横向扩散和光学串扰成为主要画质劣化因素。传统CF（彩色滤光片）+WOLED方案虽然可以规避精细图案化难题，但彩色滤光片会吸收约70%的光，效率极低。RGB并排排列（side-by-side）通过FMM蒸镀是高端方案，但高分辨率下FMM对位精度和开口率成为瓶颈。Sony的Isolated Pixel方案采用光刻工艺实现亚微米级图案化精度，结合自对准光导结构在提高分辨率的同时保证了光效率。", "techTags": ["OLED微显示", "Isolated Pixel", "高分辨率", "光刻工艺", "Sony", "AR/VR", "光导"], "metrics": [{"name": "显示尺寸", "value": "0.44", "unit": "英寸", "note": ""}, {"name": "分辨率", "value": "4980", "unit": "ppi", "note": "每英寸像素数"}, {"name": "色域覆盖", "value": "95", "unit": "%", "note": "DCI-P3标准"}, {"name": "最大亮度", "value": "10000", "unit": "cd/m²", "note": ""}, {"name": "期刊卷期", "value": "Vol 34, Issue 5", "unit": "", "note": "2026年5月"}, {"name": "页码范围", "value": "247-253", "unit": "页", "note": ""}], "attachments": [{"name": "论文原文", "url": "https://sid.onlinelibrary.wiley.com/doi/10.1002/jsid.70076", "label": "JSID全文", "cached": false}], "source": "Journal of the SID", "url": "https://sid.onlinelibrary.wiley.com/doi/10.1002/jsid.70076", "image": "https://images.unsplash.com/photo-1592478411213-6153e4ebc07d?w=1200&q=80&auto=format&fit=crop", "imageCaption": "Sony OLED 微显示像素结构（示意）", "date": "2026-05-01"}, {"id": "paper-003", "title": "Fourier pixels for bidirectional light control", "authors": "Y.M. Glauser, S.J.W. Vonk, D.B. Seda, et al. (ETH Zurich)", "field": "面板显示 / 光学", "paperType": "期刊论文", "venue": "Nature, Volume 655, pp. 87-92, 2026", "oneLiner": "ETH Zurich开发双向傅里叶像素，在同一像素上实现光控制（显示）和光分析（传感）功能", "abstract": "我们开发了能够同时控制和分析光的双向像素。该像素采用波状雕刻表面结构，可以控制和分析光强、振荡相位和偏振。在光控制方向，像素将入射光转换为沿芯片表面传播的表面波，再在像素内另一位置将表面波散射回空间中出射——通过光波干涉可创建图案和图像。在光分析方向，应用干涉和傅里叶分析的逆过程来分析光。由于像素的表面轮廓可通过傅里叶分析确定，振幅、相位和偏振的控制与分析可以在单个像素上结合。研究团队下一步计划制造由多个傅里叶像素组成的矩阵，以实现更复杂的器件。", "content": "ETH Zurich团队提出的Fourier像素的核心创新在于利用波状雕刻表面结构（通过计算设计的表面轮廓）实现双向光场调控。在显示模式下，入射光被转换为表面传播波，然后在像素另一位置被重新散射为特定形状的出射波——通过波前干涉生成所需图案。在传感模式下，光波与参考波叠加产生干涉条纹，通过相机捕捉条纹模式反演出入射光的相位信息。同样方法可用于分析偏振态。Nature论文标志着像素概念从纯粹的发光源向交互式光界面转变。", "techIntro": "传统显示像素仅为单向光发射器件（发光或调制背光），相机像素则为单向光接收器件。Fourier像素的概念打破了这一界限：同一物理结构可以同时完成光调制（显示）和光分析（成像/传感）两个任务。其物理原理基于傅里叶光学——任何光场都可以分解为不同空间频率的平面波的叠加。通过设计像素表面的亚波长结构（超表面/衍射光学元件），可以选择性地操控不同空间频率分量的振幅和相位。ETH团队使用「波状雕刻表面」实现这一功能，属于计算光学与显示技术的交叉领域。", "techTags": ["Fourier像素", "双向光控制", "计算光学", "超表面", "ETH Zurich", "Nature"], "metrics": [{"name": "期刊", "value": "Nature", "unit": "", "note": ""}, {"name": "卷数", "value": "655", "unit": "", "note": ""}, {"name": "页码范围", "value": "87-92", "unit": "页", "note": ""}, {"name": "发表年份", "value": "2026", "unit": "", "note": ""}], "attachments": [{"name": "Nature原文", "url": "https://doi.org/10.1038/s41586-026-10681-7", "label": "Nature全文", "cached": false}], "source": "Nature", "url": "https://doi.org/10.1038/s41586-026-10681-7", "image": "https://images.unsplash.com/photo-1564466809058-bf4114d55352?w=1200&q=80&auto=format&fit=crop", "imageCaption": "傅里叶像素表面波结构（示意）", "date": "2026-06-01"}]}};
  const SEMICON_DATA = {"2026-07-06": {"schema": "semicon-news-daily/v1", "date": "2026-07-06", "weekday": "周一（汇总版）", "period": "07.03 – 07.06", "summary": "TSMC 2nm N2P工艺Q3风险试产，GAA晶体管密度270MTr/mm²；三星3D DRAM堆叠原型亮相VLSI 2026，32层stacked FET结构；IMEC发布sub-2nm CFET标准单元设计套件，2028量产窗口；ASML High-NA EUV装机量突破30台；国内SiC衬底8英寸加速导入，天岳先进获英飞凌长协。", "focus": "先进制程 / GAA晶体管 / 3D DRAM / CFET / High-NA EUV / SiC衬底", "highlights": ["TSMC N2P 风险试产 Q3 启动，GAA 晶体管密度 270 MTr/mm²，比 N3 提升 15%", "三星 VLSI 2026 展示 3D DRAM 原型，32 层 stacked FET，等效密度 48 Gb/mm²", "IMEC 发布 sub-2nm CFET 标准单元设计套件，0.018 µm² 6T SRAM", "ASML High-NA EUV 全球装机超 30 台，英特尔、三星、SK 海力士已接收", "国内 8 英寸 SiC 衬底加速，天岳先进与英飞凌签署三年长协"], "news": [{"id": 1, "priority": "featured", "title": "TSMC N2P GAA 晶体管风险试产在即，密度 270 MTr/mm² 再创纪录", "keywords": ["TSMC", "N2P", "GAA", "GAAFET", "2nm", "风险试产"], "tech": "GAAFET", "route": "先进制程", "routeStatus": "↑突破", "content": "据 Digitimes 报道，台积电 N2P 工艺（2nm 增强版）计划 2026 年 Q3 在宝山 Fab 18 Phase 8 启动风险试产。该节点采用全环绕栅极（GAAFET）晶体管架构，标准单元库显示逻辑密度达 270 MTr/mm²，相较 N3 的 235 MTr/mm² 提升约 15%。相比 2025 年量产的 baseline N2（密度约 250 MTr/mm²），N2P 通过优化接触栅极间距（CPP）和金属层布线进一步提升密度。首批产品预计 2027 年上半年量产，目标客户包括苹果和英伟达。", "reason": "TSMC N2P 的 GAA 晶体管是继 FinFET 之后最重大的晶体管结构变革，密度和能效同时提升，直接决定 AI 加速器和移动 SoC 的下一个代际竞争力。", "source": "Digitimes / AnandTech", "url": "https://www.digitimes.com/news/a20260703PD200/tsmc-n2p-gaa-risk-production.html", "image": "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=800&q=80", "imageCaption": "GAA 晶体管结构示意", "date": "2026-07-03"}, {"id": 2, "priority": "featured", "title": "三星 VLSI 2026 展示 3D DRAM 原型：32 层 Stacked FET，等效密度 48 Gb/mm²", "keywords": ["三星", "3D DRAM", "Stacked FET", "VLSI", "VLSI 2026"], "tech": "3D DRAM", "route": "存储技术", "routeStatus": "↑突破", "content": "三星电子在 VLSI 2026 技术与电路研讨会（6/30-7/2 夏威夷）上展示了 3D DRAM 原型芯片。该芯片采用 32 层 stacked FET（堆叠场效应晶体管）结构，单层厚度 47 nm，位线间距 28 nm。等效存储密度达到 48 Gb/mm²，是当前 1c nm DRAM 密度（约 15-18 Gb/mm²）的 2.6-3.2 倍。三星表示该技术利用 DRAM 单元电容器的垂直堆叠绕过 EUV 光刻缩放瓶颈，预计 2028-2029 年进入量产开发阶段。", "reason": "DRAM 缩放面临物理极限，3D 堆叠是实现密度持续提升的最有希望路径。三星 3D DRAM 原型是自 HBM 以来存储技术最重大的架构变革。", "source": "VLSI 2026 / Samsung / EE Times", "url": "https://www.eetimes.com/samsung-3d-dram-stacked-fet-vlsi-2026/", "image": "https://images.unsplash.com/photo-1517077304055-d8d9c5b4fcc9?w=800&q=80", "imageCaption": "3D DRAM 堆叠结构示意", "date": "2026-07-01"}, {"id": 3, "priority": "secondary", "title": "IMEC 发布 sub-2nm CFET 标准单元设计套件，0.018 µm² 6T SRAM", "keywords": ["IMEC", "CFET", "sub-2nm", "SRAM", "标准单元"], "tech": "CFET", "route": "先进制程", "routeStatus": "↑突破", "content": "IMEC 在 VLSI 2026 上发布了互补式 FET（CFET）标准单元设计套件（PDK v0.5）。该套件包含 6T SRAM 位元，单元面积 0.018 µm²，较 2nm GAA 世代缩小约 35%。CFET 将 nFET 和 pFET 垂直堆叠在同一 footprint 内，接触栅极间距（CPP）缩至 42 nm，BEOL 使用 2 层 Ru 金属 + 低k 介电层。IMEC 预计 CFET 将于 2028 年进入量产导入窗口。", "reason": "CFET 是 GAAFET 之后的下一个晶体管架构，垂直堆叠互补器件是扩展摩尔定律的关键路径。IMEC 的 PDK 是产业生态启动的标志。", "source": "IMEC / IEEE Spectrum", "url": "https://spectrum.ieee.org/imec-cfet-pdk-2026", "image": "https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=800&q=80", "imageCaption": "CFET 标准单元布局", "date": "2026-07-02"}, {"id": 4, "priority": "secondary", "title": "ASML High-NA EUV 全球装机突破 30 台，英特尔占半", "keywords": ["ASML", "High-NA EUV", "0.55 NA", "装机量"], "tech": "EUV 光刻", "route": "设备", "routeStatus": "→稳定推进", "content": "ASML 宣布截至 2026 年 Q2，其 0.55 NA High-NA EUV 光刻系统（TWINSCAN EXE:5500）全球累计装机量突破 30 台。其中英特尔已接收 15 台（含已安装和正在安装），三星 8 台，SK 海力士 5 台，台积电 2 台。High-NA EUV 的单片成本约 3.8 亿欧元，支持单次曝光 8nm 金属半节距。ASML 计划 2027 年将产能提升至年产 20 台。", "reason": "High-NA EUV 是 2nm 以下制程的必需设备，装机量直接反映各家代工厂的先进节点竞争实力。SK 海力士和台积电的采购节奏值得关注。", "source": "ASML / Reuters", "url": "https://www.reuters.com/technology/asml-high-na-euv-30-installations-2026-07-02/", "date": "2026-07-02"}, {"id": 5, "priority": "secondary", "title": "国内 8 英寸 SiC 衬底加速导入：天岳先进获英飞凌三年长协", "keywords": ["SiC", "碳化硅", "8英寸", "天岳先进", "英飞凌"], "tech": "SiC 衬底", "route": "宽禁带半导体", "routeStatus": "↑突破", "content": "据集邦咨询报道，国内碳化硅衬底龙头天岳先进与英飞凌签署三年长单协议，约定 2026-2028 年向英飞凌供应 8 英寸 SiC 衬底，总金额未披露但业內估计超 20 亿元人民币。目前天岳先进 8 英寸 SiC 衬底已实现小批量出货，位错密度 <4000 cm⁻²，接近 Wolfspeed 同级产品。此外，天科合达、同光股份等国内厂商也在推进 8 英寸认证。", "reason": "SiC 是电动车逆变器和高压功率系统的关键衬底材料。8 英寸切换是降本的核心路径，国内 SiC 衬底厂商的良率和缺陷密度正加速追赶国际水平。", "source": "TrendForce / 集邦咨询", "url": "https://www.trendforce.com/news/2026/07/05/news-sic-substrate-8inch-china.html", "date": "2026-07-05"}, {"id": 6, "priority": "secondary", "title": "应用材料推出新型高选择性 SiGe 蚀刻技术，用于 GAA 纳米片释放", "keywords": ["应用材料", "AMAT", "SiGe蚀刻", "GAA", "纳米片释放"], "tech": "原子层蚀刻", "route": "设备", "routeStatus": "↑突破", "content": "应用材料在 SEMICON West 2026 上发布了 Centura® SyRI 高选择性 SiGe 蚀刻系统，专用于 GAAFET 纳米片释放工艺。该系统采用热化学 + 等离子体两步法，SiGe 对 Si 的选择比 >1000:1，片内均匀性 σ <1.5%。相比传统湿法释放，该干法方案可避免纳米片粘连和悬垂应力损伤，良率提升约 8%。", "reason": "纳米片释放是 GAAFET 制造中最关键且最困难的工艺步骤之一，高选择性干法蚀刻是提升量产良率的关键使能技术。", "source": "Applied Materials / Semiconductor Engineering", "url": "https://semiengineering.com/applied-materials-sige-etch-gaa-release-2026/", "date": "2026-07-06"}, {"id": 7, "priority": "flash", "title": "英飞凌宣布量产 300 mm GaN-on-Si 功率晶圆", "keywords": ["英飞凌", "GaN", "300mm", "功率半导体"], "tech": "GaN HEMT", "route": "宽禁带半导体", "routeStatus": "↑突破", "content": "据英飞凌官网，其位于奥地利菲拉赫的 300 mm GaN-on-Si 功率晶圆产线正式量产，这是全球首条 300 mm GaN HEMT 量产线。首批产品 CoolGaN™ 700 V 系列已在 6 月底出货，导通电阻 Rds(on) 低至 25 mΩ。", "reason": "300 mm GaN 量产标志着 GaN 功率器件从 200 mm 向更大直径衬底过渡，成本有望降低 30-40%。", "source": "Infineon / EET China", "url": "https://www.infineon.com/cms/en/about-infineon/press/2026/infineon-300mm-gan-量产/", "date": "2026-07-03"}, {"id": 8, "priority": "flash", "title": "SK 海力士 1c nm DRAM 良率突破 75%，HBM4E 采用混合键合", "keywords": ["SK海力士", "1c nm", "DRAM", "HBM4E", "混合键合"], "tech": "DRAM", "route": "存储技术", "routeStatus": "↑突破", "content": "SK 海力士在内部简报中透露其 1c nm DRAM 良率突破 75%，达到量产标准。同时 HBM4E 将采用 Cu-Cu 混合键合（Hybrid Bonding）替代微凸块，堆叠层数 16 层，容量提升至 48 GB。", "source": "The Elec", "url": "https://www.thelec.net/news/articleView.html?idxno=5678", "date": "2026-07-04"}, {"id": 9, "priority": "flash", "title": "东京电子推出新型低温 SiO₂ 原子层沉积系统", "keywords": ["东京电子", "TEL", "ALD", "低温沉积"], "tech": "ALD", "route": "设备", "routeStatus": "→稳定推进", "content": "东京电子（TEL）发布新型低温等离子体增强 ALD 系统，可在 150°C 以下沉积高密度 SiO₂ 薄膜，适用于 3D NAND 高深宽比间隙填充和 EUV 光刻胶下层。", "source": "TEL / Semiconductor Engineering", "url": "https://semiengineering.com/tel-low-temp-sio2-ald-2026/", "date": "2026-07-04"}, {"id": 10, "priority": "flash", "title": "台积电 CoWoS-L 产能 2027 月产 8 万片，InFO 配套扩产", "keywords": ["台积电", "CoWoS", "先进封装", "产能"], "tech": "先进封装", "route": "先进封装", "routeStatus": "→稳定推进", "content": "据供应链消息，台积电计划 2027 年将 CoWoS-L 月产能扩至 8 万片（目前约 4 万片），InFO 配套同步扩产。英伟达 Rubin 和 AMD MI400 是主要需求驱动。", "source": "DigiTimes / 经济日报", "url": "https://www.digitimes.com/news/a20260705PD210/cowos-tsmc-advanced-packaging.html", "date": "2026-07-05"}, {"id": 11, "priority": "flash", "title": "华为公布硅基量子点单光子源原型，工作温度 4K", "keywords": ["华为", "量子点", "单光子源", "硅基"], "tech": "硅基量子点", "route": "量子器件", "routeStatus": "→稳定推进", "content": "华为在 CLEO 2026 上公布了基于硅基量子点的电泵浦单光子源原型，在 4K 温度下实现 0.67 的 Hong-Ou-Mandel 可见度，为片上光量子计算提供了关键器件基础。", "source": "CLEO 2026 / 华为", "url": "https://www.cleoconference.org/program/silicon-quantum-dot-sps-huawei/", "date": "2026-07-06"}, {"id": 12, "priority": "flash", "title": "新思科技发布 3DIC Compiler 2027，支持 12 芯片堆叠热仿真", "keywords": ["Synopsys", "3DIC", "EDA", "热仿真"], "tech": "EDA", "route": "设计工具", "routeStatus": "→稳定推进", "content": "新思科技发布 3DIC Compiler 2027 版本，新增 12 芯片堆叠的热-机械协同仿真能力，支持 interposer 和 hybrid bonding 两种方案，与台积电 3Dblox 2.0 流程完成认证。", "source": "Synopsys / EDA Weekly", "url": "https://www.synopsys.com/3dic-compiler-2027-release", "date": "2026-07-06"}]}, "2026-07-07": {"schema": "semicon-news-daily/v1", "date": "2026-07-07", "weekday": "周二", "summary": "IBM发布7Å晶体管架构（交错的纳米片，性能+50%/能效+70%），Research Bits Jul 6报道串联神经网络预测半导体特性、<3nm TiO₂铁电薄膜、双向傅里叶像素；东京大学实现1nm MoS₂纳米管用于GAA；宾夕法尼亚州立大学打造单片3D自供电器件；高NA EUV掩模经济学挑战路线图；GaN功率器件走向垂直结构。", "focus": "7Å级晶体管架构竞赛升温，原子级功能材料突破加速，先进封装与CPO走向量产准备", "news": [{"id": "semi-001", "title": "IBM发布7Å晶体管架构：交错式纳米片，性能+50%或能效+70%", "keywords": ["IBM", "7Å", "纳米片", "晶体管架构", "SRAM"], "tech": "GAA纳米片晶体管", "route": "先进制程架构", "routeStatus": "↑突破", "content": "IBM展示全新7Å晶体管架构，采用交错式纳米片（interleaved nanosheet）设计——晶体管像屋顶瓦片一样堆叠在精确的斜角上，从而在单位面积内塞入更多晶体管。性能较当前工艺提升50%，或能效提升高达70%。SRAM缩放改进40%，速度远远快于HBM，延迟更低。预计量产时间在2031年左右。据SemiEngineering报道。", "reason": "IBM的新架构路线图为后2nm时代提供了关键的技术路径参考", "source": "SemiEngineering / IBM", "url": "https://semiengineering.com/chip-industry-week-in-review-144/", "image": "https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200&q=80&auto=format&fit=crop", "imageCaption": "GAA 晶体管结构示意", "date": "2026-06-26", "priority": "featured"}, {"id": "semi-002", "title": "Research Bits Jul 6：串联神经网络6个数量级加速半导体特性预测", "keywords": ["神经网络", "半导体特性", "IGZO", "TNN", "机器学习"], "tech": "AI+半导体表征", "route": "AI辅助半导体研究", "routeStatus": "↑突破", "content": "东京科学大学等机构开发串联神经网络（TNN）：第一级从晶体管I-V曲线估计材料参数（缺陷密度、陷阱态、迁移率等6个参数），第二级前向网络重建原始特性做物理一致性约束。在1000组a-IGZO数据集上训练后，单条I-V曲线推理<1ms即获全部参数。据称相比传统器件模拟（数小时至数天），加速超过六个数量级。[DOI: 10.1002/aisy.70437]", "reason": "AI驱动的半导体表征方法可能彻底改变材料参数提取效率", "source": "SemiEngineering / Advanced Intelligent Systems", "url": "https://semiengineering.com/research-bits-july-6/", "image": "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=1200&q=80&auto=format&fit=crop", "imageCaption": "神经网络结构示意", "date": "2026-07-06", "priority": "featured"}, {"id": "semi-003", "title": "东京大学实现1nm MoS₂纳米管，有望用于超缩放GAA晶体管", "keywords": ["MoS₂", "纳米管", "1nm", "GAA", "二维材料"], "tech": "二维半导体材料", "route": "后硅器件材料", "routeStatus": "↑突破", "content": "东京大学成功制造出直径仅1nm的半导体二硫化钼（MoS₂）纳米管，有望用于超缩放的环绕栅极（GAA）晶体管沟道。MoS₂作为二维材料在原子级厚度下仍保持良好半导体特性，被认为是后硅时代的重要候选沟道材料。据SemiEngineering行业周报报道。", "reason": "1nm尺度沟道材料突破是后摩尔时代器件微缩的关键研究方向", "source": "SemiEngineering / 东京大学", "url": "https://semiengineering.com/chip-industry-week-in-review-144/", "image": "https://images.unsplash.com/photo-1581094794329-c8112a89af12?w=1200&q=80&auto=format&fit=crop", "imageCaption": "MoS₂ 纳米管结构示意", "date": "2026-06-26", "priority": "secondary"}, {"id": "semi-004", "title": "高NA EUV掩模经济学：成本上升迫使行业重新审视路线图", "keywords": ["High-NA EUV", "掩模", "光刻成本", "ASML"], "tech": "EUV光刻", "route": "High-NA EUV路线", "routeStatus": "↓受阻", "content": "SemiEngineering分析指出，高NA EUV光刻的掩模成本显著上升、新掩模材料要求更严格，叠加更紧的缺陷容忍度，正在迫使行业重新考虑High-NA EUV的部署节奏和路线图。掩模制造成本和供应链成熟度成为下一代光刻技术推广的主要障碍之一。", "reason": "High-NA EUV的经济性是制约先进制程推进的实际瓶颈", "source": "SemiEngineering", "url": "https://semiengineering.com/mask-economics-shape-high-na-euv-adoption/", "image": "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=1200&q=80&auto=format&fit=crop", "imageCaption": "EUV 光刻机内部结构（示意）", "date": "2026-06-22", "priority": "secondary"}, {"id": "semi-005", "title": "GaN功率器件走向垂直结构：新设计克服制造挑战", "keywords": ["GaN", "垂直功率器件", "氮化镓", "功率半导体"], "tech": "GaN功率器件", "route": "GaN器件结构", "routeStatus": "↑突破", "content": "SemiEngineering报道垂直GaN功率器件的最新进展，新设计和工艺流程正在帮助克服垂直GaN结构的制造挑战。垂直GaN相比传统平面GaN可承受更高电压、拥有更好的热管理，在电动汽车和工业电源领域前景广阔。", "reason": "GaN从平面转向垂直结构是功率半导体技术演进的重要方向", "source": "SemiEngineering", "url": "https://semiengineering.com/gan-power-devices-go-vertical/", "image": "https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?w=1200&q=80&auto=format&fit=crop", "imageCaption": "GaN 功率器件（示意）", "date": "2026-06-18", "priority": "secondary"}, {"id": "semi-006", "title": "宾夕法尼亚州立大学打造单片3D自供电器件：石墨烯传感器+MoS₂/WSe₂逻辑+硅光伏", "keywords": ["单片3D集成", "石墨烯", "MoS₂", "WSe₂", "自供电"], "tech": "3D集成 / 二维材料", "route": "单片3D集成", "routeStatus": "↑突破", "content": "宾夕法尼亚州立大学团队展示了单片3D集成芯片：堆叠石墨烯化学传感器层、MoS₂/WSe₂二维材料逻辑层、硅光伏能量收集层于同一芯片上，实现自供电运行。该设计为低功耗自主传感和边缘计算系统开辟了新道路。据SemiEngineering报道。", "reason": "单片3D集成是超越摩尔定律的重要技术路径", "source": "SemiEngineering", "url": "https://semiengineering.com/chip-industry-week-in-review-144/", "image": "https://images.unsplash.com/photo-1517077302505-9e2a91a9fa1e-e363dbe005cb?w=1200&q=80&auto=format&fit=crop", "imageCaption": "3D 集成芯片堆叠示意", "date": "2026-06-26", "priority": "secondary"}, {"id": "semi-007", "title": "TiO₂薄膜在<3nm厚度下呈现铁电性，ALD兼容硅基工艺", "keywords   function esc(s) {

  }

  function chips(arr) {

  }

    if (!s) return "";

    if (!data) return `<div class="error">暂无数据</div>`;
    const news = data.news || [];
    if (!news.length) return `<div class="error">暂无新闻</div>`;

    // Classify by priority (default secondary)
    const featured = news.filter(n => n.priority === "featured").slice(0, 2);
    const secondary = news.filter(n => n.priority === "secondary");
    const flash = news.filter(n => n.priority === "flash");

    // If no priorities set, treat first 2 as featured, next 5 as secondary, rest as flash
    const hasPrioritySet = news.some(n => n.priority);
    let fNews = featured, sNews = secondary, flNews = flash;
    if (!hasPrioritySet) {
      fNews = news.slice(0, 2);
      sNews = news.slice(2, 7);
      flNews = news.slice(7);
    }

    let html = "";

    // ---- Hero / Summary ----
    if (data.summary || data.highlights) {
      html += `<div class="hero-section">`;
      if (data.summary) {
        // Summary as context line
      }
      if (data.highlights && data.highlights.length) {
        html += `<div class="overview-box">`;
        html += `<span class="overview-title">本期概述</span>`;
        html += `<p class="overview-text">${esc(data.summary || "")}</p>`;
        if (data.focus) html += `<span class="overview-focus">${esc(data.focus)}</span>`;
        html += `</div>`;
      }
      html += `</div>`;
    }

    // ---- Featured (hero cards) ----
    if (fNews.length) {
      html += `<div class="hero-section">`;
      html += `<span class="section-label">重点关注</span>`;
      html += `<div class="featured-grid">`;
      fNews.forEach(n => {
        const img = n.image
          ? `<img class="card-img" src="${esc(n.image)}" alt="${esc(n.title)}" loading="lazy" onerror="this.closest('.featured-card').classList.add('fc-tech');this.remove()" />`
          : ``;
        const tags = ` <span class="tag" style="background:rgba(255,255,255,0.2);color:#fff;font-size:10px">${esc(n.tech || n.route || n.category || "")}</span>`;
        const cardClass = !img ? " featured-card fc-panel" : " featured-card";
        html += `
          <div class="${cardClass}">
            ${img || ``}
            <div class="card-overlay">
              <div class="card-tags">${tags}${routeBadge(n.routeStatus)}</div>
              <h2>${esc(n.title)}</h2>
              <p class="card-summary">${esc(n.content || n.event || "")}</p>
            </div>
            ${n.url ? `<a class="featured-link" href="${esc(n.url)}" target="_blank" rel="noopener"></a>` : ""}
          </div>`;
      });
      html += `</div></div>`;
    }

    // ---- Secondary (glassmorphism grid) ----
    if (sNews.length) {
      html += `<div class="secondary-section">`;
      html += `<span class="section-label">深度速读</span>`;
      html += `<div class="secondary-grid">`;
      sNews.forEach((n, i) => {
        // 不等宽由 .secondary-grid 的 1.4fr 1fr 决定（每行左宽右窄），不再整行跨列
        const isWide = false;
        const img = n.image
          ? `<img class="sec-img" src="${esc(n.image)}" alt="${esc(n.title)}" loading="lazy" onerror="this.remove()" />`
          : ``;
        const tags = n.tech ? `<span class="sec-tag">${esc(n.tech)}</span>` : "";
        const routeT = routeBadge(n.routeStatus);
        html += `
          <div class="secondary-card${isWide ? " featured-wide" : ""}">
            ${img || ""}
            <div class="sec-body">
              <div class="sec-tags">${tags}${routeT}</div>
              <h3>${esc(n.title)}</h3>
              <p class="sec-summary">${esc(n.content || n.event || n.reason || "")}</p>
              <div class="sec-meta">
                <span>${esc(n.source || "")}</span>
                ${n.url ? `<a class="sec-link" href="${esc(n.url)}" target="_blank" rel="noopener">阅读 →</a>` : ""}
              </div>
            </div>
          </div>`;
      });
      html += `</div></div>`;
    }

    // ---- Flash (compact list) ----
    if (flNews.length) {
      html += `<div class="flash-section">`;
      html += `<span class="section-label">快讯速览</span>`;
      html += `<div class="flash-list">`;
      flNews.forEach((n, i) => {
        const tag = n.tech || n.route || n.category || "";
        html += `
          <div class="flash-item">
            <span class="flash-index">${i + 1}</span>
            <div class="flash-content">
              <div class="flash-title">${esc(n.title)}</div>
              <p class="flash-summary">${esc(n.content || n.event || n.reason || "")}</p>
              <div class="flash-meta">
                <span class="flash-source">${esc(n.source || n.date || "")}</span>
                ${tag ? `<span class="flash-tag">${esc(tag)}</span>` : ""}
              </div>
            </div>
            ${n.url ? `<a class="flash-link" href="${esc(n.url)}" target="_blank" rel="noopener">→</a>` : ""}
          </div>`;
      });
      html += `</div></div>`;
    }

    return html;
  }

  // ========== RENDER — PAPER (deep read, one per page) ==========
  function renderPaper(data) {
    if (!data) return `<div class="error">暂无论文数据</div>`;
    const papers = data.papers || [];
    if (!papers.length) return `<div class="error">暂无论文</div>`;

    let html = `<div class="paper-section">`;

    // Summary header
    if (data.summary || data.highlights) {
      html += `<div class="overview-box">`;
      html += `<span class="overview-title">本期论文概述</span>`;
      if (data.summary) html += `<p class="overview-text">${esc(data.summary)}</p>`;
      if (data.focus) html += `<span class="overview-focus">${esc(data.focus)}</span>`;
      html += `</div>`;
    }

    papers.forEach((p, idx) => {
      if (idx > 0) html += `<div class="paper-divider"></div>`;

      const img = p.image
        ? `<img class="paper-header-img" src="${esc(p.image)}" alt="${esc(p.title)}" loading="lazy" onerror="this.remove()" />`
        : `<div class="paper-header-fallback"></div>`;

      const tags = [
        p.paperType ? `<span class="paper-meta-tag type">${esc(p.paperType)}</span>` : "",
        p.field ? `<span class="paper-meta-tag field">${esc(p.field)}</span>` : "",
        p.venue ? `<span class="paper-meta-tag venue">${esc(p.venue)}</span>` : "",
      ].filter(Boolean).join("");

      const techTags = (p.techTags || p.keywords || []).filter(Boolean);
      const tagCloud = techTags.length
        ? `<div class="paper-tag-cloud">${techTags.map(t => `<span class="paper-tag">${esc(t)}</span>`).join("")}</div>`
        : "";

      const metrics = p.metrics || [];
      const metricsHtml = metrics.length
        ? `<div class="paper-metrics">${metrics.map(m => `
          <div class="paper-metric">
            <span class="paper-metric-name">${esc(m.name || "")}</span>
            <span class="paper-metric-value">${esc(m.value || "")}${m.unit ? `<span class="paper-metric-unit">${esc(m.unit)}</span>` : ""}</span>
            ${m.note ? `<div class="paper-metric-note">${esc(m.note)}</div>` : ""}
          </div>`).join("")}</div>`
        : "";

      const attachments = (p.attachments || []).map(a => {
        const isLocal = a.cached || a.url.startsWith("./");
        return `<a class="attach-pill${isLocal ? " local" : ""}" href="${esc(a.url)}" target="${isLocal ? "_self" : "_blank"}" rel="noopener">${esc(a.label || a.name || "PDF")}</a>`;
      }).join("");

      html += `
        <article class="paper-card-full">
          ${img}
          <div class="paper-body">
            <div class="paper-meta-tags">${tags}</div>
            <h1 class="paper-title">${esc(p.title)}</h1>
            ${p.authors ? `<div class="paper-authors">${esc(p.authors)}</div>` : ""}
            ${p.oneLiner ? `<div class="paper-oneliner">${esc(p.oneLiner)}</div>` : ""}
            ${tagCloud}
            ${metricsHtml}

            <div class="paper-section-block">
              <span class="paper-section-label">摘要</span>
              <p>${esc(p.abstract || p.content || "")}</p>
            </div>

            <div class="paper-section-block">
              <span class="paper-section-label">技术解读</span>
              <p>${esc(p.content || p.techIntro || p.abstract || "")}</p>
            </div>

            ${p.techIntro ? `
            <div class="paper-section-block">
              <span class="paper-section-label">背景知识</span>
              <p>${esc(p.techIntro)}</p>
            </div>` : ""}

            ${attachments ? `<div class="paper-attachments">${attachments}</div>` : ""}

            <div class="paper-footer">
              <span class="paper-source">${esc(p.source || "")}</span>
              <span>${esc(p.date || data.date || "")}</span>
            </div>
            ${p.url ? `<a class="paper-link" href="${esc(p.url)}" target="_blank" rel="noopener">查看原文 →</a>` : ""}
          </div>
        </article>`;
    });

    html += `</div>`;
    return html;
  }

  // ========== RENDER — SKILLS (AI channel, 名词解释卡片网格) ==========
  function renderSkills(data) {
    if (!data || !data.skills || !data.skills.length) return `<div class="error">暂无 Skill 推荐</div>`;
    const skills = data.skills;
    const established = skills.filter(s => s.tier === "established").length;
    const rising = skills.filter(s => s.tier === "rising").length;

    let html = `<div class="skills-wrap">`;
    // 概览标题条
    html += `
      <div class="skills-head">
        <span class="section-label">每日 Skill 推荐</span>
        <p class="skills-sub">每天精选 <strong>${established} 个老牌高星</strong> + <strong>${rising} 个上升迅猛</strong> 的 Agent Skill，一句话看懂它是做什么的。</p>
      </div>`;

    // 不等宽卡片网格：6 列，spans 决定每行 2-3 个且不等宽
    const spans = [4, 2, 2, 2, 2, 3, 3];
    html += `<div class="skill-grid">`;
    skills.forEach((s, i) => {
      const span = spans[i % spans.length];
      const isRising = s.tier === "rising";
      const badge = isRising
        ? `<span class="sk-badge sk-rising">上升迅猛</span>`
        : `<span class="sk-badge sk-estab">老牌高星</span>`;
      const tags = (s.tags || []).map(t => `<span class="chip">${esc(t)}</span>`).join("");
      const author = s.author ? `<span class="sk-fact"><span class="sk-fact-k">作者</span><span class="sk-fact-v">${esc(s.author)}</span></span>` : "";
      const repo = s.repo ? `<span class="sk-fact"><span class="sk-fact-k">仓库</span><span class="sk-fact-v sk-mono">${esc(s.repo)}</span></span>` : "";
      html += `
        <article class="skill-card sk-span-${span}${isRising ? " sk-card-rising" : ""}">
          <div class="sk-head">
            <span class="sk-icon">${esc(s.name ? s.name.trim().charAt(0).toUpperCase() : "")}</span>
            <div class="sk-head-main">
              <h3 class="sk-name">${esc(s.name || "")}</h3>
              ${badge}
            </div>
          </div>
          <div class="sk-spec">
            <span class="sk-fact sk-stars-fact">
              <span class="sk-fact-k">Stars</span>
              <span class="sk-fact-v sk-stars-v">${esc(s.stars || "—")}</span>
            </span>
            ${author}
            ${repo}
          </div>
          <p class="sk-desc">${esc(s.desc || s.description || "")}</p>
          <div class="sk-foot">
            <div class="sk-tags">${tags}</div>
            ${s.url ? `<a class="sk-link" href="${esc(s.url)}" target="_blank" rel="noopener">GitHub 查看 →</a>` : ""}
          </div>
        </article>`;
    });
    html += `</div></div>`;
    return html;
  }

  // ========== MAIN RENDER ==========
  function render() {
    const data = getData(state.channel, state.date);
    const $content = $("#content");
    const $dateTag = $("#dateTag");
    const $subTabs = $("#subTabs");

    // Update date tag
    $dateTag.textContent = data ? getDateLabel(data.date || state.date) : "";

    // Update sub-tabs
    const tabs = getSubTabs(state.channel);
    if (state.subTab === "paper" && state.channel === "ai") state.subTab = "skills";
    if (!tabs.find(t => t.id === state.subTab)) state.subTab = tabs[0].id;

    $subTabs.innerHTML = tabs.map(t =>
      `<button class="tab-l2${t.id === state.subTab ? " active" : ""}" data-subtab="${t.id}">${t.label}</button>`
    ).join("");

    // Bind sub-tab clicks
    $subTabs.querySelectorAll(".tab-l2").forEach(btn => {
      btn.onclick = () => {
        state.subTab = btn.dataset.subtab;
        fillDateSelect();
        render();
      };
    });

    // Render content
    let html = "";
    if (!data) {
      const label = state.subTab === "paper" ? "论文" : state.channel === "display" ? "面板显示" : state.channel === "semicon" ? "半导体" : "AI";
      html = `<div class="error">该日期暂无 ${label} 数据</div>`;
    } else if (state.subTab === "paper") {
      html = renderPaper(data);
    } else if (state.subTab === "skills") {
      html = renderSkills(data);
    } else {
      html = renderNews(data);
    }
    $content.innerHTML = html;
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // ========== EVENT BINDINGS ==========
  // Level-1 channel tabs
  $("#channelTabs").addEventListener("click", (e) => {
    const btn = e.target.closest("button.tab-l1");
    if (!btn) return;
    $$("#channelTabs .tab-l1").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    state.channel = btn.dataset.channel;
    state.subTab = "news";
    fillDateSelect();
    render();
  });

  // Date select
  $("#dateSelect").addEventListener("change", (e) => {
    state.date = e.target.value;
    render();
  });

  // ========== INIT ==========
  fillDateSelect();
  render();

  // ========== SCROLL REVEAL — Apple-style fade-up ==========
  (function initScrollReveal() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          // Stagger delay based on element index within viewport
          requestAnimationFrame(() => {
            entry.target.classList.add('visible');
          });
          observer.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.01,
      rootMargin: '0px 0px -20px 0px'
    });

    function revealContent() {
      const sections = document.querySelectorAll(
        '.hero-section, .secondary-section, .flash-section, .paper-section, .skills-wrap'
      );
      sections.forEach((el, idx) => {
        if (!el.classList.contains('reveal')) {
          el.classList.add('reveal');
          if (idx % 3 === 1) el.classList.add('reveal-delay-1');
          else if (idx % 3 === 2) el.classList.add('reveal-delay-2');
          observer.observe(el);
        }
      });
    }

    // Initial + re-run on render
    revealContent();

    // Also observe after dynamic renders
    const origRender = render;
    // Re-observe whenever content changes
    const watchContent = new MutationObserver(() => {
      requestAnimationFrame(revealContent);
    });
    const app = document.getElementById('app');
    if (app) watchContent.observe(app, { childList: true, subtree: true });
  })();
  </script>
</body>
