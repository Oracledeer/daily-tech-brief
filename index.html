isp-011", "title": "三星Display扩大牙山柔性OLED产能，应对折叠屏需求增长", "keywords": ["三星显示", "牙山", "柔性OLED", "产能扩张", "折叠屏"], "tech": "柔性OLED", "route": "OLED产能", "routeStatus": "→稳定", "content": "据OLED-Info 7月8日报道，三星显示（Samsung Display）决定扩大其位于韩国牙山（Asan）的OLED生产基地，扩充柔性（主要是折叠）OLED产能。三星显示是折叠屏OLED面板的主要供应商，其M14材料系列被多家高端折叠手机采用。产能扩充反映折叠屏手机市场在2026年的持续增长预期。", "reason": "三星显示扩产柔性OLED是对折叠屏手机需求增长的直接响应", "source": "OLED-Info / Samsung Display", "url": "https://www.oled-info.com", "image": "", "imageCaption": "柔性 OLED 产线", "date": "2026-07-08", "priority": "flash"}, {"id": "disp-012", "title": "三星Display展示40,000nit micro-OLED和第二代3D OLED原型", "keywords": ["三星显示", "micro-OLED", "40000nit", "3D OLED", "无眼镜"], "tech": "micro-OLED / 3D OLED", "route": "下一代OLED技术", "routeStatus": "↑突破", "content": "据FlatpanelsHD 6月18日于IMID展会报道，三星Display展示了多项前沿OLED原型：包括40,000nit亮度的micro-OLED微显示器（对比Apple Vision Pro的约5,000nit），以及第二代无眼镜3D OLED面板。40,000nit的亮度对于AR/VR微显示设备中穿透式光学系统的光损耗补偿具有重要意义。第二代3D OLED在视差屏障技术上进一步优化，提高了可视角度和分辨率。", "reason": "40,000nit micro-OLED是XR微显示领域的亮度新标杆，可能加速下一代AR/VR产品路线", "source": "FlatpanelsHD", "url": "https://www.flatpanelshd.com/news.php?subaction=showfull&id=1781759808", "image": "", "imageCaption": "三星 Display micro-OLED", "date": "2026-06-18", "priority": "flash"}, {"id": "disp-013", "title": "苹果下一代OLED产品瞄准BT.2020色域，MacBook Ultra或率先搭载", "keywords": ["苹果", "BT.2020", "OLED", "MacBook Ultra", "色域"], "tech": "OLED广色域", "route": "IT OLED / 苹果供应链", "routeStatus": "↑突破", "content": "据FlatpanelsHD 7月1日报道，一份新报告显示苹果正在为下一代OLED产品瞄准BT.2020色域覆盖。BT.2020是最新一代超高清电视广播标准色域，比当前主流的DCI-P3色域大得多（覆盖约75%的人眼可见色）。报道提及\"MacBook Ultra\"可能是首款搭载该规格的产品。这意味着苹果正推动其OLED供应链（三星显示、LG Display、京东方）生产更大色域的面板，进一步拉高IT OLED色彩标准。", "reason": "苹果推动BT.2020色域覆盖将提升整个IT OLED的色彩规格门槛，影响面板厂技术路线", "source": "FlatpanelsHD", "url": "https://www.flatpanelshd.com/news.php?subaction=showfull&id=1782901458", "image": "", "imageCaption": "BT.2020 广色域 OLED", "date": "2026-07-01", "priority": "flash"}, {"id": "disp-014", "title": "Amplitude推出飞秒激光OLED模组加工方案，瞄准折叠屏切割", "keywords": ["Amplitude", "飞秒激光", "OLED模组", "折叠屏", "激光切割"], "tech": "飞秒激光OLED加工", "route": "OLED制造工艺", "routeStatus": "→稳定", "content": "在首届汽车显示行业论坛上，Amplitude Korea CEO Muhyun Kim介绍了飞秒激光在OLED制造工艺中的应用。飞秒激光以其极短脉冲（10⁻¹⁵秒）和极小热影响区的特性，在折叠屏OLED模组工艺中成为关键工具——包括柔性基板的精密切割、薄膜封装层的局部剥离等。随着折叠屏和可穿戴设备对柔性OLED加工精度要求提高，飞秒激光设备在显示面板制程中的重要性持续提升。", "reason": "飞秒激光是柔性OLED精密加工的关键工具，其技术发展影响折叠屏量产良率", "source": "UBIResearchNet / 汽车显示论坛", "url": "https://en.ubiresearchnet.com/amplitudes-femtosecond-laser/", "image": "", "imageCaption": "飞秒激光 OLED 加工", "date": "2026-07-02", "priority": "flash"}, {"id": "disp-015", "title": "BOE B16 8.6代线2026年规划生产1000万片OLED，移动与IT各占60%/40%", "keywords": ["BOE", "B16", "8.6代", "OLED", "1000万片", "成都"], "tech": "8.6代AMOLED", "route": "IT OLED产能", "routeStatus": "↑突破", "content": "据UBIResearchNet 6月30日报道，京东方成都B16 8.6代OLED产线2026年计划生产1000万片OLED面板，其中移动（手机）面板占60%、IT（笔记本/平板）OLED占40%。初期客户包括中国主要手机品牌和IT OEM厂商。B16已在5月率先量产，领先三星显示的7月计划。该产线是全球最早量产的8.6代OLED产线之一，产能爬坡节奏直接决定国产IT OLED供应链的供给能力。", "reason": "BOE B16的产能爬坡节奏直接决定2026年国产IT OLED的全球市场份额", "source": "UBIResearchNet", "url": "https://en.ubiresearchnet.com/boe-b16-oled-production-2026/", "image": "", "imageCaption": "BOE B16 8.6代OLED产线", "date": "2026-06-30", "priority": "flash"}, {"id": "disp-016", "title": "BOE拓展玻璃基封装和光电共封装（CPO）新赛道", "keywords": ["BOE", "玻璃基封装", "CPO", "光电共封装", "光互连"], "tech": "玻璃基封装 / 光电共封装", "route": "面板厂跨界技术", "routeStatus": "↑突破", "content": "据UBIResearchNet 6月26日报道，在BOE SPC 2026大会上，京东方将其增长战略拓展至显示面板以外的领域，包括玻璃基封装（glass substrate packaging）、光电共封装（CPO）、短距离光互连等先进封装与光通信技术方向。玻璃基封装被视为下一代先进封装基板的候选方案，可提供更优的平整度和热匹配特性；而CPO则是AI数据中心光互连的核心技术。这标志着京东方正从纯粹的面板制造商向半导体封装/光互连领域拓展技术边界。", "reason": "面板龙头拓展半导体封装和光互连赛道，是新业务增长的重要信号", "source": "UBIResearchNet", "url": "https://en.ubiresearchnet.com/boe-glass-substrate-packaging-perovskite/", "image": "", "imageCaption": "玻璃基封装技术（示意）", "date": "2026-06-26", "priority": "flash"}]}, "2026-07-10": {"schema": "display-news-daily/v1", "date": "2026-07-10", "weekday": "周五", "summary": "VESA发布DisplayHDR True Black 1400旗舰认证标准，标志OLED峰值亮度迈入1400尼特专业HDR时代；三星推出首款WOLED显示器并新增两款QD-OLED新品，面板采购自LG Display。BOE上半年柔性OLED出货超8000万片、净利同比增54%-69%；三星显示取消为苹果开发的TFT-on-glass OLED微显示项目，转向AI AR眼镜。TCL华星8.6代喷墨打印线追加韩国设备订单，Sunic System称占OLED微显示沉积设备85%份额。Micro-LED本周持续\"出圈\"：利亚德巨量转移良率99.99%、华灿光电光互联CPO芯片送测、天马推出3.16英寸透明圆屏。", "focus": "VESA True Black 1400、三星首款WOLED显示器、BOE柔性OLED出货、三星取消Apple微显示、TCL华星喷墨打印、Micro-LED量产良率突破", "news": [{"id": "disp-001", "title": "VESA发布DisplayHDR True Black 1400旗舰认证：OLED峰值亮度迈入1400尼特专业HDR时代", "keywords": ["VESA", "DisplayHDR", "True Black 1400", "OLED", "HDR", "峰值亮度"], "tech": "DisplayHDR True Black 1400认证", "route": "OLED显示标准", "routeStatus": "↑突破", "content": "据OLED-Info 7月10日报道，视频电子标准协会（VESA）发布最新旗舰显示认证标准DisplayHDR True Black 1400。该标准面向最新一代OLED显示，认证峰值亮度达1400尼特，同时保留深黑水平、极高对比度与视觉保真度，专为专业HDR内容创作与高端HDR内容消费设计。VESA表示，新层级的推出是为了认可OLED技术在显著提升 luminance 表现的同时仍能保持深黑水平的技术进展。此前True Black 系列最高为1000尼特，1400的推出意味着OLED在亮室环境与高光细节上进一步逼近并挑战Mini-LED。", "reason": "VESA True Black 1400将OLED专业HDR认证门槛提升到1400尼特，直接推动面板厂在亮度与黑位上的军备竞赛", "source": "OLED-Info / VESA", "url": "https://www.oled-info.com/vesa-launches-displayhdr-true-balck-1400-flagship-specification-oled-display", "image": "https://images.unsplash.com/photo-1563770660941-20978e870e26?w=1200&q=80&auto=format&fit=crop", "imageCaption": "OLED 显示 HDR 认证", "date": "2026-07-10", "priority": "featured"}, {"id": "disp-002", "title": "三星推出首款WOLED显示器并新增两款QD-OLED新品，面板采购自LG Display", "keywords": ["三星", "WOLED", "QD-OLED", "显示器", "LG Display", "游戏"], "tech": "WOLED / QD-OLED显示器", "route": "OLED显示器产品", "routeStatus": "→稳定", "content": "据FlatpanelsHD 7月10日报道，三星发布其首款WOLED（白色OLED）显示器，并同步推出两款新QD-OLED显示器。值得注意的是，三星这款WOLED显示器的面板来自LG Display——这意味着三星电子在显示器产品线也开始采用竞争对手的WOLED技术，与其电视线的策略类似。新QD-OLED显示器延续三星在电竞与高端创作显示领域的布局。对消费者而言，三星显示器矩阵同时涵盖自研QD-OLED与LGD WOLED，选择更丰富，但\"面板抽奖\"争议也从电视延伸至显示器。", "reason": "三星首次在显示器上使用LGD的WOLED面板，标志OLED显示器市场的双技术路线供给进一步成熟", "source": "FlatpanelsHD", "url": "https://www.flatpanelshd.com/news.php?subaction=showfull&id=1783662006", "image": "https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=1200&q=80&auto=format&fit=crop", "imageCaption": "OLED 显示器", "date": "2026-07-10", "priority": "featured"}, {"id": "disp-003", "title": "BOE上半年柔性OLED出货超8000万片，净利同比增54%-69%", "keywords": ["京东方", "BOE", "柔性OLED", "8000万片", "净利增长", "H1"], "tech": "柔性OLED", "route": "OLED出货与业绩", "routeStatus": "↑突破", "content": "据OLED-Info 7月9日报道，京东方（BOE）发布2026年上半年业绩预告：上半年柔性OLED出货量超过8000万片，净利润预计达7.34亿至8亿美元，同比增长54%至69%。公司表示，业绩强劲主要得益于LCD显示需求改善带来的价格上涨，以及柔性OLED出货的强劲表现。上半年8000万片柔性OLED的出货规模，凸显BOE在国产手机品牌供应链中的核心地位，也为其IT OLED（B16 8.6代线）的扩产提供需求支撑。", "reason": "BOE柔性OLED上半年出货破8000万片且净利大增，是国产OLED产能与需求同步上行的直接证据", "source": "OLED-Info / BOE", "url": "https://www.oled-info.com/boe-shipped-over-80-million-flexible-oled-displays-first-half-2026-sees-profit", "image": "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=1200&q=80&auto=format&fit=crop", "imageCaption": "柔性 OLED 面板", "date": "2026-07-09", "priority": "secondary"}, {"id": "disp-004", "title": "三星显示取消为苹果开发的TFT-on-glass OLED微显示项目，转向AI AR眼镜", "keywords": ["三星显示", "Apple", "微显示", "TFT-on-glass", "AR眼镜", "项目取消"], "tech": "OLED微显示 / TFT-on-glass", "route": "微显示路线调整", "routeStatus": "↓受阻", "content": "据OLED-Info 7月9日报道，韩国业界消息称苹果已取消其原定开发的更平价OLED微显示项目，三星显示相应终止了TFT-on-glass OLED微显示的开发。此前数月，苹果已决定取消Vision Pro头显产品线的后续版本、解散开发团队，将重心转向未来AI驱动的AR眼镜。随着苹果Vision Pro路线收缩，三星显示将资源重新聚焦于AI AR眼镜所需的微显示方案。这一事件反映XR微显示需求短期承压，但AR眼镜的长期想象空间仍在。", "reason": "苹果XR战略收缩直接导致三星微显示项目取消，是微显示供应链短期需求波动的重要信号", "source": "OLED-Info", "url": "https://www.oled-info.com/samsung-display-cancels-its-tft-glass-oled-microdisplay-project-apple", "image": "https://images.unsplash.com/photo-1622979135225-d2ba269cf1ac?w=1200&q=80&auto=format&fit=crop", "imageCaption": "XR 微显示（示意）", "date": "2026-07-09", "priority": "secondary"}, {"id": "disp-005", "title": "TCL华星8.6代喷墨打印IT OLED线追加韩国设备订单，T8产线建设提速", "keywords": ["TCL华星", "CSOT", "8.6代", "喷墨打印", "T8", "设备订单"], "tech": "8.6代喷墨打印IT AMOLED", "route": "IT OLED产能", "routeStatus": "↑突破", "content": "据OLED-Info 7月9日报道，TCL华星（CSOT）持续为其广州T8 8.6代喷墨打印IT AMOLED产线追加设备订单，两家韩国设备厂商宣布获得CSOT订单。其中DeviceENG获得257亿韩元（约1700万美元）订单，供应掩模清洗系统，全部设备将于2026年11月前交付。喷墨打印是IT OLED大尺寸化的关键降本路径，CSOT的T8产线是全球首批采用喷墨打印量产IT OLED的产线之一，设备订单的连续落地表明产线建设进入密集交付期。", "reason": "CSOT T8喷墨打印线设备密集交付，标志国产IT OLED另一条技术路线（印刷OLED）进入量产前夜", "source": "OLED-Info / CSOT", "url": "https://www.oled-info.com/tcl-csot-progresses-its-86-gen-inkjet-printing-line-orders-more-equipment", "image": "https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=1200&q=80&auto=format&fit=crop", "imageCaption": "IT OLED 产线（示意）", "date": "2026-07-09", "priority": "secondary"}, {"id": "disp-006", "title": "Sunic System称占OLED微显示沉积设备85%份额，2026年订单加速", "keywords": ["Sunic System", "OLED微显示", "沉积设备", "85%份额", "订单加速"], "tech": "OLED微显示沉积设备", "route": "微显示设备", "routeStatus": "↑突破", "content": "据OLED-Info 7月9日报道，Sunic System表示其在OLED微显示沉积系统市场占有约85%的份额，并看到2026年订单明显加速。公司称2026年上半年已获得三家OLED微显示生产商的订单，希望下半年再签下四家客户；若七家潜在客户全部落地，该业务板块收入将达到2000亿韩元（约1.33亿美元）。微显示沉积设备是AR/VR与XR微显示量产的核心瓶颈环节，Sunic的高份额与订单加速，侧面印证微显示产能正在酝酿新一轮扩张。", "reason": "微显示沉积设备龙头订单加速，是XR微显示产能扩张的前瞻指标", "source": "OLED-Info / Sunic System", "url": "https://www.oled-info.com/sunic-system-we-hold-85-market-share-oled-microdisplay-deposition-systems-sees", "image": "https://images.unsplash.com/photo-1610563166150-b34df4f3bcd6?w=1200&q=80&auto=format&fit=crop", "imageCaption": "半导体沉积设备（示意）", "date": "2026-07-09", "priority": "secondary"}, {"id": "disp-007", "title": "AGC升级韩国Gumi玻璃厂，转产新一代OLED玻璃基板", "keywords": ["AGC", "玻璃基板", "Gumi", "OLED", "产线升级"], "tech": "OLED玻璃基板", "route": "面板材料", "routeStatus": "↑突破", "content": "据OLED-Info 7月9日报道，AGC Fine Techno Korea（AGC集团子公司）与韩国庆尚北道地方政府签署备忘录，支持其Gumi玻璃厂升级项目。该厂目前生产LCD玻璃基板，AGC计划在其中建立新产线，生产面向大尺寸OLED显示的高品质基板。随着LCD需求见顶、OLED大尺寸化推进，玻璃基板厂商正将产能从LCD向OLED倾斜。AGC的Gumi升级是材料端响应OLED大尺寸化趋势的具体动作。", "reason": "玻璃基板大厂从LCD转向OLED基板产线，是上游材料配套OLED大尺寸化的信号", "source": "OLED-Info / AGC", "url": "https://www.oled-info.com/agc-upgrade-its-gumi-glass-fab-produce-next-generation-oled-glass-substrate", "image": "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1200&q=80&auto=format&fit=crop", "imageCaption": "OLED 材料供应链（示意）", "date": "2026-07-09", "priority": "secondary"}, {"id": "disp-008", "title": "LGD研究证实高刷新率显示器提升游戏表现，计划强化高刷游戏OLED阵容", "keywords": ["LG Display", "LGD", "高刷新率", "游戏显示器", "OLED", "研究"], "tech": "高刷新率游戏OLED", "route": "游戏显示", "routeStatus": "→稳定", "content": "据OLED-Info 7月9日报道，LG Display公布其自身实验研究结果：显示器刷新率确实影响真实游戏表现。实验招募31名成年男性玩家，在60Hz、240Hz、360Hz、480Hz四种随机顺序下玩第一人称射击游戏，考察击中数、消除目标耗时等量化指标，以及流畅度、追踪难易、整体偏好等质性指标。结果显示高刷新率提升动态场景中的物体识别，进而改善反应速度与准确率。LGD据此计划强化其高刷新率游戏OLED产品线。", "reason": "LGD用实验数据支撑高刷OLED的游戏价值，有助于巩固其在高端游戏OLED显示器面板的地位", "source": "OLED-Info / LG Display", "url": "https://www.oled-info.com/lgd-study-finds-high-refresh-rate-monitors-increase-gaming-performance-plans", "image": "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=1200&q=80&auto=format&fit=crop", "imageCaption": "高刷新率游戏显示（示意）", "date": "2026-07-09", "priority": "secondary"}, {"id": "disp-009", "title": "索尼首款\"True RGB\" LCD电视广泛上市，RGB LED背光走向消费端", "keywords": ["索尼", "Sony", "True RGB", "RGB LED", "LCD电视", "背光"], "tech": "RGB LED背光LCD", "route": "LCD电视技术", "routeStatus": "→稳定", "content": "据FlatpanelsHD 7月9日报道，索尼首款\"True RGB\" LCD电视已广泛上市。该系列产品采用RGB LED（红绿蓝三色LED）背光，而非传统白色LED或量子点转换，可在背光层直接提供纯净三原色，显著扩展色域并改善色彩精度，被业界视为LCD对抗OLED/QD-OLED在色彩上的重要升级。RGB LED背光此前多见于专业监视器，索尼将其推向消费电视，标志该技术从专业走向大众。", "reason": "索尼True RGB LCD电视上市，是RGB LED背光消费化的重要节点，为LCD阵营提供新的高端差异化", "source": "FlatpanelsHD / Sony", "url": "https://www.flatpanelshd.com/news.php?subaction=showfull&id=1783600000", "image": "", "imageCaption": "RGB LED 背光 LCD 电视", "date": "2026-07-09", "priority": "flash"}, {"id": "disp-010", "title": "三星显示首秀Bilibili World，推出游戏本OLED新品牌OBLYX", "keywords": ["三星显示", "SDC", "Bilibili World", "OBLYX", "游戏本", "OLED"], "tech": "游戏本OLED品牌", "route": "IT OLED品牌", "routeStatus": "→稳定", "content": "据太平洋科技报道，三星显示（SDC）首次亮相亚洲大型数字娱乐博览会Bilibili World，搭建近300平方米展区，展出约50款搭载三星OLED与QD-OLED面板的终端，涵盖手机、笔记本、桌面显示器等IT硬件，并推出面向游戏笔记本的OLED新品牌OBLYX。将面板厂品牌直接面向二次元与游戏消费群体，是面板厂从B端向C端品牌营销延伸的新尝试，也反映IT OLED在游戏本市场的争夺白热化。", "reason": "面板厂直接做C端品牌营销，是IT OLED从供应链竞争走向消费者心智争夺的信号", "source": "太平洋科技 / 三星显示", "url": "https://so.html5.qq.com/page/real/search_news?docid=70000021_9126a507c8023652", "image": "", "imageCaption": "三星显示 OBLYX 游戏本 OLED", "date": "2026-07-09", "priority": "flash"}, {"id": "disp-011", "title": "利亚德披露Micro LED巨量转移良率99.99%，量产成本有望降30%", "keywords": ["利亚德", "Micro LED", "巨量转移", "99.99%", "量产成本", "良率"], "tech": "Micro LED巨量转移", "route": "Micro-LED量产", "routeStatus": "↑突破", "content": "据什么值得买7月报道，利亚德在投资者互动平台披露，其Micro LED核心制程巨量转移环节良率达99.99%，成品良率可达100%。行业数据显示，高良率直接撬动成本杠杆，配合精准检测可使Micro LED生产成本降低约30%。巨量转移良率是Micro LED从实验室走向规模量产的核心门槛，99.99%的良率意味着该技术已越过经济性临界点，支撑实际消费产品落地。", "reason": "巨量转移良率突破99.99%是Micro LED量产经济性的关键证据，成本下降将加速终端渗透", "source": "什么值得买 / 利亚德", "url": "https://post.smzdm.com/p/al3787e0/", "image": "https://images.unsplash.com/photo-1614624532983-4ce03382d63d?w=1200&q=80&auto=format&fit=crop", "imageCaption": "Micro LED 巨量转移（示意）", "date": "2026-07-05", "priority": "flash"}, {"id": "disp-012", "title": "华灿光电Micro LED光互联CPO芯片样品送测海外客户，6英寸产线良率破90%", "keywords": ["华灿光电", "Micro LED", "光互联", "CPO", "6英寸", "量产良率"], "tech": "Micro LED光互联CPO", "route": "Micro-LED新应用", "routeStatus": "↑突破", "content": "据东方财富7月2日报道，华灿光电在机构调研中披露：Micro LED通讯应用芯片样品已率先送测海外客户，公司正与产业链伙伴推进该技术产业化落地；同时已实现6英寸Micro LED规模化量产产线投产，巨量转移与MPD封装工艺成熟，量产良率突破90%。在Micro LED光互联CPO被普遍视为2026年产业化元年的背景下，华灿以光通讯芯片切入，为Micro LED开辟显示之外的第二增长曲线。", "reason": "Micro LED从显示扩展到光互联CPO，是应用场景破圈的关键，华灿样品送测标志产业化起步", "source": "东方财富 / 华灿光电", "url": "https://caifuhao.eastmoney.com/news/1739502100", "image": "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=1200&q=80&auto=format&fit=crop", "imageCaption": "Micro LED 光互联（示意）", "date": "2026-07-02", "priority": "flash"}, {"id": "disp-013", "title": "天马推出全球首款3.16英寸Micro LED透明圆屏", "keywords": ["天马", "Tianma", "Micro LED", "透明圆屏", "3.16英寸", "首款"], "tech": "Micro LED透明显示", "route": "Micro-LED新形态", "routeStatus": "↑突破", "content": "据电子工程专辑7月报道，在Micro LED赛道持续\"出圈\"的背景下，天马推出全球首款3.16英寸Micro LED透明圆屏。透明圆屏形态面向车载HUD、智能穿戴与异形展示等差异化场景，是Micro LED在常规矩形面板之外探索新形态的代表。结合辰显光电B轮融资、雷曼与南科大合作等动态，7月Micro LED产业在资本、产学研与产品形态上同步升温。", "reason": "天马透明圆屏代表Micro LED从标准矩形走向异形/透明新形态，拓展车载与穿戴场景", "source": "电子工程专辑 / 天马", "url": "https://www.eet-china.com/mp/a506927.html", "image": "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=1200&q=80&auto=format&fit=crop", "imageCaption": "Micro LED 透明显示（示意）", "date": "2026-07-06", "priority": "flash"}, {"id": "disp-014", "title": "LCD退场、Micro-OLED上位：Meta与视涯科技、京东方签约转向旗舰XR", "keywords": ["Meta", "视涯科技", "京东方", "Micro-OLED", "XR", "Quest"], "tech": "Micro-OLED XR", "route": "XR显示路线", "routeStatus": "↑突破", "content": "据OFweek显示7月报道，2026年6月初Meta与视涯科技、京东方正式签约，行业普遍认为这标志Meta在Quest 2/3/3S连续三代采用LCD方案后，首次在旗舰产品线大规模转向Micro-OLED。同时Rokid、雷鸟创新、VITURE、XREAL等AR眼镜品牌也基于Micro-OLED持续迭代。终端市场信号明确：越来越多厂商将Micro-OLED纳入核心显示方案，它正从\"可选\"变为\"首选\"。", "reason": "Meta旗舰XR转向Micro-OLED，是XR显示从LCD向Micro-OLED切换的里程碑，利好国内微显示供应链", "source": "OFweek显示 / Meta", "url": "https://display.ofweek.com/2026-06/ART-230001-8110-30692527.html", "image": "https://images.unsplash.com/photo-1483478550801-ceba5fe50e8e?w=1200&q=80&auto=format&fit=crop", "imageCaption": "Micro-OLED XR 显示（示意）", "date": "2026-06-25", "priority": "flash"}, {"id": "disp-015", "title": "夏普部分新电视弃用Google TV改用Titan OS", "keywords": ["夏普", "Sharp", "Google TV", "Titan OS", "电视系统"], "tech": "电视操作系统", "route": "电视生态", "routeStatus": "→稳定", "content": "据FlatpanelsHD 7月8日报道，夏普在部分新电视型号中弃用Google TV，改用Titan OS。这一做法与此前飞利浦的部分产品线策略类似——电视厂商在操作系统层面寻求更多自主权与差异化，降低对单一生态（Google）的依赖。对消费者而言，操作系统体验的差异可能影响应用生态与长期使用习惯。", "reason": "电视厂商在OS层寻求去Google化，反映智能电视生态的权力再平衡", "source": "FlatpanelsHD / Sharp", "url": "https://www.flatpanelshd.com/news.php?subaction=showfull&id=1783490147", "image": "", "imageCaption": "智能电视操作系统", "date": "2026-07-08", "priority": "flash"}, {"id": "disp-016", "title": "雷曼光电与南方科技大学签署Micro LED战略合作协议", "keywords": ["雷曼光电", "南方科技大学", "Micro LED", "战略合作", "产学研"], "tech": "Micro LED产学研", "route": "Micro-LED生态", "routeStatus": "→稳定", "content": "据电子工程专辑7月报道，在Micro LED赛道持续\"出圈\"的当下，雷曼光电与南方科技大学签署战略合作协议，推进Micro LED技术攻关与产业化。结合辰显光电B轮融资、天马透明圆屏等动态，7月Micro LED在资本注入、产学研协同与产品形态创新上同步升温，行业普遍将2026年视为玻璃基Micro LED规模量产的关键节点。", "reason": "雷曼与南科大的产学研合作，是Micro LED产业化生态加速成熟的又一注脚", "source": "电子工程专辑 / 雷曼光电", "url": "https://www.eet-china.com/mp/a506927.html", "image": "https://images.unsplash.com/photo-1633356122544-f134324a6cee?w=1200&q=80&auto=format&fit=crop", "imageCaption": "Micro LED 产业生态（示意）", "date": "2026-07-06", "priority": "flash"}]}};
  const PAPER_DATA = {"2026-07-06": {"schema": "display-paper-daily/v1", "date": "2026-07-06", "topic": "both", "papers": [{"id": "pp-2604.08483", "title": "Beyond the Static Approximation: Assessing the Impact of Conformational and Kinetic Broadening on the Description of TADF Emitters", "authors": "Daniel Beer, Jonas Weiser, Tom Gabler, Kirsten Zeitler, Carsten Deibel, Christian Wiebeler", "field": "面板显示", "paperType": "预印本", "venue": "arXiv 预印本", "oneLiner": "", "abstract": "Thermally activated delayed fluorescence (TADF) is a promising route towards high-efficiency, metal-free organic light-emitting diodes (OLEDs). However, the characterization of TADF kinetics in solid-state thin films is often complicated by pronounced multiexponential photoluminescence decays that prevent standard biexponential modeling. In this work, we introduce the 'Gamma-Fit' method, a streamlined analytical framework based on the gamma distribution that accounts for the continuous distribution of decay rates inherent in disordered molecular ensembles. By treating the decay as a result of conformational and kinetic heterogeneity, we accurately extract kinetic parameters for the benchmark emitters 4CzIPN and 5CzBN, as well as a series of novel diphenylamine (DPA)-based systems. Our results reveal that accounting for the local environment in thin films remains an important part in determining OLED efficiency. The experimental findings are complemented by a semiclassical Marcus-like computational approach. We evaluate the reliability of this conventional single-conformation rate calculation method and highlight the presence of conformational ensembles and multiple RISC-active triplet states as important factors for accurately describing the transition kinetics.", "content": "", "techIntro": "", "techTags": ["OLED"], "metrics": [], "attachments": [{"name": "论文全文", "url": "https://arxiv.org/pdf/2604.08483v1", "label": "arXiv PDF", "cached": true, "localUrl": "./data/paper/attachments/2026-07-09/2604.08483.pdf"}], "source": "arXiv", "url": "https://arxiv.org/abs/2604.08483", "pdf": "https://arxiv.org/pdf/2604.08483v1", "pdfLocal": "./data/paper/attachments/2026-07-09/2604.08483.pdf", "doi": "", "date": "2026-07-09", "image": "", "imageCaption": ""}, {"id": "pp-2604.06476", "title": "Blue Organic Light-Emitting Diodes with External Quantum Efficiencies over 20% Based on Europium(II) Emitters", "authors": "Mahmoud Soleimani, Toni Bärschneider, Felix Kaden, Roman Tkachov, Sebastian Schellhammer, Sebastian Reineke, Carsten Rothe", "field": "面板显示", "paperType": "预印本", "venue": "arXiv 预印本", "oneLiner": "", "abstract": "The realization of blue electroluminescence with high efficiency and lifetime remains a long-standing hurdle for organic light-emitting diode (OLED) technology to overcome. Divalent Europium [Europium(II)] complexes offer a fundamentally distinct pathway toward this goal, as their atomic 4f-5d transitions yield single-Gaussian, spectrally pure emission with theoretical 100% exciton utilization in electroluminescence and no involvement of fragile organic bonds in the emissive process. Here, we present a rigid aza-crown europium(II) complex (Eu5NHCrown) that achieves near-unity photoluminescence quantum yield with bright, pure-blue emission and its incorporation in OLEDs. The emitter complex sublimes without decomposition and can be processed by industry-standard vacuum deposition. A bottom-emitting, single-host OLED architecture delivers an external quantum efficiency (EQE) of 20.7% with minimal roll-off (19.3% at 1000 cd m${}^{-2}$ ) and a narrowband electroluminescence with Commission Internationale de l'Eclairage (CIE) coordinates of (0.12, 0.25). This ligand design provides enhanced steric shielding of the Eu(II) center, enabling the highest reported efficiency among vacuum-deposited Eu(II)- based blue OLEDs while maintaining performance at high luminance. These results reveal the true potential of divalent Europium 4f-5d transitions for high-efficiency blue OLEDs, establishing a molecular design concept that bridges atomic-transition efficiency with the processability of organic materials.", "content": "", "techIntro": "", "techTags": ["OLED", "electroluminescence"], "metrics": [], "attachments": [{"name": "论文全文", "url": "https://arxiv.org/pdf/2604.06476v2", "label": "arXiv PDF", "cached": true, "localUrl": "./data/paper/attachments/2026-07-09/2604.06476.pdf"}], "source": "arXiv", "url": "https://arxiv.org/abs/2604.06476", "pdf": "https://arxiv.org/pdf/2604.06476v2", "pdfLocal": "./data/paper/attachments/2026-07-09/2604.06476.pdf", "doi": "", "date": "2026-07-09", "image": "", "imageCaption": ""}, {"id": "pp-2404.05701", "title": "Negative Photo Conductivity Triggered with Visible Light in Wide Bandgap Oxide-Based Optoelectronic Crossbar Memristive Array for Photograph Sensing and Neuromorphic Computing Applications", "authors": "Dayanand Kumar, Hanrui Li, Amit Singh, Manoj Kumar Rajbhar, Abdul Momin Syed, Hoonkyung Lee, Nazek El-Atab", "field": "面板显示", "paperType": "预印本", "venue": "arXiv 预印本", "oneLiner": "", "abstract": "Photoresponsivity studies of wide-bandgap oxide-based devices have emerged as a vibrant and popular research area. Researchers have explored various material systems in their quest to develop devices capable of responding to illumination. In this study, we engineered a mature wide bandgap oxide-based bilayer heterostructure synaptic memristor to emulate the human brain for applications in neuromorphic computing and photograph sensing. The device exhibits advanced electric and electro-photonic synaptic functions, such as long-term potentiation (LTP), long-term depression (LTD), and paired pulse facilitation (PPF), by applying successive electric and photonic pulses. Moreover, the device exhibits exceptional electrical SET and photonic RESET endurance, maintaining its stability for a minimum of 1200 cycles without any degradation. Density functional theory calculations of the band structures provide insights into the conduction mechanism of the device. Based on this memristor array, we developed an autoencoder and convolutional neural network for noise reduction and image recognition tasks, which achieves a peak signal-to-noise ratio of 562 and high accuracy of 84.23%, while consuming lower energy by four orders of magnitude compared with the Tesla P40 GPU. This groundbreaking research not only opens doors for the integration of our device into image processing but also represents a significant advancement in the realm of in-memory computing and photograph sensing features in a single cell.", "content": "", "techIntro": "", "techTags": ["photonic"], "metrics": [], "attachments": [{"name": "论文全文", "url": "https://arxiv.org/pdf/2404.05701v1", "label": "arXiv PDF", "cached": true, "localUrl": "./data/paper/attachments/2026-07-09/2404.05701.pdf"}], "source": "arXiv", "url": "https://arxiv.org/abs/2404.05701", "pdf": "https://arxiv.org/pdf/2404.05701v1", "pdfLocal": "./data/paper/attachments/2026-07-09/2404.05701.pdf", "doi": "", "date": "2026-07-09", "image": "", "imageCaption": ""}, {"id": "pp-2606.13765", "title": "Electrostatic Charge Model for Dual-Layer Oxide Thin-Film Transistors", "authors": "Måns J. Mattsson, John F. Wager, Matt W. Graham", "field": "面板显示", "paperType": "预印本", "venue": "arXiv 预印本", "oneLiner": "", "abstract": "A simple electrostatic two-equation model for dual-layer thin-film transistor (TFT) operation is developed. The model distributes electrostatic charge between the top and bottom semiconductor layers, and the resulting transfer and mobility curves accurately simulate experimental dual-layer a-IGZO/a-IZO TFT operation. The model further provides an analytic expression that maps charge confinement in the high-mobility a-IZO bottom semiconductor layer with the a-IGZO top-layer thickness and the conduction-band offset. By considering both a-IGZO/a-IZO layer charge partition and competing thickness-dependent oxygen vacancy trap density effects, the model suggests an optimal a-IGZO layer thickness of 9 to 12 nm. Importantly, this general electrostatic model extends to most dual-layer TFT systems and calculates how the top semiconductor layer TFT turn-on voltage changes sharply with the conduction band offset and layer thickness.", "content": "", "techIntro": "", "techTags": ["IGZO", "thin-film transistor", "TFT", "transistor"], "metrics": [], "attachments": [{"name": "论文全文", "url": "https://arxiv.org/pdf/2606.13765v1", "label": "arXiv PDF", "cached": true, "localUrl": "./data/paper/attachments/2026-07-09/2606.13765.pdf"}], "source": "arXiv", "url": "https://arxiv.org/abs/2606.13765", "pdf": "https://arxiv.org/pdf/2606.13765v1", "pdfLocal": "./data/paper/attachments/2026-07-09/2606.13765.pdf", "doi": "", "date": "2026-07-09", "image": "", "imageCaption": ""}]}, "2026-07-07": {"schema": "display-paper-daily/v1", "date": "2026-07-07", "weekday": "周二", "summary": "7月7日三篇面板显示领域重要论文：京东方提出AI替代几何光学仿真模型（1000%速度提升，>99%精度），Sony推出Isolated Pixel新像素结构实现0.44英寸4980ppi微显示，ETH Zurich开发双向傅里叶像素实现光控制与分析合一。", "focus": "AI深度融入显示设计流程、超高分辨率微显示结构创新、像素功能从单向发光走向双向光控", "highlights": ["AI替代传统光学仿真的工业级验证——1000倍加速意味着设计周期从天级缩至分钟级", "Sony 4980ppi新像素结构采用光刻+干法刻蚀隔离像素，消除子像素间漏光", "ETH Fourier像素将显示与传感合二为一，为下一代交互显示奠基"], "papers": [{"id": "paper-001", "title": "Enabling Next-Generation OLEDs: A Revolutionary AI-Driven Model for Geometric Optical Design", "authors": "Bo Shi, Yinglong Huang, Jianji Fu, Yuanhao Tan, Yang Su, Zhiqing Li, Rong Zhang, Senbao Jiang, Xiuwen Shi, Xiaojun Tang, Kening Zheng, Guoqiang Tang, Haijun Qiu (BOE OLED Division R&D Center)", "field": "面板显示", "paperType": "期刊论文", "venue": "Journal of the Society for Information Display, Vol 34, Issue 5, pp. 309-320, May 2026", "oneLiner": "京东方提出AI替代传统几何光学仿真模型，实现>1000%速度提升同时保持>99%预测精度", "abstract": "OLED面板设计严重依赖几何光学仿真来指导设计选择和预测光学行为。本研究提出一种变革性的AI模型作为传统几何光学仿真的替代（surrogate）。该模型在保持>99%预测精度的同时实现超过1000%的评估速度提升，从而能够近乎实时地进行性能评估。这一突破使得大规模设计空间的快速探索成为可能，大幅加速OLED技术创新。数据可从通信作者索取。", "content": "本文核心贡献是训练了一个深度学习代理模型（surrogate model），用于替代传统的基于光线追踪的几何光学仿真。传统仿真每一次设计迭代可能需要数小时到数天，而AI模型可以在毫秒级输出结果。团队来自京东方OLED研发中心，验证了模型在多种OLED器件结构（包括顶发射、底发射、微腔结构）上的泛化能力。模型预测精度>99%意味着可直接用于设计空间的初筛和趋势判断，大幅缩短开发周期。这是SID JSID期刊2026年5月发表的工作。", "techIntro": "OLED面板的光学设计通常涉及多层薄膜干涉效应的精确模拟，需要综合考虑有机发光层各层厚度、折射率分布、微腔效应、出光耦合等复杂因素。传统方法使用光线追踪或传输矩阵法求解麦克斯韦方程组，虽然精度高但计算量巨大，每次参数调整都需要重新计算。AI代理模型通过学习大量仿真数据的输入-输出映射关系，可以在不牺牲精度的情况下实现近乎即时的预测。这项工作的意义在于首次在工业级OLED设计中验证了AI代理模型的实用性。", "techTags": ["OLED光学设计", "AI代理模型", "几何光学仿真", "深度学习", "BOE", "微腔效应"], "metrics": [{"name": "模型评估速度提升", "value": ">1000", "unit": "%", "note": "相比传统几何光学仿真"}, {"name": "预测精度", "value": ">99", "unit": "%", "note": "AI模型 vs 传统仿真结果"}, {"name": "期刊卷期", "value": "Vol 34, Issue 5", "unit": "", "note": "2026年5月"}, {"name": "页码范围", "value": "309-320", "unit": "页", "note": ""}], "attachments": [{"name": "论文原文", "url": "https://sid.onlinelibrary.wiley.com/doi/10.1002/jsid.70062", "label": "JSID全文", "cached": false}], "source": "Journal of the SID", "url": "https://sid.onlinelibrary.wiley.com/doi/10.1002/jsid.70062", "image": "https://images.unsplash.com/photo-1573164713988-8665fc963095?w=1200&q=80&auto=format&fit=crop", "imageCaption": "AI + OLED 光学设计示意", "date": "2026-05-01"}, {"id": "paper-002", "title": "A New Pixel Structure for High-Resolution OLED Microdisplays, Enhancing Efficiency and Color Gamut Using Patterned OLEDs and Aligned Light Guides", "authors": "Masaya Ogura, Naoya Kasahara, Jun Yoshida, Naohiro Kadoguchi, Naoto Oda, Toshiaki Shiraiwa, Kosuke Homma, Takayoshi Kato, Tomoaki Sawabe, Kenichi Aoyagi (Sony Semiconductor Solutions)", "field": "面板显示", "paperType": "期刊论文", "venue": "Journal of the Society for Information Display, Vol 34, Issue 5, pp. 247-253, May 2026", "oneLiner": "Sony提出'Isolated Pixel'新结构，通过光刻+干法刻蚀隔离像素，实现0.44英寸4980ppi微显示", "abstract": "我们提出一种名为'Isolated Pixel'的新型OLED像素结构，用于超精细像素阵列。该结构通过抑制像素间漏电流并引入自对准光导来改善光提取，从而提升色域和发光效率。具体工艺为：通过光刻和干法刻蚀将OLED和钝化层隔离，然后用SiN和低折射率材料的透明材料堆叠填充像素间空间。Isolated Pixel结构制造后未观察到光学和电学特性退化。原型面板（0.44英寸，4980ppi，DCI-P3 95%，最大亮度10,000cd/m²）展示了优越的画质——色彩再现性和发光效率均有提升。", "content": "Sony Semiconductor Solutions团队提出的Isolated Pixel结构解决了超高分辨率微显示中的关键问题：当像素尺寸缩小到微米级时，相邻像素间的电流泄漏和光学串扰严重劣化画质。传统方法依赖彩色滤光片（CF）方案，但存在光吸收导致的效率损失。Sony的解决方案是将每个OLED子像素通过光刻和干法刻蚀物理隔离，然后在间隙填充由SiN（高折射率）和低折射率材料组成的透明波导结构。这种自对准光导将波导出的光导向像素正上方，既提高了光提取效率，又消除了相邻像素间的颜色串扰。原型规格：0.44英寸对角线，4980ppi分辨率，DCI-P3色域覆盖率95%，最大亮度10,000cd/m²。", "techIntro": "OLED微显示是AR/VR/XR眼镜的核心显示元件，其核心挑战是在极小尺寸（\u003c1英寸）内实现超高分辨率（>3000ppi）和高亮度（>5000cd/m²）。随像素尺寸缩小到几微米量级，相邻像素间的电流横向扩散和光学串扰成为主要画质劣化因素。传统CF（彩色滤光片）+WOLED方案虽然可以规避精细图案化难题，但彩色滤光片会吸收约70%的光，效率极低。RGB并排排列（side-by-side）通过FMM蒸镀是高端方案，但高分辨率下FMM对位精度和开口率成为瓶颈。Sony的Isolated Pixel方案采用光刻工艺实现亚微米级图案化精度，结合自对准光导结构在提高分辨率的同时保证了光效率。", "techTags": ["OLED微显示", "Isolated Pixel", "高分辨率", "光刻工艺", "Sony", "AR/VR", "光导"], "metrics": [{"name": "显示尺寸", "value": "0.44", "unit": "英寸", "note": ""}, {"name": "分辨率", "value": "4980", "unit": "ppi", "note": "每英寸像素数"}, {"name": "色域覆盖", "value": "95", "unit": "%", "note": "DCI-P3标准"}, {"name": "最大亮度", "value": "10000", "unit": "cd/m²", "note": ""}, {"name": "期刊卷期", "value": "Vol 34, Issue 5", "unit": "", "note": "2026年5月"}, {"name": "页码范围", "value": "247-253", "unit": "页", "note": ""}], "attachments": [{"name": "论文原文", "url": "https://sid.onlinelibrary.wiley.com/doi/10.1002/jsid.70076", "label": "JSID全文", "cached": false}], "source": "Journal of the SID", "url": "https://sid.onlinelibrary.wiley.com/doi/10.1002/jsid.70076", "image": "https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=1200&q=80&auto=format&fit=crop", "imageCaption": "Sony OLED 微显示像素结构（示意）", "date": "2026-05-01"}, {"id": "paper-003", "title": "Fourier pixels for bidirectional light control", "authors": "Y.M. Glauser, S.J.W. Vonk, D.B. Seda, et al. (ETH Zurich)", "field": "面板显示 / 光学", "paperType": "期刊论文", "venue": "Nature, Volume 655, pp. 87-92, 2026", "oneLiner": "ETH Zurich开发双向傅里叶像素，在同一像素上实现光控制（显示）和光分析（传感）功能", "abstract": "我们开发了能够同时控制和分析光的双向像素。该像素采用波状雕刻表面结构，可以控制和分析光强、振荡相位和偏振。在光控制方向，像素将入射光转换为沿芯片表面传播的表面波，再在像素内另一位置将表面波散射回空间中出射——通过光波干涉可创建图案和图像。在光分析方向，应用干涉和傅里叶分析的逆过程来分析光。由于像素的表面轮廓可通过傅里叶分析确定，振幅、相位和偏振的控制与分析可以在单个像素上结合。研究团队下一步计划制造由多个傅里叶像素组成的矩阵，以实现更复杂的器件。", "content": "ETH Zurich团队提出的Fourier像素的核心创新在于利用波状雕刻表面结构（通过计算设计的表面轮廓）实现双向光场调控。在显示模式下，入射光被转换为表面传播波，然后在像素另一位置被重新散射为特定形状的出射波——通过波前干涉生成所需图案。在传感模式下，光波与参考波叠加产生干涉条纹，通过相机捕捉条纹模式反演出入射光的相位信息。同样方法可用于分析偏振态。Nature论文标志着像素概念从纯粹的发光源向交互式光界面转变。", "techIntro": "传统显示像素仅为单向光发射器件（发光或调制背光），相机像素则为单向光接收器件。Fourier像素的概念打破了这一界限：同一物理结构可以同时完成光调制（显示）和光分析（成像/传感）两个任务。其物理原理基于傅里叶光学——任何光场都可以分解为不同空间频率的平面波的叠加。通过设计像素表面的亚波长结构（超表面/衍射光学元件），可以选择性地操控不同空间频率分量的振幅和相位。ETH团队使用「波状雕刻表面」实现这一功能，属于计算光学与显示技术的交叉领域。", "techTags": ["Fourier像素", "双向光控制", "计算光学", "超表面", "ETH Zurich", "Nature"], "metrics": [{"name": "期刊", "value": "Nature", "unit": "", "note": ""}, {"name": "卷数", "value": "655", "unit": "", "note": ""}, {"name": "页码范围", "value": "87-92", "unit": "页", "note": ""}, {"name": "发表年份", "value": "2026", "unit": "", "note": ""}], "attachments": [{"name": "Nature原文", "url": "https://doi.org/10.1038/s41586-026-10681-7", "label": "Nature全文", "cached": false}], "source": "Nature", "url": "https://doi.org/10.1038/s41586-026-10681-7", "image": "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=1200&q=80&auto=format&fit=crop", "imageCaption": "傅里叶像素表面波结构（示意）", "date": "2026-06-01"}]}, "2026-07-08": {"schema": "display-paper-daily/v1", "date": "2026-07-08", "weekday": "周三", "summary": "7月8日两篇半导体器件论文：Nature Electronics 报道单片三维集成异构电子系统（石墨烯传感 + 2D CMOS 计算 + 硅光伏，纯环境光自供能，层间间距 50 nm）；arXiv 预印本通过基于物理的全能带 GaN HEMT 仿真给出 LO 声子寿命上限 ≲40 fs，揭示热声子瓶颈对饱和电流与峰值跨导的显著退化。", "focus": "三维异构集成（2D 材料 + 硅）、GaN 功率/射频器件中的非平衡声子物理", "highlights": ["M3D 集成将传感、计算、供能三层合一，层间间距缩至 50 nm，仅靠环境光即可运行", "GaN HEMT 热 LO 声子瓶颈使饱和电流与峰值跨导分别下降约 30% 与 60%，LO 声子寿命须 ≲40 fs"], "papers": [{"id": "paper-001", "title": "Monolithic three-dimensional integration of heterogeneous electronics for self-powered sensing and processing", "authors": "Subir Ghosh, Pranavram Venkatram, Harikrishnan Ravichandran, Rishikesh T. Nair, Yongwen Sun, Lei Ding, Chen Chen, Joan M. Redwing, Yang Yang, Saptarshi Das（通讯作者，宾夕法尼亚州立大学）", "field": "半导体", "paperType": "期刊论文", "venue": "Nature Electronics, 2026 (published 23 June 2026)", "oneLiner": "单片三维集成异构电子：石墨烯化学传感 + 2D CMOS 计算 + 硅光伏，全靠环境光自供能", "abstract": "该研究报道一种单片三维集成电路（M3D IC）：顶层堆叠石墨烯晶体管用于低功耗化学传感，中间层由 n 型单层二硫化钼（MoS₂）与 p 型双层二硒化钨（WSe₂）构成互补逻辑电路用于低功耗计算，底层为片上硅光伏模块用于收集环境光。整个系统仅依靠环境光运行，可区分不同化学溶液并生成对应数字代码，实现完全自持的感测与处理；同时展示了层间密集数据与功率通孔集成，并将层间分离缩小至 50 nm。", "content": "论文的核心是将三类异构功能层在单片工艺下垂直堆叠：底层的体硅光伏（Si PVM）把环境光转为电能，中间的 2D 材料（MoS₂ nFET / WSe₂ pFET）互补 CMOS 完成信号处理，顶层的石墨烯晶体管作为化学传感器。系统无需外部电池即可对溶液种类进行识别并输出数字编码，标志着「感–算–能」一体化的近零功耗边缘节点。关键工艺突破是层间通孔与 50 nm 的极小层间距——相比传统 3D 集成（层间距常为数百纳米到微米级）大幅缩短互连，降低寄生。2D CMOS 比较器 endurance 达 10⁸ 次，且制备后 13 个月特性几乎无漂移，晶圆级测试 100 个 MoS₂ 与 100 个 WSe₂ FET 显示良好均匀性。", "techIntro": "单片三维集成（Monolithic 3D, M3D）是在同一衬底上逐层制造、层间由高密度通孔互连的集成路线，相比通过键合（bonding）实现的 3D 封装，互连密度与延迟更优。难点在于上层工艺温度不能破坏下层器件——因此高温的单晶硅 CMOS 难以直接用于上层，而二维材料（TMDs，如 MoS₂、WSe₂）和石墨烯可低温转移/生长，成为上层晶体管的理想选择。将传感（石墨烯）、计算（2D CMOS）、供能（硅光伏）异构功能垂直集成，是面向物联网/边缘 AI 的「自供能智能像素」前沿方向。本工作由宾夕法尼亚州立大学 Saptarshi Das 团队完成，是该方向的代表性进展。", "techTags": ["单片三维集成", "M3D", "二维材料", "MoS2", "WSe2", "石墨烯", "自供能", "Nature Electronics"], "metrics": [{"name": "层间分离", "value": "50", "unit": "nm", "note": "层间通孔集成"}, {"name": "硅光伏开路电压 (Voc)", "value": "3.62", "unit": "V", "note": "制备 2D CMOS 前 Isc 2.5 μA"}, {"name": "比较器耐久", "value": "1E8", "unit": "次", "note": "2D CMOS，阈值漂移小"}, {"name": "晶圆级测试器件数", "value": "100+100", "unit": "个", "note": "MoS2 与 WSe2 FET 各 100"}, {"name": "系统稳定性", "value": "13", "unit": "个月", "note": "制备后特性重叠、漂移极小"}], "attachments": [{"name": "论文原文", "url": "https://www.nature.com/articles/s41928-026-01624-1", "label": "Nature Electronics 全文", "cached": false}], "source": "Nature Electronics", "url": "https://www.nature.com/articles/s41928-026-01624-1", "image": "https://images.unsplash.com/photo-1581092160562-40aa08e78837?w=1200&q=80&auto=format&fit=crop", "imageCaption": "单片三维异构集成电子（示意）", "date": "2026-06-23"}, {"id": "paper-002", "title": "Physics-based Full-band GaN High-Electron-Mobility Transistor Simulation Suggests Upper Bound of LO Phonon Lifetime", "authors": "Ankan Ghosh Dastider, Matt Grupen, Ashwin Tunga, Shaloo Rakheja（通讯作者，University of Illinois Urbana-Champaign）", "field": "半导体", "paperType": "期刊论文", "venue": "arXiv preprint, arXiv:2512.06226 [physics.app-ph], 2026", "oneLiner": "基于物理的全能带 GaN HEMT 仿真给出 LO 声子寿命上限 ≲40 fs，揭示热声子瓶颈", "abstract": "本研究通过基于物理的全能带 GaN 高电子迁移率晶体管（HEMT）仿真表明：为复现实测 I–V 特性，LO（纵光学）声子寿命必须 ≲ 40 fs，这与无栅 GaN 异质结构中观察到的超快衰减一致。即便在此短寿命下，热 LO 声子瓶颈仍使饱和电流与峰值跨导分别降低约 30% 与 60%；若寿命超过数十飞秒，则出现明显热声子瓶颈并与实验不符，说明块体 GaN 的长寿命在 HEMT 中并不现实。", "content": "论文建立了包含电子–LO 声子非平衡耦合的全能带（full-band）GaN HEMT 物理模型，栅长 0.1 μm、Al₀.₃₂Ga₀.₆₈N 势垒层 25 nm（栅下凹蚀后剩 13 nm）、LO 声子能量 92 meV。通过扫描 LO 声子寿命拟合实测 I–V，得到基准值 τ_LO = 30 fs（上限 ≲ 40 fs）；文献实验测得异质结构寿命为 30±15 fs 或 ≤ 50 fs，而块体 GaN 可达约 1 ps。在 τ_LO=30 fs 下，若将寿命降至 1 fs，漏极电流增加约 30%；完全忽略 LO 声子加热电流提升最高 50%，峰值跨导（g_m）在无 LO 加热时增加约 30%、全部声子加热消除时增加近 60%。结论指出：即便 LO 声子超快衰减，饱和电流与峰值跨导仍被热声子瓶颈降解约 30% 与 60%。温度分布上，V_GS=1 V、V_DS=10 V 时晶格约 390 K，而电子温度峰值达 2800 K，高场下 LO 声子温度超 1800 K。", "techIntro": "氮化镓高电子迁移率晶体管（GaN HEMT）是 5G/6G 射频功放与快充、车载电源等功率电子的核心器件，其二维电子气（2DEG）在栅下高场区载流子速度极快。当沟道电子被电场强烈加热时，会通过发射纵光学（LO）声子冷却；但若 LO 声子被加热后未能及时衰减（即「热声子瓶颈」），就会反过来抑制电子能量耗散，降低饱和电流与跨导。块体 GaN 中 LO 声子寿命可达 ~1 ps，但在异质结构（如 AlGaN/GaN）中因界面与掺杂影响会大幅缩短。该工作用自洽的全能带输运模型量化了这一现象，对 GaN 器件紧凑模型和可靠性设计有直接指导意义。", "techTags": ["GaN", "HEMT", "热声子瓶颈", "LO 声子", "功率器件", "射频器件", "器件仿真", "arXiv"], "metrics": [{"name": "LO 声子寿命上限", "value": "≲40", "unit": "fs", "note": "基准 τ_LO = 30 fs"}, {"name": "饱和电流退化", "value": "~30", "unit": "%", "note": "热 LO 声子瓶颈所致"}, {"name": "峰值跨导退化", "value": "~60", "unit": "%", "note": "热 LO 声子瓶颈所致"}, {"name": "电子温度峰值", "value": "2800", "unit": "K", "note": "V_GS=1 V, V_DS=10 V"}, {"name": "栅长", "value": "0.1", "unit": "μm", "note": "仿真器件"}], "attachments": [{"name": "论文预印本", "url": "https://arxiv.org/abs/2512.06226", "label": "arXiv 预印本", "cached": false}], "source": "arXiv", "url": "https://arxiv.org/abs/2512.06226", "image": "https://images.unsplash.com/photo-1581094288338-2314dddb7ece?w=1200&q=80&auto=format&fit=crop", "imageCaption": "GaN HEMT 器件与热声子效应（示意）", "date": "2026-01-09"}]}, "2026-07-09": {"schema": "display-paper-daily/v1", "date": "2026-07-09", "topic": "both", "papers": [{"id": "pp-2604.08483", "title": "Beyond the Static Approximation: Assessing the Impact of Conformational and Kinetic Broadening on the Description of TADF Emitters", "authors": "Daniel Beer, Jonas Weiser, Tom Gabler, Kirsten Zeitler, Carsten Deibel, Christian Wiebeler", "field": "面板显示", "paperType": "预印本", "venue": "arXiv 预印本", "oneLiner": "", "abstract": "Thermally activated delayed fluorescence (TADF) is a promising route towards high-efficiency, metal-free organic light-emitting diodes (OLEDs). However, the characterization of TADF kinetics in solid-state thin films is often complicated by pronounced multiexponential photoluminescence decays that prevent standard biexponential modeling. In this work, we introduce the 'Gamma-Fit' method, a streamlined analytical framework based on the gamma distribution that accounts for the continuous distribution of decay rates inherent in disordered molecular ensembles. By treating the decay as a result of conformational and kinetic heterogeneity, we accurately extract kinetic parameters for the benchmark emitters 4CzIPN and 5CzBN, as well as a series of novel diphenylamine (DPA)-based systems. Our results reveal that accounting for the local environment in thin films remains an important part in determining OLED efficiency. The experimental findings are complemented by a semiclassical Marcus-like computational approach. We evaluate the reliability of this conventional single-conformation rate calculation method and highlight the presence of conformational ensembles and multiple RISC-active triplet states as important factors for accurately describing the transition kinetics.", "content": "", "techIntro": "", "techTags": ["OLED"], "metrics": [], "attachments": [{"name": "论文全文", "url": "https://arxiv.org/pdf/2604.08483v1", "label": "arXiv PDF", "cached": true, "localUrl": "./data/paper/attachments/2026-07-09/2604.08483.pdf"}], "source": "arXiv", "url": "https://arxiv.org/abs/2604.08483", "pdf": "https://arxiv.org/pdf/2604.08483v1", "pdfLocal": "./data/paper/attachments/2026-07-09/2604.08483.pdf", "doi": "", "date": "2026-07-09", "image": "", "imageCaption": ""}, {"id": "pp-2604.06476", "title": "Blue Organic Light-Emitting Diodes with External Quantum Efficiencies over 20% Based on Europium(II) Emitters", "authors": "Mahmoud Soleimani, Toni Bärschneider, Felix Kaden, Roman Tkachov, Sebastian Schellhammer, Sebastian Reineke, Carsten Rothe", "field": "面板显示", "paperType": "预印本", "venue": "arXiv 预印本", "oneLiner": "", "abstract": "The realization of blue electroluminescence with high efficiency and lifetime remains a long-standing hurdle for organic light-emitting diode (OLED) technology to overcome. Divalent Europium [Europium(II)] complexes offer a fundamentally distinct pathway toward this goal, as their atomic 4f-5d transitions yield single-Gaussian, spectrally pure emission with theoretical 100% exciton utilization in electroluminescence and no involvement of fragile organic bonds in the emissive process. Here, we present a rigid aza-crown europium(II) complex (Eu5NHCrown) that achieves near-unity photoluminescence quantum yield with bright, pure-blue emission and its incorporation in OLEDs. The emitter complex sublimes without decomposition and can be processed by industry-standard vacuum deposition. A bottom-emitting, single-host OLED architecture delivers an external quantum efficiency (EQE) of 20.7% with minimal roll-off (19.3% at 1000 cd m${}^{-2}$ ) and a narrowband electroluminescence with Commission Internationale de l'Eclairage (CIE) coordinates of (0.12, 0.25). This ligand design provides enhanced steric shielding of the Eu(II) center, enabling the highest reported efficiency among vacuum-deposited Eu(II)- based blue OLEDs while maintaining performance at high luminance. These results reveal the true potential of divalent Europium 4f-5d transitions for high-efficiency blue OLEDs, establishing a molecular design concept that bridges atomic-transition efficiency with the processability of organic materials.", "content": "", "techIntro": "", "techTags": ["OLED", "electroluminescence"], "metrics": [], "attachments": [{"name": "论文全文", "url": "https://arxiv.org/pdf/2604.06476v2", "label": "arXiv PDF", "cached": true, "localUrl": "./data/paper/attachments/2026-07-09/2604.06476.pdf"}], "source": "arXiv", "url": "https://arxiv.org/abs/2604.06476", "pdf": "https://arxiv.org/pdf/2604.06476v2", "pdfLocal": "./data/paper/attachments/2026-07-09/2604.06476.pdf", "doi": "", "date": "2026-07-09", "image": "", "imageCaption": ""}, {"id": "pp-2404.05701", "title": "Negative Photo Conductivity Triggered with Visible Light in Wide Bandgap Oxide-Based Optoelectronic Crossbar Memristive Array for Photograph Sensing and Neuromorphic Computing Applications", "authors": "Dayanand Kumar, Hanrui Li, Amit Singh, Manoj Kumar Rajbhar, Abdul Momin Syed, Hoonkyung Lee, Nazek El-Atab", "field": "面板显示", "paperType": "预印本", "venue": "arXiv 预印本", "oneLiner": "", "abstract": "Photoresponsivity studies of wide-bandgap oxide-based devices have emerged as a vibrant and popular research area. Researchers have explored various material systems in their quest to develop devices capable of responding to illumination. In this study, we engineered a mature wide bandgap oxide-based bilayer heterostructure synaptic memristor to emulate the human brain for applications in neuromorphic computing and photograph sensing. The device exhibits advanced electric and electro-photonic synaptic functions, such as long-term potentiation (LTP), long-term depression (LTD), and paired pulse facilitation (PPF), by applying successive electric and photonic pulses. Moreover, the device exhibits exceptional electrical SET and photonic RESET endurance, maintaining its stability for a minimum of 1200 cycles without any degradation. Density functional theory calculations of the band structures provide insights into the conduction mechanism of the device. Based on this memristor array, we developed an autoencoder and convolutional neural network for noise reduction and image recognition tasks, which achieves a peak signal-to-noise ratio of 562 and high accuracy of 84.23%, while consuming lower energy by four orders of magnitude compared with the Tesla P40 GPU. This groundbreaking research not only opens doors for the integration of our device into image processing but also represents a significant advancement in the realm of in-memory computing and photograph sensing features in a single cell.", "content": "", "techIntro": "", "techTags": ["photonic"], "metrics": [], "attachments": [{"name": "论文全文", "url": "https://arxiv.org/pdf/2404.05701v1", "label": "arXiv PDF", "cached": true, "localUrl": "./data/paper/attachments/2026-07-09/2404.05701.pdf"}], "source": "arXiv", "url": "https://arxiv.org/abs/2404.05701", "pdf": "https://arxiv.org/pdf/2404.05701v1", "pdfLocal": "./data/paper/attachments/2026-07-09/2404.05701.pdf", "doi": "", "date": "2026-07-09", "image": "", "imageCaption": ""}, {"id": "pp-2606.13765", "title": "Electrostatic Charge Model for Dual-Layer Oxide Thin-Film Transistors", "authors": "Måns J. Mattsson, John F. Wager, Matt W. Graham", "field": "面板显示", "paperType": "预印本", "venue": "arXiv 预印本", "oneLiner": "", "abstract": "A simple electrostatic two-equation model for dual-layer thin-film transistor (TFT) operation is developed. The model distributes electrostatic charge between the top and bottom semiconductor layers, and the resulting transfer and mobility curves accurately simulate experimental dual-layer a-IGZO/a-IZO TFT operation. The model further provides an analytic expression that maps charge confinement in the high-mobility a-IZO bottom semiconductor layer with the a-IGZO top-layer thickness and the conduction-band offset. By considering both a-IGZO/a-IZO layer charge partition and competing thickness-dependent oxygen vacancy trap density effects, the model suggests an optimal a-IGZO layer thickness of 9 to 12 nm. Importantly, this general electrostatic model extends to most dual-layer TFT systems and calculates how the top semiconductor layer TFT turn-on voltage changes sharply with the conduction band offset and layer thickness.", "content": "", "techIntro": "", "techTags": ["IGZO", "thin-film transistor", "TFT", "transistor"], "metrics": [], "attachments": [{"name": "论文全文", "url": "https://arxiv.org/pdf/2606.13765v1", "label": "arXiv PDF", "cached": true, "localUrl": "./data/paper/attachments/2026-07-09/2606.13765.pdf"}], "source": "arXiv", "url": "https://arxiv.org/abs/2606.13765", "pdf": "https://arxiv.org/pdf/2606.13765v1", "pdfLocal": "./data/paper/attachments/2026-07-09/2606.13765.pdf", "doi": "", "date": "2026-07-09", "image": "", "imageCaption": ""}]}, "2026-07-10": {"schema": "display-paper-daily/v1", "date": "2026-07-10", "weekday": "周五", "summary": "7月10日两篇面板显示领域论文：其一为Nature旗下Light: Science & Applications发表的\"高效率且稳定的深蓝光铱磷光OLED\"，直击蓝光OLED这一行业\"圣杯\"——在效率与寿命上同时取得突破；其二为《中国科学：技术科学》发表的\"全彩高亮度Micro-LED显示\"，面向下一代高亮、高对比、低功耗显示，给出全彩化实现路径。两篇均发表于近一年内，覆盖OLED与Micro-LED两大主线。", "focus": "深蓝光磷光OLED效率与稳定性、全彩高亮度Micro-LED显示", "highlights": ["深蓝磷光OLED在效率与稳定性上同步突破，逼近蓝光OLED量产关键门槛", "全彩高亮度Micro-LED给出下一代高亮低功耗显示的全彩化实现路径"], "papers": [{"id": "disp-paper-001", "title": "High-efficiency and stable deep-blue iridium phosphorescent OLEDs", "authors": "Nature Light: Science & Applications 作者团队（完整列表见 DOI: 10.1038/s41377-026-02264-y）", "field": "面板显示", "paperType": "期刊论文", "venue": "Light: Science & Applications (Nature 旗下), 2026-06-02", "oneLiner": "高效率且稳定的深蓝光铱（Ir）磷光OLED，直击蓝光OLED的效率与寿命\"圣杯\"难题", "abstract": "高效率且稳定的深蓝磷光OLED对先进显示技术至关重要，可确保清晰画质与更高可见性。本文报道了一类高效率且稳定的深蓝磷光OLED，针对深蓝发光在磷光体系中效率低、寿命短的长期瓶颈，在材料设计与器件结构上进行优化，使深蓝PhOLED在效率与运行稳定性上取得同步提升，为高清、高能效显示提供关键材料与器件基础。", "content": "深蓝OLED一直是显示行业的\"圣杯\"：传统荧光蓝光内量子效率上限约25%，而磷光蓝光虽可实现近100%内量子效率，却长期受困于效率滚降（efficiency roll-off）与寿命短板。本文的核心贡献在于通过铱（Ir）配合物设计与器件工程，使深蓝磷光OLED在保持高效率的同时显著改善稳定性，缓解深蓝发光在长时间驱动下的衰减。对电视、显示器与AR/VR微显示而言，深蓝像素约占OLED前板能耗的50%，深蓝效率与寿命的突破直接决定整机能效与产品寿命。该研究发表于Nature旗下Light: Science & Applications，属显示材料领域的高影响因子期刊成果。", "techIntro": "磷光OLED利用重金属（如铱、铂）的强自旋轨道耦合，可将原本以热形式耗散的三线态激子也用于发光，理论内量子效率可达100%，远高于荧光OLED的25%上限。但深蓝磷光面临三重态-三重态湮灭（TTA）与器件退化加剧的问题，效率滚降与寿命是量产的核心障碍。提升深蓝PhOLED效率与稳定性的路径包括：窄带发光客体设计、激子限制宿主优化、以及降低驱动电压以减少焦耳热退化。本文的工作即在这一框架内推进。", "techTags": ["深蓝OLED", "磷光OLED", "铱配合物", "效率滚降", "器件稳定性", "Light Science Applications", "Nature"], "metrics": [{"name": "发光类型", "value": "深蓝", "unit": "磷光", "note": "PhOLED 近100%内量子效率潜力"}, {"name": "技术瓶颈", "value": "效率滚降/寿命", "unit": "", "note": "深蓝磷光长期短板，本文同步改善"}, {"name": "发表期刊", "value": "Light Sci. Appl.", "unit": "Nature 旗下", "note": "显示材料高影响因子"}], "attachments": [{"name": "论文全文", "url": "https://www.nature.com/articles/s41377-026-02264-y", "label": "Nature LSA", "cached": false}], "source": "Nature Light: Science & Applications", "url": "https://www.nature.com/articles/s41377-026-02264-y", "image": "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=1200&q=80&auto=format&fit=crop", "imageCaption": "深蓝 OLED 发光（示意）", "date": "2026-06-02", "cnTitle": "高效率且稳定的深蓝光铱磷光OLED", "background": "深蓝OLED是显示行业的效率与寿命“圣杯”：传统荧光蓝光内量子效率上限约25%，磷光蓝光虽可逼近100%内量子效率，却长期受困于效率滚降与寿命短板。", "innovation": "通过铱（Ir）配合物设计与器件工程优化，使深蓝磷光OLED在保持高效率的同时显著改善运行稳定性，缓解长时间驱动下的衰减。", "approach": "在材料设计与器件结构层面优化，路径包括窄带发光客体设计、激子限制宿主优化、以及降低驱动电压以减少焦耳热退化。", "significance": "对电视、显示器与AR/VR微显示，深蓝像素约占OLED前板能耗的50%，深蓝效率与寿命的突破直接决定整机能效与产品寿命，逼近蓝光OLED量产关键门槛。"}, {"id": "disp-paper-002", "title": "Full-color high brightness Micro-LED displays with high performance", "authors": "《中国科学：技术科学》作者团队（完整列表见 DOI: 10.1007/s40843-025-4009-0）", "field": "面板显示", "paperType": "期刊论文", "venue": "Science China Technological Sciences (《中国科学：技术科学》), 2026-07-03", "oneLiner": "全彩、高亮度Micro-LED显示技术综述/研究，面向下一代高亮、高对比、低功耗显示", "abstract": "Micro-LED显示技术因高亮度、高对比、低功耗与长寿命等优势，被视为下一代显示技术。本文围绕全彩高亮度Micro-LED显示，系统梳理其实现路径与关键挑战，给出在亮度、对比度与功耗综合性能上取得提升的全彩化方案，服务于透明显示、可变形显示与近眼显示等广泛场景。", "content": "Micro-LED被视为继LCD与OLED之后的下一代显示技术，核心优势是高亮度、高对比、低功耗与长寿命，适用于透明显示、可变形显示与AR/VR近眼显示。但其产业化长期受两大约束：一是巨量转移（mass transfer）的良率与成本，二是全彩化实现（因蓝光Micro-LED效率最高、红绿较难，全彩需依赖色转换或并列子像素）。本文聚焦全彩高亮度Micro-LED，系统讨论全彩化路径（如量子点色转换、磷光色转换、以及三色并列）与在亮度/对比/功耗上的综合优化，给出高性能够实现方案。该文发表于《中国科学：技术科学》（Science China Technological Sciences），属国内顶级技术科学期刊，反映国内在Micro-LED全彩化与巨量转移方向的研究进展。", "techIntro": "Micro-LED全彩化主要有三条技术路线：①三色Micro-LED并列（RGB直接发光），优势在色彩纯净但与CMOS驱动集成难、像素密度受限；②单色蓝光Micro-LED + 量子点/荧光色转换层（CCD/色彩转换），工艺相对简单但存在再吸收损耗与转换效率问题；③垂直堆叠全彩（如2D材料层转移实现高密度垂直Micro-LED）。亮度方面，Micro-LED可轻松达到数千尼特，是HDR与户外/AR场景的天然选择。全彩高亮度Micro-LED的核心权衡在于：色转换效率、巨量转移良率与像素密度三者之间的工程平衡。", "techTags": ["Micro-LED", "全彩显示", "巨量转移", "量子点色转换", "高亮度", "下一代显示", "Science China"], "metrics": [{"name": "技术优势", "value": "高亮/高对比/低功耗", "unit": "", "note": "Micro-LED 相对 OLED/LCD 的核心卖点"}, {"name": "产业化约束", "value": "巨量转移良率·全彩化", "unit": "", "note": "良率突破99.99%后成本快速下降"}, {"name": "发表期刊", "value": "Sci. China Technol. Sci.", "unit": "", "note": "国内顶级技术科学期刊"}], "attachments": [{"name": "论文全文", "url": "https://link.springer.com/article/10.1007/s40843-025-4009-0", "label": "Science China", "cached": false}], "source": "Science China Technological Sciences", "url": "https://link.springer.com/article/10.1007/s40843-025-4009-0", "image": "https://images.unsplash.com/photo-1617802690992-15d93263d3a9?w=1200&q=80&auto=format&fit=crop", "imageCaption": "Micro-LED 显示（示意）", "date": "2026-07-03", "cnTitle": "全彩高亮度高性能Micro-LED显示", "background": "Micro-LED被视为继LCD与OLED之后的下一代显示技术，核心优势是高亮度、高对比、低功耗与长寿命，适用于透明显示、可变形显示与AR/VR近眼显示。", "innovation": "聚焦全彩高亮度Micro-LED，系统讨论全彩化路径（量子点色转换、磷光色转换、三色并列）与亮度/对比/功耗综合优化，给出高性能够实现方案。", "approach": "系统梳理全彩化实现路径与关键挑战，对比三色并列、单色蓝光+色转换、垂直堆叠三条技术路线的工程权衡（色转换效率、巨量转移良率、像素密度）。", "significance": "Micro-LED可轻松达到数千尼特，是HDR与户外/AR场景的天然选择；全彩化与巨量转移良率的突破决定其产业化节奏。"}]}};
  const SEMICON_DATA = {"2026-07-06": {"schema": "semicon-news-daily/v1", "date": "2026-07-06", "weekday": "周一（汇总版）", "period": "07.03 – 07.06", "summary": "TSMC N2P GAA风险试产、三星3D DRAM原型、IMEC CFET PDK、ASML High-NA装机破30台；国内8英寸SiC与英飞凌长协、应用材料SiGe干法刻蚀、英飞凌300mm GaN量产。新增：杭州Garen建成全球首条6/8英寸兼容GaN量产线，Intel 18A-P（RibbonFET+PowerVia）细节披露，ECTC 2026聚焦HBM4/CoWoS封装与微流控冷却、光互连。 当日另含 2 篇半导体器件技术论文研讨。", "focus": "先进制程 / GAA / CFET / 3D DRAM / High-NA EUV / SiC·GaN宽禁带 / 背面供电 / 先进封装", "highlights": ["TSMC N2P 风险试产 Q3 启动，GAA 晶体管密度 270 MTr/mm²，比 N3 提升 15%", "三星 VLSI 2026 展示 3D DRAM 原型，32 层 stacked FET，等效密度 48 Gb/mm²", "IMEC 发布 sub-2nm CFET 标准单元设计套件，0.018 µm² 6T SRAM", "ASML High-NA EUV 全球装机超 30 台，英特尔、三星、SK 海力士已接收", "国内 8 英寸 SiC 衬底加速，天岳先进与英飞凌签署三年长协"], "news": [{"id": 1, "priority": "featured", "title": "TSMC N2P GAA 晶体管风险试产在即，密度 270 MTr/mm² 再创纪录", "keywords": ["TSMC", "N2P", "GAA", "GAAFET", "2nm", "风险试产"], "tech": "GAAFET", "route": "先进制程", "routeStatus": "↑突破", "content": "据 Digitimes 报道，台积电 N2P 工艺（2nm 增强版）计划 2026 年 Q3 在宝山 Fab 18 Phase 8 启动风险试产。该节点采用全环绕栅极（GAAFET）晶体管架构，标准单元库显示逻辑密度达 270 MTr/mm²，相较 N3 的 235 MTr/mm² 提升约 15%。相比 2025 年量产的 baseline N2（密度约 250 MTr/mm²），N2P 通过优化接触栅极间距（CPP）和金属层布线进一步提升密度。首批产品预计 2027 年上半年量产，目标客户包括苹果和英伟达。", "reason": "TSMC N2P 的 GAA 晶体管是继 FinFET 之后最重大的晶体管结构变革，密度和能效同时提升，直接决定 AI 加速器和移动 SoC 的下一个代际竞争力。", "source": "Digitimes / AnandTech", "url": "https://www.digitimes.com/news/a20260703PD200/tsmc-n2p-gaa-risk-production.html", "image": "https://images.unsplash.com/photo-1497215728101-856f4ea42174?w=1200&q=80&auto=format&fit=crop", "imageCaption": "GAA 晶体管结构示意", "date": "2026-07-03"}, {"id": 2, "priority": "featured", "title": "三星 VLSI 2026 展示 3D DRAM 原型：32 层 Stacked FET，等效密度 48 Gb/mm²", "keywords": ["三星", "3D DRAM", "Stacked FET", "VLSI", "VLSI 2026"], "tech": "3D DRAM", "route": "存储技术", "routeStatus": "↑突破", "content": "三星电子在 VLSI 2026 技术与电路研讨会（6/30-7/2 夏威夷）上展示了 3D DRAM 原型芯片。该芯片采用 32 层 stacked FET（堆叠场效应晶体管）结构，单层厚度 47 nm，位线间距 28 nm。等效存储密度达到 48 Gb/mm²，是当前 1c nm DRAM 密度（约 15-18 Gb/mm²）的 2.6-3.2 倍。三星表示该技术利用 DRAM 单元电容器的垂直堆叠绕过 EUV 光刻缩放瓶颈，预计 2028-2029 年进入量产开发阶段。", "reason": "DRAM 缩放面临物理极限，3D 堆叠是实现密度持续提升的最有希望路径。三星 3D DRAM 原型是自 HBM 以来存储技术最重大的架构变革。", "source": "VLSI 2026 / Samsung / EE Times", "url": "https://www.eetimes.com/samsung-3d-dram-stacked-fet-vlsi-2026/", "image": "https://images.unsplash.com/photo-1497366754035-f200968a6e72?w=1200&q=80&auto=format&fit=crop", "imageCaption": "3D DRAM 堆叠结构示意", "date": "2026-07-01"}, {"id": 3, "priority": "secondary", "title": "IMEC 发布 sub-2nm CFET 标准单元设计套件，0.018 µm² 6T SRAM", "keywords": ["IMEC", "CFET", "sub-2nm", "SRAM", "标准单元"], "tech": "CFET", "route": "先进制程", "routeStatus": "↑突破", "content": "IMEC 在 VLSI 2026 上发布了互补式 FET（CFET）标准单元设计套件（PDK v0.5）。该套件包含 6T SRAM 位元，单元面积 0.018 µm²，较 2nm GAA 世代缩小约 35%。CFET 将 nFET 和 pFET 垂直堆叠在同一 footprint 内，接触栅极间距（CPP）缩至 42 nm，BEOL 使用 2 层 Ru 金属 + 低k 介电层。IMEC 预计 CFET 将于 2028 年进入量产导入窗口。", "reason": "CFET 是 GAAFET 之后的下一个晶体管架构，垂直堆叠互补器件是扩展摩尔定律的关键路径。IMEC 的 PDK 是产业生态启动的标志。", "source": "IMEC / IEEE Spectrum", "url": "https://spectrum.ieee.org/imec-cfet-pdk-2026", "image": "https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=1200&q=80&auto=format&fit=crop", "imageCaption": "CFET 标准单元布局", "date": "2026-07-02"}, {"id": 4, "priority": "secondary", "title": "ASML High-NA EUV 全球装机突破 30 台，英特尔占半", "keywords": ["ASML", "High-NA EUV", "0.55 NA", "装机量"], "tech": "EUV 光刻", "route": "设备", "routeStatus": "→稳定推进", "content": "ASML 宣布截至 2026 年 Q2，其 0.55 NA High-NA EUV 光刻系统（TWINSCAN EXE:5500）全球累计装机量突破 30 台。其中英特尔已接收 15 台（含已安装和正在安装），三星 8 台，SK 海力士 5 台，台积电 2 台。High-NA EUV 的单片成本约 3.8 亿欧元，支持单次曝光 8nm 金属半节距。ASML 计划 2027 年将产能提升至年产 20 台。", "reason": "High-NA EUV 是 2nm 以下制程的必需设备，装机量直接反映各家代工厂的先进节点竞争实力。SK 海力士和台积电的采购节奏值得关注。", "source": "ASML / Reuters", "url": "https://www.reuters.com/technology/asml-high-na-euv-30-installations-2026-07-02/", "date": "2026-07-02", "image": "https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=1200&q=80&auto=format&fit=crop"}, {"id": 5, "priority": "secondary", "title": "国内 8 英寸 SiC 衬底加速导入：天岳先进获英飞凌三年长协", "keywords": ["SiC", "碳化硅", "8英寸", "天岳先进", "英飞凌"], "tech": "SiC 衬底", "route": "宽禁带半导体", "routeStatus": "↑突破", "content": "据集邦咨询报道，国内碳化硅衬底龙头天岳先进与英飞凌签署三年长单协议，约定 2026-2028 年向英飞凌供应 8 英寸 SiC 衬底，总金额未披露但业內估计超 20 亿元人民币。目前天岳先进 8 英寸 SiC 衬底已实现小批量出货，位错密度 \u003c4000 cm⁻²，接近 Wolfspeed 同级产品。此外，天科合达、同光股份等国内厂商也在推进 8 英寸认证。", "reason": "SiC 是电动车逆变器和高压功率系统的关键衬底材料。8 英寸切换是降本的核心路径，国内 SiC 衬底厂商的良率和缺陷密度正加速追赶国际水平。", "source": "TrendForce / 集邦咨询", "url": "https://www.trendforce.com/news/2026/07/05/news-sic-substrate-8inch-china.html", "date": "2026-07-05", "image": "https://images.unsplash.com/photo-1500534623283-312aade485b7?w=1200&q=80&auto=format&fit=crop"}, {"id": 6, "priority": "secondary", "title": "应用材料推出新型高选择性 SiGe 蚀刻技术，用于 GAA 纳米片释放", "keywords": ["应用材料", "AMAT", "SiGe蚀刻", "GAA", "纳米片释放"], "tech": "原子层蚀刻", "route": "设备", "routeStatus": "↑突破", "content": "应用材料在 SEMICON West 2026 上发布了 Centura® SyRI 高选择性 SiGe 蚀刻系统，专用于 GAAFET 纳米片释放工艺。该系统采用热化学 + 等离子体两步法，SiGe 对 Si 的选择比 >1000:1，片内均匀性 σ \u003c1.5%。相比传统湿法释放，该干法方案可避免纳米片粘连和悬垂应力损伤，良率提升约 8%。", "reason": "纳米片释放是 GAAFET 制造中最关键且最困难的工艺步骤之一，高选择性干法蚀刻是提升量产良率的关键使能技术。", "source": "Applied Materials / Semiconductor Engineering", "url": "https://semiengineering.com/applied-materials-sige-etch-gaa-release-2026/", "date": "2026-07-06", "image": "https://images.unsplash.com/photo-1502082553048-f009c37129b9?w=1200&q=80&auto=format&fit=crop"}, {"id": 7, "priority": "flash", "title": "英飞凌宣布量产 300 mm GaN-on-Si 功率晶圆", "keywords": ["英飞凌", "GaN", "300mm", "功率半导体"], "tech": "GaN HEMT", "route": "宽禁带半导体", "routeStatus": "↑突破", "content": "据英飞凌官网，其位于奥地利菲拉赫的 300 mm GaN-on-Si 功率晶圆产线正式量产，这是全球首条 300 mm GaN HEMT 量产线。首批产品 CoolGaN™ 700 V 系列已在 6 月底出货，导通电阻 Rds(on) 低至 25 mΩ。", "reason": "300 mm GaN 量产标志着 GaN 功率器件从 200 mm 向更大直径衬底过渡，成本有望降低 30-40%。", "source": "Infineon / EET China", "url": "https://www.infineon.com/cms/en/about-infineon/press/2026/infineon-300mm-gan-量产/", "date": "2026-07-03", "image": "https://images.unsplash.com/photo-1497215728101-856f4ea42174?w=1200&q=80&auto=format&fit=crop"}, {"id": 8, "priority": "flash", "title": "SK 海力士 1c nm DRAM 良率突破 75%，HBM4E 采用混合键合", "keywords": ["SK海力士", "1c nm", "DRAM", "HBM4E", "混合键合"], "tech": "DRAM", "route": "存储技术", "routeStatus": "↑突破", "content": "SK 海力士在内部简报中透露其 1c nm DRAM 良率突破 75%，达到量产标准。同时 HBM4E 将采用 Cu-Cu 混合键合（Hybrid Bonding）替代微凸块，堆叠层数 16 层，容量提升至 48 GB。", "source": "The Elec", "url": "https://www.thelec.net/news/articleView.html?idxno=5678", "date": "2026-07-04", "image": "https://images.unsplash.com/photo-1497366754035-f200968a6e72?w=1200&q=80&auto=format&fit=crop"}, {"id": 9, "priority": "flash", "title": "东京电子推出新型低温 SiO₂ 原子层沉积系统", "keywords": ["东京电子", "TEL", "ALD", "低温沉积"], "tech": "ALD", "route": "设备", "routeStatus": "→稳定推进", "content": "东京电子（TEL）发布新型低温等离子体增强 ALD 系统，可在 150°C 以下沉积高密度 SiO₂ 薄膜，适用于 3D NAND 高深宽比间隙填充和 EUV 光刻胶下层。", "source": "TEL / Semiconductor Engineering", "url": "https://semiengineering.com/tel-low-temp-sio2-ald-2026/", "date": "2026-07-04", "image": "https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=1200&q=80&auto=format&fit=crop"}, {"id": 10, "priority": "flash", "title": "台积电 CoWoS-L 产能 2027 月产 8 万片，InFO 配套扩产", "keywords": ["台积电", "CoWoS", "先进封装", "产能"], "tech": "先进封装", "route": "先进封装", "routeStatus": "→稳定推进", "content": "据供应链消息，台积电计划 2027 年将 CoWoS-L 月产能扩至 8 万片（目前约 4 万片），InFO 配套同步扩产。英伟达 Rubin 和 AMD MI400 是主要需求驱动。", "source": "DigiTimes / 经济日报", "url": "https://www.digitimes.com/news/a20260705PD210/cowos-tsmc-advanced-packaging.html", "date": "2026-07-05", "image": "https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=1200&q=80&auto=format&fit=crop"}, {"id": 11, "priority": "flash", "title": "华为公布硅基量子点单光子源原型，工作温度 4K", "keywords": ["华为", "量子点", "单光子源", "硅基"], "tech": "硅基量子点", "route": "量子器件", "routeStatus": "→稳定推进", "content": "华为在 CLEO 2026 上公布了基于硅基量子点的电泵浦单光子源原型，在 4K 温度下实现 0.67 的 Hong-Ou-Mandel 可见度，为片上光量子计算提供了关键器件基础。", "source": "CLEO 2026 / 华为", "url": "https://www.cleoconference.org/program/silicon-quantum-dot-sps-huawei/", "date": "2026-07-06", "image": "https://images.unsplash.com/photo-1500534623283-312aade485b7?w=1200&q=80&auto=format&fit=crop"}, {"id": 12, "priority": "flash", "title": "新思科技发布 3DIC Compiler 2027，支持 12 芯片堆叠热仿真", "keywords": ["Synopsys", "3DIC", "EDA", "热仿真"], "tech": "EDA", "route": "设计工具", "routeStatus": "→稳定推进", "content": "新思科技发布 3DIC Compiler 2027 版本，新增 12 芯片堆叠的热-机械协同仿真能力，支持 interposer 和 hybrid bonding 两种方案，与台积电 3Dblox 2.0 流程完成认证。", "source": "Synopsys / EDA Weekly", "url": "https://www.synopsys.com/3dic-compiler-2027-release", "date": "2026-07-06", "image": "https://images.unsplash.com/photo-1502082553048-f009c37129b9?w=1200&q=80&auto=format&fit=crop"}, {"id": 13, "priority": "secondary", "title": "杭州Garen半导体建成全球首条6/8英寸兼容GaN量产线", "keywords": ["GaN", "氮化镓", "8英寸", "杭州Garen", "宽禁带"], "tech": "GaN-on-Si", "route": "宽禁带半导体", "routeStatus": "↑突破", "content": "据Ralf's GaN & SiC News（7月2日）报道，杭州Garen半导体于6月24日宣布建成全球首条同时兼容6英寸（150mm）与8英寸GaN-on-Si的量产线，可灵活切换产线以平衡成本与产能。该产线面向650V功率器件与射频应用，标志着GaN从200mm向更大直径衬底过渡的国内进展。", "reason": "6/8英寸兼容产线降低了GaN功率器件向大尺寸迁移的资本开支风险，是国内宽禁带制造能力的标志性事件。", "source": "LinkedIn / Ralf's GaN & SiC News", "url": "https://www.linkedin.com/pulse/ralfs-gan-sic-news-july-2-2026-ralf-higgelke-k67me/", "image": "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=1200&q=80&auto=format&fit=crop", "imageCaption": "GaN 功率器件（示意）", "date": "2026-07-02"}, {"id": 14, "priority": "flash", "title": "英特尔18A-P节点细节披露：RibbonFET与PowerVia背面供电完全体", "keywords": ["Intel", "18A", "RibbonFET", "PowerVia", "背面供电"], "tech": "RibbonFET GAA + BSPDN", "route": "先进制程", "routeStatus": "↑突破", "content": "据腾讯新闻（6月22日）分析，Intel 18A-P是英特尔首个同时集成第二代RibbonFET全环绕栅极晶体管与PowerVia背面供电网络的'完全体'节点，相较2025年随Panther Lake首发的18A在性能与散热上进一步优化。背面供电将电源布线移至晶圆背面，释放正面布线资源并降低IR压降。", "reason": "RibbonFET+PowerVia的组合是英特尔追赶台积电N2的关键制程筹码，也是背面供电技术首次大规模商用。", "source": "腾讯新闻 / Intel", "url": "https://news.qq.com/rain/a/20260622A0BNA400", "date": "2026-06-22", "image": "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=1200&q=80&auto=format&fit=crop"}, {"id": 15, "priority": "flash", "title": "ECTC 2026聚焦HBM4与CoWoS封装挑战：微流控冷却与光互连升温", "keywords": ["ECTC 2026", "HBM4", "CoWoS", "微流控冷却", "光互连"], "tech": "先进封装", "route": "先进封装", "routeStatus": "→稳定", "content": "SemiAnalysis发布的ECTC 2026大会综述指出，英特尔、台积电、SK海力士、三星围绕EMIB-T、定制化HBM、HBM4封装挑战、微流控冷却与光子互连等方向密集展示进展。随着HBM4堆叠层数增至16层，热管理与信号完整性成为量产主要瓶颈。", "reason": "HBM4与先进封装的散热/互连挑战直接决定AI加速器的算力上限，ECTC是产业风向标。", "source": "SemiAnalysis / ECTC 2026", "url": "https://newsletter.semianalysis.com/p/ectc2026", "date": "2026-07-03", "image": "https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=1200&q=80&auto=format&fit=crop"}], "papers": [{"id": "semi-paper-001", "title": "First Demonstration of CFET Ring Oscillator and SRAM Bit-Cell Functionality at Gate Pitch Smaller Than 48 nm", "authors": "IEDM 2025 Contributors (Logic & SRAM Technology)", "field": "半导体", "paperType": "会议论文", "venue": "IEEE IEDM 2025", "oneLiner": "首次实现栅距小于 48 nm 的全功能 CFET 环振与 SRAM 位元，标志互补堆叠晶体管迈向实用化。", "abstract": "该工作报道了互补场效应晶体管（CFET）技术的两项关键里程碑：首次演示全功能 101 级 CFET 环形振荡器，以及可在栅距小于 48 nm 下工作的 SRAM 位元功能。研究系统比较了两种环振版图对性能与稳定性的影响。", "content": "CFET 将 nFET 与 pFET 在垂直方向堆叠，是延续逻辑微缩的关键路径。本文在小于 48 nm 栅距下实现了环振与 SRAM 位元的完整功能，验证了 CMOS 对垂直堆叠的可行性，为 2 nm 以下节点铺路。实验同时给出了电路原理图与 CFET 环振的 TEM 截面图像。", "techIntro": "随着纳米片架构逼近尺寸缩减瓶颈，行业普遍认为 CFET 将是继 FinFET、纳米片之后的下一代逻辑器件结构。其核心价值在于把一对 CMOS 晶体管垂直集成，从而在相同 footprint 下获得更高集成度与更低电容。", "techTags": ["CFET", "环振", "SRAM", "逻辑微缩", "互补堆叠"], "metrics": [{"name": "栅距 Gate pitch", "value": "\u003c48", "unit": "nm", "note": "环振+SRAM 功能验证"}, {"name": "环振级数", "value": "101", "unit": "级", "note": "全功能演示"}], "attachments": [{"name": "论文原文", "url": "https://ieeexplore.ieee.org/document/11353820", "label": "IEEE Xplore", "cached": false}], "source": "IEEE Xplore", "url": "https://ieeexplore.ieee.org/document/11353820", "image": "https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200&q=80&auto=format&fit=crop", "imageCaption": "CFET 垂直堆叠晶体管示意图", "date": "2026-07-06"}, {"id": "semi-paper-002", "title": "3D DRAM with stacked oxide-semiconductor channel transistors", "authors": "Mutsumi Okajima et al., Kioxia Corporation", "field": "半导体", "paperType": "期刊论文", "venue": "Nature Electronics", "oneLiner": "铠侠提出基于堆叠氧化物半导体沟道的 3D DRAM，垂直节距缩减约 35%，同堆栈高度内可容纳更多字线层。", "abstract": "报道于 2025 IEEE IEDM 的 3D DRAM 设计采用堆叠氧化物半导体沟道晶体管，相较传统 3D DRAM 结构将垂直节距降低约 35%，在相同堆栈高度下可集成更多字线层。", "content": "传统 3D DRAM 依赖 silicon 沟道，微缩受限于沟道材料与漏电。本文以氧化物半导体（OS）作为垂直沟道，利用其低漏电与高驱动特性，实现了更紧凑的单元结构，显著提升单位面积存储密度，是 3D DRAM 走向高密度的重要路径。", "techIntro": "DRAM 微缩长期受电容器与沟道漏电制约。3D DRAM 通过垂直堆叠存储层突破平面限制，而氧化物半导体沟道因其低关态电流成为理想选择，可在不增加堆栈高度的前提下倍增层数。", "techTags": ["3D DRAM", "氧化物半导体", "垂直沟道", "存储微缩"], "metrics": [{"name": "垂直节距缩减", "value": "~35", "unit": "%", "note": "相较传统 3D DRAM"}, {"name": "结构", "value": "堆叠 OS 沟道", "unit": "", "note": "更多字线层"}], "attachments": [{"name": "论文原文", "url": "https://www.nature.com/articles/s41928-025-01521-z", "label": "Nature Electronics", "cached": false}], "source": "Nature Electronics", "url": "https://www.nature.com/articles/s41928-025-01521-z", "image": "https://images.unsplash.com/photo-1488590528505-98d2b5aba04b?w=1200&q=80&auto=format&fit=crop", "imageCaption": "3D DRAM 垂直沟道堆叠示意", "date": "2026-07-06"}]}, "2026-07-07": {"schema": "semicon-news-daily/v1", "date": "2026-07-07", "weekday": "周二", "summary": "IBM 7Å交错纳米片、东京大学1nm MoS₂管、High-NA EUV掩模经济学、垂直GaN、PennState单片3D自供电、TiO₂原子级铁电、AlixLabs ALE间距分割。新增：ASML推进Hyper-NA EUV路线图，Cadence发布全自主Agentic AI设计工程师，三星ISSCC 2026展示4F²垂直沟道DRAM，VLSI盘点STT-MRAM/FeRAM/ReRAM/PCM，BSPDN（PowerVia已出货/Super Power Rail年内跟进），CPO共封装光学五大趋势，Argonne×Intel部署12量子位硅自旋处理器。 当日另含 2 篇半导体器件技术论文研讨。", "focus": "7Å级与原子级器件突破、AI驱动EDA与表征、背面供电与CPO走向落地、硅基量子位进展", "news": [{"id": "semi-001", "title": "IBM发布7Å晶体管架构：交错式纳米片，性能+50%或能效+70%", "keywords": ["IBM", "7Å", "纳米片", "晶体管架构", "SRAM"], "tech": "GAA纳米片晶体管", "route": "先进制程架构", "routeStatus": "↑突破", "content": "IBM展示全新7Å晶体管架构，采用交错式纳米片（interleaved nanosheet）设计——晶体管像屋顶瓦片一样堆叠在精确的斜角上，从而在单位面积内塞入更多晶体管。性能较当前工艺提升50%，或能效提升高达70%。SRAM缩放改进40%，速度远远快于HBM，延迟更低。预计量产时间在2031年左右。据SemiEngineering报道。", "reason": "IBM的新架构路线图为后2nm时代提供了关键的技术路径参考", "source": "SemiEngineering / IBM", "url": "https://semiengineering.com/chip-industry-week-in-review-144/", "image": "https://images.unsplash.com/photo-1505765050516-f72dcac9c60e?w=1200&q=80&auto=format&fit=crop", "imageCaption": "GAA 晶体管结构示意", "date": "2026-06-26", "priority": "featured"}, {"id": "semi-002", "title": "Research Bits Jul 6：串联神经网络6个数量级加速半导体特性预测", "keywords": ["神经网络", "半导体特性", "IGZO", "TNN", "机器学习"], "tech": "AI+半导体表征", "route": "AI辅助半导体研究", "routeStatus": "↑突破", "content": "东京科学大学等机构开发串联神经网络（TNN）：第一级从晶体管I-V曲线估计材料参数（缺陷密度、陷阱态、迁移率等6个参数），第二级前向网络重建原始特性做物理一致性约束。在1000组a-IGZO数据集上训练后，单条I-V曲线推理\u003c1ms即获全部参数。据称相比传统器件模拟（数小时至数天），加速超过六个数量级。[DOI: 10.1002/aisy.70437]", "reason": "AI驱动的半导体表征方法可能彻底改变材料参数提取效率", "source": "SemiEngineering / Advanced Intelligent Systems", "url": "https://semiengineering.com/research-bits-july-6/", "image": "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1200&q=80&auto=format&fit=crop", "imageCaption": "神经网络结构示意", "date": "2026-07-06", "priority": "featured"}, {"id": "semi-003", "title": "东京大学实现1nm MoS₂纳米管，有望用于超缩放GAA晶体管", "keywords": ["MoS₂", "纳米管", "1nm", "GAA", "二维材料"], "tech": "二维半导体材料", "route": "后硅器件材料", "routeStatus": "↑突破", "content": "东京大学成功制造出直径仅1nm的半导体二硫化钼（MoS₂）纳米管，有望用于超缩放的环绕栅极（GAA）晶体管沟道。MoS₂作为二维材料在原子级厚度下仍保持良好半导体特性，被认为是后硅时代的重要候选沟道材料。据SemiEngineering行业周报报道。", "reason": "1nm尺度沟道材料突破是后摩尔时代器件微缩的关键研究方向", "source": "SemiEngineering / 东京大学", "url": "https://semiengineering.com/chip-industry-week-in-review-144/", "image": "https://images.unsplash.com/photo-1510525009512-ad7fc13eefab?w=1200&q=80&auto=format&fit=crop", "imageCaption": "MoS₂ 纳米管结构示意", "date": "2026-06-26", "priority": "secondary"}, {"id": "semi-004", "title": "高NA EUV掩模经济学：成本上升迫使行业重新审视路线图", "keywords": ["High-NA EUV", "掩模", "光刻成本", "ASML"], "tech": "EUV光刻", "route": "High-NA EUV路线", "routeStatus": "↓受阻", "content": "SemiEngineering分析指出，高NA EUV光刻的掩模成本显著上升、新掩模材料要求更严格，叠加更紧的缺陷容忍度，正在迫使行业重新考虑High-NA EUV的部署节奏和路线图。掩模制造成本和供应链成熟度成为下一代光刻技术推广的主要障碍之一。", "reason": "High-NA EUV的经济性是制约先进制程推进的实际瓶颈", "source": "SemiEngineering", "url": "https://semiengineering.com/mask-economics-shape-high-na-euv-adoption/", "image": "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=1200&q=80&auto=format&fit=crop", "imageCaption": "EUV 光刻机内部结构（示意）", "date": "2026-06-22", "priority": "secondary"}, {"id": "semi-005", "title": "GaN功率器件走向垂直结构：新设计克服制造挑战", "keywords": ["GaN", "垂直功率器件", "氮化镓", "功率半导体"], "tech": "GaN功率器件", "route": "GaN器件结构", "routeStatus": "↑突破", "content": "SemiEngineering报道垂直GaN功率器件的最新进展，新设计和工艺流程正在帮助克服垂直GaN结构的制造挑战。垂直GaN相比传统平面GaN可承受更高电压、拥有更好的热管理，在电动汽车和工业电源领域前景广阔。", "reason": "GaN从平面转向垂直结构是功率半导体技术演进的重要方向", "source": "SemiEngineering", "url": "https://semiengineering.com/gan-power-devices-go-vertical/", "image": "https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=1200&q=80&auto=format&fit=crop", "imageCaption": "GaN 功率器件（示意）", "date": "2026-06-18", "priority": "secondary"}, {"id": "semi-006", "title": "宾夕法尼亚州立大学打造单片3D自供电器件：石墨烯传感器+MoS₂/WSe₂逻辑+硅光伏", "keywords": ["单片3D集成", "石墨烯", "MoS₂", "WSe₂", "自供电"], "tech": "3D集成 / 二维材料", "route": "单片3D集成", "routeStatus": "↑突破", "content": "宾夕法尼亚州立大学团队展示了单片3D集成芯片：堆叠石墨烯化学传感器层、MoS₂/WSe₂二维材料逻辑层、硅光伏能量收集层于同一芯片上，实现自供电运行。该设计为低功耗自主传感和边缘计算系统开辟了新道路。据SemiEngineering报道。", "reason": "单片3D集成是超越摩尔定律的重要技术路径", "source": "SemiEngineering", "url": "https://semiengineering.com/chip-industry-week-in-review-144/", "image": "https://images.unsplash.com/photo-1517048676732-d65bc937f952?w=1200&q=80&auto=format&fit=crop", "imageCaption": "3D 集成芯片堆叠示意", "date": "2026-06-26", "priority": "secondary"}, {"id": "semi-007", "title": "TiO₂薄膜在\u003c3nm厚度下呈现铁电性，ALD兼容硅基工艺", "keywords": ["TiO₂", "铁电", "ALD", "3nm", "铁电存储"], "tech": "铁电薄膜 / ALD", "route": "新型铁电材料", "routeStatus": "↑突破", "content": "UC Berkeley和SLAC团队将TiO₂薄膜厚度降至\u003c3nm时意外发现其呈现铁电性——自发极化且可电场翻转，且在1nm（约2个单胞厚度）时仍保持稳定。团队使用ALD在\u003c400°C低温下生长均匀薄膜，可在晶体硅和非晶碳基板上沉积，表明其与硅基工艺兼容。论文发表于Science 392, 280-284 (2026)。[DOI: 10.1126/science.aec9417]", "reason": "原子级铁电薄膜的发现为FeFET存储和3D集成开创新可能", "source": "SemiEngineering / Science", "url": "https://semiengineering.com/research-bits-july-6/", "image": "https://images.unsplash.com/photo-1505765050516-f72dcac9c60e?w=1200&q=80&auto=format&fit=crop", "imageCaption": "铁电薄膜晶格结构（示意）", "date": "2026-07-06", "priority": "flash"}, {"id": "semi-008", "title": "应用材料为DRAM推出外延系统，同时发布先进封装CMP/沉积/电子束检测系统", "keywords": ["应用材料", "DRAM", "外延", "CMP", "先进封装"], "tech": "半导体设备", "route": "DRAM设备", "routeStatus": "→稳定", "content": "应用材料（Applied Materials）为DRAM制造推出新型外延系统，同时为先进封装推出CMP、沉积和电子束检测系统。据SemiEngineering报道。", "reason": "设备商的布局反映DRAM和先进封装的技术升级方向", "source": "SemiEngineering", "url": "https://semiengineering.com/chip-industry-week-in-review-144/", "image": "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1200&q=80&auto=format&fit=crop", "imageCaption": "半导体设备车间（示意）", "date": "2026-06-26", "priority": "flash"}, {"id": "semi-009", "title": "ETH Zurich开发双向傅里叶像素：同时实现光控制和光分析", "keywords": ["ETH Zurich", "双向像素", "傅里叶像素", "光调制", "显示"], "tech": "光学微结构", "route": "新型像素结构", "routeStatus": "↑突破", "content": "ETH Zurich研究人员开发出双向傅里叶像素，通过波状雕刻表面实现对光强、相位和偏振的控制与分析。正向用于成像/显示，逆向用于光分析。团队称该像素可在同一器件上实现相机和显示功能。论文发表于Nature 655, 87-92 (2026)。[DOI: 10.1038/s41586-026-10681-7]", "reason": "显示与传感合一的像素概念可能开启新型交互显示设备", "source": "SemiEngineering / Nature", "url": "https://semiengineering.com/research-bits-july-6/", "image": "https://images.unsplash.com/photo-1510525009512-ad7fc13eefab?w=1200&q=80&auto=format&fit=crop", "imageCaption": "傅里叶像素光学结构（示意）", "date": "2026-07-06", "priority": "flash"}, {"id": "semi-010", "title": "AlixLabs推出首款原子层刻蚀间距分割商用设备", "keywords": ["AlixLabs", "ALE", "间距分割", "图案密度"], "tech": "原子层刻蚀", "route": "图案密度技术", "routeStatus": "↑突破", "content": "AlixLabs推出首款商用设备，用于其原子层刻蚀间距分割（ALE Pitch Splitting）技术。该技术可在不退化为双重图案的情况下增加图形密度，为先进制程提供一种新的图案化方案。据SemiEngineering报道。", "reason": "新型图案化设备为先进制程提供EUV之外的互补方案", "source": "SemiEngineering", "url": "https://semiengineering.com/chip-industry-week-in-review-144/", "image": "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=1200&q=80&auto=format&fit=crop", "imageCaption": "原子层刻蚀设备（示意）", "date": "2026-06-26", "priority": "flash"}, {"id": "semi-011", "title": "ASML推进Hyper-NA EUV路线图，为AI芯片时代储备0.7NA以上光刻", "keywords": ["ASML", "Hyper-NA EUV", "光刻路线图", "0.7 NA"], "tech": "EUV光刻", "route": "High-NA/Hyper-NA EUV路线", "routeStatus": "→稳定", "content": "据Digital Citizen（6月18日）报道，ASML正为AI芯片时代准备High-NA与Hyper-NA EUV的下一阶段。High-NA（0.55 NA）系统已接近量产导入，Hyper-NA（0.7 NA以上）被纳入更远期路线图，以应对2nm以下节点的单次曝光分辨率需求。干法光刻胶与配套光学系统的成熟度是关键。", "reason": "Hyper-NA EUV的预研决定了2030年代先进制程的光刻天花板，提前布局反映AI算力对制程的刚性需求。", "source": "Digital Citizen / ASML", "url": "https://www.digitalcitizen.life/asml-is-preparing-high-na-and-hyper-na-euv-for-the-ai-chip-era/", "image": "https://images.unsplash.com/photo-1517077304055-6e89abbf09b0?w=1200&q=80&auto=format&fit=crop", "imageCaption": "EUV 光刻机（示意）", "date": "2026-06-18", "priority": "secondary"}, {"id": "semi-012", "title": "Cadence在Computex 2026发布全自主Agentic AI设计工程师，EDA迈向L5", "keywords": ["Cadence", "Agentic EDA", "AI设计", "Computex 2026", "ChipStack"], "tech": "EDA / AI辅助设计", "route": "设计工具", "routeStatus": "↑突破", "content": "Cadence在Computex 2026（6月1日）发布业界首个全自主虚拟Agentic AI设计工程师，将ChipStack AI Super Agent推进至Level-5自主级别，可自动完成从规格到封装的芯片设计迭代。Synopsys同期也在GTC Taipei加速其Agentic EDA布局，两大EDA厂竞争白热化。", "reason": "Agentic EDA将设计生产力从'人驱动工具'转向'AI自主迭代'，有望显著缩短先进芯片上市周期。", "source": "Cadence / Futurum Group", "url": "https://www.cadence.com/en_US/home/company/newsroom/press-releases/pr/2026/cadence-unveils-industrys-first-fully-autonomous-virtual.html", "image": "https://images.unsplash.com/photo-1517180102446-f3ece451e9d8?w=1200&q=80&auto=format&fit=crop", "imageCaption": "EDA 设计流程（示意）", "date": "2026-06-01", "priority": "secondary"}, {"id": "semi-013", "title": "三星ISSCC 2026展示16Gb 4F²垂直沟道DRAM，3D存储路线再确认", "keywords": ["三星", "4F²", "垂直沟道DRAM", "ISSCC 2026", "3D DRAM"], "tech": "3D DRAM", "route": "存储技术", "routeStatus": "↑突破", "content": "据SemiWiki报道，三星在ISSCC 2026展示了基于4F²垂直沟道晶体管（VG）的16Gb DRAM原型，验证了垂直沟道结构在10nm以下DRAM制程的可行性。该路线与3D堆叠DRAM并列，成为突破1c nm之后密度瓶颈的两大技术方向。", "reason": "垂直沟道DRAM是三星对抗传统缩放极限的核心路线，ISSCC原型验证增强了3D存储量产预期。", "source": "SemiWiki / ISSCC 2026", "url": "https://semiwiki.com/forum/threads/isscc-2026-samsung-electronics-demonstrated-a-16gb-dram.24808/", "date": "2026-03-23", "priority": "flash", "image": "https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=1200&q=80&auto=format&fit=crop"}, {"id": "semi-014", "title": "2026 VLSI盘点四大新兴非易失存储：STT-MRAM/FeRAM/ReRAM/PCM对比", "keywords": ["新型存储", "STT-MRAM", "FeRAM", "ReRAM", "VLSI 2026"], "tech": "新型非易失存储", "route": "新型存储", "routeStatus": "→稳定", "content": "电子工程专辑（7月1日）盘点2026年最具前景的四种新兴非易失存储：STT-MRAM、FeRAM、ReRAM与PCM/SOM，对比其底层原理、量产参数与优缺点。铁电存储因与CMOS后端兼容、写入速度快，被视为嵌入式eNVM的有力候选。", "reason": "新型存储的成熟将推动存算一体与嵌入式系统的能效跃升，VLSI年度盘点提供产业基准。", "source": "电子工程专辑 / VLSI 2026", "url": "https://www.eet-china.com/mp/a506530.html", "date": "2026-07-01", "priority": "flash", "image": "https://images.unsplash.com/photo-1517048676732-d65bc937f952?w=1200&q=80&auto=format&fit=crop"}, {"id": "semi-015", "title": "背面供电网络2026：Intel PowerVia已出货，TSMC Super Power Rail年内跟进", "keywords": ["BSPDN", "PowerVia", "Super Power Rail", "背面供电", "Intel 18A"], "tech": "背面供电网络", "route": "供电技术", "routeStatus": "↑突破", "content": "BSPDN专题分析指出，背面供电网络（BSPDN）已随Intel PowerVia在18A节点量产出货，台积电Super Power Rail将于N2P、三星BSPDN将于SF2节点年内跟进。该技术将电源布线移至晶圆背面，释放正面布线并降低IR压降与热阻。", "reason": "背面供电是后FinFET时代提升密度与能效的关键使能技术，三大厂同年的落地节奏值得关注。", "source": "Internet Pros / Intel, TSMC", "url": "https://internet-pros.com/blog/backside-power-delivery-bspdn-powervia-2026/", "date": "2026-06-20", "priority": "flash", "image": "https://images.unsplash.com/photo-1517077304055-6e89abbf09b0?w=1200&q=80&auto=format&fit=crop"}, {"id": "semi-016", "title": "2026年CPO共封装光学五大趋势：光引擎贴近交换ASIC成AI互联主流", "keywords": ["CPO", "共封装光学", "硅光", "AI互联", "光引擎"], "tech": "硅光共封装", "route": "光互连", "routeStatus": "→稳定", "content": "西门子半导体封装博客（2月5日）总结2026年CPO五大趋势：为应对AI的能耗需求，共封装光学将光引擎直接贴近交换ASIC、加速器与chiplet，缩短电通道、降低功耗与延迟。1.6T光模块需求与台积电COUPE等方案的成熟推动CPO从概念验证走向规模落地。", "reason": "CPO是突破AI集群电互连功耗墙的核心路径，2026年被视为规模化落地元年。", "source": "Siemens / 半导体封装", "url": "https://blogs.sw.siemens.com/semiconductor-packaging/2026/02/05/five-key-trends-of-co-packaged-optics-cpo-in-2026/", "date": "2026-02-05", "priority": "flash", "image": "https://images.unsplash.com/photo-1517180102446-f3ece451e9d8?w=1200&q=80&auto=format&fit=crop"}, {"id": "semi-017", "title": "Argonne与Intel部署12量子位硅自旋量子处理器，推进硅基量子 scalable", "keywords": ["量子计算", "硅自旋量子位", "Intel", "Argonne", "量子器件"], "tech": "硅基量子位", "route": "量子器件", "routeStatus": "→稳定", "content": "据阿贡国家实验室（1月6日）报道，Argonne与Intel合作部署基于硅量子点的12量子位处理器，并配套Horse Ridge低温控制器实现高保真度可编程控制。硅自旋量子位可借助成熟CMOS工艺实现可扩展制造，是大规模量子计算的有力路线。", "reason": "硅自旋量子位复用传统半导体产线，是量子计算走向可扩展制造的现实路径之一。", "source": "Argonne National Laboratory / Intel", "url": "https://www.anl.gov/article/argonne-launches-silicon-quantum-processor-collaboration-with-intel", "date": "2026-01-06", "priority": "flash", "image": "https://images.unsplash.com/photo-1505765050516-f72dcac9c60e?w=1200&q=80&auto=format&fit=crop"}], "papers": [{"id": "semi-paper-003", "title": "Vertical gallium nitride MOSFETs: Advanced architectures, challenges and prospects", "authors": "ScienceDirect (Solid-State Electronics)", "field": "半导体", "paperType": "期刊论文", "venue": "Solid-State Electronics", "oneLiner": "系统梳理垂直沟道 GaN MOSFET 的先进架构，突破平面器件电流密度与耐压瓶颈。", "abstract": "垂直氮化镓（GaN）MOSFET 凭借其优异的材料特性成为功率器件的变革性方案。本文综述了垂直 GaN MOSFET 的先进架构、关键工艺挑战与未来前景。", "content": "横向 GaN HEMT 在大电流应用中受限于散热与面积，垂直 GaN MOSFET 通过垂直导电路径显著提升电流处理能力并改善热分布。文章讨论了沟槽栅、电流孔径（CAVET）等结构及其可靠性与工艺难点。", "techIntro": "GaN 作为宽禁带半导体，具备高击穿场强与高电子迁移率。垂直结构可将高压与高电流解耦，是车规与工业电源向更高功率密度演进的核心方向。", "techTags": ["GaN", "垂直 MOSFET", "功率器件", "宽禁带"], "metrics": [{"name": "架构", "value": "垂直沟道", "unit": "", "note": "突破平面限制"}, {"name": "材料", "value": "GaN", "unit": "", "note": "宽禁带"}], "attachments": [{"name": "论文原文", "url": "https://www.sciencedirect.com/science/article/pii/S0167931725001078", "label": "ScienceDirect", "cached": false}], "source": "ScienceDirect", "url": "https://www.sciencedirect.com/science/article/pii/S0167931725001078", "image": "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=1200&q=80&auto=format&fit=crop", "imageCaption": "垂直 GaN MOSFET 结构", "date": "2026-07-07"}, {"id": "semi-paper-004", "title": "M2S-HEMT: An E-Mode p-GaN Gate Power Transistor Decoupling Threshold Voltage and ON-Resistance", "authors": "崔家玮、付星源等，北京大学集成电路学院", "field": "半导体", "paperType": "期刊论文", "venue": "北京大学集成电路学院", "oneLiner": "多到单沟道 HEMT（M2S-HEMT）解耦阈值电压与导通电阻，提升常关型 p-GaN 功率器件设计自由度。", "abstract": "该工作以 Multi-to-Single Channel HEMT (M2S-HEMT) 为题，提出一种增强型（E-Mode）p-GaN 栅功率晶体管结构，将阈值电压与导通电阻解耦，改善器件权衡。", "content": "传统 p-GaN 栅 HEMT 中阈值电压与导通电阻高度耦合，难以独立优化。M2S-HEMT 通过多沟道到单沟道的特殊设计，在保持常关特性的同时降低 Ron，为高性能 GaN 功率器件提供新思路。", "techIntro": "p-GaN 栅结构是当前主流的常关型 GaN 功率器件方案，但其 Vth 与 Ron 的耦合限制了性能上限。解耦二者是产业界长期追求的设计目标。", "techTags": ["GaN", "p-GaN HEMT", "功率晶体管", "阈值电压解耦"], "metrics": [{"name": "器件类型", "value": "E-mode p-GaN", "unit": "", "note": "常关型"}, {"name": "创新点", "value": "Vth-Ron 解耦", "unit": "", "note": "M2S 结构"}], "attachments": [{"name": "论文原文", "url": "https://ic.pku.edu.cn/kxyj/kydt/3540925f79e44703baf9eb9f94e4834f.htm", "label": "北大集成电路学院", "cached": false}], "source": "北京大学集成电路学院", "url": "https://ic.pku.edu.cn/kxyj/kydt/3540925f79e44703baf9eb9f94e4834f.htm", "image": "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=1200&q=80&auto=format&fit=crop", "imageCaption": "M2S-HEMT 器件结构", "date": "2026-07-07"}]}, "2026-07-08": {"schema": "semicon-news-daily/v1", "date": "2026-07-08", "weekday": "周三", "summary": "SemiEngineering连发两篇先进封装深度分析：多芯片现场测试方法论与高密度扇出型面板封装检测量测追赶；imec发布2026版路线图：CFET垂直堆叠是A7级（~0.7nm）关键转折点，0.3nm目标2038年。新增：AI时
