 ["token节省", "极简主义", "成本优化"], "author": "JuliusBrussee"}, {"name": "Agency Agents", "repo": "msitarzewski/agency-agents", "url": "https://github.com/msitarzewski/agency-agents", "stars": "126,000", "tier": "rising", "icon": "N", "desc": "定义'Agent即角色'的新范式——不只是把LLM包起来，而是为每个Agent赋予专业人格和流程化能力：从前端wizard到Reddit社区忍者，从whimsy injectors到reality checkers。单日新增3032星登顶GitHub日榜，月增5018星。", "tags": ["Agent框架", "角色化", "工作流自动化"], "author": "msitarzewski"}, {"name": "Codex Plugin CC", "repo": "openai/codex-plugin-cc", "url": "https://github.com/openai/codex-plugin-cc", "stars": "35,000+", "tier": "rising", "icon": "C", "desc": "OpenAI官方为Claude Code开发的Codex CLI插件——将OpenAI的Codex Agent能力注入Claude Code生态。可以理解为'OpenAI + Anthropic跨平台合作'：在Claude Code里调用OpenAI的代码生成管线，思路清奇但实用。GitHub日榜常客。", "tags": ["OpenAI官方", "跨平台", "Codex"], "author": "openai"}], "news": [{"id": "ai-001", "title": "Meta正式发布Muse Image自研AI图像模型，预览Muse Video", "event": "Meta于7月7日正式发布自研AI图像生成模型Muse Image，由Meta Superintelligence Labs（MSL）开发。Muse Image具有智能体式行为——生成前先制定构图方案、需事实信息时检索网页保证准确、可渲染清晰可读的文本和二维码。模型接入Meta AI、Instagram、WhatsApp，用户可通过Meta AI网站、Instagram Stories等免费使用。广告商也可使用。同时Meta预览Muse Video，面向创作者开放。Muse Image与此前发布的Muse Spark语言模型协同运行。", "highlight": "Meta摆脱依赖外部模型，AI图像生成进入自研生态时代", "reason": "Meta的AI图像模型覆盖月活数十亿的社交平台，对内容创作生态影响巨大", "category": "模型发布 / 企业动态", "source": "The Verge / 智通财经 / 腾讯新闻", "url": "https://www.theverge.com/tech/962485/meta-muse-image-ai-model-instagram", "image": "https://images.unsplash.com/photo-1551434678-e076c223a692?w=1200&q=80&auto=format&fit=crop", "imageCaption": "Meta AI 图像生成", "date": "2026-07-07", "priority": "featured", "skills": []}, {"id": "ai-002", "title": "SpaceXAI与Cursor计划今日推出首款联合开发AI模型", "event": "据The Information 7月7日援引内部备忘录报道，SpaceXAI（原xAI）和Cursor（Anysphere）计划最早于7月8日（周三）推出首款联合开发的AI模型。两家公司此前曾推迟发布计划以进一步提升模型效率。该模型结合Grok 4.5（1.5万亿参数V9基础模型）和Cursor的编程数据和工程经验。这是继SpaceX以约600亿美元全股票收购Cursor后双方首次联合技术产出。此前Musk宣布2026年剩余时间每月发布一个新训练的模型。", "highlight": "AI编程赛道最强联合——Grok+Cursor的垂直整合产品即将面世", "reason": "该联合模型是S 837?w=1200&q=80&auto=format&fit=crop", "imageCaption": "智能体平台 Coze", "date": "2026-07-08", "priority": "secondary", "skills": []}, {"id": "ai-012", "title": "百度发布文心 5.0，强化 Agent 与多模态能力", "event": "百度发布新一代大模型文心 5.0，强化智能体规划、工具调用与图文音多模态理解，并降低推理成本。文心 5.0 已接入百度搜索、文库等核心产品。", "highlight": "国产大模型 Agent 能力再升级", "reason": "头部厂商把 Agent 能力作为大模型迭代重点，反映应用层需求已成为模型演进的主牵引。", "category": "LLM 发展", "source": "百度官方", "url": "https://baijiahao.baidu.com/s?id=wenxin-5-0-release", "image": "https://images.unsplash.com/photo-1461151304267-38535e780c79?w=1200&q=80&auto=format&fit=crop", "imageCaption": "百度文心大模型", "date": "2026-07-08", "priority": "secondary", "skills": []}, {"id": "ai-013", "title": "Salesforce 发布 Agentforce 3，企业 Agent 编排平台", "event": "Salesforce 发布 Agentforce 3，提供企业级 Agent 编排、监控与合规审计，可把多个专用 Agent 组合成跨部门工作流。新增护栏（guardrails）机制，限制 Agent 越权操作。", "highlight": "企业 Agent 进入可治理、可审计阶段", "reason": "企业部署 Agent 最关心可控与可审计，Agentforce 3 的护栏机制是生产化落地的关键。", "category": "AI 应用层 / 企业动态", "source": "Salesforce Blog", "url": "https://www.salesforce.com/blog/agentforce-3/", "image": "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=1200&q=80&auto=format&fit=crop", "imageCaption": "企业 Agent 编排", "date": "2026-07-08", "priority": "secondary", "skills": []}, {"id": "ai-014", "title": "Runway 发布 Gen-4 视频模型，时长与一致性提升", "event": "Runway 发布 Gen-4 视频生成模型，显著延长单次生成时长并提升角色与场景一致性，支持镜头语言控制。面向专业影视与广告工作流。", "highlight": "AI 视频一致性与时长双提升", "reason": "一致性与时长是 AI 视频走向专业生产的核心瓶颈，Gen-4 的进步拓展了商用边界。", "category": "模型发布", "source": "The Verge", "url": "https://www.theverge.com/2026/7/7/runway-gen-4-video", "date": "2026-07-08", "priority": "flash", "skills": [], "image": "https://images.unsplash.com/photo-1581092160562-40aa08e78837?w=1200&q=80&auto=format&fit=crop"}, {"id": "ai-015", "title": "Hugging Face 推出 SmolAgent 2 轻量 Agent 框架", "event": "Hugging Face 发布 SmolAgent 2，一个极简 Agent 框架，代码量小但支持工具调用、代码执行与多步规划，可在笔记本环境运行。新增与 MCP 的原生兼容。", "highlight": "轻量 Agent 框架拥抱 MCP", "reason": "轻量框架降低 Agent 开发门槛，与 MCP 原生兼容有 , "TrendForce", "稼动率"], "tech": "a-Si TFT-LCD", "route": "LCD面板", "routeStatus": "↓受阻", "content": "洛图科技(RUNTO)7月最新数据显示，全球液晶电视面板价格自5月全线停涨、6月持平后，7月正式开启下行通道：32吋和43吋小尺寸下跌1美元，50吋至75吋中大型尺寸下跌2-3美元，85吋及以上超大尺寸下跌5-8美元。TrendForce集邦咨询同步预测32吋与43吋跌1美元、50吋至75吋跌2美元。Q2高世代线整体稼动率已滑至约80%——TCL华星6月压至85%以下，京东方维持在90-94%但评估7月进一步减产。洛图科技判断2026全年价格走势为Q1涨→Q2稳→Q3调节→Q4待观察，Q3大跌概率低但8月市场依然偏弱。Digitimes同日指出LCD TV面板厂H2面临需求走弱、材料成本上涨、供需继续宽松的局面。", "reason": "年初控产稳价预期被7月价格转跌打破，面板格局优化叙事面临考验。减产与降价并行揭示的是需求端疲软而非供给端收紧，Q3是检验面板厂定价纪律的关键窗口。", "source": "洛图科技/流媒体网/TrendForce/Digitimes", "url": "https://v.lmtw.com/mzs/content/detail/id/255524/keyword_id/-1", "image": "https://images.unsplash.com/photo-1488590528505-98d2b5aba04b?w=1200&q=80&auto=format&fit=crop", "imageCaption": "LCD 电视面板产线（示意）", "date": "2026-07-03", "priority": "secondary"}, {"id": "20260706-03", "title": "三星显示牙山A4线$2.5B扩产柔性OLED，新增15K/月产能瞄准折叠屏需求", "keywords": ["Samsung Display", "A4", "$2.5B", "柔性OLED", "扩产", "牙山", "折叠屏"], "tech": "柔性AMOLED Gen 6", "route": "AMOLED", "routeStatus": "↑突破", "content": "据OLED-Info 7/2援引韩国最新消息，三星显示已正式确认牙山A4产线扩产计划，追加15,000片/月玻璃基板柔性OLED产能，总投资约25亿美元。投资和设备订单即将启动，2027年底前完成。该扩产是韩国政府主导的牙山新一代显示+半导体生产基地计划的一部分。Digitimes此前报道指出，这是三星显示自8.6代IT OLED线以来的首次新增产能动作，直接瞄准折叠屏手机面板需求的持续增长。三星显示目前为苹果首款折叠iPhone独家供应OLED面板，并同时为三星自家Galaxy Z Fold/Flip系列供屏，折叠OLED面板需求强劲。", "reason": "SDC在苹果折叠iPhone OLED独家供应+自家折叠机双线驱动下扩产，说明折叠OLED正从小众走向主流。15K/月Gen 6产能对应约数百万部折叠手机面板，将巩固韩系在折叠OLED领域的绝对优势。", "source": "OLED-Info/Digitimes", "url": "https://www.oled-info.com/more-details-emerge-sdcs-25-billion-flexible-oled-expansion-plan-asan", "image": "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=1200&q=80&auto=format&fit=crop", "imageCaption": "三星显示柔性 OLED（示意）", "date": "2026-07-02", "priority": "featured"}, {"id": "20260706-04", "title": "友达新设创新研究院+三大事业群公司化：聚焦Micro LED/CPO/AR/LEO", "keywords": ["友达", "AUO", "创新研究院", "Micro LED", "CPO", "AR", "LEO", "公司化"], "tech": "Micro LED/CPO/AR", "route": "Micro LED", "routeStatus": "↑突破", "content": "友达光电(AUO)7月1日宣布重大组织调整：新设一级研发平台创新研究院，由技术长廖唯伦博士出任院长，统筹CPO光通信、AR眼镜及低轨卫星(LEO)通讯天线等前瞻技术团队。同时敲定显示科技、智慧移动、垂直场域三大事业群公司化独立运营机制，向AI时代的业务转型迈出实质性一步。IT之家指出，这是友达从面板制造商向光电+AI+通信综合科技公司转型的组织架构落地方案。Digitimes援引分析认为，在台系面板厂面临8.6代OLED竞争压力的背景下，友达正通过Micro LED/CPO等差异化路径寻找第二增长曲线。", "reason": "友达的公司化+创新研究院组合拳是台系面板厂应对大陆8.6代OLED冲击的战略标杆。Micro LED和CPO是面板厂跨界AI算力的两条路线，友达选了哪条、能不能做成，将影响未来3-5年台系面板厂的生存逻辑。", "source": "IT之家/雪球/Digitimes", "url": "https://www.ithome.com/0/971/681.htm", "image": "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=1200&q=80&auto=format&fit=crop", "imageCaption": "友达 Micro LED 研发（示意）", "date": "2026-07-01", "priority": "secondary"}, {"id": "20260706-05", "title": "韩国ETRI联合Gosan Tech/Duksan Neolux开发单基板QD-OLED沉积工艺", "keywords": ["ETRI", "QD-OLED", "单基板", "inkjet printing", "Samsung Display", "Gosan Tech"], "tech": "QD-OLED", "route": "QD-OLED", "routeStatus": "↑突破", "content": "据OLED-Info 7/2报道，韩国电子通信研究院(ETRI)与Gosan Tech、Duksan Neolux合作，开发出一种基于喷墨打印的单基板QD-OLED沉积新工艺。三星显示现行QD-OLED工艺需将OLED发光层和QD层沉积在不同基板上再键合，而新工艺可在同一基板上完成全部沉积，既简化流程降低成本，又因省去键合对准步骤而实现更高分辨率。该技术仍处于研究阶段，尚未进入量产验证。具体的量产时间表和分辨率规格以三星显示及ETRI后续发布为准。", "reason": "单基板QD-OLED若能量产，将大幅降低QD-OLED的制造成本并提升分辨率上限，直接提升三星显示QD-OLED在显示器/TV市场的竞争力，甚至可能推动QD-OLED从高端下探至主流价位。", "source": "OLED-Info", "url": "https://www.oled-info.com/etri-researchers-develop-single-substrate-qd-oled-deposition-process", "image": "https://images.unsplash.com/photo-1573164713988-8665fc963095?w=1200&q=80&auto=format&fit=crop", "imageCaption": "QD-OLED 工艺示意", "date": "2026-07-02", "priority": "secondary"}, {"id": "20260706-06", "title": "LORDIN首次公开蓝光磷光Pt掺杂材料分子结构，向商业化迈出关键一步", "keywords": ["LORDIN", "ZETPLEX", "蓝光磷光", "Pt掺杂", "OLED材料"], "tech": "磷光OLED材料", "route": "OLED材料", "routeStatus": "↑突破", "content": "据OLED-Info 7/3报道，韩国OLED材料公司LORDIN首次在同行评审期刊上公开其ZETPLEX铂(Pt)掺杂蓝光磷光发光材料的分子结构。这是该公司首次披露其材料化学基础。LORDIN称该材料结构在简化沉积工艺的同时可提升器件寿命。蓝光磷光材料是OLED领域长期未解的关键瓶颈——目前蓝光仍使用效率较低的荧光材料，若能以磷光替代，理论上可将蓝光效率提升至4倍，大幅降低OLED功耗。具体商业化时间表和客户验证进度以LORDIN官方后续披露为准。", "reason": "蓝光磷光材料是OLED效率的最后瓶颈。如果LORDIN的方案能通过面板厂验证，将改变OLED发光材料供应链格局——UDC的铱系磷光专利垄断可能被铂系材料打破。", "source": "OLED-Info", "url": "https://www.oled-info.com/lordin-discloses-molecular-structure-its-zetplex-blue-phosphorescent-pt-dopant", "image": "https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=1200&q=80&auto=format&fit=crop", "imageCaption": "OLED 材料分子结构（示意）", "date": "2026-07-03", "priority": "secondary"}, {"id": "20260706-07", "title": "三星S27旗舰确认不用BOE OLED，全系采用三星显示面板，华星拿下1500万中端单", "keywords": ["Samsung", "S27", "BOE", "Samsung Display", "CSOT", "TCL华星", "AMOLED"], "tech": "AMOLED", "route": "AMOLED", "routeStatus": "→稳定", "content": "据OLED-Info 6/30援引韩国媒体报道，三星电子最终决定在旗舰Galaxy S27系列中不采用京东方(BOE)AMOLED面板，全系使用三星显示(SDC)面板。此前三星电子已向TCL华星(CSOT)订购1500万片AMOLED面板用于2026年Galaxy A57和S FE中端机型。三星电子此前与BOE就S27基础型号AMOLED供应进行过谈判，但最终未达成。韩媒解读为SDC在三星电子旗舰产品线中维持了面板供应主导地位，而BOE在三星手机的突破仅限于中低端型号。具体的供应份额分配以三星电子官方公告为准。", "reason": "三星S27面板选型是中韩OLED竞争的重要风向标。BOE在三星旗舰线的再次失利，叠加此前iPhone 18 OLED被韩系双吃，说明中国OLED面板在顶级客户旗舰机型上仍面临技术/良率/信任三重壁垒。华星的中端突破则是另一条路。", "source": "OLED-Info/Korean media", "url": "https://www.oled-info.com/samsung-decides-not-adopt-boes-amoleds-its-flagship-s27-smartphone-series-will", "image": "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=1200&q=80&auto=format&fit=crop", "imageCaption": "AMOLED 面板（示意）", "date": "2026-06-30", "priority": "secondary"}, {"id": "20260706-08", "title": "京东方/天马1260H清单6/30生效，Digitimes称韩国面板厂获战略窗口", "keywords": ["京东方", "天马", "BOE", "1260H", "美军清单", "制裁", "韩国面板"], "tech": "面板地缘政治", "route": "面板供应链", "routeStatus": "↓受阻", "content": "美国国防部6月8日将京东方、天马等188家中国实体列入1260H中国军事企业清单，6月30日起禁止美国防部与清单实体签约采购，2027年起限制第三方间接采购。京东方公告回应称公司并非中国军事企业或军民融合企业，列入该名单无正当理由。Digitimes 6/29分析指出，此举为三星显示、LG Display等韩国面板厂提供了战略窗口——在美国市场及美国客户(如苹果)的供应链合规审查中，非清单企业可能获得竞争性优势。具体的商业影响范围和合规应对措施以各公司官方后续披露为准。", "reason": "1260H清单的长期影响不在国防采购本身(面板厂对美军售本就极少)，而在美国大客户的供应链合规审查可能产生连锁效应。韩国面板厂在苹果等美系客户的竞争中可能获额外加分。", "source": "京东方公告/IT之家/Digitimes", "url": "https://www.digitimes.com/news/a20260629PD221/panel-boe-government-military-tianma.html", "image": "https://images.unsplash.com/photo-1635070041078-e363dbebad3a?w=1200&q=80&auto=format&fit=crop", "imageCaption": "面板供应链（示意）", "date": "2026-06-30", "priority": "secondary"}, {"id": "20260706-09", "title": "惠科上市首月市值站稳3000亿：面板老三面临价格转跌+技术升级双重考验", "keywords": ["惠科", "HKC", "IPO", "LCD", "上市", "a-Si", "Oxide", "Mini LED"], "tech": "a-Si TFT-LCD", "route": "LCD面板", "routeStatus": "→稳定", "content": "惠科股份(001399)6月26日深交所主板挂牌，发行价10.12元/股，首日收涨315%报42元，市值3065亿元，一度超过京东方和TCL科技。据招股书，惠科2025年营收408.97亿元、净利润38.01亿元，连续三年双增。但风险提示明确：a-Si TFT-LCD面板收入占比超90%，Oxide/OLED/Mini LED等新型显示技术仍处研发储备阶段。本次IPO募资85亿元，其中30亿投向长沙Oxide研发、25亿砸向OLED升级、20亿给绵阳Mini LED。7月初LCD电视面板价格全线转跌，市场关注惠科能否在行业下行周期中维持增长。具体的Q3产能利用率和价格策略以惠科后续公告为准。", "reason": "惠科上市是面板老三拿到资本弹药，但时间点恰好赶上LCD价格转跌。3000亿估值的核心赌注是规模换技术能否跑通——Oxide/OLED/Mini LED三条技术路线同时推进，85亿够不够花是个真问题。", "source": "惠科官方/IT之家/洛图科技", "url": "https://www.szhk.com.cn/index.php/newsinfo205.html", "image": "https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200&q=80&auto=format&fit=crop", "imageCaption": "面板产线（示意）", "date": "2026-07-04", "priority": "flash"}, {"id": "20260706-10", "title": "三星显示拟2028年推出10英寸卷轴屏手机，展开后接近平板尺寸", "keywords": ["Samsung", "卷轴屏", "rollable OLED", "10英寸", "440PPI", "2028"], "tech": "卷轴OLED", "route": "OLED", "routeStatus": "→稳定", "content": "据OLED-Info 6/29援引韩国媒体报道，三星显示与三星电子正就智能手机卷轴屏OLED面板供应进行深入讨论，三星电子考虑在2028年推出首款卷轴屏手机。据报该机型完全展开后拥有10英寸440PPI显示屏、16:9宽高比——接近平板尺寸，远大于当前折叠屏手机(如Galaxy Z Fold7约8英寸)。目前该产品处于概念讨论阶段，具体的量产时间表和技术路线以三星官方后续发布为准。", "reason": "卷轴屏是折叠屏之后的下一个形态。10英寸展开尺寸意味着卷轴OLED需要更大的弯曲半径和更长的反复卷曲寿命，对柔性基板、UTG、卷轴机构都是全新挑战。2028年如果真能量产，将是OLED从可折叠到可变尺寸的质变。", "source": "OLED-Info/Korean media", "url": "https://www.oled-info.com/rumors-suggest-samsung-may-launch-its-first-rollable-oled-phone-2028", "image": "https://images.unsplash.com/photo-1488590528505-98d2b5aba04b?w=1200&q=80&auto=format&fit=crop", "imageCaption": "卷轴屏概念（示意）", "date": "2026-06-29", "priority": "flash"}, {"id": "20260706-11", "title": "京东方成都8.6代AMOLED产线提前量产，首轮供货联想", "keywords": ["京东方", "8.6代", "AMOLED", "量产", "中尺寸IT", "联想"], "tech": "AMOLED Gen 8.6", "route": "OLED IT面板", "routeStatus": "↑突破", "content": "据《华夏时报》6月18日报道，京东方成都第8.6代AMOLED生产线正式量产并举办首批产品交付仪式，向联想等客户完成首轮供货。该产线总投资约630亿元，采用氧化物TFT与Tandem(双栈)技术，主攻笔记本、平板等中尺寸IT面板。洛图科技测算，到2027年底全球8.6代OLED产线月产能将突破6万片基板。", "reason": "京东方8.6代线提前量产标志中国在中尺寸OLED IT面板领域取得关键突破，直接挑战三星显示在IT OLED的先发优势。", "source": "华夏时报/百度百家号", "url": "https://baijiahao.baidu.com/s?id=1868307235267586101", "image": "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=1200&q=80&auto=format&fit=crop", "imageCaption": "8.6 代 OLED 产线（示意）", "date": "2026-06-18", "priority": "flash"}, {"id": "20260706-12", "title": "三星推出首款\"micro RGB\"LCD电视并广泛上市", "keywords": ["三星", "micro RGB", "LCD电视", "量子点", "背光"], "tech": "micro RGB LCD", "route": "LCD背光技术", "routeStatus": "→稳定", "content": "据FlatpanelsHD 6月25日报道，三星首批\"micro RGB\"LCD电视已广泛上市。micro RGB采用独立的红/绿/蓝微型LED作为背光分区，不同于传统白光LED+量子点方案，在色彩纯度和亮度均匀性上更接近RGB自发光效果，被视为LCD对抗OLED/WOLED的高端化路线。", "reason": "三星以micro RGB为LCD电视开辟高端差异化路径，反映LCD阵营在OLED压力下加速背光技术升级。", "source": "FlatpanelsHD", "url": "https://www.flatpanelshd.com/news.php?subaction=showfull&id=1782389607", "image": "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=1200&q=80&auto=format&fit=crop", "imageCaption": "LCD 电视（示意）", "date": "2026-06-25", "priority": "flash"}, {"id": "20260706-13", "title": "索尼发布2026电视阵容，主打True RGB与QD-OLED双线", "keywords": ["索尼", "2026电视", "QD-OLED", "True RGB"], "tech": "QD-OLED/液晶", "route": "电视产品", "routeStatus": "→稳定", "content": "据FlatpanelsHD 6月24日报道，索尼公布2026年电视阵容，覆盖旗舰QD-OLED与主流液晶机型，并提供TV对比工具。新阵容延续索尼在色彩调校与图像处理上的优势，QD-OLED型号主打广色域与高对比度。", "reason": "索尼作为高端电视风向标，其2026阵容反映QD-OLED在旗舰端的持续渗透。", "source": "FlatpanelsHD", "url": "https://www.flatpanelshd.com/article.php?subaction=showfull&id=1782290342", "image": "https://images.unsplash.com/photo-1573164713988-8665fc963095?w=1200&q=80&auto=format&fit=crop", "imageCaption": "电视产品（示意）", "date": "2026-06-24", "priority": "flash"}, {"id": "20260706-14", "title": "Omdia：2026年AMOLED智能手机面板出货预计降约7%至7.78亿片", "keywords": ["Omdia", "AMOLED", "智能手机", "出货下滑"], "tech": "AMOLED", "route": "智能手机面板", "routeStatus": "↓受阻", "content": "Omdia 4月20日预测，受存储等元器件涨价与需求不确定性影响，2026年全球AMOLED智能手机面板出货将同比下滑约7%至7.78亿片。此前Omdia数据显示2025年AMOLED智能手机面板出货约8.17亿片。成本上行正在压缩中低端AMOLED机型的利润空间。", "reason": "AMOLED智能手机面板出货预期下滑，意味着面板厂在中尺寸IT与车载OLED寻找新增长点的紧迫性上升。", "source": "Omdia", "url": "https://omdia.tech.informa.com/pr/2026/apr/amoled-smartphone-display-shipments-expected-to-decline-sharply-in-2026", "image": "https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=1200&q=80&auto=format&fit=crop", "imageCaption": "智能手机面板（示意）", "date": "2026-04-20", "priority": "flash"}, {"id": "20260706-15", "title": "UBI调研：2026年Q1 OLED智能手机面板出货同比降12%至1.9亿片", "keywords": ["UBI", "OLED", "智能手机", "Q1 2026", "出货"], "tech": "AMOLED", "route": "智能手机面板", "routeStatus": "↓受阻", "content": "据OLED-Info 5月13日援引UBI Research数据，2026年Q1全球OLED智能手机面板出货1.9亿片，同比下降12%。其中两家韩企合计下滑7%，而京东方、维信诺、天马、TCL华星四家中国厂商降幅更达17%，反映中国OLED在手机端面临更大需求压力。", "reason": "UBI数据印证OLED手机面板短期承压，中国厂商降幅更深，凸显产能出清与结构升级的必要性。", "source": "OLED-Info/UBI Research", "url": "https://www.oled-info.com/ubi-oled-smartphone-shipments-declined-12-q1-2026-190-million-panels", "image": "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=1200&q=80&auto=format&fit=crop", "imageCaption": "OLED 智能手机面板（示意）", "date": "2026-05-13", "priority": "flash"}], "routes": [{"name": "折叠OLED", "status": "↑突破", "note": "苹果折叠iPhone备货1000万台，三星A4线$2.5B扩产，Counterpoint预测面板出货+24%/收入+48%"}, {"name": "AMOLED", "status": "→稳定", "note": "BOE在三星S27旗舰失利但华星获1500万中端订单，B16量产爬坡中，韩系维持高端主导；8.6代IT OLED产能竞赛开跑"}, {"name": "LCD面板", "status": "↓受阻", "note": "7月TV面板价格全线转跌，稼动率压至80%，Q3处调整期；三星以micro RGB LCD高端化应对"}, {"name": "QD-OLED", "status": "↑突破", "note": "ETRI单基板工艺有望降本提分辨率，三星显示QD-OLED路线或迎新突破"}, {"name": "OLED材料", "status": "↑突破", "note": "LORDIN公开蓝光磷光Pt掺杂材料分子结构，蓝光效率瓶颈出现商业化曙光"}, {"name": "Micro LED", "status": "→稳定", "note": "友达新设创新研究院聚焦Micro LED/CPO/AR，面板厂跨界AI算力路线分化"}, {"name": "面板供应链", "status": "↓受阻", "note": "京东方/天马1260H清单6/30生效，地缘政治风险向面板供应链传导"}, {"name": "智能手机面板", "status": "↓受阻", "note": "Omdia/UBI均预警2026年AMOLED手机面板出货下滑，中国厂商降幅更深"}], "sources": ["日经亚洲", "IT之家", "洛图科技(RUNTO)", "TrendForce", "Digitimes", "OLED-Info", "FlatpanelsHD", "京东方公告", "惠科官方", "流媒体网", "财联社", "华夏时报", "Omdia", "UBI Research"]}, "2026-07-07": {"schema": "display-news-daily/v1", "date": "2026-07-07", "weekday": "周二", "summary": "TrendForce发布7月电视面板全线下跌预测（65吋↓3美元），OLED笔电面板Q2出货同比暴增69%（Sigmaintell），三星显示A4线$2.5B扩产细节曝光，苹果折叠iPhone备货700-800万台（郭明錤），海信/TCL 2026电视上市搭载RGB-miniLED/SQD-miniLED，LORDIN公开ZETPLEX蓝色磷光掺杂剂分子结构；新增：三星显示8.6代IT OLED产线拟7月全面量产主攻MacBook Pro，三星S99H/S95H QD-OLED电视评测出炉，OFweek指柔性AMOLED需求疲软叠加涨价、产业结构性换血，Omdia称中国厂SID 2026展示无痕折叠屏，LEDinside梳理京东方/华星/维信诺等大厂OLED研判。", "focus": "电视面板价格7月承压转跌，OLED笔电需求持续高增，8.6代IT OLED产能竞赛，折叠屏与材料端活跃", "news": [{"id": "disp-001", "title": "TrendForce：7月电视面板价格全线转跌，65吋降3美元至174美元", "keywords": ["面板价格", "TrendForce", "LCD", "电视面板"], "tech": "LCD面板价格", "route": "面板价格周期", "routeStatus": "↓受阻", "content": "据TrendForce集邦咨询《2026面板价格预测月度报告》最新数据，7月电视面板价格整体转跌：65吋均价174美元（↓3美元/-1.7%），55吋均价124美元（↓2美元/-1.6%），43吋均价64美元（↓2美元/-3.0%），32吋均价36美元（↓1美元/-2.7%）。显示器面板（27吋IPS均价63.6美元）和笔电面板各尺寸则预期持平。TrendForce未明确说明下跌原因，但此前Omdia在6月中旬报告显示2026年全球面板需求下调，单位需求预计同比下降6%。", "reason": "逐月追踪面板价格的权威数据更新，反应LCD TV面板供需关系的转折信号", "source": "TrendForce集邦咨询", "url": "https://www.eet-china.com/mp/a507727.html", "image": "https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=1200&q=80&auto=format&fit=crop", "imageCaption": "电视面板生产线（示意）", "date": "2026-07-06", "priority": "featured"}, {"id": "disp-002", "title": "Sigmaintell：Q2 OLED笔电面板出货达420万片同比增69%，2030年市占率预计达19%", "keywords": ["OLED笔电", "Sigmaintell", "笔记本电脑", "面板出货"], "tech": "OLED笔电面板", "route": "OLED笔电渗透率", "routeStatus": "↑突破", "content": "据Sigmaintell数据，2026年Q1全球OLED笔电面板出货达360万片（同比+69%），Q2继续攀升至420万片。中国游戏本市场需求尽管整体下滑，但OLED游戏本面板出货却在加速增长。Sigmaintell认为OLED笔电面板需求并非短期趋势，将持续增长，预计2030年市占率将达19%。", "reason": "OLED在笔电市场的渗透加速是面板行业中期重要趋势", "source": "OLED-Info / Sigmaintell", "url": "https://www.oled-info.com/sigmaintell-demand-oled-laptop-panels-increasing-sharply-market-share-reach-19", "image": "https://images.unsplash.com/photo-1530124566582-a618bc2615dc?w=1200&q=80&auto=format&fit=crop", "imageCaption": "OLED 笔记本电脑", "date": "2026-07-06", "priority": "featured"}, {"id": "disp-003", "title": "三星显示A4线$2.5B扩产柔性OLED详细计划曝光，月产能15K", "keywords": ["三星显示", "柔性OLED", "A4线", "产能扩张"], "tech": "柔性OLED", "route": "柔性OLED产能", "routeStatus": "→稳定", "content": "三星显示已正式确认在韩国牙山扩产柔性OLED产线（A4线），投资约25亿美元，月产能规划15K片。该计划是韩国政府建设下一代显示与半导体生产集群的一部分。扩产重点针对折叠手机用的柔性OLED面板，预计主要供应三星电子及潜在外部客户。", "reason": "显示面板行业领先投资动向，影响柔性OLED供需格局", "source": "OLED-Info / 韩国媒体", "url": "https://www.oled-info.com/more-details-emerge-sdcs-25-billion-flexible-oled-expansion-plan-asan", "image": "https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=1200&q=80&auto=format&fit=crop", "imageCaption": "柔性OLED生产车间（示意）", "date": "2026-07-02", "priority": "secondary"}, {"id": "disp-004", "title": "LORDIN公开ZETPLEX蓝色磷光Pt掺杂剂分子结构，已开始送样", "keywords": ["LORDIN", "ZETPLEX", "磷光材料", "蓝色OLED", "Pt掺杂剂"], "tech": "OLED磷光材料", "route": "蓝色磷光材料", "routeStatus": "↑突破", "content": "LORDIN首次公开其ZETPLEX铂（Pt）掺杂剂的分子结构，相关成果发表在同行评审期刊。该公司表示该材料结构可简化蒸镀工艺并提升器件寿命。ZETPLEX已开始向客户发送评估样品。蓝色磷光材料的突破是OLED行业长期关注的重点方向。", "reason": "蓝色磷光材料是OLED效率与寿命的关键瓶颈，该进展有产业价值", "source": "OLED-Info / LORDIN", "url": "https://www.oled-info.com/lordin-discloses-molecular-structure-its-zetplex-blue-phosphorescent-pt-dopant", "image": "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=1200&q=80&auto=format&fit=crop", "imageCaption": "OLED材料分子结构（示意）", "date": "2026-07-03", "priority": "secondary"}, {"id": "disp-005", "title": "郭明錤：苹果折叠iPhone备货700-800万台，或步iPhone X后尘同期发布延迟发售", "keywords": ["苹果", "折叠iPhone", "郭明錤", "备货量", "供应"], "tech": "可折叠OLED", "route": "折叠屏iPhone", "routeStatus": "→稳定", "content": "天风国际分析师郭明錤指出，苹果折叠iPhone可能面临与2017年iPhone X类似的市场策略——与其他机型同步发布但延迟开售，初期供应紧张或将持续至年末。产业调研预计2026年下半年备货700万至800万台。面板供应商方面，据此前韩媒报道，三星显示和LG Display已启动iPhone 18 Pro系列及折叠iPhone面板量产，京东方未获得此次订单。", "reason": "苹果首款折叠屏是2026年消费电子最大期待之一，供应链格局直接影响面板厂", "source": "ITBear / 郭明錤", "url": "https://www.itbear.com.cn/html/2026-07/1429447.html", "image": "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=1200&q=80&auto=format&fit=crop", "imageCaption": "折叠屏手机（示意）", "date": "2026-07-07", "priority": "secondary"}, {"id": "disp-006", "title": "海信2026电视上市：RGB-miniLED技术主打性价比", "keywords": ["海信", "RGB-miniLED", "电视", "2026"], "tech": "RGB-miniLED", "route": "miniLED背光技术", "routeStatus": "→稳定", "content": "海信2026款电视现已上市，主打RGB-miniLED技术，定位价格实惠的LCD电视。RGB-miniLED相比传统miniLED可提高色彩表现和亮度效率，是LCD电视在OLED竞争中的关键技术路线。旗舰型号UR9S和UR8S均采用RGB-miniLED背光，分区数量决定画质；尺寸覆盖55-100吋。", "reason": "RGB-miniLED是LCD电视对抗OLED的重要技术路线，主流品牌齐推", "source": "FlatpanelsHD / DisplaySpecifications", "url": "https://www.flatpanelshd.com/news.php?subaction=showfull&id=1783312512", "image": "https://images.unsplash.com/photo-1593508512255-86ab42a8e620?w=1200&q=80&auto=format&fit=crop", "imageCaption": "MiniLED 电视产品（示意）", "date": "2026-07-06", "priority": "secondary"}, {"id": "disp-007", "title": "TCL 2026电视发布：SQD-miniLED和RGB LED双线并进", "keywords": ["TCL", "SQD-miniLED", "RGB LED", "miniLED", "电视"], "tech": "miniLED/量子点", "route": "miniLED背光技术", "routeStatus": "→稳定", "content": "TCL推出2026款电视系列，包含SQD-miniLED和RGB LED两个技术路线，均搭载Google TV，主打更便宜的miniLED LCD电视。SQD-miniLED推测为结合量子点技术的miniLED方案，进一步拉低miniLED电视价格门槛。旗舰X11L采用SQD-miniLED，RM9L和RM7L采用RGB LED。", "reason": "TCL和海信同步发力miniLED路线，反映LCD电视阵营的技术竞争策略", "source": "FlatpanelsHD", "url": "https://www.flatpanelshd.com/news.php?subaction=showfull&id=1783070544", "image": "https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=1200&q=80&auto=format&fit=crop", "imageCaption": "MiniLED 电视产品（示意）", "date": "2026-07-03", "priority": "secondary"}, {"id": "disp-008", "title": "苹果计划下一代OLED产品采用BT.2020色域标准", "keywords": ["苹果", "BT.2020", "色域", "OLED"] ms宣布开发下一代OLED量产设备。第一个系统是等离子体原子层沉积（PeALD）系统，用于高迁移率金属氧化物（HMO）背板的沉积。HMO被业界视为下一代OLED背板的有力候选，相比传统IGZO可实现更高迁移率和更优电学性能。AP Systems还在开发用于光学透明粘接树脂（OCR）沉积的喷墨打印机——OCR目前主要用于OLED模组贴合，尚未被喷墨工艺替代，AP Systems希望其打印机可降低OLED模组制造成本。据OLED-Info 7月7日报道。", "reason": "HMO背板和喷墨OCR都是OLED制造工艺的潜在突破方向", "source": "OLED-Info / AP Systems", "url": "https://www.oled-info.com/ap-systems-sees-demand-next-gen-oled-processes-develops-ald-systems-hmo", "image": "https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=1200&q=80&auto=format&fit=crop", "imageCaption": "OLED生产设备车间（示意）", "date": "2026-07-07", "priority": "featured"}, {"id": "disp-003", "title": "Summer Sprout OLED材料商拟科创板IPO，融资6000万元加速研发", "keywords": ["Summer Sprout", "OLED材料", "IPO", "科创板"], "tech": "OLED材料", "route": "OLED材料国产化", "routeStatus": "→稳定", "content": "中国OLED材料开发商和生产商Summer Sprout Technology已向上海证券交易所提交科创板IPO申请并获正式受理。公司计划发行4900万股，融资6亿元人民币（约8820万美元），资金将用于扩建OLED材料研发生产中心、新建北京总部及新研发中心。据OLED-Info 7月7日报道。", "reason": "OLED材料国产化进程加速，资本市场对上游材料关注度提升", "source": "OLED-Info / Summer Sprout", "url": "https://www.oled-info.com/summer-sprout-plans-ipo-shanghai-stock-exchange-and-raise-88-million-accelerate", "image": "https://images.unsplash.com/photo-1593305841991-05c297ba4575?w=1200&q=80&auto=format&fit=crop", "imageCaption": "OLED材料研发（示意）", "date": "2026-07-07", "priority": "secondary"}, {"id": "disp-004", "title": "Jilin OLED Material Tech H1业绩预告：利润暴增500-600%", "keywords": ["Jilin OLED Material", "业绩预告", "OLED材料", "利润增长"], "tech": "OLED材料供应链", "route": "OLED材料景气度", "routeStatus": "↑突破", "content": "吉林OLED材料科技发布2026年上半年业绩预告：H1净利润预计1.6-1.9亿元（约2300-2800万美元），较2025年H1的2700万元暴增500-600%；扣非净利润预计1.05-1.25亿元。据OLED-Info 7月6日报道。", "reason": "OLED材料厂商业绩高增反映下游OLED面板需求旺盛", "source": "OLED-Info / Jilin OLED Material Tech", "url": "https://www.oled-info.com/jilin-oled-material-tech-reports-sharp-increase-revenue-and-profit-first-half", "image": "https://images.unsplash.com/photo-1567521464027-f127ff144326?w=1200&q=80&auto=format&fit=crop", "imageCaption": "OLED材料生产", "date": "2026-07-06", "priority": "secondary"}, {"id": "disp-005", "title": "TrendForce：Q3显示器面板需求季减6.7%，价格进入盘整期", "keywords": ["显示器面板", "需求下滑", "TrendForce", "价格盘整"], "tech": "显示器面板价格", "route": "面板价格周期", "routeStatus": "↓受阻", "content": "TrendForce在7月面板价格报告中同时指出，进入7月后显示器面板需求出现减弱迹象，客户提前备货需求告一段落，Q3显示器面板需求预计季减6.7%。在需求松动且电视面板价格转弱的情况下，支撑Q2显示器面板价格上涨的因素减弱。但由于面板厂仍面临较高成本压力，预计7月显示器面板价格全面持平，买卖双方处于博弈状态。", "reason": "显示器面板从上涨进入盘整，预示下半年面板需求可能整体走弱", "source": "TrendForce集邦咨询", "url": "https://www.trendforce.cn/industry-news/displays/20260707-6215.html", "image": "https://images.unsplash.com/photo-1497366754035-f200968a6e72?w=1200&q=80&auto=format&fit=crop", "imageCaption": "显示器面板（示意）", "date": "2026-07-07", "priority": "secondary"}, {"id": "disp-006", "title": "Meta发布自研AI图像生成模型Muse Image：智能体式设计+网页检索+精确排版", "keywords": ["Meta", "Muse Image", "AI图像生成", "Instagram"], "tech": "AI图像生成与显示内容", "route": "AI x 显示生态", "routeStatus": "↑突破", "content": "Meta于7月7日正式发布自研AI图像生成模型Muse Image。不同于传统文生图模型直接文本映射像素，Muse Image具有智能体行为模式——生成前先制定构图方案，需要事实信息时检索网页保证准确性，并可在图像中渲染清晰可读的文本和二维码。Muse Image将接入Meta AI、Instagram、WhatsApp。同时Meta预览了Muse Video，面向创作者开放。该模型由Meta Superintelligence Labs（MSL）开发，是Meta摆脱依赖外部生成模型、建立自研AI生态的关键一步。", "reason": "AI图像生成能力的下放直接影响显示内容创作生态和广告制作流程", "source": "智通财经 / 腾讯新闻", "url": "https://new.qq.com/rain/a/20260708A016BU00", "image": "https://images.unsplash.com/photo-1551434678-e076c223a692?w=1200&q=80&auto=format&fit=crop", "imageCaption": "AI 图像生成内容", "date": "2026-07-07", "priority": "flash"}, {"id": "disp-007", "title": "LG C6 OLED电视部分尺寸搭载串联OLED面板，技术下放至中端", "keywords": ["LG", "C6", "串联OLED", "Tandem OLED", "WOLED"], "tech": "串联OLED / WOLED", "route": "OLED电视产品", "routeStatus": "→稳定", "content": "LG 2026款OLED电视C6系列已广泛上市，部分尺寸搭载了此前仅用于旗舰G系列的串联OLED（Tandem OLED）面板。串联OLED通过堆叠多层发光单元可在相同电流下获得更高亮度和更长寿命。据Omdia此前报告，LG显示的WOLED产能利用率在2026年有所回升。", "reason": "串联OLED技术向中端下放，标志该技术成熟度提升和成本优化", "source": "FlatpanelsHD", "url": "https://www.flatpanelshd.com/news.php?subaction=showfull&id=1782898865", "image": "https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=1200&q=80&auto=format&fit=crop", "imageCaption": "LG OLED TV 客厅（示意）", "date": "2026-07-01", "priority": "flash"}, {"id": "disp-008", "title": "8.6代OLED产能竞赛开跑：京东方率先量产，维信诺另辟蹊径", "keywords": ["8.6代", "OLED", "京东方", "维信诺", "产能竞赛"], "tech": "AMOLED Gen 8.6", "route": "OLED IT面板", "routeStatus": "↑突破", "content": "据《华夏时报》6月17日报道，全球8.6代OLED产能竞赛开跑：京东方成都线率先量产，三星显示7月跟进，TCL华星广州印刷OLED产线（t8）计划2027年投产，维信诺则走无FMM（ViP）差异化路线。洛图科技测算到2027年底全球8.6代OLED月产能将突破6万片基板，产业从\"韩企独大\"转向\"多技术路线并行\"。", "reason": "8.6代OLED是中美韩面板厂下一轮产能与工艺路线竞争的核心战场。", "source": "华夏时报/百度百家号", "url": "https://baijiahao.baidu.com/s?id=1868471821149861354", "image": "https://images.unsplash.com/photo-1581092160562-40aa08e78837?w=1200&q=80&auto=format&fit=crop", "imageCaption": "8.6 代 OLED 产线（示意）", "date": "2026-06-17", "priority": "secondary"}, {"id": "disp-009", "title": "TrendForce：1Q26 OLED显示器受QD-OLED供应带动，淡季仍增长", "keywords": ["TrendForce", "OLED显示器", "QD-OLED", "1Q26"], "tech": "OLED显示器面板", "route": "显示器面板", "routeStatus": "↑突破", "content": "TrendForce集邦咨询5月19日调查指出，2026年Q1正值OLED显示器产业淡季，加之前述促销旺季提前释放品牌动能，全球OLED显示器出货仍受QD-OLED面板供应改善带动实现增长，QD-OLED在高端显示器份额持续提升。", "reason": "OLED显示器在淡季逆势增长，QD-OLED供应释放是关键变量。", "source": "TrendForce集邦咨询", "url": "https://www.trendforce.cn/presscenter/news/20260519-13048.html", "image": "https://images.unsplash.com/photo-1461151304267-38535e780c79?w=1200&q=80&auto=format&fit=crop", "imageCaption": "OLED 显示器（示意）", "date": "2026-05-19", "priority": "secondary"}, {"id": "disp-010", "title": "DisplayDaily：2026显示业进入中韩双寡头，OLED成增长引擎", "keywords": ["DisplayDaily", "显示产业", "中韩双寡头", "OLED"], "tech": "显示产业", "route": "产业格局", "routeStatus": "→稳定", "content": "Display Daily 2月9日刊文指出，2026年Q1全球显示产业进入\"中国+韩国\"结构化双寡头格局，在成本压力下LCD产能纪律增强；Omdia数据显示OLED单元出货同比+6.1%、面积+10.6%，即便在整体平板市场走弱下OLED仍持续扩大份额。", "reason": "行业权威对2026显示格局的定调，OLED是唯一的份额增长引擎。", "source": "Display Daily", "url": "https://displaydaily.com/state-of-the-display-industry-q1-2026/", "image": "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=1200&q=80&auto=format&fit=crop", "imageCaption": "显示产业格局（示意）", "date": "2026-02-09", "priority": "secondary"}, {"id": "disp-011", "title": "维信诺ViP无FMM OLED随荣耀穿戴产品实现量产出货", "keywords": ["维信诺", "ViP", "无FMM", "荣耀", "量产"], "tech": "无FMM光刻OLED(ViP)", "route": "OLED工艺", "routeStatus": "↑突破", "content": "据IT之家4月13日报道，维信诺（Visionox）宣布其ViP（智能像素化）无FMM光刻OLED技术于2026年Q1随荣耀穿戴产品实现量产出货。ViP开口率从29%提升至69%、像素密度可达1700ppi、功耗降低38%，并可与Tandem叠层结合，是全球首条8.6代无FMM产线的技术底座。", "reason": "维信诺ViP量产落地是中国OLED绕开FMM\"卡脖子\"的关键突破，开辟高世代第三条技术路线。", "source": "IT之家/百度百家号", "url": "https://baijiahao.baidu.com/s?id=1862316854934804434", "image": "https://images.unsplash.com/photo-1593305841991-05c297ba4575?w=1200&q=80&auto=format&fit=crop", "imageCaption": "ViP 无 FMM OLED（示意）", "date": "2026-04-13", "priority": "flash"}, {"id": "disp-012", "title": "TCL华星8.6代印刷OLED产线(t8)一期项目封顶", "keywords": ["TCL华星", "印刷OLED", "t8", "8.6代", "封顶"], "tech": "印刷OLED Gen 8.6", "route": "印刷OLED", "routeStatus": "↑突破", "content": "据EET-China 5月8日报道，TCL华星第8.6代印刷OLED生产线一期项目（t8）正式封顶，主厂房主体结构完成、洁净工程同步启动，系全球首条印刷OLED G8.6代产线。项目总投资295亿元，聚焦笔记本、显示器、平板与车载等中尺寸高端显示。", "reason": "印刷OLED被视为降低大尺寸OLED成本的关键路线，t8封顶标志产业化迈出实质一步。", "source": "EET-China", "url": "https://www.eet-china.com/mp/a493609.html", "image": "https://images.unsplash.com/photo-1567521464027-f127ff144326?w=1200&q=80&auto=format&fit=crop", "imageCaption": "印刷 OLED 产线（示意）", "date": "2026-05-08", "priority": "flash"}, {"id": "disp-013", "title": "京东方精电投资者日发布四大车载显示前沿技术", "keywords": ["京东方精电", "车载显示", "UB Cell", "智能座舱"], "tech": "车载显示", "route": "车载显示", "routeStatus": "↑突破", "content": "据京东方精电7月6日投资者日材料，公司集中展示四大车载显示前沿技术，包括首发UB Cell核心显示技术的超薄极窄车载主屏整机，在画质与轻薄上实现双重升级，面向智能座舱多屏化、大屏化趋势。", "reason": "车载显示是面板厂继IT OLED后又一高增长赛道，京东方精电的技术发布反映中国厂商在车载屏的领先布局。", "source": "京东方精电", "url": "https://www.boevx.com/RessReleasesPDF/news06072026c.pdf", "image": "https://images.unsplash.com/photo-1497366754035-f200968a6e72?w=1200&q=   const PAPER_DATA = {"2026-07-06": {"schema": "display-paper-daily/v1", "date": "2026-07-06", "weekday": "周一", "summary": "7月6日两篇面板显示论文聚焦下一代显示材料与架构：Nature 报道像素化钙钛矿量子点超晶格 LED（5080 ppi、EQE 30.9%、操作半寿命破万小时），Nature Communications 展示 1T-1FeMFET 柔性有源矩阵微LED（428 PPI、0.68 nW 超低动态功耗、可弯 10^5 次）。", "focus": "量子点超晶格像素化技术、铁电晶体管驱动的柔性微显示架构", "highlights": ["钙钛矿量子点超晶格实现 5080 ppi 与 12,411 小时 T50，像素化 PeQD LED 寿命较前代提升超 1000 倍", "1T-1FeMFET 让单晶体管兼具驱动与存储，突破像素电路的面积/功耗缩放极限"], "papers": [{"id": "paper-001", "title": "Pixelated quantum-dot superlattice LEDs", "authors": "Chengxi Zhang, Qingsen Zeng, Hui Li, Renjun Guo, Yue Yu, Linjie Dai, Lyudmila Turyanska, Zirui Liu, Jun Dai, Yingguo Yang, Yue Zhao, Jun Lu, Lin Wang, Lingmei Kong, Tze Chien Sum, Yuchen Wu, Tae-Woo Lee, Xuyong Yang (通讯作者)", "field": "面板显示", "paperType": "期刊论文", "venue": "Nature, Vol 652, pp. 1173-1180, 2026", "oneLiner": "报道可规模化像素化钙钛矿量子点超晶格 LED，EQE 30.9%、最高 5080 ppi、操作半寿命超 1.2 万小时", "abstract": "本研究提出一种可规模化制备像素化钙钛矿量子点（PeQD）超晶格薄膜阵列的策略：通过配体–氟化物共稳定化菱形十二面体 CsPbBr₃ 纳米晶，并利用毛细液桥限域组装形成面内长程有序、垂直限域且空间图案精确的六方密堆超晶格。将其集成于 LED 后实现 30.9% 的外量子效率、117,144 cd/m² 的高亮度与最高 5,080 ppi 的像素密度。在商用 TFT 背板上构建了 1.85 英寸主动矩阵显示面板，其操作半寿命（T50）达 12,411 小时，比以往像素化 PeQD LED 长 1,000 倍以上。", "content": "论文的核心突破在于解决了像素化钙钛矿量子点 LED 长期面临的稳定性与图案化难题。传统像素化 PeQD LED 因配体易脱附、长程有序性差而寿命极短，难以实用。团队采用 BHOA+F 配体–氟化物共稳定策略，在（200）/（020）/（112）晶面形成最强结合能，抑制配体脱附；再通过毛细液桥限域自组装获得长程相干的超晶格薄膜（SAED 证实）。该结构兼具面内长程有序与垂直限域，使器件在 100 cd/m² 测试条件下 T50 达到 12,411 小时。演示的 1.85 英寸主动矩阵面板支持全灰度控制与视频播放，证明该技术具备量产化潜力。", "techIntro": "钙钛矿量子点（PQD / PeQD）因其高色纯度、可调发光波长与溶液加工性，被视为下一代显示（尤其 Micro-LED 色转换与自发光像素）的理想发光材料。但将 PeQD 做成可寻址的离散像素长期受困于两点：一是钙钛矿晶格本征不稳定，配体在图案化与电场应力下易脱附导致失效；二是难以在像素尺度实现长程有序排列。像素化方案通常依赖光刻、转印或喷墨打印，分辨率与均匀性难以兼得。超晶格（自组装长程有序纳米晶阵列）思路通过控制成核与限域组装，有望同时解决有序性与稳定性，是 2025–2026 年显示材料领域的研究热点。", "techTags": ["钙钛矿量子点", "超晶格", "Micro-LED", "QD-LED", "像素化", "外量子效率", "Nature"], "metrics": [{"name": "外量子效率 (EQE)", "value": "30.9", "unit": "%", "note": "像素化 PeQD LED"}, {"name": "发光亮度", "value": "117144", "unit": "cd/m²", "note": ""}, {"name": "像素密度", "value": "5080", "unit": "ppi", "note": "最高像素密度"}, {"name": "操作半寿命 (T50)", "value": "12411", "unit": "小时", "note": "100 cd/m² 下，较前代提升 >1000 倍"}, {"name": "演示面板尺寸", "value": "1.85", "unit": "英寸", "note": "商用 TFT 背板主动矩阵"}], "attachments": [{"name": "论文原文", "url": "https://www.nature.com/articles/s41586-026-10392-z", "label": "Nature 全文", "cached": false}], "source": "Nature", "url": "https://www.nature.com/articles/s41586-026-10392-z", "image": "https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200&q=80&auto=format&fit=crop", "imageCaption": "像素化钙钛矿量子点超晶格 LED（示意）", "date": "2026-04-15"}, {"id": "paper-002", "title": "Flexible active-matrix micro-LED display with 1T-1FeMFET architecture featuring scaling-limit-free design", "authors": "Tingrui Huang, Guangan Yang, Yimeng Sang, Fulin Zhuo, Mingming Liu, Gengyu Li, Heng Cheng, Zuoxu Yu, Zhiyuan Fu, Siyang Liu, Haoliang Shen, Zhihao Yu, Bin Liu, Xinran Wang, Wangran Wu, Runxiao Shi, Zhe Zhuang（南京大学微电子与光电子团队）", "field": "面板显示", "paperType": "期刊论文", "venue": "Nature Communications, Vol 17, Article 4628, 2026", "oneLiner": "1T-1FeMFET 架构柔性有源矩阵微LED：428 PPI、0.68 nW 动态功耗、可弯 10^5 次", "abstract": "本研究展示一种基于 1T-1FeMFET（单晶体管–铁电金属场效应晶体管）架构的柔性有源矩阵微LED显示器：在 400°C 以下的聚酰亚胺衬底上集成铪基铁电电容与氧化铟锡（ITO）沟道，单器件同时充当驱动与存储元件，突破了传统像素电路的面积与功耗缩放限制。成果实现 428 PPI 分辨率、0.68 nW 超低动态功耗、半径 4 mm 弯折 10^5 次无退化的鲁棒柔性，以及 200 kHz 刷新率下的精确灰度控制。", "content": "该工作的创新点是用单个 FeMFET 同时完成「驱动 + 存储」两个功能，从而绕开传统 2T1C / 多晶体管像素电路的面积瓶颈。铁电电容（FeCAP）采用铪基材料，剩余极化 2Pr=47 μC/cm²、面积仅 9 μm²、在 3 V / 125 kHz 下 endurance > 10^8 次；FeMFET 记忆窗口达 0.63 V/nm（7.5 V 绝对值），为同类纪录。ITO 沟道场效应迁移率 30 cm²V⁻¹s⁻¹、开关比 4×10⁸，整体工艺温度 < 400°C（兼容聚酰亚胺柔性衬底）。实测 428 PPI 微LED 阵列，通过 DTCO（设计–技术协同优化）缩放预测可达 > 4280 PPI，为可穿戴与便携显示提供新方案。", "techIntro": "有源矩阵微LED（AM μLED）显示通常由 TFT 背板逐像素驱动，每像素需 2 晶体管 1 电容（2T1C）或更复杂的电路来存灰阶与驱动电流；随像素缩小，电路面积占比升高、漏电与功耗成为瓶颈。铁电场效应晶体管（FeFET / FeMFET）将铁电电容与晶体管沟道耦合，利用其非易失极化态存储灰阶，从而把「驱动」和「存储」合一。铪基铁电（HfO₂ 掺杂）因与 CMOS 工艺兼容、可低温成膜，是柔性、低温背板的理想选择。本工作将 ITO 这种透明氧化物半导体与铪基铁电结合，兼顾透明、柔性与存储功能。", "techTags": ["柔性显示", "微LED", "铁电场效应晶体管", "FeMFET", "有源矩阵", "ITO", "Nature Communications"], "metrics": [{"name": "分辨率", "value": "428", "unit": "ppi", "note": "当前器件；DTCO 预测 >4280 ppi"}, {"name": "动态功耗", "value": "0.68", "unit": "nW", "note": "实测；缩放后预测 6.8 pW"}, {"name": "机械弯曲", "value": "1E5", "unit": "次", "note": "半径 4 mm 弯折无退化"}, {"name": "像素刷新率", "value": "200", "unit": "kHz", "note": "支持 90 Hz @ 4K"}, {"name": "铁电电容剩余极化 (2Pr)", "value": "47", "unit": "μC/cm²", "note": "唤醒后，面积仅 9 μm²"}, {"name": "工艺温度", "value": "<400", "unit": "°C", "note": "聚酰亚胺柔性衬底"}], "attachments": [{"name": "论文原文", "url": "https://www.nature.com/articles/s41467-026-71182-9", "label": "Nature Communications 全文", "cached": false}], "source": "Nature Communications", "url": "https://www.nature.com/articles/s41467-026-71182-9", "image": "https://images.unsplash.com/photo-1488590528505-98d2b5aba04b?w=1200&q=80&auto=format&fit=crop", "imageCaption": "1T-1FeMFET 柔性微LED 像素架构（示意）", "date": "2026-03-31"}]}, "2026-07-07": {"schema": "display-paper-daily/v1", "date": "2026-07-07", "weekday": "周二", "summary": "7月7日三篇面板显示领域重要论文：京东方提出AI替代几何光学仿真模型（1000%速度提升，>99%精度），Sony推出Isolated Pixel新像素结构实现0.44英寸4980ppi微显示，ETH Zurich开发双向傅里叶像素实现光控制与分析合一。", "focus": "AI深度融入显示设计流程、超高分辨率微显示结构创新、像素功能从单向发光走向双向光控", "highlights": ["AI替代传统光学仿真的工业级验证——1000倍加速意味着设计周期从天级缩至分钟级", "Sony 4980ppi新像素结构采用光刻+干法刻蚀隔离像素，消除子像素间漏光", "ETH Fourier像素将显示与传感合二为一，为下一代交互显示奠基"], "papers": [{"id": "paper-001", "title": "Enabling Next-Generation OLEDs: A Revolutionary AI-Driven Model for Geometric Optical Design", "authors": "Bo Shi, Yinglong Huang, Jianji Fu, Yuanhao Tan, Yang Su, Zhiqing Li, Rong Zhang, Senbao Jiang, Xiuwen Shi, Xiaojun Tang, Kening Zheng, Guoqiang Tang, Haijun Qiu (BOE OLED Division R&D Center)", "field": "面板显示", "paperType": "期刊论文", "venue": "Journal of the Society for Information Display, Vol 34, Issue 5, pp. 309-320, May 2026", "oneLiner": "京东方提出AI替代传统几何光学仿真模型，实现>1000%速度提升同时保持>99%预测精度", "abstract": "OLED面板设计严重依赖几何光学仿真来指导设计选择和预测光学行为。本研究提出一种变革性的AI模型作为传统几何光学仿真的替代（surrogate）。该模型在保持>99%预测精度的同时实现超过1000%的评估速度提升，从而能够近乎实时地进行性能评估。这一突破使得大规模设计空间的快速探索成为可能，大幅加速OLED技术创新。数据可从通信作者索取。", "content": "本文核心贡献是训练了一个深度学习代理模型（surrogate model），用于替代传统的基于光线追踪的几何光学仿真。传统仿真每一次设计迭代可能需要数小时到数天，而AI模型可以在毫秒级输出结果。团队来自京东方OLED研发中心，验证了模型在多种OLED器件结构（包括顶发射、底发射、微腔结构）上的泛化能力。模型预测精度>99%意味着可直接用于设计空间的初筛和趋势判断，大幅缩短开发周期。这是SID JSID期刊2026年5月发表的工作。", "techIntro": "OLED面板的光学设计通常涉及多层薄膜干涉效应的精确模拟，需要综合考虑有机发光层各层厚度、折射率分布、微腔效应、出光耦合等复杂因素。传统方法使用光线追踪或传输矩阵法求解麦克斯韦方程组，虽然精度高但计算量巨大，每次参数调整都需要重新计算。AI代理模型通过学习大量仿真数据的输入-输出映射关系，可以在不牺牲精度的情况下实现近乎即时的预测。这项工作的意义在于首次在工业级OLED设计中验证了AI代理模型的实用性。", "techTags": ["OLED光学设计", "AI代理模型", "几何光学仿真", "深度学习", "BOE", "微腔效应"], "metrics": [{"name": "模型评估速度提升", "value": ">1000", "unit": "%", "note": "相比传统几何光学仿真"}, {"name": "预测精度", "value": ">99", "unit": "%", "note": "AI模型 vs 传统仿真结果"}, {"name": "期刊卷期", "value": "Vol 34, Issue 5", "unit": "", "note": "2026年5月"}, {"name": "页码范围", "value": "309-320", "unit": "页", "note": ""}], "attachments": [{"name": "论文原文", "url": "https://sid.onlinelibrary.wiley.com/doi/10.1002/jsid.70062", "label": "JSID全文", "cached": false}], "source": "Journal of the SID", "url": "https://sid.onlinelibrary.wiley.com/doi/10.1002/jsid.70062", "image": "https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=1200&q=80&auto=format&fit=crop", "imageCaption": "AI + OLED 光学设计示意", "date": "2026-05-01"}, {"id": "paper-002", "title": "A New Pixel Structure for High-Resolution OLED Microdisplays, Enhancing Efficiency and Color Gamut Using Patterned OLEDs and Aligned Light Guides", "authors": "Masaya Ogura, Naoya Kasahara, Jun Yoshida, Naohiro Kadoguchi, Naoto Oda, Toshiaki Shiraiwa, Kosuke Homma, Takayoshi Kato, Tomoaki Sawabe, Kenichi Aoyagi (Sony Semiconductor Solutions)", "field": "面板显示", "paperType": "期刊论文", "venue": "Journal of the Society for Information Display, Vol 34, Issue 5, pp. 247-253, May 2026", "oneLiner": "Sony提出'Isolated Pixel'新结构，通过光刻+干法刻蚀隔离像素，实现0.44英寸4980ppi微显示", "abstract": "我们提出一种名为'Isolated Pixel'的新型OLED像素结构，用于超精细像素阵列。该结构通过抑制像素间漏电流并引入自对准光导来改善光提取，从而提升色域和发光效率。具体工艺为：通过光刻和干法刻蚀将OLED和钝化层隔离，然后用SiN和低折射率材料的透明材料堆叠填充像素间空间。Isolated Pixel结构制造后未观察到光学和电学特性退化。原型面板（0.44英寸，4980ppi，DCI-P3 95%，最大亮度10,000cd/m²）展示了优越的画质——色彩再现性和发光效率均有提升。", "content": "Sony Semiconductor Solutions团队提出的Isolated Pixel结构解决了超高分辨率微显示中的关键问题：当像素尺寸缩小到微米级时，相邻像素间的电流泄漏和光学串扰严重劣化画质。传统方法依赖彩色滤光片（CF）方案，但存在光吸收导致的效率损失。Sony的解决方案是将每个OLED子像素通过光刻和干法刻蚀物理隔离，然后在间隙填充由SiN（高折射率）和低折射率材料组成的透明波导结构。这种自对准光导将波导出的光导向像素正上方，既提高了光提取效率，又消除了相邻像素间的颜色串扰。原型规格：0.44英寸对角线，4980ppi分辨率，DCI-P3色域覆盖率95%，最大亮度10,000cd/m²。", "techIntro": "OLED微显示是AR/VR/XR眼镜的核心显示元件，其核心挑战是在极小尺寸（<1英寸）内实现超高分辨率（>3000ppi）和高亮度（>5000cd/m²）。随像素尺寸缩小到几微米量级，相邻像素间的电流横向扩散和光学串扰成为主要画质劣化因素。传统CF（彩色滤光片）+WOLED方案虽然可以规避精细图案化难题，但彩色滤光片会吸收约70%的光，效率极低。RGB并排排列（side-by-side）通过FMM蒸镀是高端方案，但高分辨率下FMM对位精度和开口率成为瓶颈。Sony的Isolated Pixel方案采用光刻工艺实现亚微米级图案化精度，结合自对准光导结构在提高分辨率的同时保证了光效率。", "techTags": ["OLED微显示", "Isolated Pixel", "高分辨率", "光刻工艺", "Sony", "AR/VR", "光导"], "metrics": [{"name": "显示尺寸", "value": "0.44", "unit": "英寸", "note": ""}, {"name": "分辨率", "value": "4980", "unit": "ppi", "note": "每英寸像素数"}, {"name": "色域覆盖", "value": "95", "unit": "%", "note": "DCI-P3标准"}, {"name": "最大亮度", "value": "10000", "unit": "cd/m²", "note": ""}, {"name": "期刊卷期", "value": "Vol 34, Issue 5", "unit": "", "note": "2026年5月"}, {"name": "页码范围", "value": "247-253", "unit": "页", "note": ""}], "attachments": [{"name": "论文原文", "url": "https://sid.onlinelibrary.wiley.com/doi/10.1002/jsid.70076", "label": "JSID全文", "cached": false}], "source": "Journal of the SID", "url": "https://sid.onlinelibrary.wiley.com/doi/10.1002/jsid.70076", "image": "https://images.unsplash.com/photo-1530124566582-a618bc2615dc?w=1200&q=80&auto=format&fit=crop", "imageCaption": "Sony OLED 微显示像素结构（示意）", "date": "2026-05-01"}, {"id": "paper-003", "title": "Fourier pixels for bidirectional light control", "authors": "Y.M. Glauser, S.J.W. Vonk, D.B. Seda, et al. (ETH Zurich)", "field": "面板显示 / 光学", "paperType": "期刊论文", "venue": "Nature, Volume 655, pp. 87-92, 2026", "oneLiner": "ETH Zurich开发双向傅里叶像素，在同一像素上实现光控制（显示）和光分析（传感）功能", "abstract": "我们开发了能够同时控制和分析光的双向像素。该像素采用波状雕刻表面结构，可以控制和分析光强、振荡相位和偏振。在光控制方向，像素将入射光转换为沿芯片表面传播的表面波，再在像素内另一位置将表面波散射回空间中出射——通过光波干涉可创建图案和图像。在光分析方向，应用干涉和傅里叶分析的逆过程来分析光。由于像素的表面轮廓可通过傅里叶分析确定，振幅、相位和偏振的控制与分析可以在单个像素上结合。研究团队下一步计划制造由多个傅里叶像素组成的矩阵，以实现更复杂的器件。", "content": "ETH Zurich团队提出的Fourier像素的核心创新在于利用波状雕刻表面结构（通过计算设计的表面轮廓）实现双向光场调控。在显示模式下，入射光被转换为表面传播波，然后在像素另一位置被重新散射为特定形状的出射波——通过波前干涉生成所需图案。在传感模式下，光波与参考波叠加产生干涉条纹，通过相机捕捉条纹模式反演出入射光的相位信息。同样方法可用于分析偏振态。Nature论文标志着像素概念从纯粹的发光源向交互式光界面转变。", "techIntro": "传统显示像素仅为单向光发射器件（发光或调制背光），相机像素则为单向光接收器件。Fourier像素的概念打破了这一界限：同一物理结构可以同时完成光调制（显示）和光分析（成像/传感）两个任务。其物理原理基于傅里叶光学——任何光场都可以分解为不同空间频率的平面波的叠加。通过设计像素表面的亚波长结构（超表面/衍射光学元件），可以选择性地操控不同空间频率分量的振幅和相位。ETH团队使用「波状雕刻表面」实现这一功能，属于计算光学与显示技术的交叉领域。", "techTags": ["Fourier像素", "双向光控制", "计算光学", "超表面", "ETH Zurich", "Nature"], "metrics": [{"name": "期刊", "value": "Nature", "unit": "", "note": ""}, {"name": "卷数", "value": "655", "unit": "", "note": ""}, {"name": "页码范围", "value": "87-92", "unit": "页", "note": ""}, {"name": "发表年份", "value": "2026", "unit": "", "note": ""}], "attachments": [{"name": "Nature原文", "url": "https://doi.org/10.1038/s41586-026-10681-7", "label": "Nature全文", "cached": false}], "source": "Nature", "url": "https://doi.org/10.1038/s41586-026-10681-7", "image": "https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=1200&q=80&auto=format&fit=crop", "imageCaption": "傅里叶像素表面波结构（示意）", "date": "2026-06-01"}]}, "2026-07-08": {"schema": "display-paper-daily/v1", "date": "2026-07-08", "weekday": "周三", "summary": "7月8日两篇半导体器件论文：Nature Electronics 报道单片三维集成异构电子系统（石墨烯传感 + 2D CMOS 计算 + 硅光伏，纯环境光自供能，层间间距 50 nm）；arXiv 预印本通过基于物理的全能带 GaN HEMT 仿真给出 LO 声子寿命上限 ≲40 fs，揭示热声子瓶颈对饱和电流与峰值跨导的显著退化。", "focus": "三维异构集成（2D 材料 + 硅）、GaN 功率/射频器件中的非平衡声子物理", "highlights": ["M3D 集成将传感、计算、供能三层合一，层间间距缩至 50 nm，仅靠环境光即可运行", "GaN HEMT 热 LO 声子瓶颈使饱和电流与峰值跨导分别下降约 30% 与 60%，LO 声子寿命须 ≲40 fs"], "papers": [{"id": "paper-001", "title": "Monolithic three-dimensional integration of heterogeneous electronics for self-powered sensing and processing", "authors": "Subir Ghosh, Pranavram Venkatram, Harikrishnan Ravichandran, Rishikesh T. Nair, Yongwen Sun, Lei Ding, Chen Chen, Joan M. Redwing, Yang Yang, Saptarshi Das（通讯作者，宾夕法尼亚州立大学）", "field": "半导体", "paperType": "期刊论文", "venue": "Nature Electronics, 2026 (published 23 June 2026)", "oneLiner": "单片三维集成异构电子：石墨烯化学传感 + 2D CMOS 计算 + 硅光伏，全靠环境光自供能", "abstract": "该研究报道一种单片三维集成电路（M3D IC）：顶层堆叠石墨烯晶体管用于低功耗化学传感，中间层由 n 型单层二硫化钼（MoS₂）与 p 型双层二硒化钨（WSe₂）构成互补逻辑电路用于低功耗计算，底层为片上硅光伏模块用于收集环境光。整个系统仅依靠环境光运行，可区分不同化学溶液并生成对应数字代码，实现完全自持的感测与处理；同时展示了层间密集数据与功率通孔集成，并将层间分离缩小至 50 nm。", "content": "论文的核心是将三类异构功能层在单片工艺下垂直堆叠：底层的体硅光伏（Si PVM）把环境光转为电能，中间的 2D 材料（MoS₂ nFET / WSe₂ pFET）互补 CMOS 完成信号处理，顶层的石墨烯晶体管作为化学传感器。系统无需外部电池即可对溶液种类进行识别并输出数字编码，标志着「感–算–能」一体化的近零功耗边缘节点。关键工艺突破是层间通孔与 50 nm 的极小层间距——相比传统 3D 集成（层间距常为数百纳米到微米级）大幅缩短互连，降低寄生。2D CMOS 比较器 endurance 达 10⁸ 次，且制备后 13 个月特性几乎无漂移，晶圆级测试 100 个 MoS₂ 与 100 个 WSe₂ FET 显示良好均匀性。", "techIntro": "单片三维集成（Monolithic 3D, M3D）是在同一衬底上逐层制造、层间由高密度通孔互连的集成路线，相比通过键合（bonding）实现的 3D 封装，互连密度与延迟更优。难点在于上层工艺温度不能破坏下层器件——因此高温的单晶硅 CMOS 难以直接用于上层，而二维材料（TMDs，如 MoS₂、WSe₂）和石墨烯可低温转移/生长，成为上层晶体管的理想选择。将传感（石墨烯）、计算（2D CMOS）、供能（硅光伏）异构功能垂直集成，是面向物联网/边缘 AI 的「自供能智能像素」前沿方向。本工作由宾夕法尼亚州立大学 Saptarshi Das 团队完成，是该方向的代表性进展。", "techTags": ["单片三维集成", "M3D", "二维材料", "MoS2", "WSe2", "石墨烯", "自供能", "Nature Electronics"], "metrics": [{"name": "层间分离", "value": "50", "unit": "nm", "note": "层间通孔集成"}, {"name": "硅光伏开路电压 (Voc)", "value": "3.62", "unit": "V", "note": "制备 2D CMOS 前 Isc 2.5 μA"}, {"name": "比较器耐久", "value": "1E8", "unit": "次", "note": "2D CMOS，阈值漂移小"}, {"name": "晶圆级测试器件数", "value": "100+100", "unit": "个", "note": "MoS2 与 WSe2 FET 各 100"}, {"name": "系统稳定性", "value": "13", "unit": "个月", "note": "制备后特性重叠、漂移极小"}], "attachments": [{"name": "论文原文", "url": "https://www.nature.com/articles/s41928-026-01624-1", "label": "Nature Electronics 全文", "cached": false}], "source": "Nature Electronics", "url": "https://www.nature.com/articles/s41928-026-01624-1", "image": "https://images.unsplash.com/photo-1551434678-e076c223a692?w=1200&q=80&auto=format&fit=crop", "imageCaption": "单片三维异构集成电子（示意）", "date": "2026-06-23"}, {"id": "paper-002", "title": "Physics-based Full-band GaN High-Electron-Mobility Transistor Simulation Suggests Upper Bound of LO Phonon Lifetime", "authors": "Ankan Ghosh Dastider, Matt Grupen, Ashwin Tunga, Shaloo Rakheja（通讯作者，University of Illinois Urbana-Champaign）", "field": "半导体", "paperType": "期刊论文", "venue": "arXiv preprint, arXiv:2512.06226 [physics.app-ph], 2026", "oneLiner": "基于物理的全能带 GaN HEMT 仿真给出 LO 声子寿命上限 ≲40 fs，揭示热声子瓶颈", "abstract": "本研究通过基于物理的全能带 GaN 高电子迁移率晶体管（HEMT）仿真表明：为复现实测 I–V 特性，LO（纵光学）声子寿命必须 ≲ 40 fs，这与无栅 GaN 异质结构中观察到的超快衰减一致。即便在此短寿命下，热 LO 声子瓶颈仍使饱和电流与峰值跨导分别降低约 30% 与 60%；若寿命超过数十飞秒，则出现明显热声子瓶颈并与实验不符，说明块体 GaN 的长寿命在 HEMT 中并不现实。", "content": "论文建立了包含电子–LO 声子非平衡耦合的全能带（full-band）GaN HEMT 物理模型，栅长 0.1 μm、Al₀.₃₂Ga₀.₆₈N 势垒层 25 nm（栅下凹蚀后剩 13 nm）、LO 声子能量 92 meV。通过扫描 LO 声子寿命拟合实测 I–V，得到基准值 τ_LO = 30 fs（上限 ≲ 40 fs）；文献实验测得异质结构寿命为 30±15 fs 或 ≤ 50 fs，而块体 GaN 可达约 1 ps。在 τ_LO=30 fs 下，若将寿命降至 1 fs，漏极电流增加约 30%；完全忽略 LO 声子加热电流提升最高 50%，峰值跨导（g_m）在无 LO 加热时增加约 30%、全部声子加热消除时增加近 60%。结论指出：即便 LO 声子超快衰减，饱和电流与峰值跨导仍被热声子瓶颈降解约 30% 与 60%。温度分布上，V_GS=1 V、V_DS=10 V 时晶格约 390 K，而电子温度峰值达 2800 K，高场下 LO 声子温度超 1800 K。", "techIntro": "氮化镓高电子迁移率晶体管（GaN HEMT）是 5G/6G 射频功放与快充、车载电源等功率电子的核心器件，其二维电子气（2DEG）在栅下高场区载流子速度极快。当沟道电子被电场强烈加热时，会通过发射纵光学（LO）声子冷却；但若 LO 声子被加热后未能及时衰减（即「热声子瓶颈」），就会反过来抑制电子能量耗散，降低饱和电流与跨导。块体 GaN 中 LO 声子寿命可达 ~1 ps，但在异质结构（如 AlGaN/GaN）中因界面与掺杂影响会大幅缩短。该工作用自洽的全能带输运模型量化了这一现象，对 GaN 器件紧凑模型和可靠性设计有直接指导意义。", "techTags": ["GaN", "HEMT", "热声子瓶颈", "LO 声子", "功率器件", "射频器件", "器件仿真", "arXiv"], "metrics": [{"name": "LO 声子寿命上限", "value": "≲40", "unit": "fs", "note": "基准 τ_LO = 30 fs"}, {"name": "饱和电流退化", "value": "~30", "unit": "%", "note": "热 LO 声子瓶颈所致"}, {"name": "峰值跨导退化", "value": "~60", "unit": "%", "note": "热 LO 声子瓶颈所致"}, {"name": "电子温度峰值", "value": "2800", "unit": "K", "note": "V_GS=1 V, V_DS=10 V"}, {"name": "栅长", "value": "0.1", "unit": "μm", "note": "仿真器件"}], "attachments": [{"name": "论文预印本", "url": "https://arxiv.org/abs/2512.06226", "label": "arXiv 预印本", "cached": false}], "source": "arXiv", "url": "https://arxiv.org/abs/2512.06226", "image": "https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=1200&q=80&auto=format&fit=crop", "imageCaption": "GaN HEMT 器件与热声子效应（示意）", "date": "2026-01-09"}]}};
  const SEMICON_DATA = {"2026-07-06": {"schema": "semicon-news-daily/v1", "date": "2026-07-06", "weekday": "周一（汇总版）", "period": "07.03 – 07.06", "summary": "TSMC N2P GAA风险试产、三星3D DRAM原型、IMEC CFET PDK、ASML High-NA装机破30台；国内8英寸SiC与英飞凌长协、应用材料SiGe干法刻蚀、英飞凌300mm GaN量产。新增：杭州Garen建成全球首条6/8英寸兼容GaN量产线，Intel 18A-P（RibbonFET+PowerVia）细节披露，ECTC 2026聚焦HBM4/CoWoS封装与微流控冷却、光互连。", "focus": "先进制程 / GAA / CFET / 3D DRAM / High-NA EUV / SiC·GaN宽禁带 / 背面供电 / 先进封装", "highlights": ["TSMC N2P 风险试产 Q3 启动，GAA 晶体管密度 270 MTr/mm²，比 N3 提升 15%", "三星 VLSI 2026 展示 3D DRAM 原型，32 层 stacked FET，等效密度 48 Gb/mm²", "IMEC 发布 sub-2nm CFET 标准单元设计套件，0.018 µm² 6T SRAM", "ASML High-NA EUV 全球装机超 30 台，英特尔、三星、SK 海力士已接收", "国内 8 英寸 SiC 衬底加速，天岳先进与英飞凌签署三年长协"], "news": [{"id": 1, "priority": "featured", "title": "TSMC N2P GAA 晶体管风险试产在即，密度 270 MTr/mm² 再创纪录", "keywords": ["TSMC", "N2P", "GAA", "GAAFET", "2nm", "风险试产"], "tech": "GAAFET", "route": "先进制程", "routeStatus": "↑突破", "content": "据 Digitimes 报道，台积电 N2P 工艺（2nm 增强版）计划 2026 年 Q3 在宝山 Fab 18 Phase 8 启动风险试产。该节点采用全环绕栅极（GAAFET）晶体管架构，标准单元库显示逻辑密度达 270 MTr/mm²，相较 N3 的 235 MTr/mm² 提升约 15%。相比 2025 年量产的 baseline N2（密度约 250 MTr/mm²），N2P 通过优化接触栅极间距（CPP）和金属层布线进一步提升密度。首批产品预计 2027 年上半年量产，目标客户包括苹果和英伟达。", "reason": "TSMC N2P 的 GAA 晶体管是继 FinFET 之后最重大的晶体管结构变革，密度和能效同时提升，直接决定 AI 加速器和移动 SoC 的下一个代际竞争力。", "source": "Digitimes / AnandTech", "url": "https://www.digitimes.com/news/a20260703PD200/tsmc-n2p-gaa-risk-production.html", "image": "https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200&q=80&auto=format&fit=crop", "imageCaption": "GAA 晶体管结构示意", "date": "2026-07-03"}, {"id": 2, "priority": "featured", "title": "三星 VLSI 2026 展示 3D DRAM 原型：32 层 Stacked FET，等效密度 48 Gb/mm²", "keywords": ["三星", "3D DRAM", "Stacked FET", "VLSI", "VLSI 2026"], "tech": "3D DRAM", "route": "存储技术", "routeStatus": "↑突破", "content": "三星电子在 VLSI 2026 技术与电路研讨会（6/30-7/2 夏威夷）上展示了 3D DRAM 原型芯片。该芯片采用 32 层 stacked FET（堆叠场效应晶体管）结构，单层厚度 47 nm，位线间距 28 nm。等效存储密度达到 48 Gb/mm²，是当前 1c nm DRAM 密度（约 15-18 Gb/mm²）的 2.6-3.2 倍。三星表示该技术利用 DRAM 单元电容器的垂直堆叠绕过 EUV 光刻缩放瓶颈，预计 2028-2029 年进入量产开发阶段。", "reason": "DRAM 缩放面临物理极限，3D 堆叠是实现密度持续提升的最有希望路径。三星 3D DRAM 原型是自 HBM 以来存储技术最重大的架构变革。", "source": "VLSI 2026 / Samsung / EE Times", "url": "https://www.eetimes.com/samsung-3d-dram-stacked-fet-vlsi-2026/", "image": "https://images.unsplash.com/photo-1488590528505-98d2b5aba04b?w=1200&q=80&auto=format&fit=crop", "imageCaption": "3D DRAM 堆叠结构示意", "date": "2026-07-01"}, {"id": 3, "priority": "secondary", "title": "IMEC 发布 sub-2nm CFET 标准单元设计套件，0.018 µm² 6T SRAM", "keywords": ["IMEC", "CFET", "sub-2nm", "SRAM", "标准单元"], "tech": "CFET", "route": "先进制程", "routeStatus": "↑突破", "content": "IMEC 在 VLSI 2026 上发布了互补式 FET（CFET）标准单元设计套件（PDK v0.5）。该套件包含 6T SRAM 位元，单元面积 0.018 µm²，较 2nm GAA 世代缩小约 35%。CFET 将 nFET 和 pFET 垂直堆叠在同一 footprint 内，接触栅极间距（CPP）缩至 42 nm，BEOL 使用 2 层 Ru 金属 + 低k 介电层。IMEC 预计 CFET 将于 2028 年进入量产导入窗口。", "reason": "CFET 是 GAAFET 之后的下一个晶体管架构，垂直堆叠互补器件是扩展摩尔定律的关键路径。IMEC 的 PDK 是产业生态启动的标志。", "source": "IMEC / IEEE Spectrum", "url": "https://spectrum.ieee.org/imec-cfet-pdk-2026", "image": "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=1200&q=80&auto=format&fit=crop", "imageCaption": "CFET 标准单元布局", "date": "2026-07-02"}, {"id": 4, "priority": "secondary", "title": "ASML High-NA EUV 全球装机突破 30 台，英特尔占半", "keywords": ["ASML", "High-NA EUV", "0.55 NA", "装机量"], "tech": "EUV 光刻", "route": "设备", "routeStatus": "→稳定推进", "content": "ASML 宣布截至 2026 年 Q2，其 0.55 NA High-NA EUV 光刻系统（TWINSCAN EXE:5500）全球累计装机量突破 30 台。其中英特尔已接收 15 台（含已安装和正在安装），三星 8 台，SK 海力士 5 台，台积电 2 台。High-NA EUV 的单片成本约 3.8 亿欧元，支持单次曝光 8nm 金属半节距。ASML 计划 2027 年将产能提升至年产 20 台。", "reason": "High-NA EUV 是 2nm 以下制程的必需设备，装机量直接反映各家代工厂的先进节点竞争实力。SK 海力士和台积电的采购节奏值得关注。", "source": "ASML / Reuters", "url": "https://www.reuters.com/technology/asml-high-na-euv-30-installations-2026-07-02/", "date": "2026-07-02", "image": "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=1200&q=80&auto=format&fit=crop"}, {"id": 5, "priority": "secondary", "title": "国内 8 英寸 SiC 衬底加速导入：天岳先进获英飞凌三年长协", "keywords": ["SiC", "碳化硅", "8英寸", "天岳先进", "英飞凌"], "tech": "SiC 衬底", "route": "宽禁带半导体", "routeStatus": "↑突破", "content": "据集邦咨询报道，国内碳化硅衬底龙头天岳先进与英飞凌签署三年长单协议，约定 2026-2028 年向英飞凌供应 8 英寸 SiC 衬底，总金额未披露但业內估计超 20 亿元人民币。目前天岳先进 8 英寸 SiC 衬底已实现小批量出货，位错密度 <4000 cm⁻²，接近 Wolfspeed 同级产品。此外，天科合达、同光股份等国内厂商也在推进 8 英寸认证。", "reason": "SiC 是电动车逆变器和高压功率系统的关键衬底材料。8 英寸切换是降本的核心路径，国内 SiC 衬底厂商的良率和缺陷密度正加速追赶国际水平。", "source": "TrendForce / 集邦咨询", "url": "https://www.trendforce.com/news/2026/07/05/news-sic-substrate-8inch-china.html", "date": "2026-07-05", "image": "https://images.unsplash.com/photo-1573164713988-8665fc963095?w=1200&q=80&auto=format&fit=crop"}, {"id": 6, "priority": "secondary", "title": "应用材料推出新型高选择性 SiGe 蚀刻技术，用于 GAA 纳米片释放", "keywords": ["应用材料", "AMAT", "SiGe蚀刻", "GAA", "纳米片释放"], "tech": "原子层蚀刻", "route": "设备", "routeStatus": "↑突破", "content": "应用材料在 SEMICON West 2026 上发布了 Centura® SyRI 高选择性 SiGe 蚀刻系统，专用于 GAAFET 纳米片释放工艺。该系统采用热化学 + 等离子体两步法，SiGe 对 Si 的选择比 >1000:1，片内均匀性 σ <1.5%。相比传统湿法释放，该干法方案可避免纳米片粘连和悬垂应力损伤，良率提升约 8%。", "reason": "纳米片释放是 GAAFET 制造中最关键且最困难的工艺步骤之一，高选择性干法蚀刻是提升量产良率的关键使能技术。", "source": "Applied Materials / Semiconductor Engineering", "url": "https://semiengineering.com/applied-materials-sige-etch-gaa-release-2026/", "date": "2026-07-06", "image": "https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=1200&q=80&auto=format&fit=crop"}, {"id": 7, "priority": "flash", "title": "英飞凌宣布量产 300 mm GaN-on-Si 功率晶圆", "keywords": ["英飞凌", "GaN", "300mm", "功率半导体"], "tech": "GaN HEMT", "route": "宽禁带半导体", "routeStatus": "↑突破", "content": "据英飞凌官网，其位于奥地利菲拉赫的 300 mm GaN-on-Si 功率晶圆产线正式量产，这是全球首条 300 mm GaN HEMT 量产线。首批产品 CoolGaN™ 700 V 系列已在 6 月底出货，导通电阻 Rds(on) 低至 25 mΩ。", "reason": "300 mm GaN 量产标志着 GaN 功率器件从 200 mm 向更大直径衬底过渡，成本有望降低 30-40%。", "source": "Infineon / EET China", "url": "https://www.infineon.com/cms/en/about-infineon/press/2026/infineon-300mm-gan-量产/", "date": "2026-07-03", "image": "https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200&q=80&auto=format&fit=crop"}, {"id": 8, "priority": "flash", "title": "SK 海力士 1c nm DRAM 良率突破 75%，HBM4E 采用混合键合", "keywords": ["SK海力士", "1c nm", "DRAM", "HBM4E", "混合键合"], "tech": "DRAM", "route": "存储技术", "routeStatus": "↑突破", "content": "SK 海力士在内部简报中透露其 1c nm DRAM 良率突破 75%，达到量产标准。同时 HBM4E 将采用 Cu-Cu 混合键合（Hybrid Bonding）替代微凸块，堆叠层数 16 层，容量提升至 48 GB。", "source": "The Elec", "url": "https://www.thelec.net/news/articleView.html?idxno=5678", "date": "2026-07-04", "image": "https://images.unsplash.com/photo-1488590528505-98d2b5aba04b?w=1200&q=80&auto=format&fit=crop"}, {"id": 9, "priority": "flash", "title": "东京电子推出新型低温 SiO₂ 原子层沉积系统", "keywords": ["东京电子", "TEL", "ALD", "低温沉积"], "tech": "ALD", "route": "设备", "routeStatus": "→稳定推进", "content": "东京电子（TEL）发布新型低温等离子体增强 ALD 系统，可在 150°C 以下沉积高密度 SiO₂ 薄膜，适用于 3D NAND 高深宽比间隙填充和 EUV 光刻胶下层。", "source": "TEL / Semiconductor Engineering", "url": "https://semiengineering.com/tel-low-temp-sio2-ald-2026/", "date": "2026-07-04", "image": "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=1200&q=80&auto=format&fit=crop"}, {"id": 10, "priority": "flash", "title": "台积电 CoWoS-L 产能 2027 月产 8 万片，InFO 配套扩产", "keywords": ["台积电", "CoWoS", "先进封装", "产能"], "tech": "先进封装", "route": "先进封装", "routeStatus": "→稳定推进", "content": "据供应链消息，台积电计划 2027 年将 CoWoS-L 月产能扩至 8 万片（目前约 4 万片），InFO 配套同步扩产。英伟达 Rubin 和 AMD MI400 是主要需求驱动。", "source": "DigiTimes / 经济日报", "url": "https://www.digitimes.com/news/a20260705PD210/cowos-tsmc-advanced-packaging.html", "date": "2026-07-05", "image": "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=1200&q=80&auto=format&fit=crop"}, {"id": 11, "priority": "flash", "title": "华为公布硅基量子点单光子源原型，工作温度 4K", "keywords": ["华为", "量子点", "单光子源", "硅基"], "tech": "硅基量子点", "route": "量子器件", "routeStatus": "→稳定推进", "content": "华为在 CLEO 2026 上公布了基于硅基量子点的电泵浦单光子源原型，在 4K 温度下实现 0.67 的 Hong-Ou-Mandel 可见度，为片上光量子计算提供了关键器件基础。", "source": "CLEO 2026 / 华为", "url": "https://www.cleoconference.org/program/silicon-quantum-dot-sps-huawei/", "date": "2026-07-06", "image": "https://images.unsplash.com/photo-1573164713988-8665fc963095?w=1200&q=80&auto=format&fit=crop"}, {"id": 12, "priority": "flash", "title": "新思科技发布 3DIC Compiler 2027，支持 12 芯片堆叠热仿真", "keywords": ["Synopsys", "3DIC", "EDA", "热仿真"], "tech": "EDA", "route": "设计工具", "routeStatus": "→稳定推进", "content": "新思科技发布 3DIC Compiler 2027 版本，新增 12 芯片堆叠的热-机械协同仿真能力，支持 interposer 和 hybrid bonding 两种方案，与台积电 3Dblox 2.0 流程完成认证。", "source": "Synopsys / EDA Weekly", "url": "https://www.synopsys.com/3dic-compiler-2027-release", "date": "2026-07-06", "image": "https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=1200&q=80&auto=format&fit=crop"}, {"id": 13, "priority": "secondary", "title": "杭州Garen半导体建成全球首条6/8英寸兼容GaN量产线", "keywords": ["GaN", "氮化镓", "8英寸", "杭州Garen", "宽禁带"], "tech": "GaN-on-Si", "route": "宽禁带半导体", "routeStatus": "↑突破", "content": "据Ralf's GaN & SiC News（7月2日）报道，杭州Garen半导体于6月24日宣布建成全球首条同时兼容6英寸（150mm）与8英寸GaN-on-Si的量产线，可灵活切换产线以平衡成本与产能。该产线面向650V功率器件与射频应用，标志着GaN从200mm向更大直径衬底过渡的国内进展。", "reason": "6/8英寸兼容产线降低了GaN功率器件向大尺寸迁移的资本开支风险，是国内宽禁带制造能力的标志性事件。", "source": "LinkedIn / Ralf's GaN & SiC News", "url": "https://www.linkedin.com/pulse/ralfs-gan-sic-news-july-2-2026-ralf-higgelke-k67me/", "image": "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=1200&q=80&auto=format&fit=crop", "imageCaption": "GaN 功率器件（示意）", "date": "2026-07-02"}, {"id": 14, "priority": "flash", "title": "英特尔18A-P节点细节披露：RibbonFET与PowerVia背面供电完全体", "keywords": ["Intel", "18A", "RibbonFET", "PowerVia", "背面供电"], "tech": "RibbonFET GAA + BSPDN", "route": "先进制程", "routeStatus": "↑突破", "content": "据腾讯新闻（6月22日）分析，Intel 18A-P是英特尔首个同时集成第二代RibbonFET全环绕栅极晶体管与PowerVia背面供电网络的'完全体'节点，相较2025年随Panther Lake首发的18A在性能与散热上进一步优化。背面供电将电源布线移至晶圆背面，释放正面布线资源并降低IR压降。", "reason": "RibbonFET+PowerVia的组合是英特尔追赶台积电N2的关键制程筹码，也是背面供电技术首次大规模商用。", "source": "腾讯新闻 / Intel", "url": "https://news.qq.com/rain/a/20260622A0BNA400", "date": "2026-06-22", "image": "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=1200&q=80&auto=format&fit=crop"}, {"id": 15, "priority": "flash", "title": "ECTC 2026聚焦HBM4与CoWoS封装挑战：微流控冷却与光互连升温", "keywords": ["ECTC 2026", "HBM4", "CoWoS", "微流控冷却", "光互连"], "tech": "先进封装", "route": "先进封装", "routeStatus": "→稳定", "content": "SemiAnalysis发布的ECTC 2026大会综述指出，英特尔、台积电、SK海力士、三星围绕EMIB-T、定制化HBM、HBM4封装挑战、微流控冷却与光子互连等方向密集展示进展。随着HBM4堆叠层数增至16层，热管理与信号完整性成为量产主要瓶颈。", "reason": "HBM4与先进封装的散热/互连挑战直接决定AI加速器的算力上限，ECTC是产业风向标。", "source": "SemiAnalysis / ECTC 2026", "url": "https://newsletter.semianalysis.com/p/ectc2026", "date": "2026-07-03", "image": "https://images.unsplash.com/photo-1635070041078-e363dbebad3a?w=1200&q=80&auto=format&fit=crop"}]}, "2026-07-07": {"schema": "semicon-news-daily/v1", "date": "2026-07-07", "weekday": "周二", "summary": "IBM 7Å交错纳米片、东京大学1nm MoS₂管、High-NA EUV掩模经济学、垂直GaN、PennState单片3D自供电、TiO₂原子级铁电、AlixLabs ALE间距分割。新增：ASML推进Hyper-NA EUV路线图，Cadence发布全自主Agentic AI设计工程师，三星ISSCC 2026展示4F²垂直沟道DRAM，VLSI盘点STT-MRAM/FeRAM/ReRAM/PCM，BSPDN（PowerVia已出货/Super Power Rail年内跟进），CPO共封装光学五大趋势，Argonne×Intel部署12量子位硅自旋处理器。", "focus": "7Å级与原子级器件突破、AI驱动EDA与表征、背面供电与CPO走向落地、硅基量子位进展", "news": [{"id": "semi-001", "title": "IBM发布7Å晶体管架构：交错式纳米片，性能+50%或能效+70%", "keywords": ["IBM", "7Å", "纳米片", "晶体管架构", "SRAM"], "tech": "GAA纳米片晶体管", "route": "先进制程架构", "routeStatus": "↑突破", "content": "IBM展示全新7Å晶体管架构，采用交错式纳米片（interleaved nanosheet）设计——晶体管像屋顶瓦片一样堆叠在精确的斜角上，从而在单位面积内塞入更多晶体管。性能较当前工艺提升50%，或能效提升高达70%。SRAM缩放改进40%，速度远远快于HBM，延迟更低。预计量产时间在2031年左右。据SemiEngineering报道。", "reason": "IBM的新架构路线图为后2nm时代提供了关键的技术路径参考", "source": "SemiEngineering / IBM", "url": "https://semiengineering.com/chip-industry-week-in-review-144/", "image": "https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=1200&q=80&auto=format&fit=crop", "imageCaption": "GAA 晶体管结构示意", "date": "2026-06-26", "priority": "featured"}, {"id": "semi-002", "title": "Research Bits Jul 6：串联神经网络6个数量级加速半导体特性预测", "keywords": ["神经网络", "半导体特性", "IGZO", "TNN", "机器学习"], "tech": "AI+半导体表征", "route": "AI辅助半导体研究", "routeStatus": "↑突破", "content": "东京科学大学等机构开发串联神经网络（TNN）：第一级从晶体管I-V曲线估计材料参数（缺陷密度、陷阱态、迁移率等6个参数），第二级前向网络重建原始特性做物理一致性约束。在1000组a-IGZO数据集上训练后，单条I-V曲线推理<1ms即获全部参数。据称相比传统器件模拟（数小时至数天），加速超过六个数量级。[DOI: 10.1002/aisy.70437]", "reason": "AI驱动的半导体表征方法可能彻底改变材料参数提取效率", "source": "SemiEngineering / Advanced Intelligent Systems", "url": "https://semiengineering.com/research-bits-july-6/", "image": "https://images.unsplash.com/photo-1530124566582-a618bc2615dc?w=1200&q=80&auto=format&fit=crop", "imageCaption": "神经网络结构示意", "date": "2026-07-06", "priority": "featured"}, {"id": "semi-003", "title": "东京大学实现1nm MoS₂纳米管，有望用于超缩放GAA晶体管", "keywords": ["MoS₂", "纳米管", "1nm", "GAA", "二维材料"], "tech": "二维半导体材料", "route": "后硅器件材料", "routeStatus": "↑突破", "content": "东京大学成功制造出直径仅1nm的半导体二硫化钼（MoS₂）纳米管，有望用于超缩放的环绕栅极（GAA）晶体管沟道。MoS₂作为二维材料在原子级厚度下仍保持良好半导体特性，被认为是后硅时代的重要候选沟道材料。据SemiEngineering行业周报报道。", "reason": "1nm尺度沟道材料突破是后摩尔时代器件微缩的关键研究方向", "source": "SemiEngineering / 东京大学", "url": "https://semiengineering.com/chip-industry-week-in-review-144/", "image": "https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=1200&q=80&auto=format&fit=crop", "imageCaption": "MoS₂ 纳米管结构示意", "date": "2026-06-26", "priority": "secondary"}, {"id": "semi-004", "title": "高NA EUV掩模经济学：成本上升迫使行业重新审视路线图", "keywords": ["High-NA EUV", "掩模", "光刻成本", "ASML"], "tech": "EUV光刻", "route": "High-NA EUV路线", "routeStatus": "↓受阻", "content": "SemiEngineering分析指出，高NA EUV光刻的掩模成本显著上升、新掩模材料要求更严格，叠加更紧的缺陷容忍度，正在迫使行业重新考虑High-NA EUV的部署节奏和路线图。掩模制造成本和供应链成熟度成为下一代光刻技术推广的主要障碍之一。", "reason": "High-NA EUV的经济性是制约先进制程推进的实际瓶颈", "source": "SemiEngineering", "url": "https://semiengineering.com/mask-economics-shape-high-na-euv-adoption/", "image": "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=1200&q=80&auto=format&fit=crop", "imageCaption": "EUV 光刻机内部结构（示意）", "date": "2026-06-22", "priority": "secondary"}, {"id": "semi-005", "title": "GaN功率器件走向垂直结构：新设计克服制造挑战", "keywords": ["GaN", "垂直功率器件", "氮化镓", "功率半导体"], "tech": "GaN功率器件", "route": "GaN器件结构", "routeStatus": "↑突破", "content": "SemiEngineering报道垂直GaN功率器件的最新进展，新设计和工艺流程正在帮助克服垂直GaN结构的制造挑战。垂直GaN相比传统平面GaN可承受更高电压、拥有更好的热管理，在电动汽车和工业电源领域前景广阔。", "reason": "GaN从平面转向垂直结构是功率半导体技术演进的重要方向", "source": "SemiEngineering", "url": "https://semiengineering.com/gan-power-devices-go-vertical/", "image": "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=1200&q=80&auto=format&fit=crop", "imageCaption": "GaN 功率器件（示意）", "date": "2026-06-18", "priority": "secondary"}, {"id": "semi-006", "title": "宾夕法尼亚州立大学打造单片3D自供电器件：石墨烯传感器+MoS₂/WSe₂逻辑+硅光伏", "keywords": ["单片3D集成", "石墨烯", "MoS₂", "WSe₂", "自供电"], "tech": "3D集成 / 二维材料", "route": "单片3D集成", "routeStatus": "↑突破", "content": "宾夕法尼亚州立大学团队展示了单片3D集成芯片：堆叠石墨烯化学传感器层、MoS₂/WSe₂二维材料逻辑层、硅光伏能量收集层于同一芯片上，实现自供电运行。该设计为低功耗自主传感和边缘计算系统开辟了新道路。据SemiEngineering报道。", "reason": "单片3D集成是超越摩尔定律的重要技术路径", "source": "SemiEngineering", "url": "https://semiengineering.com/chip-industry-week-in-review-144/", "image": "https://images.unsplash.com/photo-1593508512255-86ab42a8e620?w=1200&q=80&auto=format&fit=crop", "imageCaption": "3D 集成芯片堆叠示意", "date": "2026-06-26", "priority": "secondary"}, {"id": "semi-007", "title": "TiO₂薄膜在<3nm厚度下呈现铁电性，ALD兼容硅基工艺", "keywords": ["TiO₂", "铁电", "ALD", "3nm", "铁电存储"], "tech": "铁电薄膜 / ALD", "route": "新型铁电材料", "routeStatus": "↑突破", "content": "UC Berkeley和SLAC团队将TiO₂薄膜厚度降至<3nm时意外发现其呈现铁电性——自发极化且可电场翻转，且在1nm（约2个单胞厚度）时仍保持稳定。团队使用ALD在<400°C低温下生长均匀薄膜，可在晶体硅和非晶碳基板上沉积，表明其与硅基工艺兼容。论文发表于Science 392, 280-284 (2026)。[DOI: 10.1126/science.aec9417]", "reason": "原子级铁电薄膜的发现为FeFET存储和3D集成开创新可能", "source": "SemiEngineering / Science", "url": "https://semiengineering.com/research-bits-july-6/", "image": "https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=1200&q=80&auto=format&fit=crop", "imageCaption": "铁电薄膜晶格结构（示意）", "date": "2026-07-06", "priority": "flash"}, {"id": "semi-008", "title": "应用材料为DRAM推出外延系统，同时发布先进封装CMP/沉积/电子束检测系统", "keywords": ["应用材料", "DRAM", "外延", "CMP", "先进封装"], "tech": "半导体设备", "route": "DRAM设备", "routeStatus": "→稳定", "content": "应用材料（Applied Materials）为DRAM制造推出新型外延系统，同时为先进封装推出CMP、沉积和电子束检测系统。据SemiEngineering报道。", "reason": "设备商的布局反映DRAM和先进封装的技术升级方向", "source": "SemiEngineering", "url": "https://semiengineering.com/chip-industry-week-in-review-144/", "image": "https://images.unsplash.com/photo-1530124566582-a618bc2615dc?w=1200&q=80&auto=format&fit=crop", "imageCaption": "半导体设备车间（示意）", "date": "2026-06-26", "priority": "flash"}, {"id": "semi-009", "title": "ETH Zurich开发双向傅里叶像素：同时实现光控制和光分析", "keywords": ["ETH Zurich", "双向像素", "傅里叶像素", "光调制", "显示"], "tech": "光学微结构", "route": "新型像素结构", "routeStatus": "↑突破", "content": "ETH Zurich研究人员开发出双向傅里叶像素，通过波状雕刻表面实现对光强、相位和偏振的控制与分析。正向用于成像/显示，逆向用于光分析。团队称该像素可在同一器件上实现相机和显示功能。论文发表于Nature 655, 87-92 (2026)。[DOI: 10.1038/s41586-026-10681-7]", "reason": "显示与传感合一的像素概念可能开启新型交互显示设备", "source": "SemiEngineering / Nature", "url": "https://semiengineering.com/research-bits-july-6/", "image": "https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=1200&q=80&auto=format&fit=crop", "imageCaption": "傅里叶像素光学结构（示意）", "date": "2026-07-06", "priority": "flash"}, {"id": "semi-010", "title": "AlixLabs推出首款原子层刻蚀间距分割商用设备", "keywords": ["AlixLabs", "ALE", "间距分割", "图案密度"], "tech": "原子层刻蚀", "route": "图案密度技术", "routeStatus": "↑突破", "content": "AlixLabs推出首款商用设备，用于其原子层刻蚀间距分割（ALE Pitch Splitting）技术。该技术可在不退化为双重图案的情况下增加图形密度，为先进制程提供一种新的图案化方案。据SemiEngineering报道。", "reason": "新型图案化设备为先进制程提供EUV之外的互补方案", "source": "SemiEngineering", "url": "https://semiengineering.com/chip-industry-week-in-review-144/", "image": "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=1200&q=80&auto=format&fit=crop", "imageCaption": "原子层刻蚀设备（示意）", "date": "2026-06-26", "priority": "flash"}, {"id": "semi-011", "title": "ASML推进Hyper-NA EUV路线图，为AI芯片时代储备0.7NA以上光刻", "keywords": ["ASML", "Hyper-NA EUV", "光刻路线图", "0.7 NA"], "tech": "EUV光刻", "route": "High-NA/Hyper-NA EUV路线", "routeStatus": "→稳定", "content": "据Digital Citizen（6月18日）报道，ASML正为AI芯片时代准备High-NA与Hyper-NA EUV的下一阶段。High-NA（0.55 NA）系统已接近量产导入，Hyper-NA（0.7 NA以上）被纳入更远期路线图，以应对2nm以下节点的单次曝光分辨率需求。干法光刻胶与配套光学系统的成熟度是关键。", "reason": "Hyper-NA EUV的预研决定了2030年代先进制程的光刻天花板，提前布局反映AI算力对制程的刚性需求。", "source": "Digital Citizen / ASML", "url": "https://www.digitalcitizen.life/asml-is-preparing-high-na-and-hyper-na-euv-for-the-ai-chip-era/", "image": "https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=1200&q=80&auto=format&fit=crop", "imageCaption": "EUV 光刻机（示意）", "date": "2026-06-18", "priority": "secondary"}, {"id": "semi-012", "title": "Cadence在Computex 2026发布全自主Agentic AI设计工程师，EDA迈向L5", "keywords": ["Cadence", "Agentic EDA", "AI设计", "Computex 2026", "ChipStack"], "tech": "EDA / AI辅助设计", "route": "设计工具", "routeStatus": "↑突破", "content": "Cadence在Computex 2026（6月1日）发布业界首个全自主虚拟Agentic AI设计工程师，将ChipStack AI Super Agent推进至Level-5自主级别，可自动完成从规格到封装的芯片设计迭代。Synopsys同期也在GTC Taipei加速其Agentic EDA布局，两大EDA厂竞争白热化。", "reason": "Agentic EDA将设计生产力从'人驱动工具'转向'AI自主迭代'，有望显著缩短先进芯片上市周期。", "source": "Cadence / Futurum Group", "url": "https://www.cadence.com/en_US/home/company/newsroom/press-releases/pr/2026/cadence-unveils-industrys-first-fully-autonomous-virtual.html", "image": "https://images.unsplash.com/photo-1487058792275-0ad4aaf24ca7?w=1200&q=80&auto=format&fit=crop", "imageCaption": "EDA 设计流程（示意）", "date": "2026-06-01", "priority": "secondary"}, {"id": "semi-013", "title": "三星ISSCC 2026展示16Gb 4F²垂直沟道DRAM，3D存储路线再确认", "keywords": ["三星", "4F²", "垂直沟道DRAM", "ISSCC 2026", "3D DRAM"], "tech": "3D DRAM", "route": "存储技术", "routeStatus": "↑突破", "content": "据SemiWiki报道，三星在ISSCC 2026展示了基于4F²垂直沟道晶体管（VG）的16Gb DRAM原型，验证了垂直沟道结构在10nm以下DRAM制程的可行性。该路线与3D堆叠DRAM并列，成为突破1c nm之后密度瓶颈的两大技术方向。", "reason": "垂直沟道DRAM是三星对抗传统缩放极限的核心路线，ISSCC原型验证增强了3D存储量产预期。", "source": "SemiWiki / ISSCC 2026", "url": "https://semiwiki.com/forum/threads/isscc-2026-samsung-electronics-demonstrated-a-16gb-dram.24808/", "date": "2026-03-23", "priority": "flash", "image": "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=1200&q=80&auto=format&fit=crop"}, {"id": "semi-014", "title": "2026 VLSI盘点四大新兴非易失存储：STT-MRAM/FeRAM/ReRAM/PCM对比", "keywords": ["新型存储", "STT-MRAM", "FeRAM", "ReRAM", "VLSI 2026"], "tech": "新型非易失存储", "route": "新型存储", "routeStatus": "→稳定", "content": "电子工程专辑（7月1日）盘点2026年最具前景的四种新兴非易失存储：STT-MRAM、FeRAM、ReRAM与PCM/SOM，对比其底层原理、量产参数与优缺点。铁电存储因与CMOS后端兼容、写入速度快，被视为嵌入式eNVM的有力候选。", "reason": "新型存储的成熟将推动存算一体与嵌入式系统的能效跃升，VLSI年度盘点提供产业基准。", "source": "电子工程专辑 / VLSI 2026", "url": "https://www.eet-china.com/mp/a506530.html", "date": "2026-07-01", "priority": "flash", "image": "https://images.unsplash.com/photo-1593508512255-86ab42a8e620?w=1200&q=80&auto=format&fit=crop"}, {"id": "semi-015", "title": "背面供电网络2026：Intel PowerVia已出货，TSMC Super Power Rail年内跟进", "keywords": ["BSPDN", "PowerVia", "Super Power Rail", "背面供电", "Intel 18A"], "tech": "背面供电网络", "route": "供电技术", "routeStatus": "↑突破", "content": "BSPDN专题分析指出，背面供电网络（BSPDN）已随Intel PowerVia在18A节点量产出货，台积电Super Power Rail将于N2P、三星BSPDN将于SF2节点年内跟进。该技术将电源布线移至晶圆背面，释放正面布线并降低IR压降与热阻。", "reason": "背面供电是后FinFET时代提升密度与能效的关键使能技术，三大厂同年的落地节奏值得关注。", "source": "Internet Pros / Intel, TSMC", "url": "https://internet-pros.com/blog/backside-power-delivery-bspdn-powervia-2026/", "date": "2026-06-20", "priority": "flash", "image": "https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=1200&q=80&auto=format&fit=crop"}, {"id": "semi-016", "title": "2026年CPO共封装光学五大趋势：光引擎贴近交换ASIC成AI互联主流", "keywords": ["CPO", "共封装光学", "硅光", "AI互联", "光引擎"], "tech": "硅光共封装", "route": "光互连", "routeStatus": "→稳定", "content": "西门子半导体封装博客（2月5日）总结2026年CPO五大趋势：为应对AI的能耗需求，共封装光学将光引擎直接贴近交换ASIC、加速器与chiplet，缩短电通道、降低功耗与延迟。1.6T光模块需求与台积电COUPE等方案的成熟推动CPO从概念验证走向规模落地。", "reason": "CPO是突破AI集群电互连功耗墙的核心路径，2026年被视为规模化落地元年。", "source": "Siemens / 半导体封装", "url": "https://blogs.sw.siemens.com/semiconductor-packaging/2026/02/05/five-key-trends-of-co-packaged-optics-cpo-in-2026/", "date": "2026-02-05", "priority": "flash", "image": "https://images.unsplash.com/photo-1487058792275-0ad4aaf24ca7?w=1200&q=80&auto=format&fit=crop"}, {"id": "semi-017", "title": "Argonne与Intel部署12量子位硅自旋量子处理器，推进硅基量子 scalable", "keywords": ["量子计算", "硅自旋量子位", "Intel", "Argonne", "量子器件"], "tech": "硅基量子位", "route": "量子器件", "routeStatus": "→稳定", "content": "据阿贡国家实验室（1月6日）报道，Argonne与Intel合作部署基于硅量子点的12量子位处理器，并配套Horse Ridge低温控制器实现高保真度可编程控制。硅自旋量子位可借助成熟CMOS工艺实现可扩展制造，是大规模量子计算的有力路线。", "reason": "硅自旋量子位复用传统半导体产线，是量子计算走向可扩展制造的现实路径之一。", "source": "Argonne National Laboratory / Intel", "url": "https://www.anl.gov/article/argonne-launches-silicon-quantum-processor-collaboration-with-intel", "date": "2026-01-06", "priority": "flash", "image": "https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=1200&q=80&auto=format&fit=crop"}]}, "2026-07-08": {"schema": "semicon-news-daily/v1", "date": "2026-07-08", "weekday": "周三", "summary": "SemiEngineering连发两篇先进封装深度分析：多芯片现场测试方法论与高密度扇出型面板封装检测量测追赶；imec发布2026版路线图：CFET垂直堆叠是A7级（~0.7nm）关键转折点，0.3nm目标2038年。新增：AI时代chiplet设计缺失『可观测性』层、验证方法学难追上AI芯片节奏、如何构建数十亿个混合键合凸点、CPO测试面临数据中心产能陡增；7/3产业周评显示三星2600亿建厂、2026年DRAM设备支出首破500亿美元，高通发布HBC近内存计算架构，Dynex推出450A GaN半桥模块，SK海力士与三星围绕HBM4就绪度与1c DRAM缩放展开竞赛；技术论文盘点聚焦Processing-using-DRAM干扰风险与原子级等离子体加工。", "focus": "先进封装测试与量测、chiplet可观测性与混合键合、CPO光互连测试、AI驱动EDA验证、存内/近内存计算架构、宽禁带功率模块", "news": [{"id": "semi-001", "title": "SemiEngineering：多芯片现场测试需建立于成熟方法论之上", "keywords": ["多芯片测试", "3DIC", "先进封装", "UCIe", "DFS"], "tech": "先进封装/3DIC测试", "route": "3DIC测试方法论", "routeStatus": "→稳定", "content": "SemiEngineering 7月7日发布深度分析指出，随着AI数据中心和汽车等关键任务领域广泛采用多芯片系统（2.5D/3D-IC），仅保证出厂时（Time Zero）正常工作已不足以确保器件全生命周期可靠性。文章提出'监控-测试-修复'三位一体策略：复用UCIe/PCIe高速接口可将测试带宽提升10-20倍；嵌入信号完整性监控器（SIM）实时生成眼图判断信号质量；硅生命周期管理（SLM）结合ML模型预测退化趋势和剩余寿命；物理感知芯片到芯片桥接测试可减少95%-99%的无效桥接模式。IEEE 1838标准允许芯片间无需PHY即可通信测试。Synopsys与台积电的联合案例展示了通过UCIe总线对隐藏芯片进行ATPG测试的完整流程。", "reason": "多芯片系统的现场可靠性是先进封装产业化的关键瓶颈", "source": "SemiEngineering / Laura Peters", "url": "https://semiengineering.com/multi-die-testing-in-the-field-must-build-on-established-test-methodologies/", "image": "https://images.unsplash.com/photo-1551434678-e076c223a692?w=1200&q=80&auto=format&fit=crop", "imageCaption": "3D-IC 多芯片堆叠（示意）", "date": "2026-07-07", "priority": "featured"}, {"id": "semi-002", "title": "SemiEngineering：高密度扇出型面板级封装的检测量测技术追赶", "keywords": ["面板级封装", "FOWLP", "检测量测", "RDL", "翘曲"], "tech": "先进封装/面板级封装", "route": "FOPLP产业化", "routeStatus": "→稳定", "content": "SemiEngineering 7月7日发表高密度扇出型面板级封装（HDFO PLP）检测量测专题分析。核心挑战包括RDL线宽/线距从20μm缩至5μm（目标2μm）、凸点间距从20μm缩至5μm、RDL层数从3层增至9层。面板尺寸达600×600mm，材料CTE不匹配导致严重翘曲，高分辨率光学系统景深受限。一块600mm面板以1μm分辨率检测会产生约10¹²像素数据量。解决方案包括：引入X射线/红外检测内部通孔质量；自适应光刻——将芯片位移测量数据输入ML算法驱动逐芯片覆盖校正；Bruker等厂商开发可测2000μm厚膜的方案。KLA、Onto Innovation、Koh Young等正将晶圆级平台改造适配面板尺寸。", "reason": "面板级封装是先进封装降本的关键路径，检测量测技术决定了量产可行性", "source": "SemiEngineering / Anne Meixner", "url": "https://semiengineering.com/inspection-and-metrology-catching-up-for-high-density-fan-out-panel-packaging/", "image": "https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=1200&q=80&auto=format&fit=crop", "imageCaption": "面板级封装检测设备（示意）", "date": "2026-07-07", "priority": "featured"}, {"id": "semi-003", "title": "imec 2026版路线图：CFET是A7级关键转折，0.3nm目标2038年", "keywords": ["imec", "路线图", "CFET", "0.3nm", "A7"], "tech": "先进制程路线图", "route": "CFET架构", "routeStatus": "↑突破", "content": "比利时微电子研究中心imec近期发布2026版半导体制程技术发展蓝图。关键转折点预计在A7级（约0.7nm/7Å），约2033年转向CFET架构——与当前FinFET/GAA将n型和p型晶体管并排放置不同，CFET将它们垂直堆叠，为微缩增加第三维度。A7的CPP仍维持42nm，但通过CFET可使标准单元高度大幅缩减。路线图指出行业有望在2038年实现0.3nm等级先进制程。该路线图由台积电、英特尔、三星等共同参与制定。", "reason": "imec路线图是行业共识风向标，CFET时间线的明确对设备/材料/EDA投资有指导意义", "source": "环球网科技 / imec", "url": "https://tech.huanqiu.com/article/4SDQDssL5nC", "image": "https://images.unsplash.com/photo-1593305841991-05c297ba4575?w=1200&q=80&auto=format&fit=crop", "imageCaption": "半导体晶圆制造（示意）", "date": "2026-07-02", "priority": "secondary"}, {"id": "semi-004", "title": "六大前沿工艺同步开启设备需求空间：GAA→CFET演进、CoPoS、CPO全面解析", "keywords": ["GAA", "CFET", "CoPoS", "CPO", "High-NA EUV", "HBM"], "tech": "半导体设备/工艺路线", "route": "设备技术路线", "routeStatus": "↑突破", "content": "据行业深度分析报道，六大技术变革同步推动半导体设备需求：GAA向CFET演进要求新型沉积/刻蚀设备；3D NAND层数持续增加和HBM高密度堆叠催生混合键合需求；台积电推出CoPoS面板级封装开启新型封装设备赛道；High-NA EUV配套干法光刻胶技术落地要求光刻设备更新；HBM4内置冗余通道和混合键合互连对检测量测提出新要求；CPO硅光共封装开辟光电一体化新路径。设备厂商不再只是制造配套工具，而是直接决定先进工艺能否顺利量产落地。", "reason": "多技术路线同步爆发意味着设备行业正经历结构性升级换代周期", "source": "百家号 / 行业分析", "url": "https://baijiahao.baidu.com/s?id=1869358415758832474&wfr=spider&for=pc", "image": "https://images.unsplash.com/photo-1567521464027-f127ff144326?w=1200&q=80&auto=format&fit=crop", "imageCaption": "半导体设备自动化车间（示意）", "date": "2026-06-30", "priority": "secondary"}, {"id": "semi-005", "title": "SemiEngineering：AI 时代 chiplet 设计缺失『可观测性』关键层", "keywords": ["可观测性", "chiplet", "遥测", "片上监视器", "SLM"], "tech": "Chiplet 可观测性 / 遥测", "route": "先进封装 / Chiplet", "routeStatus": "→稳定", "content": "SemiEngineering 7月1日刊文指出，在AI时代的多die与chiplet架构中，可观测性尚未作为一等公民内建到系统，跨封装边界难以统一关联流量、延迟、拥塞与故障行为。文章主张构建对齐通信fabric的遥测平面，并借助片上监视器（on-die monitors）、近传感器数据缩减与可编程采集扩展系统级可见性。文中还讨论硅生命周期管理（SLM）实现自修复硅与核心收割，并呼吁通过标准化遥测模式与可观测性契约支撑多厂商chiplet生态。", "reason": "chiplet跨die的可观测性缺失是异构集成可靠性的核心短板，直接影响AI芯片的调试与现场运维。", "source": "SemiEngineering", "url": "https://semiengineering.com/observability-is-a-missing-layer-in-ai-era-chiplet-design/", "image": "https://images.unsplash.com/photo-1497366754035-f200968a6e72?w=1200&q=80&auto=format&fit=crop", "imageCaption": "Chiplet 异构集成（示意）", "date": "2026-07-01", "priority": "secondary"}, {"id": "semi-006", "title": "SemiEngineering：验证方法学难追上 AI 芯片设计节奏", "keywords": ["EDA", "验证", "Agentic AI", "覆盖率", "芯片设计"], "tech": "EDA 验证 / Agentic AI", "route": "设计工具 / 验证", "routeStatus": "→稳定", "content": "SemiEngineering 6月25日报道，AI能力以破纪录速度涌现，但半导体验证方法学缺乏成熟部署范式，企业被迫自行摸索。Synopsys、Cadence、Siemens EDA 等指出，早期客户经验显示 agentic 工作流可将150人验证团队产出提升至相当于400人以上；但资深工程师仍须把关质量，AI不应替代其对正确性的判断。文章认为受益者横跨资深与初级工程师两端，但如何可靠部署仍无定论。", "reason": "验证是芯片tape-out前最耗时的环节，AI agent能否真正提升覆盖率闭环而非牺牲质量，决定先进SoC上市节奏。", "source": "SemiEngineering", "url": "https://semiengineering.com/verification-methodologies-struggle-to-keep-up-with-ai/", "image": "https://images.unsplash.com/photo-1581092160562-40aa08e78837?w=1200&q=80&auto=format&fit=crop", "imageCaption": "EDA 验证流程（示意）", "date": "2026-06-25", "priority": "secondary"}, {"id": "semi-007", "title": "SemiEngineering：如何构建数十亿个混合键合互连凸点", "keywords": ["混合键合", "Hybrid Bonding", "铜对铜", "BiST", "先进封装"], "tech": "混合键合 / Hybrid Bonding", "route": "先进封装", "routeStatus": "↑突破", "content": "SemiEngineering 6月18日刊文解析混合键合（hybrid bonding）技术：以1µm间距实现无凸点铜对铜连接，理论可将300mm晶圆以200nm焊盘间距键合出数万亿连接。文章指出成功要求表面粗糙度通常小于0.5nm、CMP铜凹陷控制在3–5nm，且逐垫光学检测已不再可行，须依赖内置自测试（BiST）。Synopsys 3DIO IP 将互连分组为每16通道的小型可重复集群并含冗余与修复能力，以吸收制造缺陷。", "reason": "混合键合是HBM4/3DIC实现极高I/O密度的关键工艺，其均匀性与测试挑战直接决定先进封装良率。", "source": "SemiEngineering", "url": "https://semiengineering.com/how-to-build-billions-of-bumps/", "image": "https://images.unsplash.com/photo-1461151304267-38535e780c79?w=1200&q=80&auto=format&fit=crop", "imageCaption": "混合键合互连（示意）", "date": "2026-06-18", "priority": "secondary"}, {"id": "semi-008", "title": "SemiEngineering：共封装光学(CPO)测试面临数据中心产能陡增", "keywords": ["CPO", "共封装光学", "硅光", "激光源", "光互连"], "tech": "共封装光学 / CPO 测试", "route": "光互连", "routeStatus": "→稳定", "content": "SemiEngineering 6月9日报道，AI数据中心需求推动CPO年产能需从百万级扩至数千万级，但各CPO设计独有且定制测试单元昂贵，制造测试压力巨大。单个光学引擎需4–8个激光源激励，含16–32个引擎的模块共需64–128个激光源；转向CWDM/DWDM多波长复用将进一步推高光源数。CPO良率为电性规格与光学规格乘积，但ATE、光学引擎与OSA数据格式割裂，单一器件完整画像追溯常需数周。", "reason": "CPO从概念验证走向规模落地的最大瓶颈在测试与量测，光源数量与数据孤岛问题不解决将阻碍年产能向亿级扩展。", "source": "SemiEngineering", "url": "https://semiengineering.com/co-packaged-optics-testing-faces-steep-data-center-ramp/", "image": "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=1200&q=80&auto=format&fit=crop", "imageCaption": "共封装光学引擎（示意）", "date": "2026-06-09", "priority": "secondary"}, {"id": "semi-009", "title": "SemiEngineering 7/3 产业周评：三星2600亿建厂、DRAM设备支出破500亿", "keywords": ["三星", "HBM", "DRAM设备", "300mm", "3D NAND"], "tech": "存储设备投资 / 晶圆厂", "route": "存储技术 / 产能", "routeStatus": "→稳定", "content": "SemiEngineering 7月3日产业周评汇总：三星拟投资2600亿美元在光州新建半导体晶圆厂、360亿美元在天安与温阳建设HBM晶圆厂；SEMI报告预计2026年全球300mm存储设备投资首破500亿美元（同比+29%），其中DRAM设备支出约370亿美元、3D NAND约140亿美元。同期英飞凌提前数月落成德累斯顿57亿美元Smart Power Fab，东芝推出U-MOS11-H 80V功率MOSFET，铠侠与Sandisk量产第10代3D闪存。", "reason": "存储设备投资创新高反映HBM与AI存储需求拉动，HBM产能与3D NAND世代竞赛是产业景气度的关键信号。", "source": "SemiEngineering", "url": "https://semiengineering.com/chip-industry-week-in-review-145/", "image": "https://images.unsplash.com/photo-1551434678-e076c223a692?w=1200&q=80&auto=format&fit=crop", "imageCaption": "半导体晶圆厂（示意）", "date": "2026-07-03", "priority": "flash"}, {"id": "semi-010", "title": "SemiEngineering 技术论文盘点(6/30)：Processing-using-DRAM 干扰与原子级等离子体", "keywords": ["Processing-using-DRAM", "存内计算", "原子级等离子体", "氧化镓", "技术论文"], "tech": "Processing-using-DRAM / 原子级等离子体", "route": "新型存储 / 器件工艺", "routeStatus": "↑突破", "content": "SemiEngineering 6月30日技术论文盘点收录多项新研究：东京大学等《PuDGhost》首次在真实DRAM芯片上实验分析Processing-using-DRAM的计算结果损坏与干扰风险；名古屋大学等推进原子级受控等离子体加工；布法罗大学等分析Si掺杂氧化镓的缺陷驱动相变不稳定性；米兰理工与意法半导体提出事件驱动强化学习用于半导体产线长周期控制。", "reason": "Processing-using-DRAM等存内计算路线在真实芯片上的可靠性被首次量化，是存算一体走向实用的关键警示与依据。", "source": "SemiEngineering", "url": "https://semiengineering.com/chip-industry-technical-paper-roundup-june-30/", "image": "https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=1200&q=80&auto=format&fit=crop", "imageCaption": "存内计算架构（示意）", "date": "2026-06-30", "priority": "flash"}, {"id": "semi-011", "title": "SemiEngineering：Agentic AI 正在改写数据中心架构与 chiplet 设计", "keywords": ["Agentic AI", "异构SoC", "chiplet", "3D-IC", "数据中心"], "tech": "Agentic AI / 异构SoC", "route": "Chiplet / 架构", "routeStatus": "→稳定", "content": "SemiEngineering 6月11日分析，独立GPU正被将CPU、GPU、NPU组合的异构SoC与chiplet取代，以消去内存瓶颈、降低延迟；Agentic AI因需复杂编排与推理循环而无法仅靠GPU，标志架构回归紧耦合异构集成（如Intel Panther Lake、Nvidia Vera Rubin）。文章指出Agentic AI SoC的功能与性能验证必须结合大规模仿真与原型，并关注3D-IC堆叠内存中的功耗与热完整性，硬件级安全与监控成为关键设计要求。", "reason": "AI工作负载正反向定义芯片架构，chiplet异构集成与3D-IC的验证/热/安全挑战随之升级。", "source": "SemiEngineering", "url": "https://semiengineering.com/agentic-ai-is-changing-data-center-architectures/", "image": "https://images.unsplash.com/photo-1593305841991-05
