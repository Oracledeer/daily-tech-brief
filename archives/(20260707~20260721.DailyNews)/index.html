tle": "背面供电网络2026：Intel PowerVia已出货，TSMC Super Power Rail年内跟进", "keywords": ["BSPDN", "PowerVia", "Super Power Rail", "背面供电", "Intel 18A"], "tech": "背面供电网络", "route": "供电技术", "routeStatus": "↑突破", "content": "BSPDN专题分析指出，背面供电网络（BSPDN）已随Intel PowerVia在18A节点量产出货，台积电Super Power Rail将于N2P、三星BSPDN将于SF2节点年内跟进。该技术将电源布线移至晶圆背面，释放正面布线并降低IR压降与热阻。", "reason": "背面供电是后FinFET时代提升密度与能效的关键使能技术，三大厂同年的落地节奏值得关注。", "source": "Internet Pros / Intel, TSMC", "url": "https://internet-pros.com/blog/backside-power-delivery-bspdn-powervia-2026/", "date": "2026-06-20", "priority": "flash", "image": "https://images.unsplash.com/photo-1517077304055-6e89abbf09b0?w=1200&q=80&auto=format&fit=crop"}, {"id": "semi-016", "title": "2026年CPO共封装光学五大趋势：光引擎贴近交换ASIC成AI互联主流", "keywords": ["CPO", "共封装光学", "硅光", "AI互联", "光引擎"], "tech": "硅光共封装", "route": "光互连", "routeStatus": "→稳定", "content": "西门子半导体封装博客（2月5日）总结2026年CPO五大趋势：为应对AI的能耗需求，共封装光学将光引擎直接贴近交换ASIC、加速器与chiplet，缩短电通道、降低功耗与延迟。1.6T光模块需求与台积电COUPE等方案的成熟推动CPO从概念验证走向规模落地。", "reason": "CPO是突破AI集群电互连功耗墙的核心路径，2026年被视为规模化落地元年。", "source": "Siemens / 半导体封装", "url": "https://blogs.sw.siemens.com/semiconductor-packaging/2026/02/05/five-key-trends-of-co-packaged-optics-cpo-in-2026/", "date": "2026-02-05", "priority": "flash", "image": "https://images.unsplash.com/photo-1517180102446-f3ece451e9d8?w=1200&q=80&auto=format&fit=crop"}, {"id": "semi-017", "title": "Argonne与Intel部署12量子位硅自旋量子处理器，推进硅基量子 scalable", "keywords": ["量子计算", "硅自旋量子位", "Intel", "Argonne", "量子器件"], "tech": "硅基量子位", "route": "量子器件", "routeStatus": "→稳定", "content": "据阿贡国家实验室（1月6日）报道，Argonne与Intel合作部署基于硅量子点的12量子位处理器，并配套Horse Ridge低温控制器实现高保真度可编程控制。硅自旋量子位可借助成熟CMOS工艺实现可扩展制造，是大规模量子计算的有力路线。", "reason": "硅自旋量子位复用传统半导体产线，是量子计算走向可扩展制造的现实路径之一。", "source": "Argonne National Laboratory / Intel", "url": "https://www.anl.gov/article/argonne-launches-silicon-quantum-processor-collaboration-with-intel", "date": "2026-01-06", "priority": "flash", "image": "https://images.unsplash.com/photo-1505765050516-f72dcac9c60e?w=1200&q=80&auto=format&fit=crop"}], "papers": [{"id": "semi-paper-003", "title": "Vertical gallium nitride MOSFETs: Advanced architectures, challenges and prospects", "authors": "ScienceDirect (Solid-State Electronics)", "field": "半导体", "paperType": "期刊论文", "venue": "Solid-State Electronics", "oneLiner": "系统梳理垂直沟道 GaN MOSFET 的先进架构，突破平面器件电流密度与耐压瓶颈。", "abstract": "垂直氮化镓（GaN）MOSFET 凭借其优异的材料特性成为功率器件的变革性方案。本文综述了垂直 GaN MOSFET 的先进架构、关键工艺挑战与未来前景。", "content": "横向 GaN HEMT 在大电流应用中受限于散热与面积，垂直 GaN MOSFET 通过垂直导电路径显著提升电流处理能力并改善热分布。文章讨论了沟槽栅、电流孔径（CAVET）等结构及其可靠性与工艺难点。", "techIntro": "GaN 作为宽禁带半导体，具备高击穿场强与高电子迁移率。垂直结构可将高压与高电流解耦，是车规与工业电源向更高功率密度演进的核心方向。", "techTags": ["GaN", "垂直 MOSFET", "功率器件", "宽禁带"], "metrics": [{"name": "架构", "value": "垂直沟道", "unit": "", "note": "突破平面限制"}, {"name": "材料", "value": "GaN", "unit": "", "note": "宽禁带"}], "attachments": [{"name": "论文原文", "url": "https://www.sciencedirect.com/science/article/pii/S0167931725001078", "label": "ScienceDirect", "cached": false}], "source": "ScienceDirect", "url": "https://www.sciencedirect.com/science/article/pii/S0167931725001078", "image": "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=1200&q=80&auto=format&fit=crop", "imageCaption": "垂直 GaN MOSFET 结构", "date": "2026-07-07"}, {"id": "semi-paper-004", "title": "M2S-HEMT: An E-Mode p-GaN Gate Power Transistor Decoupling Threshold Voltage and ON-Resistance", "authors": "崔家玮、付星源等，北京大学集成电路学院", "field": "半导体", "paperType": "期刊论文", "venue": "北京大学集成电路学院", "oneLiner": "多到单沟道 HEMT（M2S-HEMT）解耦阈值电压与导通电阻，提升常关型 p-GaN 功率器件设计自由度。", "abstract": "该工作以 Multi-to-Single Channel HEMT (M2S-HEMT) 为题，提出一种增强型（E-Mode）p-GaN 栅功率晶体管结构，将阈值电压与导通电阻解耦，改善器件权衡。", "content": "传统 p-GaN 栅 HEMT 中阈值电压与导通电阻高度耦合，难以独立优化。M2S-HEMT 通过多沟道到单沟道的特殊设计，在保持常关特性的同时降低 Ron，为高性能 GaN 功率器件提供新思路。", "techIntro": "p-GaN 栅结构是当前主流的常关型 GaN 功率器件方案，但其 Vth 与 Ron 的耦合限制了性能上限。解耦二者是产业界长期追求的设计目标。", "techTags": ["GaN", "p-GaN HEMT", "功率晶体管", "阈值电压解耦"], "metrics": [{"name": "器件类型", "value": "E-mode p-GaN", "unit": "", "note": "常关型"}, {"name": "创新点", "value": "Vth-Ron 解耦", "unit": "", "note": "M2S 结构"}], "attachments": [{"name": "论文原文", "url": "https://ic.pku.edu.cn/kxyj/kydt/3540925f79e44703baf9eb9f94e4834f.htm", "label": "北大集成电路学院", "cached": false}], "source": "北京大学集成电路学院", "url": "https://ic.pku.edu.cn/kxyj/kydt/3540925f79e44703baf9eb9f94e4834f.htm", "image": "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=1200&q=80&auto=format&fit=crop", "imageCaption": "M2S-HEMT 器件结构", "date": "2026-07-07"}]}, "2026-07-08": {"schema": "semicon-news-daily/v1", "date": "2026-07-08", "weekday": "周三", "summary": "SemiEngineering连发两篇先进封装深度分析：多芯片现场测试方法论与高密度扇出型面板封装检测量测追赶；imec发布2026版路线图：CFET垂直堆叠是A7级（~0.7nm）关键转折点，0.3nm目标2038年。新增：AI时代chiplet设计缺失『可观测性』层、验证方法学难追上AI芯片节奏、如何构建数十亿个混合键合凸点、CPO测试面临数据中心产能陡增；7/3产业周评显示三星2600亿建厂、2026年DRAM设备支出首破500亿美元，高通发布HBC近内存计算架构，Dynex推出450A GaN半桥模块，SK海力士与三星围绕HBM4就绪度与1c DRAM缩放展开竞赛；技术论文盘点聚焦Processing-using-DRAM干扰风险与原子级等离子体加工。 当日另含 2 篇半导体器件技术论文研讨。", "focus": "先进封装测试与量测、chiplet可观测性与混合键合、CPO光互连测试、AI驱动EDA验证、存内/近内存计算架构、宽禁带功率模块", "news": [{"id": "semi-001", "title": "SemiEngineering：多芯片现场测试需建立于成熟方法论之上", "keywords": ["多芯片测试", "3DIC", "先进封装", "UCIe", "DFS"], "tech": "先进封装/3DIC测试", "route": "3DIC测试方法论", "routeStatus": "→稳定", "content": "SemiEngineering 7月7日发布深度分析指出，随着AI数据中心和汽车等关键任务领域广泛采用多芯片系统（2.5D/3D-IC），仅保证出厂时（Time Zero）正常工作已不足以确保器件全生命周期可靠性。文章提出'监控-测试-修复'三位一体策略：复用UCIe/PCIe高速接口可将测试带宽提升10-20倍；嵌入信号完整性监控器（SIM）实时生成眼图判断信号质量；硅生命周期管理（SLM）结合ML模型预测退化趋势和剩余寿命；物理感知芯片到芯片桥接测试可减少95%-99%的无效桥接模式。IEEE 1838标准允许芯片间无需PHY即可通信测试。Synopsys与台积电的联合案例展示了通过UCIe总线对隐藏芯片进行ATPG测试的完整流程。", "reason": "多芯片系统的现场可靠性是先进封装产业化的关键瓶颈", "source": "SemiEngineering / Laura Peters", "url": "https://semiengineering.com/multi-die-testing-in-the-field-must-build-on-established-test-methodologies/", "image": "https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?w=1200&q=80&auto=format&fit=crop", "imageCaption": "3D-IC 多芯片堆叠（示意）", "date": "2026-07-07", "priority": "featured"}, {"id": "semi-002", "title": "SemiEngineering：高密度扇出型面板级封装的检测量测技术追赶", "keywords": ["面板级封装", "FOWLP", "检测量测", "RDL", "翘曲"], "tech": "先进封装/面板级封装", "route": "FOPLP产业化", "routeStatus": "→稳定", "content": "SemiEngineering 7月7日发表高密度扇出型面板级封装（HDFO PLP）检测量测专题分析。核心挑战包括RDL线宽/线距从20μm缩至5μm（目标2μm）、凸点间距从20μm缩至5μm、RDL层数从3层增至9层。面板尺寸达600×600mm，材料CTE不匹配导致严重翘曲，高分辨率光学系统景深受限。一块600mm面板以1μm分辨率检测会产生约10¹²像素数据量。解决方案包括：引入X射线/红外检测内部通孔质量；自适应光刻——将芯片位移测量数据输入ML算法驱动逐芯片覆盖校正；Bruker等厂商开发可测2000μm厚膜的方案。KLA、Onto Innovation、Koh Young等正将晶圆级平台改造适配面板尺寸。", "reason": "面板级封装是先进封装降本的关键路径，检测量测技术决定了量产可行性", "source": "SemiEngineering / Anne Meixner", "url": "https://semiengineering.com/inspection-and-metrology-catching-up-for-high-density-fan-out-panel-packaging/", "image": "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=1200&q=80&auto=format&fit=crop", "imageCaption": "面板级封装检测设备（示意）", "date": "2026-07-07", "priority": "featured"}, {"id": "semi-003", "title": "imec 2026版路线图：CFET是A7级关键转折，0.3nm目标2038年", "keywords": ["imec", "路线图", "CFET", "0.3nm", "A7"], "tech": "先进制程路线图", "route": "CFET架构", "routeStatus": "↑突破", "content": "比利时微电子研究中心imec近期发布2026版半导体制程技术发展蓝图。关键转折点预计在A7级（约0.7nm/7Å），约2033年转向CFET架构——与当前FinFET/GAA将n型和p型晶体管并排放置不同，CFET将它们垂直堆叠，为微缩增加第三维度。A7的CPP仍维持42nm，但通过CFET可使标准单元高度大幅缩减。路线图指出行业有望在2038年实现0.3nm等级先进制程。该路线图由台积电、英特尔、三星等共同参与制定。", "reason": "imec路线图是行业共识风向标，CFET时间线的明确对设备/材料/EDA投资有指导意义", "source": "环球网科技 / imec", "url": "https://tech.huanqiu.com/article/4SDQDssL5nC", "image": "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=1200&q=80&auto=format&fit=crop", "imageCaption": "半导体晶圆制造（示意）", "date": "2026-07-02", "priority": "secondary"}, {"id": "semi-004", "title": "六大前沿工艺同步开启设备需求空间：GAA→CFET演进、CoPoS、CPO全面解析", "keywords": ["GAA", "CFET", "CoPoS", "CPO", "High-NA EUV", "HBM"], "tech": "半导体设备/工艺路线", "route": "设备技术路线", "routeStatus": "↑突破", "content": "据行业深度分析报道，六大技术变革同步推动半导体设备需求：GAA向CFET演进要求新型沉积/刻蚀设备；3D NAND层数持续增加和HBM高密度堆叠催生混合键合需求；台积电推出CoPoS面板级封装开启新型封装设备赛道；High-NA EUV配套干法光刻胶技术落地要求光刻设备更新；HBM4内置冗余通道和混合键合互连对检测量测提出新要求；CPO硅光共封装开辟光电一体化新路径。设备厂商不再只是制造配套工具，而是直接决定先进工艺能否顺利量产落地。", "reason": "多技术路线同步爆发意味着设备行业正经历结构性升级换代周期", "source": "百家号 / 行业分析", "url": "https://baijiahao.baidu.com/s?id=1869358415758832474&wfr=spider&for=pc", "image": "https://images.unsplash.com/photo-1517842645767-c639042777db?w=1200&q=80&auto=format&fit=crop", "imageCaption": "半导体设备自动化车间（示意）", "date": "2026-06-30", "priority": "secondary"}, {"id": "semi-005", "title": "SemiEngineering：AI 时代 chiplet 设计缺失『可观测性』关键层", "keywords": ["可观测性", "chiplet", "遥测", "片上监视器", "SLM"], "tech": "Chiplet 可观测性 / 遥测", "route": "先进封装 / Chiplet", "routeStatus": "→稳定", "content": "SemiEngineering 7月1日刊文指出，在AI时代的多die与chiplet架构中，可观测性尚未作为一等公民内建到系统，跨封装边界难以统一关联流量、延迟、拥塞与故障行为。文章主张构建对齐通信fabric的遥测平面，并借助片上监视器（on-die monitors）、近传感器数据缩减与可编程采集扩展系统级可见性。文中还讨论硅生命周期管理（SLM）实现自修复硅与核心收割，并呼吁通过标准化遥测模式与可观测性契约支撑多厂商chiplet生态。", "reason": "chiplet跨die的可观测性缺失是异构集成可靠性的核心短板，直接影响AI芯片的调试与现场运维。", "source": "SemiEngineering", "url": "https://semiengineering.com/observability-is-a-missing-layer-in-ai-era-chiplet-design/", "image": "https://images.unsplash.com/photo-1517999144091-3d9dca6d1e43?w=1200&q=80&auto=format&fit=crop", "imageCaption": "Chiplet 异构集成（示意）", "date": "2026-07-01", "priority": "secondary"}, {"id": "semi-006", "title": "SemiEngineering：验证方法学难追上 AI 芯片设计节奏", "keywords": ["EDA", "验证", "Agentic AI", "覆盖率", "芯片设计"], "tech": "EDA 验证 / Agentic AI", "route": "设计工具 / 验证", "routeStatus": "→稳定", "content": "SemiEngineering 6月25日报道，AI能力以破纪录速度涌现，但半导体验证方法学缺乏成熟部署范式，企业被迫自行摸索。Synopsys、Cadence、Siemens EDA 等指出，早期客户经验显示 agentic 工作流可将150人验证团队产出提升至相当于400人以上；但资深工程师仍须把关质量，AI不应替代其对正确性的判断。文章认为受益者横跨资深与初级工程师两端，但如何可靠部署仍无定论。", "reason": "验证是芯片tape-out前最耗时的环节，AI agent能否真正提升覆盖率闭环而非牺牲质量，决定先进SoC上市节奏。", "source": "SemiEngineering", "url": "https://semiengineering.com/verification-methodologies-struggle-to-keep-up-with-ai/", "image": "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=1200&q=80&auto=format&fit=crop", "imageCaption": "EDA 验证流程（示意）", "date": "2026-06-25", "priority": "secondary"}, {"id": "semi-007", "title": "SemiEngineering：如何构建数十亿个混合键合互连凸点", "keywords": ["混合键合", "Hybrid Bonding", "铜对铜", "BiST", "先进封装"], "tech": "混合键合 / Hybrid Bonding", "route": "先进封装", "routeStatus": "↑突破", "content": "SemiEngineering 6月18日刊文解析混合键合（hybrid bonding）技术：以1µm间距实现无凸点铜对铜连接，理论可将300mm晶圆以200nm焊盘间距键合出数万亿连接。文章指出成功要求表面粗糙度通常小于0.5nm、CMP铜凹陷控制在3–5nm，且逐垫光学检测已不再可行，须依赖内置自测试（BiST）。Synopsys 3DIO IP 将互连分组为每16通道的小型可重复集群并含冗余与修复能力，以吸收制造缺陷。", "reason": "混合键合是HBM4/3DIC实现极高I/O密度的关键工艺，其均匀性与测试挑战直接决定先进封装良率。", "source": "SemiEngineering", "url": "https://semiengineering.com/how-to-build-billions-of-bumps/", "image": "https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200&q=80&auto=format&fit=crop", "imageCaption": "混合键合互连（示意）", "date": "2026-06-18", "priority": "secondary"}, {"id": "semi-008", "title": "SemiEngineering：共封装光学(CPO)测试面临数据中心产能陡增", "keywords": ["CPO", "共封装光学", "硅光", "激光源", "光互连"], "tech": "共封装光学 / CPO 测试", "route": "光互连", "routeStatus": "→稳定", "content": "SemiEngineering 6月9日报道，AI数据中心需求推动CPO年产能需从百万级扩至数千万级，但各CPO设计独有且定制测试单元昂贵，制造测试压力巨大。单个光学引擎需4–8个激光源激励，含16–32个引擎的模块共需64–128个激光源；转向CWDM/DWDM多波长复用将进一步推高光源数。CPO良率为电性规格与光学规格乘积，但ATE、光学引擎与OSA数据格式割裂，单一器件完整画像追溯常需数周。", "reason": "CPO从概念验证走向规模落地的最大瓶颈在测试与量测，光源数量与数据孤岛问题不解决将阻碍年产能向亿级扩展。", "source": "SemiEngineering", "url": "https://semiengineering.com/co-packaged-optics-testing-faces-steep-data-center-ramp/", "image": "https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=1200&q=80&auto=format&fit=crop", "imageCaption": "共封装光学引擎（示意）", "date": "2026-06-09", "priority": "secondary"}, {"id": "semi-009", "title": "SemiEngineering 7/3 产业周评：三星2600亿建厂、DRAM设备支出破500亿", "keywords": ["三星", "HBM", "DRAM设备", "300mm", "3D NAND"], "tech": "存储设备投资 / 晶圆厂", "route": "存储技术 / 产能", "routeStatus": "→稳定", "content": "SemiEngineering 7月3日产业周评汇总：三星拟投资2600亿美元在光州新建半导体晶圆厂、360亿美元在天安与温阳建设HBM晶圆厂；SEMI报告预计2026年全球300mm存储设备投资首破500亿美元（同比+29%），其中DRAM设备支出约370亿美元、3D NAND约140亿美元。同期英飞凌提前数月落成德累斯顿57亿美元Smart Power Fab，东芝推出U-MOS11-H 80V功率MOSFET，铠侠与Sandisk量产第10代3D闪存。", "reason": "存储设备投资创新高反映HBM与AI存储需求拉动，HBM产能与3D NAND世代竞赛是产业景气度的关键信号。", "source": "SemiEngineering", "url": "https://semiengineering.com/chip-industry-week-in-review-145/", "image": "https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?w=1200&q=80&auto=format&fit=crop", "imageCaption": "半导体晶圆厂（示意）", "date": "2026-07-03", "priority": "flash"}, {"id": "semi-010", "title": "SemiEngineering 技术论文盘点(6/30)：Processing-using-DRAM 干扰与原子级等离子体", "keywords": ["Processing-using-DRAM", "存内计算", "原子级等离子体", "氧化镓", "技术论文"], "tech": "Processing-using-DRAM / 原子级等离子体", "route": "新型存储 / 器件工艺", "routeStatus": "↑突破", "content": "SemiEngineering 6月30日技术论文盘点收录多项新研究：东京大学等《PuDGhost》首次在真实DRAM芯片上实验分析Processing-using-DRAM的计算结果损坏与干扰风险；名古屋大学等推进原子级受控等离子体加工；布法罗大学等分析Si掺杂氧化镓的缺陷驱动相变不稳定性；米兰理工与意法半导体提出事件驱动强化学习用于半导体产线长周期控制。", "reason": "Processing-using-DRAM等存内计算路线在真实芯片上的可靠性被首次量化，是存算一体走向实用的关键警示与依据。", "source": "SemiEngineering", "url": "https://semiengineering.com/chip-industry-technical-paper-roundup-june-30/", "image": "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=1200&q=80&auto=format&fit=crop", "imageCaption": "存内计算架构（示意）", "date": "2026-06-30", "priority": "flash"}, {"id": "semi-011", "title": "SemiEngineering：Agentic AI 正在改写数据中心架构与 chiplet 设计", "keywords": ["Agentic AI", "异构SoC", "chiplet", "3D-IC", "数据中心"], "tech": "Agentic AI / 异构SoC", "route": "Chiplet / 架构", "routeStatus": "→稳定", "content": "SemiEngineering 6月11日分析，独立GPU正被将CPU、GPU、NPU组合的异构SoC与chiplet取代，以消去内存瓶颈、降低延迟；Agentic AI因需复杂编排与推理循环而无法仅靠GPU，标志架构回归紧耦合异构集成（如Intel Panther Lake、Nvidia Vera Rubin）。文章指出Agentic AI SoC的功能与性能验证必须结合大规模仿真与原型，并关注3D-IC堆叠内存中的功耗与热完整性，硬件级安全与监控成为关键设计要求。", "reason": "AI工作负载正反向定义芯片架构，chiplet异构集成与3D-IC的验证/热/安全挑战随之升级。", "source": "SemiEngineering", "url": "https://semiengineering.com/agentic-ai-is-changing-data-center-architectures/", "image": "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=1200&q=80&auto=format&fit=crop", "imageCaption": "异构 SoC 架构（示意）", "date": "2026-06-11", "priority": "flash"}, {"id": "semi-012", "title": "SemiEngineering：PCIe 在 AI 浪潮下仍受益于互连协议演进", "keywords": ["PCIe", "CXL", "互连", "内存池化", "AI集群"], "tech": "PCIe / CXL 互连", "route": "互连", "routeStatus": "→稳定", "content": "SemiEngineering 6月10日探讨PCIe在AI时代的角色：尽管光学与chiplet互连兴起，PCIe凭借向后兼容与生态成熟度仍受益于协议演进，CXL等扩展在内存池化与异构连接中持续渗透。文章分析AI集群对高带宽低延迟互连的需求如何推动PCIe速率与分层拓扑升级。", "reason": "互连协议是AI系统带宽与延迟的底层约束，PCIe/CXL的演进节奏影响chiplet与加速器协同效率。", "source": "SemiEngineering", "url": "https://semiengineering.com/pcie-benefits-from-ai-despite-scaling-protocols/", "image": "https://images.unsplash.com/photo-1517842645767-c639042777db?w=1200&q=80&auto=format&fit=crop", "imageCaption": "高速互连（示意）", "date": "2026-06-10", "priority": "flash"}, {"id": "semi-013", "title": "SemiEngineering：AI 模型变革缺陷检测却难规模化的根因", "keywords": ["AI缺陷检测", "ADC", "CNN", "良率", "数据孤岛"], "tech": "AI 缺陷检测 / ADC", "route": "制造 / 检测", "routeStatus": "→稳定", "content": "SemiEngineering 6月9日报道，基于CNN的深度学习方法可自动学习复杂缺陷特征，用于自动缺陷分类（ADC），在晶圆边缘与partial die等区域泛化更好，并结合混合键合场景检测残留钨CMP缺陷。但PDF Solutions估计超70%的AI项目在试点后停滞，主因是数据碎片化、遗留工厂系统、专家带宽不足及缺乏企业级AI运维模型；MES/ERP元数据未对齐会导致横向数据联通失败。", "reason": "AI缺陷检测的价值已在试点验证，但工厂级数据孤岛是规模化落地的主要障碍，关乎先进制程良率学习速度。", "source": "SemiEngineering", "url": "https://semiengineering.com/ai-models-transform-defect-inspection-and-review-but-can-fail-to-scale/", "image": "https://images.unsplash.com/photo-1517999144091-3d9dca6d1e43?w=1200&q=80&auto=format&fit=crop", "imageCaption": "晶圆缺陷检测（示意）", "date": "2026-06-09", "priority": "flash"}, {"id": "semi-014", "title": "SemiEngineering：设计能『自我解释』的芯片", "keywords": ["可解释芯片", "片上监测", "遥测", "形式化方法", "自修复"], "tech": "片上监测 / 可解释性", "route": "设计工具 / 监测", "routeStatus": "→稳定", "content": "SemiEngineering 6月17日探讨『可解释芯片（chips that can explain themselves）』设计趋势：通过在芯片内嵌监控与数据模型，使系统能自述运行状态、定位异常根因，而非仅报告『发生了什么』。该方向与健康度遥测、形式化方法验证结合，支撑AI时代复杂SoC的现场可观测性与自修复。", "reason": "随着芯片复杂度飙升，内建可解释性是从被动调试转向主动健康管理的必然，呼应chiplet可观测性议题。", "source": "SemiEngineering", "url": "https://semiengineering.com/designing-chips-that-can-explain-themselves/", "image": "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=1200&q=80&auto=format&fit=crop", "imageCaption": "片上健康监测（示意）", "date": "2026-06-17", "priority": "flash"}, {"id": "semi-015", "title": "SemiEngineering：AI 数据中心与汽车产业在器件层面趋同", "keywords": ["AI数据中心", "汽车", "功率半导体", "宽禁带", "功能安全"], "tech": "跨域器件协同", "route": "应用驱动", "routeStatus": "→稳定", "content": "SemiEngineering 7月2日指出，AI数据中心与汽车产业在功率、传感与可靠性需求上正趋同于相同器件创新议题：高算力下的功率半导体、宽禁带器件与功能安全成为共性挑战。两领域共享对高效电源转换、热管理与长寿命可靠性的诉求，推动功率与模拟芯片技术跨域复用。", "reason": "跨域需求趋同将加速宽禁带功率器件与高可靠模拟技术的产业化，是器件厂商的重要市场信号。", "source": "SemiEngineering", "url": "https://semiengineering.com/ai-data-centers-and-auto-industry-converge-on-same-issues/", "image": "https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200&q=80&auto=format&fit=crop", "imageCaption": "功率与汽车电子（示意）", "date": "2026-07-02", "priority": "flash"}, {"id": "semi-016", "title": "高通发布 HBC 近内存计算架构：每瓦带宽是 HBM 的 6 倍", "keywords": ["高通", "HBC", "近内存计算", "TSV", "存储墙"], "tech": "近内存计算 / HBC", "route": "存储架构", "routeStatus": "↑突破", "content": "据快科技/腾讯新闻6月25日报道，高通在2026投资者日公布高带宽计算（HBC）架构，将专用近内存加速器堆叠在LPDDR存储堆栈下方，通过TSV硅通孔实现3D堆叠。该技术旨在突破AI『存储墙』，将计算单元直接置于DRAM底层；高通称在完整加速器级别可实现6倍于HBM的每瓦带宽与200倍于SRAM的每瓦容量。", "reason": "近内存计算是缓解AI存储墙的重要架构路线，HBC将计算贴近DRAM有望重塑AI加速器能效范式。", "source": "快科技 / 腾讯新闻", "url": "https://news.qq.com/rain/a/20260625A07FQ700", "image": "https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=1200&q=80&auto=format&fit=crop", "imageCaption": "近内存计算堆叠（示意）", "date": "2026-06-25", "priority": "flash"}, {"id": "semi-017", "title": "Dynex 发布 450A/650V GaN 半桥功率模块，面向快充与工业", "keywords": ["Dynex", "GaN", "功率模块", "半桥", "宽禁带"], "tech": "GaN 功率模块", "route": "宽禁带半导体", "routeStatus": "↑突破", "content": "据Ralf's GaN & SiC News（7月2日），Dynex Semiconductor宣布开发450A、650V GaN半桥功率模块，主打超快开关性能、高效率与紧凑集成，面向电动车快充、工业电源等大功率场景。该模块体现GaN从单器件向功率模块级封装演进，推动宽禁带器件在更高功率段落地。", "reason": "GaN功率模块化是宽禁带器件从消费级快充走向工业/车规高功率应用的关键一步。", "source": "LinkedIn / Ralf's GaN & SiC News", "url": "https://www.linkedin.com/pulse/ralfs-gan-sic-news-july-2-2026-ralf-higgelke-k67me/", "image": "https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?w=1200&q=80&auto=format&fit=crop", "imageCaption": "GaN 功率模块（示意）", "date": "2026-07-02", "priority": "flash"}, {"id": "semi-018", "title": "CPO/XPO 领衔，AI 数据中心网络迈向 1.6T", "keywords": ["CPO", "XPO", "1.6T", "硅光", "光互连"], "tech": "共封装光学 / 1.6T 光互连", "route": "光互连", "routeStatus": "→稳定", "content": "据ICC讯（6月25日）基于OFC 2026讨论分析，AI集群对高速光连接的迫切需求推动CPO、XPO、Open CPX、OCI及6.4T OBO等新兴技术升温，AI数据中心网络迈向1.6T。文章强调光学供应链与规模化制造能力在AI时代的关键作用，硅光与光电协同封装成为突破电互连功耗墙的核心路径。", "reason": "1.6T光互连与CPO生态成熟是AI集群扩展的底层支撑，供应链量产能力决定落地节奏。", "source": "ICC 讯 / 光纤在线", "url": "http://www.iccsz.com/site/cn/News/2026/06/25/20260625020953308554.htm", "image": "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=1200&q=80&auto=format&fit=crop", "imageCaption": "光互连模块（示意）", "date": "2026-06-25", "priority": "flash"}, {"id": "semi-019", "title": "SK 海力士与三星 HBM4 就绪度及 1c DRAM 缩放竞赛", "keywords": ["SK海力士", "三星", "HBM4", "1c DRAM", "混合键合"], "tech": "HBM4 / 1c DRAM", "route": "存储技术", "routeStatus": "→稳定", "content": "据Silicon Analysts（7月2日）分析，SK海力士目标将1c DRAM产量提升约8倍，三星则推进约50%的HBM产能扩张，两者对AI内存需求走向下注不同。文章评估两家在HBM4认证节奏、1c DRAM缩放与混合键合导入上的就绪度差异，反映存储厂商在AI内存世代切换中的战略分化。", "reason": "HBM4认证与1c DRAM缩放节奏决定AI内存供给格局，两大存储厂的产能赌注影响2026–2027供给平衡。", "source": "Silicon Analysts", "url": "https://siliconanalysts.com/analysis/sk-hynix-samsung-2026-memory-capex-hbm4-qualification-race", "image": "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=1200&q=80&auto=format&fit=crop", "imageCaption": "HBM 存储堆栈（示意）", "date": "2026-07-02", "priority": "flash"}], "papers": [{"id": "semi-paper-005", "title": "Silicon carbide MOSFETs: A critical review of applications, evolution and future trajectories", "authors": "ScienceDirect (Results in Engineering)", "field": "半导体", "paperType": "综述", "venue": "Results in Engineering", "oneLiner": "全面评述 SiC MOSFET 的技术演进、现状与未来，涵盖高温与高可靠应用场景。", "abstract": "本文系统分析碳化硅（SiC）MOSFET 的技术演进、当前最先进水平与未来轨迹，探讨其在高温、高功率等严苛环境中的应用优势。", "content": "SiC MOSFET 凭借宽禁带特性，在高温、高击穿电压场景下显著优于硅基器件。综述梳理了从平面到沟槽栅的代际演进、可靠性挑战（如栅氧退化）及在新能源汽车、光伏与储能中的规模化应用。", "techIntro": "SiC 与 GaN 并列为两大宽禁带半导体。SiC 聚焦中高压功率场景，其高导热与高耐压使之成为电动化与能源革命的关键使能材料。", "techTags": ["SiC", "MOSFET", "功率器件", "宽禁带", "可靠性"], "metrics": [{"name": "材料", "value": "4H-SiC", "unit": "", "note": "宽禁带"}, {"name": "范围", "value": "全代际", "unit": "", "note": "平面/沟槽"}], "attachments": [{"name": "论文原文", "url": "https://www.sciencedirect.com/science/article/pii/S277301232500055X", "label": "ScienceDirect", "cached": false}], "source": "ScienceDirect", "url": "https://www.sciencedirect.com/science/article/pii/S277301232500055X", "image": "https://images.unsplash.com/photo-1573164713988-8665fc963095?w=1200&q=80&auto=format&fit=crop", "imageCaption": "SiC 功率器件应用", "date": "2026-07-08"}, {"id": "semi-paper-006", "title": "3D Integrated Process and Hybrid Bonding of High Bandwidth Memory", "authors": "Springer (Electronic Materials Letters)", "field": "半导体", "paperType": "期刊论文", "venue": "Electronic Materials Letters", "oneLiner": "面向高带宽存储的 3D 集成工艺与混合键合，提升集成密度与热管理。", "abstract": "混合键合通过金属与绝缘体直接键合显著提升集成密度与热管理，是高性能半导体器件的关键技术。本文报道面向高带宽存储（HBM）的 3D 集成工艺与混合键合方案。", "content": "随着 AI 算力对带宽需求激增，HBM 通过 TSV 与混合键合实现多层堆叠。本文探讨 Cu/聚合物混合键合的工艺窗口、对准精度与界面可靠性，并指出其在高密度 3DIC 中的核心地位。", "techIntro": "混合键合（hybrid bonding）以纳米级 Cu-Cu 与介质-介质直接连接替代传统微凸点，极大缩短互连间距，是 CoWoS、HBM 等先进封装的基石。", "techTags": ["混合键合", "HBM", "3DIC", "先进封装", "高带宽存储"], "metrics": [{"name": "键合方式", "value": "Cu/介质混合", "unit": "", "note": "直接金属-绝缘体键合"}, {"name": "目标", "value": "HBM 堆叠", "unit": "", "note": "提升带宽密度"}], "attachments": [{"name": "论文原文", "url": "https://link.springer.com/article/10.1007/s13391-025-00557-9", "label": "Springer", "cached": false}], "source": "Springer", "url": "https://link.springer.com/article/10.1007/s13391-025-00557-9", "image": "https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=1200&q=80&auto=format&fit=crop", "imageCaption": "混合键合 3D 集成示意", "date": "2026-07-08"}]}, "2026-07-09": {"schema": "semicon-paper-daily/v1", "date": "2026-07-09", "weekday": "周四", "summary": "7月9日两篇半导体器件设计论文：NVIDIA Research提出HORIZON，首次将芯片硬件设计视为仓库级代码演化的自演化Agent框架，在Verilog功能验证Pass@1达88.9%、比GPT-5.5高9.4个百分点；ETH Zurich联合lowRISC和博洛尼亚大学推出Croc开源RISC-V SoC平台，从RTL到硅的端到端芯片设计教学流程，基于130nm开源PDK。", "focus": "AI Agent驱动的硬件设计自动化、开源RISC-V芯片设计教育", "highlights": ["HORIZON将Verilog功能验证Pass@1提升至88.9%，超越GPT-5.5约9.4个百分点", "Croc开源SoC平台可让学生在130nm节点从RTL设计走到流片，直接回应芯片人才短缺挑战"], "papers": [{"id": "semi-paper-001", "title": "Agentic Hardware Design as Repository-Level Code Evolution", "authors": "NVIDIA Research（完整作者列表见arXiv: 2606.28279）", "field": "半导体", "paperType": "预印本", "venue": "arXiv preprint, arXiv:2606.28279 [cs.AR], June 2026", "oneLiner": "NVIDIA提出HORIZON——首个将硬件设计视为仓库级代码演化的自演化Agent框架", "abstract": "We present HORIZON, a self-evolving agent framework that treats hardware design as repository-level code evolution. HORIZON enables LLM agents to autonomously analyze existing hardware designs, identify optimization opportunities, generate modifications, and perform iterative regression testing. On the Verilog function verification benchmark, HORIZON achieves a Pass@1 of 88.9%, outperforming GPT-5.5 by 9.4 percentage points. The framework represents a paradigm shift from human-in-the-loop hardware design toward agent-driven autonomous hardware development.", "content": "HORIZON的核心创新在于将硬件设计（RTL代码仓库）类比为软件代码仓库，允许Agent在仓库层面进行跨模块的分析、修改和验证。传统硬件设计流程中，工程师手工编写RTL，每次修改后需要手动运行仿真和形式验证。HORIZON的Agent自主完成：① 仓库级代码理解——分析模块层级结构、接口依赖和数据流；② 优化机会识别——基于PPA（功耗/性能/面积）目标和已知设计模式；③ 代码生成与修改——在保持功能正确的前提下重构或优化RTL；④ 自动回归测试——调用仿真器和形式验证工具验证修改的正确性。在Verilog功能验证基准测试中，HORIZON的Pass@1达到88.9%，比GPT-5.5（79.5%）高9.4个百分点，比基线Agent方法提升约15个百分点。该工作由NVIDIA Research完成，标志着AI Agent从辅助性的验证和调试延伸到全流程硬件设计自动化。", "techIntro": "Agentic EDA（电子设计自动化）是2026年兴起的新方向，利用LLM Agent的推理和工具调用能力来辅助甚至替代部分芯片设计流程。与传统的EDA工具不同，Agent不是执行固定的算法流程，而是在设计空间中自主探索、决策和迭代。HORIZON是第一篇将硬件设计视为仓库级代码演化的论文，借鉴了软件工程中\"仓库级代码演化\"的概念——把整个硬件代码库看作一个可演化的实体，Agent在其中进行优化和重构。这一方向与芯片设计行业面临的\"设计生产力鸿沟\"（design productivity gap）直接相关——晶圆厂提供的晶体管密度每代增长约40%，但设计团队的设计效率每代仅增长约20%。", "techTags": ["Agentic EDA", "HORIZON", "硬件设计自动化", "RTL", "AI驱动设计", "NVIDIA", "arXiv"], "metrics": [{"name": "Verilog功能验证Pass@1", "value": "88.9", "unit": "%", "note": "比GPT-5.5高9.4个百分点"}, {"name": "基线Agent对比", "value": "~15", "unit": "百分点", "note": "相比基线Agent方法提升"}, {"name": "设计层级", "value": "仓库级", "unit": "", "note": "跨模块分析+修改+回归"}, {"name": "验证方式", "value": "仿真+形式验证", "unit": "", "note": "自动回归测试"}], "attachments": [{"name": "论文预印本", "url": "https://arxiv.org/abs/2606.28279", "label": "arXiv 全文", "cached": false}, {"name": "SemiEngineering报道", "url": "https://semiengineering.com/a-self-evolving-agent-framework-that-treats-hardware-design-as-repository-level-code-evolution-nvidia-research/", "label": "SemiEngineering", "cached": false}], "source": "arXiv / NVIDIA Research", "url": "https://arxiv.org/abs/2606.28279", "image": "https://images.unsplash.com/photo-1517077304055-b38f0b7b2d63?w=1200&q=80&auto=format&fit=crop", "imageCaption": "HORIZON Agentic 硬件设计架构（示意）", "date": "2026-06-27"}, {"id": "semi-paper-002", "title": "Croc: Training the Next Generation Chip Designers on Domain-Specific End-to-End Open Source Silicon", "authors": "ETH Zurich, lowRISC CIC, University of Bologna（完整作者列表见arXiv: 2606.25673）", "field": "半导体", "paperType": "预印本", "venue": "arXiv preprint, arXiv:2606.25673 [cs.AR], June 2026", "oneLiner": "ETH Zurich推出Croc开源RISC-V SoC平台，从RTL到硅的端到端芯片设计教学流程", "abstract": "We present an end-to-end open-source domain-specific SoC design and fabrication flow built around Croc, a highly customizable RISC-V platform. Croc is assembled from open-source SystemVerilog IP blocks, integrates a 130 nm open-source PDK, and provides a complete teaching flow that takes students from architecture and RTL through physical design to tapeout. The platform enables students to gain hands-on experience across the full chip design stack, addressing the critical shortage of skilled chip designers.", "content": "Croc平台围绕一个高度可定制的RISC-V处理器核心构建，使用开源SystemVerilog IP模块，并集成基于130nm开源PDK（工艺设计套件）的物理设计流程。教学流程覆盖：① 架构设计与性能评估——学生可在RISC-V指令集架构上进行领域专用加速器设计；② RTL设计与仿真——基于开源IP进行SystemVerilog RTL编码和功能验证；③ 逻辑综合与物理设计——使用开源EDA工具将RTL综合到网表，再经过布局布线到GDSII；④ 流片——最终将设计送交制造。该平台已在ETH Zurich的VLSI课程中实际使用，学生可在一学期内完成从架构设计到物理设计的完整芯片开发流程。Croc直接回应全球芯片人才短缺问题——通过提供零成本的端到端开源教学平台，使任何高校甚至个人都能获得芯片设计的完整实践经验。", "techIntro": "芯片设计人才短缺是制约半导体产业增长的结构性问题。传统的芯片设计教育面临高门槛：商业EDA工具许可费用昂贵（数十万美元/年）、PDK通常需要与晶圆厂签署NDA、制造流片成本高昂（小批量和多项目晶圆（MPW）约数万至数十万美元）。Croc的突破在于：使用开源RISC-V核心（免除IP许可费）、使用开源SkyWater 130nm PDK（免除NDA）、使用开源EDA工具（OpenROAD等）、教学流程完全开源可复制。这使任何高校或个人都能以零成本获得完整的芯片设计经验。130nm虽然对先进制程（5nm/3nm）来说较老，但它足以教授全部核心概念：RTL设计、综合、时序分析、布局布线、DRC/LVS等。", "techTags": ["RISC-V", "开源芯片", "芯片设计教育", "SoC", "Croc", "ETH Zurich", "OpenROAD", "SkyWater 130nm"], "metrics": [{"name": "工艺节点", "value": "130", "unit": "nm", "note": "SkyWater开源PDK"}, {"name": "教学覆盖", "value": "RTL→GDSII", "unit": "", "note": "端到端全流程"}, {"name": "平台架构", "value": "RISC-V", "unit": "", "note": "高度可定制SoC"}, {"name": "工具链", "value": "全开源", "unit": "", "note": "免除商业EDA许可费用"}], "attachments": [{"name": "论文预印本", "url": "https://arxiv.org/abs/2606.25673", "label": "arXiv 全文", "cached": false}, {"name": "SemiEngineering报道", "url": "https://semiengineering.com/open-source-risc-v-platform-trains-chip-designers-from-rtl-to-silicon-eth-z-lowrisc-u-of-bologna/", "label": "SemiEngineering", "cached": false}], "source": "arXiv / ETH Zurich", "url": "https://arxiv.org/abs/2606.25673", "image": "https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?w=1200&q=80&auto=format&fit=crop", "imageCaption": "Croc 开源 RISC-V SoC 教学平台（示意）", "date": "2026-06-24"}]}};

  // ========== SECONDARY SPAN — 收窄版 Bento（缩小宽窄差异，杜绝空列） ==========

  const SECONDARY_SPANS = {
    1: [6],
    2: [3, 3],
    3: [2, 2, 2],
    4: [3, 3, 3, 3],
    5: [3, 3, 2, 2, 2],        // 2+3
    6: [3, 3, 3, 3, 3, 3],     // 2+2+2
    7: [3, 3, 2, 2, 2, 3, 3],  // 2+3+2
    8: [3, 3, 2, 2, 2, 2, 2, 2], // 2+3+3
  };
  function buildSecondarySpans(n) {
    if (SECONDARY_SPANS[n]) return SECONDARY_SPANS[n];
    // n > 8：统一 3 列（span 2）；若 n%3===1 则末张占满整行避免空列
    const arr = new Array(n).fill(2);
    if (n % 3 === 1) arr[n - 1] = 6;
    return arr;
  }

  // ========== RENDER — NEWS (featured / secondary / flash) ==========
  function renderNews(data) {
    if (!data) return `<div class="error">暂无数据</div>`;
    const news = data.news || [];
    if (!news.length) return `<div class="error">暂无新闻</div>`;

    // Classify by priority (default secondary)
    const featured = news.filter(n => n.priority === "featured").slice(0, 2);
    const secondary = news.filter(n => n.priority === "secondary");
    const flash = news.filter(n => n.priority === "flash");

    // If no priorities set, treat first 2 as featured, next 5 as secondary, rest as flash
    const hasPrioritySet = news.some(n => n.priority);
    let fNews = featured, sNews = secondary, flNews = flash;
    if (!hasPrioritySet) {
      fNews = news.slice(0, 2);

    }

    let html = "";

        if (data.focus) html += `<span class="overview-focus">${esc(data.focus)}</span>`;
        html += `</div>`;
      }
      html += `</div>`;
    }

    // ---- Featured (hero cards) ----
    if (fNews.length) {
      html += `<div class="hero-section">`;

            ${img || ``}
            <div class="card-overlay">
              <div class="card-tags">${tags}${routeBadge(n.routeStatus)}</div>
              <h2>${esc(n.title)}</h2>
              <p class="card-summary">${esc(n.content || n.event || "")}</p>
            </div>
            ${n.url ? `<a class="featured-link" href="${esc(n.url)}" target="_blank" rel="noopener"></a>` : ""}
          </div>`;
      });
      html += `</div></div>`;
    }

    // ---- Secondary (glassmorphism grid) ----
    if (sNews.length) {
      html += `<div class="secondary-section">`;
      html += `<span class="section-label">深度速读</span>`;
      html += `<div class="secondary-grid">`;
      sNews.forEach((n, i) => {
        // 收窄版 Bento：缩小宽窄差异，杜绝空列
        // 条数→排布：4→2+2, 5→2+3, 6→2+2+2（6 列网格，span 取 2/3，最大宽窄比 1.5）
        const span = buildSecondarySpans(sNews.length)[i] || 3;

        const img = n.image
          ? `<img class="sec-img" src="${esc(n.image)}" alt="${esc(n.title)}" loading="lazy" onerror="this.remove()" />`
          : ``;
        const tags = n.tech ? `<span class="sec-tag">${esc(n.tech)}</span>` : "";
        const routeT = routeBadge(n.routeStatus);
        html += `
          <div class="secondary-card sec-span-${span}">
            ${img || ""}
            <div class="sec-body">
              <div class="sec-tags">${tags}${routeT}</div>
              <h3>${esc(n.title)}</h3>
              <p class="sec-summary">${esc(n.content || n.event || n.reason || "")}</p>
              <div class="sec-meta">
                <span>${esc(n.source || "")}</span>
                ${n.url ? `<a class="sec-link" href="${esc(n.url)}" target="_blank" rel="noopener">阅读 →</a>` : ""}
              </div>
            </div>
          </div>`;
      });
      html += `</div></div>`;
    }

    // ---- Flash (compact list) ----
    if (flNews.length) {
      html += `<div class="flash-section">`;
      html += `<span class="section-label">快讯速览</span>`;
      html += `<div class="flash-list">`;
      flNews.forEach((n, i) => {
        const tag = n.tech || n.route || n.category || "";
        html += `
          <div class="flash-item">
            <span class="flash-index">${i + 1}</span>
            <div class="flash-content">
              <div class="flash-title">${esc(n.title)}</div>
              <p class="flash-summary">${esc(n.content || n.event || n.reason || "")}</p>
              <div class="flash-meta">
                <span class="flash-source">${esc(n.source || n.date || "")}</span>
                ${tag ? `<span class="flash-tag">${esc(tag)}</span>` : ""}
              </div>
            </div>
            ${n.url ? `<a class="flash-link" href="${esc(n.url)}" target="_blank" rel="noopener">→</a>` : ""}
          </div>`;
      });
      html += `</div></div>`;
    }

    return html;
  }

  // ========== RENDER — PAPER (deep read, one per page) ==========
  function renderPaper(data) {
    if (!data) return `<div class="error">暂无论文数据</div>`;
    const papers = data.papers || [];
    if (!papers.length) return `<div class="error">暂无论文</div>`;

    let html = `<div class="paper-section">`;

    // Summary header
    if (data.summary || data.highlights) {
      html += `<div class="overview-box">`;
      html += `<span class="overview-title">本期论文概述</span>`;
      if (data.summary) html += `<p class="overview-text">${esc(data.summary)}</p>`;
      if (data.focus) html += `<span class="overview-focus">${esc(data.focus)}</span>`;
      html += `</div>`;
    }

    papers.forEach((p, idx) => {
      if (idx > 0) html += `<div class="paper-divider"></div>`;

      const img = p.image
        ? `<img class="paper-header-img" src="${esc(p.image)}" alt="${esc(p.title)}" loading="lazy" onerror="this.remove()" />`
        : `<div class="paper-header-fallback"></div>`;

      const tags = [
        p.paperType ? `<span class="paper-meta-tag type">${esc(p.paperType)}</span>` : "",
        p.field ? `<span class="paper-meta-tag field">${esc(p.field)}</span>` : "",
        p.venue ? `<span class="paper-meta-tag venue">${esc(p.venue)}</span>` : "",
      ].filter(Boolean).join("");

      const techTags = (p.techTags || p.keywords || []).filter(Boolean);
      const tagCloud = techTags.length
        ? `<div class="paper-tag-cloud">${techTags.map(t => `<span class="paper-tag">${esc(t)}</span>`).join("")}</div>`
        : "";

      const metrics = p.metrics || [];
      const metricsHtml = metrics.length
        ? `<div class="paper-metrics">${metrics.map(m => `
          <div class="paper-metric">
            <span class="paper-metric-name">${esc(m.name || "")}</span>
            <span class="paper-metric-value">${esc(m.value || "")}${m.unit ? `<span class="paper-metric-unit">${esc(m.unit)}</span>` : ""}</span>
            ${m.note ? `<div class="paper-metric-note">${esc(m.note)}</div>` : ""}
          </div>`).join("")}</div>`
        : "";

      const attachments = (p.attachments || []).map(a => {
        const isLocal = a.cached || a.url.startsWith("./");
        return `<a class="attach-pill${isLocal ? " local" : ""}" href="${esc(a.url)}" target="${isLocal ? "_self" : "_blank"}" rel="noopener">${esc(a.label || a.name || "PDF")}</a>`;
      }).join("");

      html += `
        <article class="paper-card-full">
          ${img}
          <div class="paper-body">
            <div class="paper-meta-tags">${tags}</div>
            <h1 class="paper-title">${esc(p.title)}</h1>
            ${p.authors ? `<div class="paper-authors">${esc(p.authors)}</div>` : ""}
            ${p.oneLiner ? `<div class="paper-oneliner">${esc(p.oneLiner)}</div>` : ""}
            ${tagCloud}
            ${metricsHtml}

            <div class="paper-section-block">
              <span class="paper-section-label">摘要</span>
              <p>${esc(p.abstract || p.content || "")}</p>
            </div>

            <div class="paper-section-block">
              <span class="paper-section-label">技术解读</span>
              <p>${esc(p.content || p.techIntro || p.abstract || "")}</p>
            </div>

            ${p.techIntro ? `
            <div class="paper-section-block">
              <span class="paper-section-label">背景知识</span>
              <p>${esc(p.techIntro)}</p>
            </div>` : ""}

            ${attachments ? `<div class="paper-attachments">${attachments}</div>` : ""}

            <div class="paper-footer">
              <span class="paper-source">${esc(p.source || "")}</span>
              <span>${esc(p.date || data.date || "")}</span>
            </div>
            ${p.url ? `<a class="paper-link" href="${esc(p.url)}" target="_blank" rel="noopener">查看原文 →</a>` : ""}
          </div>
        </article>`;
    });

    html += `</div>`;
    return html;
  }

  // ========== RENDER — SKILLS (AI channel, 名词解释卡片网格) ==========
  function renderSkills(data) {
    if (!data || !data.skills || !data.skills.length) return `<div class="error">暂无 Skill 推荐</div>`;
    const skills = data.skills;
    const established = skills.filter(s => s.tier === "established").length;
    const rising = skills.filter(s => s.tier === "rising").length;

    let html = `<div class="skills-wrap">`;
    // 概览标题条
    html += `
      <div class="skills-head">
        <span class="section-label">每日 Skill 推荐</span>
        <p class="skills-sub">每天精选 <strong>${established} 个老牌高星</strong> + <strong>${rising} 个上升迅猛</strong> 的 Agent Skill，一句话看懂它是做什么的。</p>
      </div>`;

    // 不等宽卡片网格：6 列，spans 决定每行 2-3 个且不等宽
    const spans = [4, 2, 2, 2, 2, 3, 3];
    html += `<div class="skill-grid">`;
    skills.forEach((s, i) => {
      const span = spans[i % spans.length];
      const isRising = s.tier === "rising";
      const badge = isRising
        ? `<span class="sk-badge sk-rising">上升迅猛</span>`
        : `<span class="sk-badge sk-estab">老牌高星</span>`;
      const tags = (s.tags || []).map(t => `<span class="chip">${esc(t)}</span>`).join("");
      const author = s.author ? `<span class="sk-fact"><span class="sk-fact-k">作者</span><span class="sk-fact-v">${esc(s.author)}</span></span>` : "";
      const repo = s.repo ? `<span class="sk-fact"><span class="sk-fact-k">仓库</span><span class="sk-fact-v sk-mono">${esc(s.repo)}</span></span>` : "";
      html += `
        <article class="skill-card sk-span-${span}${isRising ? " sk-card-rising" : ""}">
          <div class="sk-head">
            <span class="sk-icon">${skillIconSvg(s)}</span>
            <div class="sk-head-main">
              <h3 class="sk-name">${esc(s.name || "")}</h3>
              ${badge}
            </div>
          </div>
          <div class="sk-spec">
            <span class="sk-fact sk-stars-fact">
              <span class="sk-fact-k">Stars</span>
              <span class="sk-fact-v sk-stars-v">${esc(s.stars || "—")}</span>
            </span>
            ${author}
            ${repo}
          </div>
          <p class="sk-desc">${esc(s.desc || s.description || "")}</p>
          <div class="sk-foot">
            <div class="sk-tags">${tags}</div>
            ${s.url ? `<a class="sk-link" href="${esc(s.url)}" target="_blank" rel="noopener">GitHub 查看 →</a>` : ""}
          </div>
        </article>`;
    });
    html += `</div></div>`;
    return html;
  }

  // ========== MAIN RENDER ==========
  function render() {
    const data = getData(state.channel, state.date);
    const $content = $("#content");
    const $dateTag = $("#dateTag");
    const $subTabs = $("#subTabs");

    // Update date tag
    $dateTag.textContent = data ? getDateLabel(data.date || state.date) : "";

    // Update sub-tabs
    const tabs = getSubTabs(state.channel);
    if (state.subTab === "paper" && state.channel === "ai") state.subTab = "skills";
    if (!tabs.find(t => t.id === state.subTab)) state.subTab = tabs[0].id;

    $subTabs.innerHTML = tabs.map(t =>
      `<button class="tab-l2${t.id === state.subTab ? " active" : ""}" data-subtab="${t.id}">${t.label}</button>`
    ).join("");

    // Bind sub-tab clicks
    $subTabs.querySelectorAll(".tab-l2").forEach(btn => {
      btn.onclick = () => {
        state.subTab = btn.dataset.subtab;
        fillDateSelect();
        render();
      };
    });

    // Render content
    let html = "";
    if (!data) {
      const label = state.subTab === "paper" ? "论文" : state.channel === "display" ? "面板显示" : state.channel === "semicon" ? "半导体" : "AI";
      html = `<div class="error">该日期暂无 ${label} 数据</div>`;
    } else if (state.subTab === "paper") {
      html = renderPaper(data);
    } else if (state.subTab === "skills") {
      html = renderSkills(data);
    } else {
      html = renderNews(data);
    }
    $content.innerHTML = html;
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // ========== EVENT BINDINGS ==========
  // Level-1 channel tabs
  $("#channelTabs").addEventListener("click", (e) => {
    const btn = e.target.closest("button.tab-l1");
    if (!btn) return;
    $$("#channelTabs .tab-l1").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    state.channel = btn.dataset.channel;
    state.subTab = "news";
    fillDateSelect();
    render();
  });

  // Date select
  $("#dateSelect").addEventListener("change", (e) => {
    state.date = e.target.value;
    render();
  });

  // ========== INIT ==========
  fillDateSelect();
  render();

  // ========== SCROLL REVEAL — Apple-style fade-up ==========
  (function initScrollReveal() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          // Stagger delay based on element index within viewport
          requestAnimationFrame(() => {
            entry.target.classList.add('visible');
          });
          observer.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.01,
      rootMargin: '0px 0px -20px 0px'
    });

    function revealContent() {
      const sections = document.querySelectorAll(
        '.hero-section, .secondary-section, .flash-section, .paper-section, .skills-wrap'
      );
      sections.forEach((el, idx) => {
        if (!el.classList.contains('reveal')) {
          el.classList.add('reveal');
          if (idx % 3 === 1) el.classList.add('reveal-delay-1');
          else if (idx % 3 === 2) el.classList.add('reveal-delay-2');
          observer.observe(el);
        }
      });
    }

    // Initial + re-run on render
    revealContent();

    // Also observe after dynamic renders
    const origRender = render;
    // Re-observe whenever content changes
    const watchContent = new MutationObserver(() => {
      requestAnimationFrame(revealContent);
    });
    const app = document.getElementById('app');
    if (app) watchContent.observe(app, { childList: true, subtree: true });
  })();
  </script>
</body>
